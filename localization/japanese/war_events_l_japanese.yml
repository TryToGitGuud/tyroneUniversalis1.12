l_japanese:
 war_stuff.1.t:0 "[SCOPE.sCountry('war_stuff_enemy').GetCapital.GetCityHubName] 占領"
 war_stuff.1.d:1 "我が勝利した軍は今や[SCOPE.sCountry('war_stuff_enemy').GetName]の心臓部を占領している。征服された首都をどう扱うかは歴史に響き渡り、我々の正統性と敵の抵抗意志を形作るだろう。"
 war_stuff.1.f:1 ""「この人々は、その運命が我々の慈悲にかかっていることを知っている」""
 war_stuff.1.a:0 "秩序を維持し制度を尊重せよ"
 war_stuff.1.b:0 "兵士に相応の分け前を取らせよ"

 war_stuff.2.t:0 "[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] 占領"
 war_stuff.2.d:1 "驚くべきことに、占領軍である[SCOPE.sCountry('war_stuff_enemy').GetAdjective]軍は勝利にもかかわらず秩序を維持し、我々の制度を尊重した。"
 war_stuff.2.f:1 ""「侵略者は略奪せずに市場を巡回し、落とした財布を返す者さえ見かけた！ 一体誰がそんな…礼節を持って征服するというのか？」""
 war_stuff.2.a:0 "その自制心は評価する"

 war_stuff.3.t:0 "[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] 略奪"
 war_stuff.3.d:1 "[SCOPE.sCountry('war_stuff_enemy').GetAdjective]軍は[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]を燻る廃墟と化し、我々の国宝を略奪し、遺産を冒涜した。"
 war_stuff.3.f:1 ""「数世紀の知識が灰となった。彼らは像をスクラップのため溶かした！」""
 war_stuff.3.a:0 "この蛮行の代償を払わせる！"

 war_stuff.4.t:0 "[SCOPE.sState('war_stuff_state').GetName]の不安"
 war_stuff.4.d:1 "[SCOPE.sState('war_stuff_state').GetName]全域で暴力的な事件が発生している。占領下の住民が我々の権威に抵抗しているのだ。街路は反抗で血に染まり、我々は直ちに対応を決めねばならない。"
 war_stuff.4.f:1 ""「彼らは我々が舗装した通りから剥がした石畳を投げている！ 中尉が反撃すべきか尋ねた。何と答えればよい？」""
 war_stuff.4.a:0 "最大武力で反乱を粉砕せよ"
 war_stuff.4.b:0 "巡回を撤回し緊張を冷まそう"

 war_stuff.5.t:0 "戦争の鼓動"
 war_stuff.5.d:1 "組織的なプロパガンダ運動が[SCOPE.sCountry('war_stuff_home').GetName]を席巻し、愛国熱を煽り、闘争継続の公的決意を強化している。"
 war_stuff.5.f:1 ""「壁紙は募集ポスターだらけだ！ 子供さえ縄跳びしながら行進曲を歌う。国民の心は勝利のみを打つ」""
 war_stuff.5.a:0 "我が民は大義の下に団結せり！"

 war_stuff.6.t:0 "[SCOPE.sState('war_stuff_state').GetName]の人種差別"
 war_stuff.6.d:1 "[SCOPE.sState('war_stuff_state').GetName]の[SCOPE.sCountry('war_stuff_home').GetName]市民が[SCOPE.sCulture('war_stuff_culture').GetName]系の隣人を暴力的に標的にし、現在の戦争の責任を負わせている。"
 war_stuff.6.f:1 ""「『故郷に帰れ！』と彼らは叫んだ…」""
 war_stuff.6.a:0 "民の正義の怒りを発散させよ"
 war_stuff.6.b:0 "出自に関わらず全市民を保護せよ"

 war_stuff.7.t:0 "結束の呼び声"
 war_stuff.7.d:1 "[SCOPE.sCountry('war_stuff_enemy').GetName]からの使節団が到着し、共通の文化と歴史的絆を理由に[SCOPE.sCountry('war_stuff_home').GetName]への自発的併合を提案した。"
 war_stuff.7.f:1 ""「祖父は我々を分断するため戦ったが、今や私の生徒は君がたの国歌を歌い行進している。歴史の車輪は回る…」""
 war_stuff.7.a:0 "我が兄弟を[SCOPE.sCountry('war_stuff_home').GetNameNoFlag]へ迎え入れよ！"
 war_stuff.7.b:0 "[SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag]の独立を尊重する"

 war_stuff.8.t:0 "併合の波紋"
 war_stuff.8.d:1 "[SCOPE.sCountry('war_stuff_home').GetName]が[SCOPE.sCountry('war_stuff_enemy').GetName]を外交的併合で吸収したとの報が[SCOPE.GetRootScope.GetCountry.GetName]に届く。欧州の勢力均衡は劇的に変化した。"
 war_stuff.8.f:1 ""「最初にオーストリア人が狙われた…」""
 war_stuff.8.a:0 "認めざるを得ない既成事実なり"

 war_stuff.9.t:0 "[SCOPE.sCountry('war_stuff_enemy').GetName]との無条件講和を提案"
 war_stuff.9.d:1 "[SCOPE.sWar('war_stuff_war').GetName]に活動的な地上戦線が存在しないため、軍の助言官は[SCOPE.sCountry('war_stuff_enemy').GetName]との無条件講和を推奨しています。これにより、領土変動なく紛争を終結させ、膠着状態の戦争における兵力と国庫のさらなる消耗を防ぐことができます。"
 war_stuff.9.f:1 ""
 war_stuff.9.a:0 "和平条件を持った使節を派遣する。"
 war_stuff.9.b:0 "行き詰まりにもかかわらず戦争を継続する。"

 war_stuff.10.t:0 "[SCOPE.sCountry('war_stuff_home').GetName]からの和平提案"
 war_stuff.10.d:1 "[SCOPE.sCountry('war_stuff_home').GetAdjective]司令部からの外交使節が到着し、[SCOPE.sWar('war_stuff_war').GetName]を戦前の国境に戻して終結させる正式な提案をもたらしました。その通信は戦略的膠着状態を認め、全ての敵対行為の停止を申し出ています。"
 war_stuff.10.f:1 ""
 war_stuff.10.a:0 "彼らの提案を受け入れる。"
 war_stuff.10.b:0 "彼らの申し出を拒否する。"

 war_stuff.11.t:0 "消耗した者たちの反乱"
 war_stuff.11.d:1 "塹壕は墓場と化し、兵士たちは限界に達している。[SCOPE.sFront('war_stuff_front').GetName]からの報告によると、全連隊が銃剣の装着を拒否しているという。彼らは敵の進撃に対して戦線を維持するが、彼らの命の価値を忘れたかのような政府のための『自殺的』な攻勢にはもう参加しないと主張している。"
 war_stuff.11.f:1 ""我々は祖国を打たないが、嘘のために死ぬこともない。将軍たちがあの丘を欲しいなら、彼ら自身で取るがいい。""
 war_stuff.11.a:0 "銃殺隊で秩序を回復させる。"
 war_stuff.11.b:0 "彼らの不満に応え、配給を改善する。"

 war_stuff.12.t:0 "弾薬スキャンダル"
 war_stuff.12.d:1 "国家的な不面目が明るみに出た：前線の兵士たちに欠陥弾が支給されている、あるいはそれどころか全く支給されていないのだ。我が勇敢な兵士たちが敵の砲火にさらされている間、本国の工場は非効率と高騰するコストに足を取られている。マスコミはなぜ『[SCOPE.GetRootScope.GetCountry.GetName]の兵器廠』が必要な時に沈黙しているのかと問い詰めている。"
 war_stuff.12.f:1 ""弾丸なき兵士はただの標的である。我々の小銃が空打ちする間に産業が利益を得ることは最高の犯罪である。""
 war_stuff.12.a:0 "とにかく生産を強行する。"
 war_stuff.12.b:0 "品質と補給線の完全性を優先する。"

 war_stuff.13.t:0 "[SCOPE.sCharacter('war_stuff_general_offensive').GetLastName]計画"
 war_stuff.13.d:1 "総司令部の地図は何ヶ月も変わっていない。[SCOPE.sFront('war_stuff_front').GetName]では、朝に獲得した土地は日暮れまでに取り戻される。[SCOPE.sCharacter('war_stuff_general_offensive').GetFullName]は、作戦地図の束と冷酷な決意を持って前線から到着した。彼は十分な根性と『最後の大攻勢』さえあれば、[SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag]の戦線を粉砕し、戦争に動きを取り戻せると主張する。"
 war_stuff.13.f:1 "\"兵士たちは確かに疲れているが、泥の中で死を待つことにはもっと疲れている。弾薬をくれ、そうすれば私は[SCOPE.sCountry('war_stuff_enemy').GetNameNoFormatting]を粉砕してみせよう。\""
 war_stuff.13.a:0 "[SCOPE.sCharacter('war_stuff_general_offensive').GetLastName]攻勢を開始する。"
 war_stuff.13.b:0 "計画を拒否し、防御を維持する。"

 war_stuff.14.t:0 "解放作戦"
 war_stuff.14.d:1 "[SCOPE.sFront('war_stuff_front').GetName]の戦線が停滞し、我が同胞たちが[SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag]占領下で苦しんでいる。[SCOPE.sCharacter('war_stuff_general_liberation').GetFullName]は、陸軍省に大胆な作戦計画を提出した。彼は、部隊を集中させ、兵士たちが自らの家を奪還したいという願望に訴えかけることで、[SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag]の戦線を粉砕できると論じている。"
 war_stuff.14.f:1 "\"我々が遅れる一日一日が、[SCOPE.sState('war_stuff_liberation_state').GetNameNoFormatting]の我が兄弟たちの苦しみを長引かせる。命令を下せ、我々は[SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFormatting]の脅威を国境の向こうに追い返してみせよう。\""
 war_stuff.14.a:0 "[SCOPE.sCharacter('war_stuff_general_liberation').GetLastName]攻勢を承認する。"
 war_stuff.14.b:0 "防御態勢を維持する。"

 waddle_modifier_brutal_discipline:0 "残忍な規律"
 waddle_modifier_war_concessions:0 "前線譲歩"
