l_french:
 war_stuff.1.t:0 "[SCOPE.sCountry('war_stuff_enemy').GetCapital.GetCityHubName] Occupée"
 war_stuff.1.d:1 "Nos armées victorieuses occupent désormais le cœur même de [SCOPE.sCountry('war_stuff_enemy').GetName]. Notre traitement de la capitale conquise résonnera à travers l'histoire, façonnant notre légitimité et la volonté de résistance de l'ennemi."
 war_stuff.1.f:1 ""Ces gens savent que leur sort dépend de notre clémence.""
 war_stuff.1.a:0 "Maintenir l'ordre et respecter les institutions."
 war_stuff.1.b:0 "Laissez les troupes prendre leur dû."

 war_stuff.2.t:0 "[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] Occupée"
 war_stuff.2.d:1 "À notre stupéfaction, les forces [SCOPE.sCountry('war_stuff_enemy').GetAdjective] occupantes ont maintenu l'ordre et respecté nos institutions malgré leur victoire."
 war_stuff.2.f:1 ""Les envahisseurs patrouillaient les marchés sans piller, j'en ai même vu un rendre une bourse tombée ! Qui conquiert avec une telle... civilité ?""
 war_stuff.2.a:0 "Leur retenue est notée."

 war_stuff.3.t:0 "[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] Pillée"
 war_stuff.3.d:1 "Les troupes [SCOPE.sCountry('war_stuff_enemy').GetAdjective] ont réduit [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] en ruines fumantes, pillant nos trésors nationaux et profanant notre patrimoine."
 war_stuff.3.f:1 ""Des siècles de savoir réduits en cendres. Ils ont même fondu les statues pour la ferraille !""
 war_stuff.3.a:0 "Ils paieront pour cette barbarie !"

 war_stuff.4.t:0 "Agitation à [SCOPE.sState('war_stuff_state').GetName]"
 war_stuff.4.d:1 "Des éruptions violentes ont éclaté dans [SCOPE.sState('war_stuff_state').GetName] alors que les populations occupées résistent à notre autorité. Les rues ruissellent de défi, nous devons choisir notre réponse immédiatement."
 war_stuff.4.f:1 ""Ils lancent des pavés arrachés aux rues que nous avons pavées ! Mon lieutenant a demandé si nous devions riposter. Que dois-je lui dire ?""
 war_stuff.4.a:0 "Écrasez cette rébellion par la force maximale."
 war_stuff.4.b:0 "Retirez les patrouilles et laissez les tensions se calmer."

 war_stuff.5.t:0 "Les Tambours de la Guerre"
 war_stuff.5.d:1 "Une campagne de propagande coordonnée a balayé [SCOPE.sCountry('war_stuff_home').GetName], suscitant un fervent patriotisme et renforçant la résolution publique à poursuivre la lutte."
 war_stuff.5.f:1 ""Chaque mur porte maintenant des affiches de recrutement ! Même les enfants chantent des chants de marche en sautant à la corde. Le cœur de la nation ne bat que pour la victoire.""
 war_stuff.5.a:0 "Notre peuple est uni derrière la cause !"

 war_stuff.6.t:0 "Racisme à [SCOPE.sState('war_stuff_state').GetName]"
 war_stuff.6.d:1 "Des citoyens de [SCOPE.sCountry('war_stuff_home').GetName] à [SCOPE.sState('war_stuff_state').GetName] prennent violemment pour cible des voisins d'origine [SCOPE.sCulture('war_stuff_culture').GetName], les accusant de la guerre en cours."
 war_stuff.6.f:1 ""'Rentrez chez vous !' criaient-ils...""
 war_stuff.6.a:0 "Laissez le peuple exprimer sa colère légitime."
 war_stuff.6.b:0 "Protégez tous les citoyens quelle que soit leur origine."

 war_stuff.7.t:0 "L'Appel de l'Unité"
 war_stuff.7.d:1 "Des délégations de [SCOPE.sCountry('war_stuff_enemy').GetName] sont arrivées proposant une annexion volontaire à [SCOPE.sCountry('war_stuff_home').GetName], invoquant une culture partagée et des liens historiques."
 war_stuff.7.f:1 ""Mon grand-père a combattu pour nous diviser, mais mes étudiants marchent maintenant en chantant vos hymnes. La roue de l'histoire tourne...""
 war_stuff.7.a:0 "Accueillons nos frères dans la [SCOPE.sCountry('war_stuff_home').GetNameNoFlag] !"
 war_stuff.7.b:0 "Nous respectons l'indépendance [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag]."

 war_stuff.8.t:0 "Ondes de Choc de l'Annexion"
 war_stuff.8.d:1 "La nouvelle parvient à [SCOPE.GetRootScope.GetCountry.GetName] que [SCOPE.sCountry('war_stuff_home').GetName] a absorbé [SCOPE.sCountry('war_stuff_enemy').GetName] par annexion diplomatique, modifiant radicalement l'équilibre des pouvoirs en Europe."
 war_stuff.8.f:1 ""Ils sont d'abord venus pour les Autrichiens...""
 war_stuff.8.a:0 "Un fait accompli que nous devons reconnaître."

 war_stuff.9.t:0 "Proposer une Paix Blanche avec [SCOPE.sCountry('war_stuff_enemy').GetName]"
 war_stuff.9.d:1 "Sans fronts terrestres actifs dans la [SCOPE.sWar('war_stuff_war').GetName], nos conseillers militaires recommandent de chercher une paix blanche avec [SCOPE.sCountry('war_stuff_enemy').GetName]. Cela mettrait fin au conflit sans changements territoriaux, préservant nos forces et notre trésor d'un épuisement supplémentaire dans une guerre au point mort."
 war_stuff.9.f:1 ""
 war_stuff.9.a:0 "Envoyer des émissaires avec des termes de paix."
 war_stuff.9.b:0 "Poursuivre la guerre malgré l'impasse."

 war_stuff.10.t:0 "Ouverture de Paix de [SCOPE.sCountry('war_stuff_home').GetName]"
 war_stuff.10.d:1 "Des courriers diplomatiques arrivent du quartier général [SCOPE.sCountry('war_stuff_home').GetAdjective] portant une proposition formelle pour mettre fin à la [SCOPE.sWar('war_stuff_war').GetName] avec un retour aux frontières d'avant-guerre. Leur message reconnaît l'impasse stratégique et offre la cessation de toutes les hostilités."
 war_stuff.10.f:1 ""
 war_stuff.10.a:0 "Accepter leur proposition."
 war_stuff.10.b:0 "Rejeter leur ouverture."

 war_stuff.11.t:0 "La Mutinerie des Épuisés"
 war_stuff.11.d:1 "Les tranchées sont devenues un cimetière, et les hommes ont atteint leur point de rupture. Des rapports du [SCOPE.sFront('war_stuff_front').GetName] décrivent des régiments entiers refusant de fixer les baïonnettes. Ils affirment qu'ils tiendront la ligne contre une avancée ennemie, mais qu'ils ne participeront plus à des offensives 'suicidaires' pour un gouvernement qui semble avoir oublié la valeur de leurs vies."
 war_stuff.11.f:1 ""Nous ne frapperons pas contre la mère patrie, mais nous ne mourrons pas pour un mensonge. Si les généraux veulent cette colline, qu'ils la prennent eux-mêmes.""
 war_stuff.11.a:0 "Rétablir l'ordre avec le peloton d'exécution."
 war_stuff.11.b:0 "Prendre en compte leurs griefs et améliorer les rations."

 war_stuff.12.t:0 "Le Scandale des Munitions"
 war_stuff.12.d:1 "Une honte nationale a été révélée : nos soldats au front reçoivent des obus défectueux ; ou pire, aucun du tout. Alors que nos braves hommes font face au feu ennemi, les usines à l'arrière sont enlisées dans l'inefficacité et les coûts exorbitants. La presse exige de savoir pourquoi 'l'Arsenal de [SCOPE.GetRootScope.GetCountry.GetName]' reste silencieux en cette heure de besoin."
 war_stuff.12.f:1 ""Un soldat sans balle n'est qu'une cible. C'est un crime de la plus haute gravité que notre industrie profite pendant que nos fusils claquent à vide.""
 war_stuff.12.a:0 "Forcer la production malgré tout."
 war_stuff.12.b:0 "Privilégier la qualité et l'intégrité des lignes d'approvisionnement."

 war_stuff.13.t:0 "Le Plan [SCOPE.sCharacter('war_stuff_general_offensive').GetLastName]"
 war_stuff.13.d:1 "Les cartes du Quartier Général n'ont pas changé depuis des mois. Sur le [SCOPE.sFront('war_stuff_front').GetName], chaque mètre de terre gagné le matin est repris au crépuscule. [SCOPE.sCharacter('war_stuff_general_offensive').GetFullName] est arrivé du front avec une pile de cartes opérationnelles et une détermination sombre. Il insiste qu'avec assez de cran et 'une dernière grande poussée', il peut briser les lignes [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag] et redonner du mouvement à la guerre."
 war_stuff.13.f:1 "\"Les hommes sont fatigués, oui, mais ils sont plus fatigués d'attendre de mourir dans la boue. Donnez-moi les obus, et je briserai [SCOPE.sCountry('war_stuff_enemy').GetNameNoFormatting] une fois pour toutes.\""
 war_stuff.13.a:0 "Commencer l'Offensive [SCOPE.sCharacter('war_stuff_general_offensive').GetLastName]."
 war_stuff.13.b:0 "Rejeter le plan et maintenir nos défenses."

 war_stuff.14.t:0 "L'Initiative de Libération"
 war_stuff.14.d:1 "Les lignes sur le [SCOPE.sFront('war_stuff_front').GetName] ont stagné, laissant nos propres compatriotes dépérir sous l'occupation [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag]. [SCOPE.sCharacter('war_stuff_general_liberation').GetFullName] a soumis un plan opérationnel audacieux au Ministère de la Guerre. Il soutient qu'en concentrant nos troupes et en faisant appel au désir des hommes de reconquérir leurs propres foyers, nous pouvons briser les lignes [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag]."
 war_stuff.14.f:1 "\"Chaque jour que nous retardons est un autre jour de souffrance pour nos frères en [SCOPE.sState('war_stuff_liberation_state').GetNameNoFormatting]. Donnez l'ordre, et nous chasserons la menace [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFormatting] de l'autre côté de la frontière.\""
 war_stuff.14.a:0 "Autoriser l'Offensive [SCOPE.sCharacter('war_stuff_general_liberation').GetLastName]."
 war_stuff.14.b:0 "Maintenir une posture défensive."

 waddle_modifier_brutal_discipline:0 "Discipline Brutale"
 waddle_modifier_war_concessions:0 "Concessions du Front"
 waddle_modifier_industrial_seizure:0 "Production de Munitions Défectueuses"
 waddle_modifier_careful_supply:0 "Contrôle Qualité des Approvisionnements"
