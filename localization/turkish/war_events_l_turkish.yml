l_turkish:
 war_stuff.1.t:0 "[SCOPE.sCountry('war_stuff_enemy').GetCapital.GetCityHubName] İşgal Edildi"
 war_stuff.1.d:1 "Muzaffer ordularımız artık [SCOPE.sCountry('war_stuff_enemy').GetName]'ın kalbini işgal etmekte. Fethedilen başkente nasıl davrandığımız tarih boyunca yankılanacak, meşruiyetimizi ve düşmanın direnme iradesini şekillendirecek."
 war_stuff.1.f:1 ""Bu insanlar kaderlerinin merhametimize kaldığını biliyor.""
 war_stuff.1.a:0 "Düzeni koru ve kurumlara saygı göster."
 war_stuff.1.b:0 "Askerler hak ettiklerini alsın."

 war_stuff.2.t:0 "[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] İşgal Edildi"
 war_stuff.2.d:1 "Şaşkınlığımıza, işgalci [SCOPE.sCountry('war_stuff_enemy').GetAdjective] kuvvetleri zaferlerine rağmen düzeni korudu ve kurumlarımıza saygı gösterdi."
 war_stuff.2.f:1 ""İşgalciler yağmalamadan pazarları devriye gezdiler, hatta biri düşen bir çantayı geri verdi! Kim böyle... medeniyetle fetheder?""
 war_stuff.2.a:0 "Ölçülülükleri not edildi."

 war_stuff.3.t:0 "[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] Yağmalandı"
 war_stuff.3.d:1 "[SCOPE.sCountry('war_stuff_enemy').GetAdjective] birlikleri [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]'ı tüten enkaza çevirdi, ulusal hazinelerimizi yağmaladı ve mirasımızı kirletti."
 war_stuff.3.f:1 ""Yüzyılların bilgisi küllere döndü. Hatta heykelleri hurda için erittiler!""
 war_stuff.3.a:0 "Bu barbarlık için bedel ödeyecekler!"

 war_stuff.4.t:0 "[SCOPE.sState('war_stuff_state').GetName]'da Huzursuzluk"
 war_stuff.4.d:1 "[SCOPE.sState('war_stuff_state').GetName] genelinde işgal altındaki nüfus otoritemize direnirken şiddetli olaylar patlak verdi. Sokaklar meydan okumayla kırmızı akıyor, derhal yanıtımızı seçmeliyiz."
 war_stuff.4.f:1 ""Döşediğimiz sokaklardan söktükleri parke taşlarını atıyorlar! Teğmenim geri ateş edip etmememizi sordu. Ona ne söylemeliyim?""
 war_stuff.4.a:0 "Maksimum güçle bu isyanı ezin."
 war_stuff.4.b:0 "Devriyeleri geri çek ve gerginliğin soğumasına izin ver."

 war_stuff.5.t:0 "Savaşın Davulları"
 war_stuff.5.d:1 "Koordineli bir propaganda kampanyası [SCOPE.sCountry('war_stuff_home').GetName]'ı süpürdü, vatansever coşkuyu körükledi ve mücadeleye devam etme kararlılığını güçlendirdi."
 war_stuff.5.f:1 ""Her duvar artık askere alma posterleriyle kaplı! Çocuklar bile ip atlarken marş söylüyor. Ulusun kalbi yalnızca zafer için atıyor.""
 war_stuff.5.a:0 "Halkımız dava arkasında birleşti!"

 war_stuff.6.t:0 "[SCOPE.sState('war_stuff_state').GetName]'da Irkçılık"
 war_stuff.6.d:1 "[SCOPE.sState('war_stuff_state').GetName]'daki [SCOPE.sCountry('war_stuff_home').GetName] vatandaşları, devam eden savaş için onları suçlayarak [SCOPE.sCulture('war_stuff_culture').GetName] kökenli komşuları hedef alıyor."
 war_stuff.6.f:1 ""'Evinize dönün!' diye bağırdılar...""
 war_stuff.6.a:0 "Halkın haklı öfkesini dışa vurmasına izin ver."
 war_stuff.6.b:0 "Kökenine bakılmaksızın tüm vatandaşları koru."

 war_stuff.7.t:0 "Birlik Çağrısı"
 war_stuff.7.d:1 "[SCOPE.sCountry('war_stuff_enemy').GetName] delegasyonları, ortak kültür ve tarihi bağlara atıfta bulunarak [SCOPE.sCountry('war_stuff_home').GetName]'a gönüllü ilhak önerisiyle geldi."
 war_stuff.7.f:1 ""Büyükbabam bizi bölmek için savaştı ama öğrencilerim şimdi marşlarınızı söyleyerek yürüyor. Tarihin tekerleği dönüyor...""
 war_stuff.7.a:0 "Kardeşlerimizi [SCOPE.sCountry('war_stuff_home').GetNameNoFlag]'a hoş geldiniz!"
 war_stuff.7.b:0 "[SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag] bağımsızlığına saygı duyuyoruz."

 war_stuff.8.t:0 "İlhak Dalgaları"
 war_stuff.8.d:1 "[SCOPE.GetRootScope.GetCountry.GetName]'a gelen haberlere göre [SCOPE.sCountry('war_stuff_home').GetName], diplomatik ilhak yoluyla [SCOPE.sCountry('war_stuff_enemy').GetName]'ı emdi ve Avrupa güç dengesini büyük ölçüde değiştirdi."
 war_stuff.8.f:1 ""Önce Avusturyalılar için geldiler...""
 war_stuff.8.a:0 "Kabul etmek zorunda olduğumuz olmuş bitmiş bir durum."

 war_stuff.9.t:0 "[SCOPE.sCountry('war_stuff_enemy').GetName] ile Beyaz Barış Öner"
 war_stuff.9.d:1 "[SCOPE.sWar('war_stuff_war').GetName]'nda aktif kara cephesi olmadığı için, askeri danışmanlarımız [SCOPE.sCountry('war_stuff_enemy').GetName] ile beyaz barış aramayı öneriyor. Bu, çatışmayı bölgesel değişiklikler olmadan sonlandırarak, tıkanmış bir savaşta güçlerimizi ve hazinemizi daha fazla tükenmeden koruyacaktır."
 war_stuff.9.f:1 ""
 war_stuff.9.a:0 "Barış şartlarıyla elçiler gönder."
 war_stuff.9.b:0 "Çıkmaza rağmen savaşa devam et."

 war_stuff.10.t:0 "[SCOPE.sCountry('war_stuff_home').GetName]'dan Barış Teklifi"
 war_stuff.10.d:1 "[SCOPE.sCountry('war_stuff_home').GetAdjective] karargahından gelen diplomatik kuryeler, [SCOPE.sWar('war_stuff_war').GetName]'i savaş öncesi sınırlara dönerek bitirmek için resmi bir teklif getiriyor. Mesajları stratejik çıkmazı kabul ediyor ve tüm düşmanlıkların durdurulmasını teklif ediyor."
 war_stuff.10.f:1 ""
 war_stuff.10.a:0 "Tekliflerini kabul et."
 war_stuff.10.b:0 "Tekliflerini reddet."

 war_stuff.11.t:0 "Tükenmişlerin İsyanı"
 war_stuff.11.d:1 "Siperler bir mezarlığa dönüştü ve adamlar kırılma noktalarına ulaştı. [SCOPE.sFront('war_stuff_front').GetName]'dan gelen raporlar, tüm alayların süngü takmayı reddettiğini anlatıyor. Bir düşman saldırısına karşı hattı tutacaklarını, ancak hayatlarının değerini unutmuş görünen bir hükümet için artık 'intihar' saldırılarına katılmayacaklarını iddia ediyorlar."
 war_stuff.11.f:1 ""Anavatanı vurmayacağız ama bir yalan için de ölmeyeceğiz. Generaller o tepeyi istiyorsa, kendileri alsınlar.""
 war_stuff.11.a:0 "İnfaz mangasıyla düzeni sağla."
 war_stuff.11.b:0 "Şikayetlerini ele al ve tayınları iyileştir."

 war_stuff.12.t:0 "Mühimmat Skandalı"
 war_stuff.12.d:1 "Ulusal bir utanç ortaya çıktı: cephedeki askerlerimize hatalı mermiler veriliyor; veya daha kötüsü, hiç verilmiyor. Cesur adamlarımız düşman ateşiyle karşı karşıyayken, ülkedeki fabrikalar verimsizlik ve fırlayan maliyetler içinde çıkmazda. Basın, '[SCOPE.GetRootScope.GetCountry.GetName] Cephaneliği'nin ihtiyaç saatimizde neden sessiz kaldığını öğrenmek istiyor."
 war_stuff.12.f:1 ""Mermisi olmayan bir asker sadece bir hedeftir. Tüfeklerimiz boş çalışırken endüstrimizin kâr etmesi en yüksek dereceden bir suçtur.""
 war_stuff.12.a:0 "Yine de üretimi zorla."
 war_stuff.12.b:0 "Kalite ve tedarik hattı bütünlüğünü önceliklendir."

 war_stuff.13.t:0 "[SCOPE.sCharacter('war_stuff_general_offensive').GetLastName] Planı"
 war_stuff.13.d:1 "Genel Karargah'taki haritalar aylardır değişmedi. [SCOPE.sFront('war_stuff_front').GetName]'nda sabah kazanılan her metre toprak akşam karanlığında geri alınıyor. [SCOPE.sCharacter('war_stuff_general_offensive').GetFullName], bir dizi operasyon haritası ve kasvetli bir kararlılıkla cepheden geldi. Yeterli azim ve 'son bir büyük hamle' ile [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag] hatlarını parçalayabileceğini ve savaşa hareket getirebileceğini ısrarla söylüyor."
 war_stuff.13.f:1 "\"Adamlar yorgun, evet, ama çamurda ölmeyi beklemekten daha yorgunlar. Bana mermileri verin ve [SCOPE.sCountry('war_stuff_enemy').GetNameNoFormatting]'ı bir kez ve herkes için kıracağım.\""
 war_stuff.13.a:0 "[SCOPE.sCharacter('war_stuff_general_offensive').GetLastName] Taarruzunu başlat."
 war_stuff.13.b:0 "Planı reddet ve savunmamızı koru."

 war_stuff.14.t:0 "Kurtuluş Girişimi"
 war_stuff.14.d:1 "[SCOPE.sFront('war_stuff_front').GetName]'daki hatlar durgunlaştı ve kendi vatandaşlarımızı [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag] işgali altında kıvranır halde bıraktı. [SCOPE.sCharacter('war_stuff_general_liberation').GetFullName], Harbiye'ye cüretkar bir operasyon planı sundu. Birliklerimizi yoğunlaştırarak ve adamların kendi ocaklarını geri alma arzusuna hitap ederek [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag] hatlarını parçalayabileceğimizi savunuyor."
 war_stuff.14.f:1 "\"Geciktirdiğimiz her gün, [SCOPE.sState('war_stuff_liberation_state').GetNameNoFormatting]'daki kardeşlerimiz için bir gün daha acı demektir. Emri verin ve [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFormatting] tehdidini sınırdan geri püskürteceğiz.\""
 war_stuff.14.a:0 "[SCOPE.sCharacter('war_stuff_general_liberation').GetLastName] Taarruzunu onayla."
 war_stuff.14.b:0 "Savunma duruşunu koru."

