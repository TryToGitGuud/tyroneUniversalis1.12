l_simp_chinese:
 war_stuff.1.t:0 "[SCOPE.sCountry('war_stuff_enemy').GetCapital.GetCityHubName]被占领"
 war_stuff.1.d:1 "我军现已占领[SCOPE.sCountry('war_stuff_enemy').GetName]的核心地带。我们如何对待这座被征服的首都，将为历史定调，塑造我们的合法性并影响敌人的抵抗意志。"
 war_stuff.1.f:1 "“这些人深知自己的命运掌握在我们的仁慈之中。”"
 war_stuff.1.a:0 "维持秩序，尊重制度"
 war_stuff.1.b:0 "让部队取得应得之财"

 war_stuff.2.t:0 "[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]被占领"
 war_stuff.2.d:1 "令我们惊讶的是，尽管取得了胜利，占领[SCOPE.sCountry('war_stuff_enemy').GetAdjective]军队仍维持了秩序并尊重我们的制度。"
 war_stuff.2.f:1 "“入侵者在集市巡逻却不抢劫，我甚至看到一个士兵归还了失落的钱包！谁会用如此……文明的方式征服？”"
 war_stuff.2.a:0 "他们的克制值得注意"

 war_stuff.3.t:0 "[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]遭洗劫"
 war_stuff.3.d:1 "[SCOPE.sCountry('war_stuff_enemy').GetAdjective]军队已将[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]化为焦土，肆意掠夺我国珍宝并亵渎我们的文化遗产。"
 war_stuff.3.f:1 "“几个世纪的知识结晶化为灰烬。他们甚至把雕像熔掉当废金属卖！”"
 war_stuff.3.a:0 "他们将为这种野蛮行径付出代价！"

 war_stuff.4.t:0 "[SCOPE.sState('war_stuff_state').GetName]动乱"
 war_stuff.4.d:1 "[SCOPE.sState('war_stuff_state').GetName]全境爆发暴力事件，被占领民众正抵制我们的统治。街头充斥着反抗，我们必须立即做出回应。"
 war_stuff.4.f:1 "“他们正用我们铺就的街道上的鹅卵石砸向我们！我的副官请示是否应该还击。您希望我如何答复他？”"
 war_stuff.4.a:0 "以最大武力镇压这场叛乱"
 war_stuff.4.b:0 "撤回巡逻队，让紧张局势降温"

 war_stuff.5.t:0 "战争鼓动"
 war_stuff.5.d:1 "一场协调一致的宣传运动席卷了[SCOPE.sCountry('war_stuff_home').GetName]，激起了爱国热情，坚定了民众继续斗争的意志。"
 war_stuff.5.f:1 "“如今每面墙都贴着征兵海报！连孩子们跳绳时唱的也是行军歌。整个国家的心只为胜利而跳动。”"
 war_stuff.5.a:0 "我们的人民团结一致支持这项事业！"

 war_stuff.6.t:0 "[SCOPE.sState('war_stuff_state').GetName]的种族主义"
 war_stuff.6.d:1 "[SCOPE.sCountry('war_stuff_home').GetName]在[SCOPE.sState('war_stuff_state').GetName]的公民正暴力针对具有[SCOPE.sCulture('war_stuff_culture').GetName]血统的邻居，将他们归咎于持续的战事。"
 war_stuff.6.f:1 "“'滚回家去！'他们叫嚷着……”"
 war_stuff.6.a:0 "让人民发泄他们的义愤"
 war_stuff.6.b:0 "保护所有公民，无论其出身如何"

 war_stuff.7.t:0 "统一的呼唤"
 war_stuff.7.d:1 "[SCOPE.sCountry('war_stuff_enemy').GetName]代表团已抵达，提议自愿并入[SCOPE.sCountry('war_stuff_home').GetName]，理由包括共同的文化与历史纽带。"
 war_stuff.7.f:1 "“我的祖父曾为分裂我们而战，但如今我的学生们高唱你们的颂歌前进。历史的车轮滚滚向前……”"
 war_stuff.7.a:0 "欢迎我们的兄弟加入[SCOPE.sCountry('war_stuff_home').GetNameNoFlag]！"
 war_stuff.7.b:0 "我们尊重[SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag]的独立"

 war_stuff.8.t:0 "吞并的涟漪"
 war_stuff.8.d:1 "[SCOPE.GetRootScope.GetCountry.GetName]获悉，[SCOPE.sCountry('war_stuff_home').GetName]通过外交吞并吸收了[SCOPE.sCountry('war_stuff_enemy').GetName]，此举极大地改变了欧洲的力量平衡。"
 war_stuff.8.f:1 "“起初他们追捕奥地利人……”"
 war_stuff.8.a:0 "我们必须承认这一既成事实"

 war_stuff.9.t:0 "向[SCOPE.sCountry('war_stuff_enemy').GetName]提议白和"
 war_stuff.9.d:1 "在[SCOPE.sWar('war_stuff_war').GetName]没有活跃陆地战线的情况下，我们的军事顾问建议寻求与[SCOPE.sCountry('war_stuff_enemy').GetName]达成白和。这将结束冲突而不改变领土现状，使我们的军队和国库免于在这场僵持的战争中继续消耗。"
 war_stuff.9.f:1 ""
 war_stuff.9.a:0 "派遣使节提出和谈条件。"
 war_stuff.9.b:0 "尽管陷入僵局，仍继续战争。"

 war_stuff.10.t:0 "[SCOPE.sCountry('war_stuff_home').GetName]的和平倡议"
 war_stuff.10.d:1 "来自[SCOPE.sCountry('war_stuff_home').GetAdjective]总部的外交信使带来了正式提议，要求以恢复战前边界的方式结束[SCOPE.sWar('war_stuff_war').GetName]。他们的信息承认了战略僵局，并提出停止一切敌对行动。"
 war_stuff.10.f:1 ""
 war_stuff.10.a:0 "接受他们的提议。"
 war_stuff.10.b:0 "拒绝他们的倡议。"

 war_stuff.11.t:0 "疲惫之师哗变"
 war_stuff.11.d:1 "战壕已成坟场，士兵们已到达崩溃的临界点。来自[SCOPE.sFront('war_stuff_front').GetName]的报告描述，整团整团的士兵拒绝上刺刀冲锋。他们声称会坚守阵地抵御敌军进攻，但绝不再为一个似乎已忘记他们生命价值的政府参与'自杀式'进攻。"
 war_stuff.11.f:1 "“我们不会攻击祖国，但也不会为谎言赴死。如果将军们想要那座山头，就让他们自己去攻占吧。”"
 war_stuff.11.a:0 "用行刑队恢复秩序。"
 war_stuff.11.b:0 "回应他们的诉求并改善补给。"

 war_stuff.12.t:0 "军火丑闻"
 war_stuff.12.d:1 "一桩举国丑闻被曝光：我们前线士兵领到的炮弹有缺陷；甚至更糟，根本领不到炮弹。当我们的勇士直面敌军炮火时，后方的工厂却深陷效率低下和成本飙升的泥潭。舆论正质问，为何在危难时刻，'[SCOPE.GetRootScope.GetCountry.GetName]的兵工厂'竟会陷入沉寂。"
 war_stuff.12.f:1 "“没有子弹的士兵不过是靶子。当我们的步枪空膛咔哒作响时，我们的工业却在牟利，这是最严重的罪行。”"
 war_stuff.12.a:0 "无论如何强制生产继续。"
 war_stuff.12.b:0 "优先保障质量与补给线完整。"

 war_stuff.13.t:0 "[SCOPE.sCharacter('war_stuff_general_offensive').GetLastName]计划"
 war_stuff.13.d:1 "总参谋部的地图已经数月未变。在[SCOPE.sFront('war_stuff_front').GetName]上，清晨攻下的每一码土地，入夜前便得而复失。[SCOPE.sCharacter('war_stuff_general_offensive').GetFullName]从前线归来，带着一沓作战地图和冷酷的决心。他坚称，只要拥有足够勇气并进行'最后一次大规模突击'，便能击溃[SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag]防线，为战局重新注入活力。"
 war_stuff.13.f:1 "“士兵们是累了，没错，但他们更厌倦了在泥泞中等死。给我炮弹，我将一劳永逸地击垮[SCOPE.sCountry('war_stuff_enemy').GetNameNoFormatting]。”"
 war_stuff.13.a:0 "发动[SCOPE.sCharacter('war_stuff_general_offensive').GetLastName]攻势。"
 war_stuff.13.b:0 "拒绝该计划，维持防御态势。"

 war_stuff.14.t:0 "解放倡议"
 war_stuff.14.d:1 "[SCOPE.sFront('war_stuff_front').GetName]的战线陷入僵局，任由我们的同胞在[SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag]占领下煎熬度日。[SCOPE.sCharacter('war_stuff_general_liberation').GetFullName]已向陆军部提交了一份大胆的作战计划。他主张，通过集结我军兵力，并激发士兵们收复故土的渴望，我们便能粉碎[SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag]防线。"
 war_stuff.14.f:1 "“我们每拖延一天，[SCOPE.sState('war_stuff_liberation_state').GetNameNoFormatting]的同胞们就多受一天苦。下达命令吧，我们将把[SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFormatting]威胁驱赶回边境那边。”"
 war_stuff.14.a:0 "批准[SCOPE.sCharacter('war_stuff_general_liberation').GetLastName]攻势。"
 war_stuff.14.b:0 "保持防御姿态。"


