 waddle_modifier_careful_supply:0 "优质补给监督"

 waddle_modifier_desperate_offensive:0 "宏大攻势"
 
 waddle_modifier_trench_attrition:0 "堑壕僵局"

 waddle_modifier_liberation_drive:0 "解放驱动力"