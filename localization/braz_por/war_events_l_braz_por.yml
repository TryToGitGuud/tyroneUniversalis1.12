l_braz_por:
 war_stuff.1.t:0 "[SCOPE.sCountry('war_stuff_enemy').GetCapital.GetCityHubName] Ocupada"
 war_stuff.1.d:1 "Nossos exércitos vitoriosos agora ocupam o coração de [SCOPE.sCountry('war_stuff_enemy').GetName]. Como tratamos a capital conquistada ecoará pela história, moldando nossa legitimidade e a vontade do inimigo de resistir."
 war_stuff.1.f:1 ""Estas pessoas sabem que seu destino depende de nossa misericórdia.""
 war_stuff.1.a:0 "Manter a ordem e respeitar as instituições."
 war_stuff.1.b:0 "Deixe as tropas tomarem o que lhes é devido."

 war_stuff.2.t:0 "[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] Ocupada"
 war_stuff.2.d:1 "Para nossa surpresa, as forças [SCOPE.sCountry('war_stuff_enemy').GetAdjective] ocupantes mantiveram a ordem e respeitaram nossas instituições apesar de sua vitória."
 war_stuff.2.f:1 ""Os invasores patrulhavam os mercados sem saquear, até vi um devolver uma bolsa caída! Quem conquista com tanta... civilidade?""
 war_stuff.2.a:0 "Sua moderação é notada."

 war_stuff.3.t:0 "[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] Saqueada"
 war_stuff.3.d:1 "As tropas [SCOPE.sCountry('war_stuff_enemy').GetAdjective] reduziram [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] a ruínas fumegantes, pilhando nossos tesouros nacionais e profanando nosso patrimônio."
 war_stuff.3.f:1 ""Séculos de conhecimento viraram cinzas. Até derreteram as estátuas para sucata!""
 war_stuff.3.a:0 "Eles pagarão por esta barbárie!"

 war_stuff.4.t:0 "Agitação em [SCOPE.sState('war_stuff_state').GetName]"
 war_stuff.4.d:1 "Explosões violentas eclodiram em [SCOPE.sState('war_stuff_state').GetName] enquanto populações ocupadas resistem à nossa autoridade. As ruas correm vermelhas de desafio, devemos escolher nossa resposta imediatamente."
 war_stuff.4.f:1 ""Eles estão atirando paralelepípedos arrancados das ruas que pavimentamos! Meu tenente perguntou se devemos atirar de volta. O que devo dizer a ele?""
 war_stuff.4.a:0 "Esmague esta rebelião com força máxima."
 war_stuff.4.b:0 "Retire as patrulhas e deixe as tensões esfriarem."

 war_stuff.5.t:0 "Os Tambores da Guerra"
 war_stuff.5.d:1 "Uma campanha de propaganda coordenada varreu [SCOPE.sCountry('war_stuff_home').GetName], despertando fervor patriótico e fortalecendo a resolução pública para continuar a luta."
 war_stuff.5.f:1 ""Cada papel de parede agora exibe pôsteres de recrutamento! Até crianças cantam marchas enquanto pulam corda. O coração da nação bate apenas pela vitória.""
 war_stuff.5.a:0 "Nosso povo está unido pela causa!"

 war_stuff.6.t:0 "Racismo em [SCOPE.sState('war_stuff_state').GetName]"
 war_stuff.6.d:1 "Cidadãos de [SCOPE.sCountry('war_stuff_home').GetName] em [SCOPE.sState('war_stuff_state').GetName] estão atacando violentamente vizinhos de herança [SCOPE.sCulture('war_stuff_culture').GetName], culpando-os pela guerra em curso."
 war_stuff.6.f:1 ""'Voltem para casa!', gritaram...""
 war_stuff.6.a:0 "Deixe o povo desabafar sua ira justa."
 war_stuff.6.b:0 "Proteja todos os cidadãos independentemente da origem."

 war_stuff.7.t:0 "O Chamado da Unidade"
 war_stuff.7.d:1 "Delegações de [SCOPE.sCountry('war_stuff_enemy').GetName] chegaram propondo anexação voluntária a [SCOPE.sCountry('war_stuff_home').GetName], citando cultura compartilhada e laços históricos."
 war_stuff.7.f:1 ""Meu avô lutou para nos dividir, mas meus alunos agora marcham cantando seus hinos. A roda da história gira...""
 war_stuff.7.a:0 "Receba nossos irmãos na [SCOPE.sCountry('war_stuff_home').GetNameNoFlag]!"
 war_stuff.7.b:0 "Respeitamos a independência [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag]."

 war_stuff.8.t:0 "Repercussões da Anexação"
 war_stuff.8.d:1 "Chegam notícias a [SCOPE.GetRootScope.GetCountry.GetName] de que [SCOPE.sCountry('war_stuff_home').GetName] absorveu [SCOPE.sCountry('war_stuff_enemy').GetName] por anexação diplomática, alterando drasticamente o equilíbrio de poder europeu."
 war_stuff.8.f:1 ""Primeiro vieram pelos austríacos...""
 war_stuff.8.a:0 "Um fato consumado que devemos reconhecer."

 war_stuff.9.t:0 "Propor Paz Branca com [SCOPE.sCountry('war_stuff_enemy').GetName]"
 war_stuff.9.d:1 "Sem frentes terrestres ativas na [SCOPE.sWar('war_stuff_war').GetName], nossos conselheiros militares recomendam buscar uma paz branca com [SCOPE.sCountry('war_stuff_enemy').GetName]. Isso encerraria o conflito sem mudanças territoriais, preservando nossas forças e tesouro de mais desgaste em uma guerra estagnada."
 war_stuff.9.f:1 ""
 war_stuff.9.a:0 "Enviar emissários com termos de paz."
 war_stuff.9.b:0 "Continuar a guerra apesar do impasse."

 war_stuff.10.t:0 "Oferta de Paz de [SCOPE.sCountry('war_stuff_home').GetName]"
 war_stuff.10.d:1 "Correios diplomáticos chegam do quartel-general [SCOPE.sCountry('war_stuff_home').GetAdjective] trazendo uma proposta formal para encerrar a [SCOPE.sWar('war_stuff_war').GetName] com um retorno às fronteiras pré-guerra. Sua mensagem reconhece o impasse estratégico e oferece a cessação de todas as hostilidades."
 war_stuff.10.f:1 ""
 war_stuff.10.a:0 "Aceitar sua proposta."
 war_stuff.10.b:0 "Rejeitar sua oferta."

 war_stuff.11.t:0 "O Motim dos Exaustos"
 war_stuff.11.d:1 "As trincheiras se tornaram um cemitério, e os homens alcançaram seu ponto de ruptura. Relatórios da [SCOPE.sFront('war_stuff_front').GetName] descrevem regimentos inteiros recusando-se a fixar baionetas. Eles afirmam que manterão a linha contra um avanço inimigo, mas não mais participarão de ofensivas 'suicidas' por um governo que parece ter esquecido o valor de suas vidas."
 war_stuff.11.f:1 ""Não atacaremos a pátria, mas não morreremos por uma mentira. Se os generais querem aquela colina, que a tomem eles mesmos.""
 war_stuff.11.a:0 "Restaurar a ordem com o pelotão de fuzilamento."
 war_stuff.11.b:0 "Atender suas queixas e melhorar as rações."

 war_stuff.12.t:0 "O Escândalo das Munições"
 war_stuff.12.d:1 "Uma vergonha nacional veio à tona: nossos soldados na frente estão recebendo munições defeituosas; ou pior, nenhuma. Enquanto nossos bravos homens enfrentam o fogo inimigo, as fábricas no país estão atoladas em ineficiência e custos crescentes. A imprensa exige saber por que o 'Arsenal de [SCOPE.GetRootScope.GetCountry.GetName]' está emudecendo em nossa hora de necessidade."
 war_stuff.12.f:1 ""Um soldado sem bala é apenas um alvo. É um crime da mais alta ordem que nossa indústria lucre enquanto nossos rifles estalam vazios.""
 war_stuff.12.a:0 "Forçar a produção de qualquer maneira."
 war_stuff.12.b:0 "Priorizar a qualidade e a integridade da linha de suprimentos."

 war_stuff.13.t:0 "O Plano [SCOPE.sCharacter('war_stuff_general_offensive').GetLastName]"
 war_stuff.13.d:1 "Os mapas no Quartel-General não mudaram há meses. Na [SCOPE.sFront('war_stuff_front').GetName], cada metro de terra conquistado de manhã é retomado ao anoitecer. [SCOPE.sCharacter('war_stuff_general_offensive').GetFullName] chegou da frente com uma pilha de mapas operacionais e uma determinação sombria. Ele insiste que com determinação suficiente e 'um último grande impulso', ele pode romper as linhas [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag] e restaurar o movimento à guerra."
 war_stuff.13.f:1 "\"Os homens estão cansados, sim, mas estão mais cansados de esperar para morrer na lama. Dê-me as munições, e quebrarei [SCOPE.sCountry('war_stuff_enemy').GetNameNoFormatting] de uma vez por todas.\""
 war_stuff.13.a:0 "Iniciar a Ofensiva [SCOPE.sCharacter('war_stuff_general_offensive').GetLastName]."
 war_stuff.13.b:0 "Rejeitar o plano e manter nossas defesas."

 war_stuff.14.t:0 "A Iniciativa de Libertação"
 war_stuff.14.d:1 "As linhas na [SCOPE.sFront('war_stuff_front').GetName] estagnaram, deixando nossos compatriotas definharem sob a ocupação [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag]. [SCOPE.sCharacter('war_stuff_general_liberation').GetFullName] apresentou um plano operacional ousado ao Ministério da Guerra. Ele argumenta que, concentrando nossas tropas e apelando ao desejo dos homens de reaver seus próprios lares, podemos romper as linhas [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag]."
 war_stuff.14.f:1 "\"Cada dia que adiamos é outro dia de sofrimento para nossos irmãos em [SCOPE.sState('war_stuff_liberation_state').GetNameNoFormatting]. Dê a ordem, e expulsaremos a ameaça [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFormatting] de volta através da fronteira.\""
 war_stuff.14.a:0 "Autorizar a Ofensiva [SCOPE.sCharacter('war_stuff_general_liberation').GetLastName]."
 war_stuff.14.b:0 "Manter uma postura defensiva."

