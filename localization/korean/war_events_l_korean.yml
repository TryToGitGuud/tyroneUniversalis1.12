l_korean:
 war_stuff.1.t:0 "[SCOPE.sCountry('war_stuff_enemy').GetCapital.GetCityHubName] 점령됨"
 war_stuff.1.d:1 "우리의 승리한 군대는 이제 [SCOPE.sCountry('war_stuff_enemy').GetName]의 심장부를 점령했습니다. 정복된 수도에 대한 우리의 처우는 역사에 울려 퍼질 것이며, 우리의 정당성과 적의 저항 의지를 형성할 것입니다."
 war_stuff.1.f:1 ""이 사람들은 자신들의 운명이 우리의 자비에 달려 있음을 알고 있습니다.""
 war_stuff.1.a:0 "질서를 유지하고 제도를 존중하라."
 war_stuff.1.b:0 "병사들이 마땅한 몫을 취하게 하라."

 war_stuff.2.t:0 "[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] 점령됨"
 war_stuff.2.d:1 "놀랍게도 점령군인 [SCOPE.sCountry('war_stuff_enemy').GetAdjective] 군대가 승리에도 불구하고 질서를 유지하고 우리의 제도를 존중했습니다."
 war_stuff.2.f:1 ""침략자들은 약탈 없이 시장을 순찰했고, 떨어진 지갑을 돌려주는 병사까지 봤습니다! 누가 이런... 문명화된 방식으로 정복합니까?""
 war_stuff.2.a:0 "그들의 자제력을 주목하라."

 war_stuff.3.t:0 "[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] 약탈됨"
 war_stuff.3.d:1 "[SCOPE.sCountry('war_stuff_enemy').GetAdjective] 군대가 [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]을 잿더미로 만들고 우리의 국보를 약탈하며 유산을 모독했습니다."
 war_stuff.3.f:1 ""수세기에 걸친 지식이 재가 되었습니다. 그들은 동상까지 고철로 녹여버렸습니다!""
 war_stuff.3.a:0 "이 야만적 행위에 대한 대가를 치르게 하라!"

 war_stuff.4.t:0 "[SCOPE.sState('war_stuff_state').GetName]의 불안"
 war_stuff.4.d:1 "[SCOPE.sState('war_stuff_state').GetName] 전역에서 점령된 주민들이 우리의 권위에 저항하며 폭력 사태가 발생하고 있습니다. 거리는 저항으로 물들었으며, 우리는 즉각 대응 방안을 결정해야 합니다."
 war_stuff.4.f:1 ""그들은 우리가 포장한 거리에서 뜯어낸 자갈을 던지고 있습니다! 중위가 반격해야 하냐고 묻습니다. 뭐라고 답해야 합니까?""
 war_stuff.4.a:0 "최대한의 무력으로 이 반란을 분쇄하라."
 war_stuff.4.b:0 "순찰대를 철수시키고 긴장을 식히라."

 war_stuff.5.t:0 "전쟁의 북소리"
 war_stuff.5.d:1 "조직적인 선전 운동이 [SCOPE.sCountry('war_stuff_home').GetName]을 휩쓸며 애국심을 불태우고, 투쟁을 계속하려는 대중의 결의를 강화하고 있습니다."
 war_stuff.5.f:1 ""벽지마다 모병 포스터가 붙었습니다! 아이들도 줄넘기하며 행진곡을 부릅니다. 국가의 심장은 오직 승리를 위해 뛰고 있습니다.""
 war_stuff.5.a:0 "우리 국민은 대의 뒤에 단결했습니다!"

 war_stuff.6.t:0 "[SCOPE.sState('war_stuff_state').GetName]의 인종차별"
 war_stuff.6.d:1 "[SCOPE.sState('war_stuff_state').GetName]의 [SCOPE.sCountry('war_stuff_home').GetName] 시민들이 [SCOPE.sCulture('war_stuff_culture').GetName] 혈통의 이웃을 폭력적으로 공격하며 현재 전쟁의 책임을 돌리고 있습니다."
 war_stuff.6.f:1 ""'고국으로 돌아가라!' 그들이 외쳤습니다...""
 war_stuff.6.a:0 "국민이 정의로운 분노를 표출하게 하라."
 war_stuff.6.b:0 "출신에 관계없이 모든 시민을 보호하라."

 war_stuff.7.t:0 "통일의 부름"
 war_stuff.7.d:1 "[SCOPE.sCountry('war_stuff_enemy').GetName] 대표단이 공통된 문화와 역사적 유대를 이유로 [SCOPE.sCountry('war_stuff_home').GetName]에의 자발적 병합을 제안하며 도착했습니다."
 war_stuff.7.f:1 ""제 할아버지는 우리를 분열시키기 위해 싸웠지만, 제 학생들은 이제 당신들의 국가를 부르며 행진합니다. 역사의 수레바퀴는 돌고...""
 war_stuff.7.a:0 "형제들을 [SCOPE.sCountry('war_stuff_home').GetNameNoFlag]으로 환영하라!"
 war_stuff.7.b:0 "[SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag]의 독립을 존중한다."

 war_stuff.8.t:0 "병합의 파문"
 war_stuff.8.d:1 "[SCOPE.sCountry('war_stuff_home').GetName]이 [SCOPE.sCountry('war_stuff_enemy').GetName]을 외교적 병합으로 흡수했다는 소식이 [SCOPE.GetRootScope.GetCountry.GetName]에 전해졌습니다. 유럽의 세력 균형은 극적으로 변했습니다."
 war_stuff.8.f:1 ""처음에는 오스트리아인들을 대상으로 했습니다...""
 war_stuff.8.a:0 "인정할 수밖에 없는 기정사실이다."

 war_stuff.9.t:0 "[SCOPE.sCountry('war_stuff_enemy').GetName]와의 백색 평화 제안"
 war_stuff.9.d:1 "[SCOPE.sWar('war_stuff_war').GetName]에서 활동적인 지상 전선이 없기 때문에, 우리의 군사 고문들은 [SCOPE.sCountry('war_stuff_enemy').GetName]와의 백색 평화를 모색할 것을 권고합니다. 이는 영토 변화 없이 분쟁을 종료시켜, 교착 상태의 전쟁에서 우리 군대와 국고를 더 이상의 소모로부터 보존할 것입니다."
 war_stuff.9.f:1 ""
 war_stuff.9.a:0 "평화 조건을 가진 사절단을 파견한다."
 war_stuff.9.b:0 "교착 상태에도 불구하고 전쟁을 계속한다."

 war_stuff.10.t:0 "[SCOPE.sCountry('war_stuff_home').GetName]의 평화 제의"
 war_stuff.10.d:1 "[SCOPE.sCountry('war_stuff_home').GetAdjective] 본부에서 외교 전령이 도착하여, [SCOPE.sWar('war_stuff_war').GetName]를 전쟁 전 국경으로 회복시키며 종료하기 위한 공식 제안서를 전달했습니다. 그들의 메시지는 전략적 교착 상태를 인정하고 모든 적대 행위의 중단을 제안합니다."
 war_stuff.10.f:1 ""
 war_stuff.10.a:0 "그들의 제안을 받아들인다."
 war_stuff.10.b:0 "그들의 제의를 거절한다."

 war_stuff.11.t:0 "소모된 자들의 반란"
 war_stuff.11.d:1 "참호는 무덤이 되었고, 병사들은 한계점에 도달했습니다. [SCOPE.sFront('war_stuff_front').GetName]에서의 보고서에 따르면 전 연대가 총검을 고정하는 것을 거부하고 있습니다. 그들은 적의 진격에 대항해 전선을 유지하겠지만, 자신들의 생명의 가치를 잊은 듯한 정부를 위한 '자살적' 공세에는 더 이상 참여하지 않겠다고 주장합니다."
 war_stuff.11.f:1 ""우리는 조국을 공격하지는 않겠지만, 거짓말을 위해 죽지도 않을 것입니다. 장군들이 그 언덕을 원한다면 그들 스스로가 취하게 하십시오.""
 war_stuff.11.a:0 "총살형으로 질서를 회복한다."
 war_stuff.11.b:0 "그들의 불만을 해소하고 배급을 개선한다."

 war_stuff.12.t:0 "탄약 스캔들"
 war_stuff.12.d:1 "국가적 수치가 드러났습니다: 전선의 우리 병사들에게 결함 있는 포탄이 지급되고 있으며, 더 나쁘게는 전혀 지급되지 않고 있습니다. 우리의 용감한 병사들이 적의 포화에 직면하는 동안, 후방의 공장들은 비효율과 급증하는 비용에 빠져 있습니다. 언론은 왜 '[SCOPE.GetRootScope.GetCountry.GetName]의 병기창'이 필요한 시기에 침묵하는지 묻고 있습니다."
 war_stuff.12.f:1 ""탄환이 없는 병사는 표적일 뿐입니다. 우리의 소총이 빈 소리를 내는 동안 우리 산업이 이익을 보는 것은 최고 수준의 범죄입니다.""
 war_stuff.12.a:0 "어쨌든 생산을 강행한다."
 war_stuff.12.b:0 "품질과 보급로의 건전성을 우선시한다."

 war_stuff.13.t:0 "[SCOPE.sCharacter('war_stuff_general_offensive').GetLastName] 계획"
 war_stuff.13.d:1 "총사령부의 지도는 몇 달 동안 변하지 않았습니다. [SCOPE.sFront('war_stuff_front').GetName]에서는 아침에 얻은 땅이 해질녘까지 다시 빼앗깁니다. [SCOPE.sCharacter('war_stuff_general_offensive').GetFullName]이 작전 지도 한 더미와 암담한 결의를 가지고 전선에서 도착했습니다. 그는 충분한 투지와 '마지막 대공세'로 [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag] 전선을 분쇄하고 전쟁에 움직임을 되찾을 수 있다고 주장합니다."
 war_stuff.13.f:1 "\"병사들은 지쳤습니다, 네, 하지만 그들은 진흙 속에서 죽음을 기다리는 것에 더 지쳤습니다. 포탄을 주십시오, 그러면 제가 [SCOPE.sCountry('war_stuff_enemy').GetNameNoFormatting]을 일거에 박살 내겠습니다.\""
 war_stuff.13.a:0 "[SCOPE.sCharacter('war_stuff_general_offensive').GetLastName] 공세를 시작한다."
 war_stuff.13.b:0 "계획을 거부하고 방어를 유지한다."

 war_stuff.14.t:0 "해방 계획"
 war_stuff.14.d:1 "[SCOPE.sFront('war_stuff_front').GetName]의 전선이 정체되면서, 우리 동포들이 [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag] 점령 하에서 고통받고 있습니다. [SCOPE.sCharacter('war_stuff_general_liberation').GetFullName]이 전쟁부에 대담한 작전 계획을 제출했습니다. 그는 병력을 집중시키고 병사들이 자신의 가정을 되찾고자 하는 욕구에 호소함으로써 [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag] 전선을 분쇄할 수 있다고 주장합니다."
 war_stuff.14.f:1 "\"우리가 하루 지연할 때마다 [SCOPE.sState('war_stuff_liberation_state').GetNameNoFormatting]의 우리 형제들의 고통이 하루 더 길어집니다. 명령을 내리십시오, 그러면 우리가 [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFormatting] 위협을 국경 너머로 몰아낼 것입니다.\""
 war_stuff.14.a:0 "[SCOPE.sCharacter('war_stuff_general_liberation').GetLastName] 공세를 승인한다."
 war_stuff.14.b:0 "방어 태세를 유지한다."

 waddle_modifier_brutal_discipline:0 "잔혹한 훈육"
 waddle_modifier_war_concessions:0 "전선 양보"
 waddle_modifier_industrial_seizure:0 "결함 탄약 생산"
 waddle_modifier_careful_supply:0 "품질 보급 감독"
 waddle_modifier_desperate_offensive:0 "대공세"
 waddle_modifier_trench_attrition:0 "참호 교착 상태"
 waddle_modifier_liberation_drive:0 "해방 기세"