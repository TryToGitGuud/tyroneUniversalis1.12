l_spanish:
 war_stuff.1.t:0 "[SCOPE.sCountry('war_stuff_enemy').GetCapital.GetCityHubName] Ocupada"
 war_stuff.1.d:1 "Nuestros ejércitos victoriosos ahora ocupan el corazón mismo de [SCOPE.sCountry('war_stuff_enemy').GetName]. Cómo tratemos la capital conquistada resonará en la historia, moldeando nuestra legitimidad y la voluntad de resistencia del enemigo."
 war_stuff.1.f:1 ""Estas personas saben que su destino descansa en nuestra misericordia.""
 war_stuff.1.a:0 "Mantener el orden y respetar las instituciones."
 war_stuff.1.b:0 "Deja que las tropas tomen lo que les corresponde."

 war_stuff.2.t:0 "[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] Ocupada"
 war_stuff.2.d:1 "Para nuestro asombro, las fuerzas ocupantes [SCOPE.sCountry('war_stuff_enemy').GetAdjective] han mantenido el orden y respetado nuestras instituciones a pesar de su victoria."
 war_stuff.2.f:1 ""¡Los invasores patrullaban los mercados sin saquear, incluso vi a uno devolver una bolsa caída! ¿Quién conquista con tanta... civilidad?""
 war_stuff.2.a:0 "Su moderación es notable."

 war_stuff.3.t:0 "[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] Saqueada"
 war_stuff.3.d:1 "Las tropas [SCOPE.sCountry('war_stuff_enemy').GetAdjective] han reducido [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] a ruinas humeantes, saqueando nuestros tesoros nacionales y profanando nuestro patrimonio."
 war_stuff.3.f:1 ""Siglos de conocimiento convertidos en cenizas. ¡Hasta fundieron las estatuas para chatarra!""
 war_stuff.3.a:0 "¡Pagarán por esta barbarie!"

 war_stuff.4.t:0 "Inquietud en [SCOPE.sState('war_stuff_state').GetName]"
 war_stuff.4.d:1 "Estallidos violentos han surgido en [SCOPE.sState('war_stuff_state').GetName] mientras las poblaciones ocupadas resisten nuestra autoridad. Las calles corren rojas de desafío, debemos elegir nuestra respuesta inmediatamente."
 war_stuff.4.f:1 ""¡Lanzan adoquines arrancados de las mismas calles que pavimentamos! Mi teniente preguntó si debemos disparar de vuelta. ¿Qué debo decirle?""
 war_stuff.4.a:0 "Aplasta esta rebelión con fuerza máxima."
 war_stuff.4.b:0 "Retira las patrullas y deja que las tensiones se enfríen."

 war_stuff.5.t:0 "Los Tambores de Guerra"
 war_stuff.5.d:1 "Una campaña de propaganda coordinada ha arrasado [SCOPE.sCountry('war_stuff_home').GetName], avivando el fervor patriótico y reforzando la resolución pública para continuar la lucha."
 war_stuff.5.f:1 ""¡Cada papel pintado ahora luce carteles de reclutamiento! Hasta los niños cantan marchas mientras saltan la cuerda. El corazón de la nación late solo por la victoria.""
 war_stuff.5.a:0 "¡Nuestro pueblo está unido tras la causa!"

 war_stuff.6.t:0 "Racismo en [SCOPE.sState('war_stuff_state').GetName]"
 war_stuff.6.d:1 "Ciudadanos de [SCOPE.sCountry('war_stuff_home').GetName] en [SCOPE.sState('war_stuff_state').GetName] atacan violentamente a vecinos de herencia [SCOPE.sCulture('war_stuff_culture').GetName], culpándolos por la guerra en curso."
 war_stuff.6.f:1 ""'¡Vuelvan a casa!', gritaron...""
 war_stuff.6.a:0 "Deja que la gente desahogue su ira justa."
 war_stuff.6.b:0 "Protege a todos los ciudadanos sin importar su origen."

 war_stuff.7.t:0 "El Llamado de la Unidad"
 war_stuff.7.d:1 "Delegaciones de [SCOPE.sCountry('war_stuff_enemy').GetName] han llegado proponiendo anexión voluntaria a [SCOPE.sCountry('war_stuff_home').GetName], citando cultura compartida y lazos históricos."
 war_stuff.7.f:1 ""Mi abuelo luchó para dividirnos, pero mis estudiantes ahora marchan cantando sus himnos. La rueda de la historia gira...""
 war_stuff.7.a:0 "¡Demos la bienvenida a nuestros hermanos al [SCOPE.sCountry('war_stuff_home').GetNameNoFlag]!"
 war_stuff.7.b:0 "Respetamos la independencia [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag]."

 war_stuff.8.t:0 "Ondas de la Anexión"
 war_stuff.8.d:1 "Llegan noticias a [SCOPE.GetRootScope.GetCountry.GetName] de que [SCOPE.sCountry('war_stuff_home').GetName] ha absorbido [SCOPE.sCountry('war_stuff_enemy').GetName] mediante anexión diplomática, alterando drásticamente el equilibrio de poder europeo."
 war_stuff.8.f:1 ""Primero vinieron por los austríacos...""
 war_stuff.8.a:0 "Un hecho consumado que debemos reconocer."

 war_stuff.9.t:0 "Proponer Paz Blanca con [SCOPE.sCountry('war_stuff_enemy').GetName]"
 war_stuff.9.d:1 "Sin frentes terrestres activos en la [SCOPE.sWar('war_stuff_war').GetName], nuestros asesores militares recomiendan buscar una paz blanca con [SCOPE.sCountry('war_stuff_enemy').GetName]. Esto terminaría el conflicto sin cambios territoriales, preservando nuestras fuerzas y tesoro de un mayor desgaste en una guerra estancada."
 war_stuff.9.f:1 ""
 war_stuff.9.a:0 "Enviar emisarios con términos de paz."
 war_stuff.9.b:0 "Continuar la guerra a pesar del impasse."

 war_stuff.10.t:0 "Obertura de Paz de [SCOPE.sCountry('war_stuff_home').GetName]"
 war_stuff.10.d:1 "Llegan correos diplomáticos del cuartel general [SCOPE.sCountry('war_stuff_home').GetAdjective] con una propuesta formal para terminar la [SCOPE.sWar('war_stuff_war').GetName] con un regreso a las fronteras de preguerra. Su mensaje reconoce el punto muerto estratégico y ofrece el cese de todas las hostilidades."
 war_stuff.10.f:1 ""
 war_stuff.10.a:0 "Aceptar su propuesta."
 war_stuff.10.b:0 "Rechazar su obertura."

 war_stuff.11.t:0 "El Motín de los Agotados"
 war_stuff.11.d:1 "Las trincheras se han convertido en un cementerio, y los hombres han alcanzado su punto de quiebre. Informes del [SCOPE.sFront('war_stuff_front').GetName] describen regimientos enteros negándose a fijar bayonetas. Afirman que mantendrán la línea contra un avance enemigo, pero que ya no participarán en ofensivas 'suicidas' por un gobierno que parece haber olvidado el valor de sus vidas."
 war_stuff.11.f:1 ""No atacaremos a la patria, pero no moriremos por una mentira. Si los Generales quieren esa colina, que la tomen ellos mismos.""
 war_stuff.11.a:0 "Restaurar el orden con el pelotón de fusilamiento."
 war_stuff.11.b:0 "Atender sus quejas y mejorar las raciones."

 war_stuff.12.t:0 "El Escándalo de Municiones"
 war_stuff.12.d:1 "Ha salido a la luz una vergüenza nacional: a nuestros soldados en el frente se les están suministrando proyectiles defectuosos; o peor, ninguno en absoluto. Mientras nuestros valientes hombres enfrentan el fuego enemigo, las fábricas en casa están estancadas en la ineficiencia y costos crecientes. La prensa exige saber por qué el 'Arsenal de [SCOPE.GetRootScope.GetCountry.GetName]' está callando en nuestra hora de necesidad."
 war_stuff.12.f:1 ""Un soldado sin bala no es más que un blanco. Es un crimen del más alto orden que nuestra industria obtenga ganancias mientras nuestros rifles hacen clic vacíos.""
 war_stuff.12.a:0 "Forzar la producción de todas formas."
 war_stuff.12.b:0 "Priorizar la calidad y la integridad de la línea de suministros."

 war_stuff.13.t:0 "El Plan [SCOPE.sCharacter('war_stuff_general_offensive').GetLastName]"
 war_stuff.13.d:1 "Los mapas en el Cuartel General no han cambiado en meses. En el [SCOPE.sFront('war_stuff_front').GetName], cada yarda de tierra ganada por la mañana es recuperada al anochecer. [SCOPE.sCharacter('war_stuff_general_offensive').GetFullName] ha llegado desde el frente con una pila de mapas operativos y una determinación sombría. Insiste en que con suficiente determinación y 'un último gran empuje', puede destrozar las líneas [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag] y restaurar el movimiento a la guerra."
 war_stuff.13.f:1 "\"Los hombres están cansados, sí, pero están más cansados de esperar morir en el barro. Denme los proyectiles, y romperé [SCOPE.sCountry('war_stuff_enemy').GetNameNoFormatting] de una vez por todas.\""
 war_stuff.13.a:0 "Comenzar la Ofensiva [SCOPE.sCharacter('war_stuff_general_offensive').GetLastName]."
 war_stuff.13.b:0 "Rechazar el plan y mantener nuestras defensas."

 war_stuff.14.t:0 "La Iniciativa de Liberación"
 war_stuff.14.d:1 "Las líneas en el [SCOPE.sFront('war_stuff_front').GetName] se han estancado, dejando a nuestros propios compatriotas languideciendo bajo la ocupación [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag]. [SCOPE.sCharacter('war_stuff_general_liberation').GetFullName] ha presentado un plan operativo audaz al Ministerio de Guerra. Argumenta que concentrando nuestras tropas y apelando al deseo de los hombres de reclamar sus propios hogares, podemos destrozar las líneas [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag]."
 war_stuff.14.f:1 "\"Cada día que retrasamos es otro día de sufrimiento para nuestros hermanos en [SCOPE.sState('war_stuff_liberation_state').GetNameNoFormatting]. Dé la orden, y echaremos la amenaza [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFormatting] de regreso a través de la frontera.\""
 war_stuff.14.a:0 "Autorizar la Ofensiva [SCOPE.sCharacter('war_stuff_general_liberation').GetLastName]."
 war_stuff.14.b:0 "Mantener una postura defensiva."

