 TTW_PEASANTS_TOOLTIP:0 "Крестьяне: #v [Country.GetSubsistingWorkingAdults|Kv]#!"
 TTW_UNEMPLOYED_TOOLTIP:0 "#header Безработные#!\nБезработная [concept_pop] не работает ни в одном из [Concept('concept_state','$concept_state_possessive$')] [Concept('concept_building','$concept_buildings$')] и не получает [concept_building_wage]. Такие группы охотно ухватятся за первую доступную работу и могут [Concept('concept_migration','$concept_emigrate$')], если ничего подходящего не подвернётся.\n\nНаселение области получает растущий штраф к рождаемости пропорционально уровню безработицы в этой области, вплоть до следующего предела:\n[GetStaticModifier('unemployment_birth_penalty_state').GetDesc]"
 TTW_CURRENT_TECH_TOOLTIP:0 "#header Текущее исследование#!\n[Technology.GetName]\nПрогресс: #v [Technology.GetProgressPercentage(GetPlayer.Self)|%0]#!"
 TTW_RESEARCH_PROGRESS_LINE:0 "#v [Technology.GetProgress(GetPlayer.Self)|D]#! / #maximum [Technology.GetCost(GetPlayer.Self)|D]#!"
 TTW_RESEARCH_INNOVATION_LINE:0 "[GetPlayer.GetWeeklyInnovation|0] / [GetPlayer.GetWeeklyMaxInnovation|0]"
 TTW_ARMY_SIZE_TOOLTIP:0 "#header Размер армии#!\nТекущие: @battalions![GetPlayer.GetBattalions|v]\nРегулярные + призывные: #v [GetPlayer.GetRegularBattalions|v] + [GetPlayer.CalcConscriptableBattalions|v]#!\nПроекция силы: #tooltippable #tooltip:[GetPlayer.GetTooltipTag],PANEL_MILITARY_ARMY_POWER_PROJECTION_TOOLTIP [GetPlayer.GetArmyPowerProjection|v0]#!#!"
 TTW_NAVY_SIZE_TOOLTIP:0 "#header Размер флота#!\nТекущие: @ships![GetPlayer.GetNumShips|v]\nПроекция силы: #tooltippable #tooltip:[GetPlayer.GetTooltipTag],PANEL_MILITARY_NAVY_POWER_PROJECTION_TOOLTIP [GetPlayer.GetNavyPowerProjection|v0]#!#!"
 TTW_INTERESTS_TOOLTIP:0 "#header Регионы интересов#!\nАктивные регионы интересов: #v [GetDataModelSize(AccessPlayer.AccessInterests)|v]#!.\nНажмите, чтобы открыть дипломатический обзор."
 TTW_COMPANIES_TOOLTIP:0 "#header Компании#!\nИспользуется #v [GetPlayer.GetNumCompanies|v] / [GetPlayer.GetMaxNumCompanies|v]#! слотов компаний.\n[GetPlayer.GetMaxNumCompaniesDesc]"
 TTW_AGITATORS_TOOLTIP:0 "#header [Concept('concept_agitator','$concept_agitators$')]#!\nВ настоящее время у нас есть #v [GetPlayer.GetUsedAgitatorSlots|v] / [GetPlayer.GetTotalAgitatorSlots|v]#! потенциальных [Concept('concept_agitator','$concept_agitators$')]."
 TTW_MARKET_TRADE_CAPACITY_TOOLTIP:0 "#header [concept_trade_capacity]#!"
 TTW_INVESTMENT_POOL_TOOLTIP:0 "#header Инвестиционный пул#!\nТекущее значение: #v @money![GetPlayer.GetInvestmentPool|D+]#!\nЕженедельное изменение: #v @money![GetPlayer.GetInvestmentPoolChange|D+=]#!"



