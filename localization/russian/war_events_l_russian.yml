l_russian:
 war_stuff.1.t:0 "[SCOPE.sCountry('war_stuff_enemy').GetCapital.GetCityHubName] Оккупирован"
 war_stuff.1.d:1 "Наши победоносные армии заняли самое сердце [SCOPE.sCountry('war_stuff_enemy').GetName]. Наше обращение с завоеванной столицей повлияет на нашу легитимность и волю врага к победе."
 war_stuff.1.f:1 ""Эти люди знают, что их судьба зависит от нашей милости.""
 war_stuff.1.a:0 "Поддерживать порядок и уважать институты."
 war_stuff.1.b:0 "Позволить войскам взять причитающееся."

 war_stuff.2.t:0 "[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] Оккупирован"
 war_stuff.2.d:1 "К нашему изумлению, оккупационные силы [SCOPE.sCountry('war_stuff_enemy').GetAdjective] сохранили порядок и уважали наши институты, несмотря на их победу."
 war_stuff.2.f:1 ""Захватчики патрулировали рынки без грабежей, я даже видел, как один вернул уроненный кошелек! Кто завоевывает с такой... цивилизованностью?""
 war_stuff.2.a:0 "Их сдержанность отмечена."

 war_stuff.3.t:0 "[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] Разграблен"
 war_stuff.3.d:1 "Войска [SCOPE.sCountry('war_stuff_enemy').GetAdjective] превратили [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] в дымящиеся руины, разграбив наши национальные сокровища и осквернив наше наследие."
 war_stuff.3.f:1 ""Века знаний превратились в пепел. Они даже переплавили статуи на металлолом!""
 war_stuff.3.a:0 "Они заплатят за это варварство!"

 war_stuff.4.t:0 "Беспорядки в [SCOPE.sState('war_stuff_state').GetName]"
 war_stuff.4.d:1 "По всему [SCOPE.sState('war_stuff_state').GetName] вспыхнули насильственные выступления, поскольку оккупированное население сопротивляется нашей власти. Улицы окрашены кровью, мы должны немедленно подготовить ответ."
 war_stuff.4.f:1 ""Они бросают булыжники, вырванные из улиц, которые мы мостили! Мой лейтенант спросил, должны ли мы стрелять в ответ. Что мне ему сказать?""
 war_stuff.4.a:0 "Подавить этот бунт максимальной силой."
 war_stuff.4.b:0 "Отозвать патрули и дать напряжению утихнуть."

 war_stuff.5.t:0 "Барабаны Войны"
 war_stuff.5.d:1 "Скоординированная пропагандистская кампания охватила [SCOPE.sCountry('war_stuff_home').GetName], разжигая патриотический пыл и укрепляя общественную решимость продолжать борьбу."
 war_stuff.5.f:1 ""Теперь на всех обоях вербовочные плакаты! Даже дети поют марши, прыгая на скакалке. Сердце нации бьется только ради победы.""
 war_stuff.5.a:0 "Наш народ един за дело!"

 war_stuff.6.t:0 "Расизм в [SCOPE.sState('war_stuff_state').GetName]"
 war_stuff.6.d:1 "Граждане [SCOPE.sCountry('war_stuff_home').GetName] в [SCOPE.sState('war_stuff_state').GetName] насильственно преследуют соседей [SCOPE.sCulture('war_stuff_culture').GetName] происхождения, обвиняя их в продолжающейся войне."
 war_stuff.6.f:1 ""'Убирайтесь домой!' кричали они...""
 war_stuff.6.a:0 "Пусть люди выплеснут праведный гнев."
 war_stuff.6.b:0 "Защищать всех граждан независимо от происхождения."

 war_stuff.7.t:0 "Зов Единства"
 war_stuff.7.d:1 "Делегации из [SCOPE.sCountry('war_stuff_enemy').GetName] прибыли с предложением добровольного присоединения к [SCOPE.sCountry('war_stuff_home').GetName], ссылаясь на общую культуру и исторические связи."
 war_stuff.7.f:1 ""Мой дед боролся, чтобы разделить нас, но мои ученики теперь маршируют, распевая ваши гимны. Колесо истории поворачивается...""
 war_stuff.7.a:0 "Приветствуем наших братьев в [SCOPE.sCountry('war_stuff_home').GetNameNoFlag]!"
 war_stuff.7.b:0 "Мы уважаем [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag] независимость."

 war_stuff.8.t:0 "Последствия Аннексии"
 war_stuff.8.d:1 "В [SCOPE.GetRootScope.GetCountry.GetName] поступают новости, что [SCOPE.sCountry('war_stuff_home').GetName] поглотила [SCOPE.sCountry('war_stuff_enemy').GetName] через дипломатическую аннексию, резко изменив европейский баланс сил."
 war_stuff.8.f:1 ""Сначала они пришли за австрийцами...""
 war_stuff.8.a:0 "Свершившийся факт, который мы должны признать."

 war_stuff.9.t:0 "Предложить Белый Мир с [SCOPE.sCountry('war_stuff_enemy').GetName]"
 war_stuff.9.d:1 "Ввиду отсутствия активных сухопутных фронтов в [SCOPE.sWar('war_stuff_war').GetName], наши военные советники рекомендуют искать белый мир с [SCOPE.sCountry('war_stuff_enemy').GetName]. Это положило бы конец конфликту без территориальных изменений, сохранив наши силы и казну от дальнейшего истощения в зашедшей в тупик войне."
 war_stuff.9.f:1 ""
 war_stuff.9.a:0 "Отправить послов с мирными условиями."
 war_stuff.9.b:0 "Продолжить войну, несмотря на тупик."

 war_stuff.10.t:0 "Мирное Предложение от [SCOPE.sCountry('war_stuff_home').GetName]"
 war_stuff.10.d:1 "Дипломатические курьеры прибывают из [SCOPE.sCountry('war_stuff_home').GetAdjective] штаба с формальным предложением закончить [SCOPE.sWar('war_stuff_war').GetName] возвращением к довоенным границам. Их сообщение признаёт стратегический тупик и предлагает прекращение всех военных действий."
 war_stuff.10.f:1 ""
 war_stuff.10.a:0 "Принять их предложение."
 war_stuff.10.b:0 "Отклонить их предложение."

 war_stuff.11.t:0 "Бунт Изможденных"
 war_stuff.11.d:1 "Окопы превратились в кладбище, и люди достигли предела своих сил. Сообщения с [SCOPE.sFront('war_stuff_front').GetName] описывают целые полки, отказывающиеся примыкать штыки. Они заявляют, что будут держать линию против вражеского наступления, но больше не будут участвовать в 'самоубийственных' атаках ради правительства, которое, кажется, забыло ценность их жизней."
 war_stuff.11.f:1 ""Мы не будем наносить удар по родине, но мы не умрем за ложь. Если генералы хотят тот холм, пусть берут его сами.""
 war_stuff.11.a:0 "Восстановить порядок расстрельным отрядом."
 war_stuff.11.b:0 "Учесть их жалобы и улучшить пайки."

 war_stuff.12.t:0 "Скандал с Боеприпасами"
 war_stuff.12.d:1 "Обнаружился национальный позор: нашим солдатам на фронте выдают неисправные снаряды; или хуже того, вообще никаких. Пока наши храбрые люди сталкиваются с вражеским огнем, заводы в тылу погрязли в неэффективности и растущих затратах. Пресса требует знать, почему 'Арсенал [SCOPE.GetRootScope.GetCountry.GetName]' молчит в час нашей нужды."
 war_stuff.12.f:1 ""Солдат без пули - всего лишь мишень. Это преступление высшего порядка, что наша промышленность получает прибыль, пока наши винтовки щелкают вхолостую.""
 war_stuff.12.a:0 "Все равно насильно продолжать производство."
 war_stuff.12.b:0 "Приоритет качества и целостности линий снабжения."

 war_stuff.13.t:0 "План [SCOPE.sCharacter('war_stuff_general_offensive').GetLastName]"
 war_stuff.13.d:1 "Карты в Генеральном штабе не менялись месяцами. На [SCOPE.sFront('war_stuff_front').GetName] каждый ярд земли, завоеванный утром, отбивается к закату. [SCOPE.sCharacter('war_stuff_general_offensive').GetFullName] прибыл с фронта со стопкой оперативных карт и мрачной решимостью. Он настаивает, что с достаточной стойкостью и 'одним последним великим натиском' он может разгромить [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag] линии и вернуть движение войне."
 war_stuff.13.f:1 "\"Люди устали, да, но они больше устали ждать смерти в грязи. Дайте мне снаряды, и я сокрушу [SCOPE.sCountry('war_stuff_enemy').GetNameNoFormatting] раз и навсегда.\""
 war_stuff.13.a:0 "Начать Наступление [SCOPE.sCharacter('war_stuff_general_offensive').GetLastName]."
 war_stuff.13.b:0 "Отклонить план и сохранить нашу оборону."

 war_stuff.14.t:0 "Инициатива Освобождения"
 war_stuff.14.d:1 "Линии на [SCOPE.sFront('war_stuff_front').GetName] застыли, оставляя наших соотечественников томиться под [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag] оккупацией. [SCOPE.sCharacter('war_stuff_general_liberation').GetFullName] представил смелый оперативный план в Военное министерство. Он утверждает, что, сосредоточив войска и обратившись к желанию людей вернуть свои очаги, мы можем разбить [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag] линии."
 war_stuff.14.f:1 "\"Каждый день, который мы откладываем, - это еще один день страданий для наших братьев в [SCOPE.sState('war_stuff_liberation_state').GetNameNoFormatting]. Отдайте приказ, и мы отбросим [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFormatting] угрозу обратно через границу.\""
 war_stuff.14.a:0 "Санкционировать Наступление [SCOPE.sCharacter('war_stuff_general_liberation').GetLastName]."
 war_stuff.14.b:0 "Сохранять оборонительную позицию."

