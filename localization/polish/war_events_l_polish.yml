l_polish:
 war_stuff.1.t:0 "[SCOPE.sCountry('war_stuff_enemy').GetCapital.GetCityHubName] Okupowane"
 war_stuff.1.d:1 "Nasze zwycięskie armie zajęły samo serce [SCOPE.sCountry('war_stuff_enemy').GetName]. To, jak traktujemy podbitą stolicę, odbije się echem w historii, kształtując naszą legitymację i wolę oporu wroga."
 war_stuff.1.f:1 ""Ci ludzie wiedzą, że ich los spoczywa w naszym miłosierdziu.""
 war_stuff.1.a:0 "Utrzymać porządek i szanować instytucje."
 war_stuff.1.b:0 "Pozwól żołnierzom wziąć to, co im się należy."

 war_stuff.2.t:0 "[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] Okupowane"
 war_stuff.2.d:1 "Ku naszemu zdumieniu okupacyjne siły [SCOPE.sCountry('war_stuff_enemy').GetAdjective] utrzymały porządek i szanowały nasze instytucje pomimo zwycięstwa."
 war_stuff.2.f:1 ""Najeźdźcy patrolowali rynki bez grabieży, nawet widziałem, jak jeden zwrócił zgubioną sakiewkę! Kto podbija z taką... cywilizacją?""
 war_stuff.2.a:0 "Ich powściągliwość została odnotowana."

 war_stuff.3.t:0 "[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] Splądrowane"
 war_stuff.3.d:1 "Wojska [SCOPE.sCountry('war_stuff_enemy').GetAdjective] zredukowały [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] do dymiących ruin, grabiąc nasze skarby narodowe i profanując nasze dziedzictwo."
 war_stuff.3.f:1 ""Wieki wiedzy obrócone w popiół. Nawet przetopili posągi na złom!""
 war_stuff.3.a:0 "Zapłacą za to barbarzyństwo!"

 war_stuff.4.t:0 "Zamieszki w [SCOPE.sState('war_stuff_state').GetName]"
 war_stuff.4.d:1 "Gwałtowne zamieszki wybuchły w [SCOPE.sState('war_stuff_state').GetName] gdy okupowana ludność stawia opór naszej władzy. Ulice spływają krwią buntu, musimy natychmiast zareagować."
 war_stuff.4.f:1 ""Rzucają kostką brukową wyrywaną z ulic, które sami wybrukowaliśmy! Mój porucznik pyta, czy mamy strzelać w odpowiedzi. Co mam mu powiedzieć?""
 war_stuff.4.a:0 "Zgnieść ten bunt z maksymalną siłą."
 war_stuff.4.b:0 "Wycofać patrole i pozwolić ochłonąć sytuacji."

 war_stuff.5.t:0 "Bębny Wojny"
 war_stuff.5.d:1 "Skoordynowana kampania propagandowa ogarnęła [SCOPE.sCountry('war_stuff_home').GetName], rozpalając patriotyzm i wzmacniając publiczną determinację do kontynuowania walki."
 war_stuff.5.f:1 ""Każda tapeta teraz nosi plakaty rekrutacyjne! Nawet dzieci śpiewają marsze podczas skakania na skakance. Serce narodu bije tylko dla zwycięstwa.""
 war_stuff.5.a:0 "Nasz lud stoi zjednoczony za sprawą!"

 war_stuff.6.t:0 "Rasizm w [SCOPE.sState('war_stuff_state').GetName]"
 war_stuff.6.d:1 "Obywatele [SCOPE.sCountry('war_stuff_home').GetName] w [SCOPE.sState('war_stuff_state').GetName] gwałtownie atakują sąsiadów o pochodzeniu [SCOPE.sCulture('war_stuff_culture').GetName], obwiniając ich o trwającą wojnę."
 war_stuff.6.f:1 ""'Wracajcie do domu!' krzyczeli...""
 war_stuff.6.a:0 "Pozwól ludziom wyładować słuszny gniew."
 war_stuff.6.b:0 "Chroń wszystkich obywateli niezależnie od pochodzenia."

 war_stuff.7.t:0 "Wezwanie do Jedności"
 war_stuff.7.d:1 "Przybyły delegacje z [SCOPE.sCountry('war_stuff_enemy').GetName] proponując dobrowolne włączenie do [SCOPE.sCountry('war_stuff_home').GetName], powołując się na wspólną kulturę i więzi historyczne."
 war_stuff.7.f:1 ""Mój dziadek walczył, by nas podzielić, ale moi uczniowie maszerują teraz śpiewając wasze hymny. Koło historii się obraca...""
 war_stuff.7.a:0 "Witajmy naszych braci w [SCOPE.sCountry('war_stuff_home').GetNameNoFlag]!"
 war_stuff.7.b:0 "Szanujemy [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag] niepodległość."

 war_stuff.8.t:0 "Fale Aneksji"
 war_stuff.8.d:1 "Wieści docierają do [SCOPE.GetRootScope.GetCountry.GetName], że [SCOPE.sCountry('war_stuff_home').GetName] wchłonęło [SCOPE.sCountry('war_stuff_enemy').GetName] poprzez aneksję dyplomatyczną, dramatycznie przesuwając europejską równowagę sił."
 war_stuff.8.f:1 ""Najpierw przyszli po Austriaków...""
 war_stuff.8.a:0 "Fait accompli, który musimy uznać."

 war_stuff.9.t:0 "Zaproponuj Biały Pokój z [SCOPE.sCountry('war_stuff_enemy').GetName]"
 war_stuff.9.d:1 "Brak aktywnych frontów lądowych w [SCOPE.sWar('war_stuff_war').GetName] skłania naszych doradców wojskowych do zalecenia zawarcia białego pokoju z [SCOPE.sCountry('war_stuff_enemy').GetName]. Zakończyłoby to konflikt bez zmian terytorialnych, zachowując nasze siły i skarbiec przed dalszym wyczerpaniem w wojnie patowej."
 war_stuff.9.f:1 ""
 war_stuff.9.a:0 "Wysłać posłów z warunkami pokojowymi."
 war_stuff.9.b:0 "Kontynuować wojnę pomimo impasu."

 war_stuff.10.t:0 "Propozycja Pokoju od [SCOPE.sCountry('war_stuff_home').GetName]"
 war_stuff.10.d:1 "Dyplomatyczni kurierzy przybywają z kwatery głównej [SCOPE.sCountry('war_stuff_home').GetAdjective] z formalną propozycją zakończenia [SCOPE.sWar('war_stuff_war').GetName] poprzez powrót do przedwojennych granic. Ich wiadomość uznaje strategiczny impas i oferuje zaprzestanie wszelkich działań wojennych."
 war_stuff.10.f:1 ""
 war_stuff.10.a:0 "Zaakceptować ich propozycję."
 war_stuff.10.b:0 "Odrzucić ich ofertę."

 war_stuff.11.t:0 "Bunt Wyczerpanych"
 war_stuff.11.d:1 "Okopy stały się cmentarzem, a ludzie osiągnęli punkt załamania. Raporty z [SCOPE.sFront('war_stuff_front').GetName] opisują całe pułki odmawiające mocowania bagnetów. Twierdzą, że utrzymają linię przed natarciem wroga, ale nie będą już brać udziału w 'samobójczych' ofensywach dla rządu, który zdaje się zapomniał o wartości ich życia."
 war_stuff.11.f:1 ""Nie uderzymy przeciwko ojczyźnie, ale nie umrzemy za kłamstwo. Jeśli generałowie chcą tego wzgórza, niech wezmą je sami.""
 war_stuff.11.a:0 "Przywrócić porządek plutonem egzekucyjnym."
 war_stuff.11.b:0 "Zająć się ich skargami i poprawić racje żywnościowe."

 war_stuff.12.t:0 "Skandal Amunicyjny"
 war_stuff.12.d:1 "Wyszła na jaw narodowa kompromitacja: nasi żołnierze na froncie otrzymują wadliwe pociski; lub co gorsza, żadne. Podczas gdy nasi dzielni ludzie stawiają czoła wrogim kulom, fabryki w kraju tkwią w nieefektywności i rosnących kosztach. Prasa domaga się wyjaśnień, dlaczego 'Arsenał [SCOPE.GetRootScope.GetCountry.GetName]' milknie w godzinie naszej potrzeby."
 war_stuff.12.f:1 ""Żołnierz bez kuli to tylko cel. To zbrodnia najwyższego rzędu, że nasz przemysł czerpie zyski, podczas gdy nasze karabiny strzelają na sucho.""
 war_stuff.12.a:0 "I tak zmusić do produkcji."
 war_stuff.12.b:0 "Priorytetowo potraktować jakość i integralność linii zaopatrzeniowych."

 war_stuff.13.t:0 "Plan [SCOPE.sCharacter('war_stuff_general_offensive').GetLastName]"
 war_stuff.13.d:1 "Mapy w Kwaterze Głównej nie zmieniły się od miesięcy. Na [SCOPE.sFront('war_stuff_front').GetName] każda stopa ziemi zdobyta rano jest odbierana do zmroku. [SCOPE.sCharacter('war_stuff_general_offensive').GetFullName] przybył z frontu z plikiem map operacyjnych i ponurą determinacją. Nalega, że z wystarczającą zawziętością i 'jednym ostatnim wielkim pchnięciem' może rozbić linie [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag] i przywrócić ruch w wojnie."
 war_stuff.13.f:1 "\"Ludzie są zmęczeni, tak, ale bardziej są zmęczeni czekaniem na śmierć w błocie. Dajcie mi pociski, a rozbiję [SCOPE.sCountry('war_stuff_enemy').GetNameNoFormatting] raz na zawsze.\""
 war_stuff.13.a:0 "Rozpocząć Ofensywę [SCOPE.sCharacter('war_stuff_general_offensive').GetLastName]."
 war_stuff.13.b:0 "Odrzucić plan i utrzymać naszą obronę."

 war_stuff.14.t:0 "Inicjatywa Wyzwolenia"
 war_stuff.14.d:1 "Linie na [SCOPE.sFront('war_stuff_front').GetName] zastały, pozostawiając naszych rodaków wegetujących pod okupacją [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag]. [SCOPE.sCharacter('war_stuff_general_liberation').GetFullName] przedłożył śmiały plan operacyjny Ministerstwu Wojny. Twierdzi, że koncentrując nasze wojska i odwołując się do pragnienia ludzi, by odzyskać własne ogniska domowe, możemy rozbić linie [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag]."
 war_stuff.14.f:1 "\"Każdy dzień, który opóźniamy, to kolejny dzień cierpienia dla naszych braci w [SCOPE.sState('war_stuff_liberation_state').GetNameNoFormatting]. Wydaj rozkaz, a przepędzimy zagrożenie [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFormatting] z powrotem za granicę.\""
 war_stuff.14.a:0 "Zatwierdzić Ofensywę [SCOPE.sCharacter('war_stuff_general_liberation').GetLastName]."
 war_stuff.14.b:0 "Utrzymać postawę obronną."

