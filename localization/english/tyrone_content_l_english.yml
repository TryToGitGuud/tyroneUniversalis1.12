    #Sakhalin
    divide_sakhalin_decision:0 "Sakhalin Partition Treaty"
    divide_sakhalin_decision_desc:0 "With the colonization of Sakhalin complete, the fate of the island must now be decided. A negotiated partition could stabilize relations and formalize borders, while rejecting division would assert exclusive control. This choice will define our position in the North Pacific."
    sakhalin_colonized_tt: "#v $SKH$#! has been fully colonized."
    sakhalin.1.t:0 "The Sakhalin Question"

    sakhalin.1.d:0 "With the colonization of Sakhalin complete, overlapping claims that were once vague lines on maps have become rival administrations on the ground. Diplomats propose a clean settlement: a partition of the island along the 50th parallel north, fixing borders before a minor incident becomes a major war. Hardliners reject any division and insist that Sakhalin must remain whole under our rightful claim."

    sakhalin.1.f:0 "“Borders on paper are cheap. Borders on the ground are paid for—either in ink, or in blood.”"

    sakhalin.1.a:0 "Offer a division along the 50th parallel."
    sakhalin.1.b:0 "Reject partition—Sakhalin is ours in full."

    sakhalin.2.t:0 "An Offer to Divide Sakhalin"

    sakhalin.2.d:0 "A formal proposal has arrived from our rival claimant to Sakhalin: partition the island along the 50th parallel north and put an end to the island’s overlapping claims. Accepting would secure a recognized frontier and reduce the risk of escalation. Refusing preserves our claim to the whole island—but invites tension, incidents, and the possibility that the dispute will be settled by force instead of ink."

    sakhalin.2.f:0 "“To accept a line is to gain peace today. To refuse it is to wager that tomorrow will favor us.”"

    sakhalin.2.a:0 "Accept the partition along the 50th parallel."
    sakhalin.2.b:0 "Reject the offer—our claim is to all Sakhalin."

    sakhalin.3.t:0 "The Fate of Sakhalin"

    sakhalin.3.d:0 "The agreement has been signed. Sakhalin will be partitioned along the 50th parallel north, ending the ambiguity of overlapping claims and fixing a frontier that both sides can recognize. Administrators, garrisons, and surveyors now move to mark the line on the ground, trading uncertain rivalry for a defined—if uneasy—peace."

    sakhalin.3.d_2:0 "No agreement has been reached. Both sides maintain their claims to the whole of Sakhalin, and the island remains a patchwork of rival patrols and competing maps. For now the dispute is contained—but every outpost and minor incident risks turning the question of Sakhalin into a broader crisis."

    sakhalin.3.f:0 "“A border agreed is a quarrel postponed; a border refused is a quarrel prepared.”"

    sakhalin.3.a:0 "The island is divided."
    sakhalin.3.b:0 "No agreement will be made."


