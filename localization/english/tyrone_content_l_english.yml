    #American Exceptionalism
    je_american_exceptionalism: "American Exceptionalism"
    je_american_exceptionalism_reason: "The United States stands apart from the old powers of the world — a nation built not on hereditary aristocracy or colonial exploitation, but on the principle that any nation can rise through its own strength and virtue. With our power bloc at the center of the international order, we must prove that this great experiment in self-governance can lead the world.\n\n#b The American Agenda:#!\nCompleting at least #v 5#! of the following 15 will allow you to #b Declare American Hegemony#!.\n\n#b Expansion#!\n[ROOT.GetCountry.GetCustom('ae_manifest_destiny_checkbox')] Complete #b Manifest Destiny#!\n[ROOT.GetCountry.GetCustom('ae_alaska_checkbox')] Acquire [GetStateRegion('STATE_ALASKA').GetName]\n[ROOT.GetCountry.GetCustom('ae_hawaii_checkbox')] Acquire [GetStateRegion('STATE_HAWAIIAN_ISLANDS').GetName]\n\n#b Diplomacy#!\n[ROOT.GetCountry.GetCustom('ae_power_bloc_checkbox')] Lead a [concept_power_bloc] with at least #v 5#! member nations in the Americas\n[ROOT.GetCountry.GetCustom('ae_bloc_rank1_checkbox')] Be the leader of a #b top 3-ranked [concept_power_bloc]#!\n[ROOT.GetCountry.GetCustom('ae_monroe_checkbox')] Enforce the #b Monroe Doctrine#! (#v 80%#! of Americas nations in your [concept_power_bloc])\n\n#b Military#!\n[ROOT.GetCountry.GetCustom('ae_flotilla_checkbox')] Hold a #b top 3#! flotilla count\n[ROOT.GetCountry.GetCustom('ae_trench_infantry_checkbox')] Field at least #v 100#! battalions with #v 50+#! being #b Trench Infantry#!\n[ROOT.GetCountry.GetCustom('ae_arms_producer_checkbox')] Be a #b top 3 producer#! of [GetGoods('small_arms').GetName], [GetGoods('artillery').GetName], [GetGoods('ammunition').GetName], or [GetGoods('ironclads').GetName]\n\n#b Domestic#!\n[ROOT.GetCountry.GetCustom('ae_slavery_checkbox')] #b Abolish Slavery#!\n[ROOT.GetCountry.GetCustom('ae_multiculturalism_checkbox')] Enact [GetLawType('law_multicultural').GetName]\n[ROOT.GetCountry.GetCustom('ae_guaranteed_liberties_checkbox')] Enact [GetLawType('law_guaranteed_liberties').GetName]\n\n#b Economy#!\n[ROOT.GetCountry.GetCustom('ae_industry_checkbox')] Be a #b top 3 producer#! of [GetGoods('tools').GetName] or [GetGoods('steel').GetName]\n[ROOT.GetCountry.GetCustom('ae_gdp_checkbox')] Hold a #b top 3 GDP#!\n[ROOT.GetCountry.GetCustom('ae_steel_frame_checkbox')] Research and deploy [GetTechnology('steel_frame_buildings').GetName] in all domestic construction sectors\n\n#b \"America is not merely a nation but a nation of nations — a reflection of the world's aspirations for freedom and self-determination.\"#!\n— Herman Melville, 1849"
    je_american_exceptionalism_fail_tt: "The United States no longer leads a Power Bloc."
    je_american_exceptionalism_lobby: "Lead the next chapter of the free world as an up and coming Great Power."
    je_american_exceptionalism_button: "Declare American Hegemony"
    je_american_exceptionalism_button_desc: "The United States has proven itself on the world stage. Let us declare to all nations that this great republic stands above the old orders of Europe — the undisputed leader of a new world."
    je_american_exceptionalism_button_desc_agendas: "The United States has proven itself on the world stage. Let us declare to all nations that this great republic stands above the old orders of Europe — the undisputed leader of a new world.\n\n[ROOT.GetCountry.GetName] gets $ae_modifier_display$ for #v 10 years#!, multiplied by the number of #b agenda#! items completed (currently [GetPlayer.MakeScope.ScriptValue('american_exceptionalism_agenda_value')|v0])"
