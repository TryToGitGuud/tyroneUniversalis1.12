    # Ostend Manifesto — Event Chain
    ostend_manifesto.1.t: "The American Offer"
    ostend_manifesto.1.d: "An envoy has arrived in Madrid bearing a remarkable proposal from Washington: the United States wishes to purchase Cuba outright for the sum of five million dollars. The offer is audacious — but Spain's coffers are not what they once were, and the Americans are not known for making offers they do not intend to press."
    ostend_manifesto.1.f: "The fate of Cuba may be decided not on a battlefield, but across a negotiating table."
    ostend_manifesto.1.a: "Accept — Five Million for Cuba"
    ostend_manifesto.1.b: "Counter — Seven and a Half Million"
    ostend_manifesto.1.c: "Refuse — Cuba Is Not For Sale"

    ostend_manifesto.2.t: "Spain's Counteroffer"
    ostend_manifesto.2.d: "Spain has declined the initial offer, but has not slammed the door entirely. Madrid's reply arrives: seven and a half million dollars, and not a cent less. The question now falls to Washington — is Cuba worth the price?"
    ostend_manifesto.2.f: "Diplomacy is a game of patience. Spain has raised the stakes."
    ostend_manifesto.2.a: "Accept the Counteroffer — Seven and a Half Million"
    ostend_manifesto.2.b: "Reject the Counteroffer"

    ostend_manifesto.3.t: "The Treaty of Havana"
    ostend_manifesto.3.d: "With the price agreed upon, the ink is nearly dry — but one final question remains unanswered. Cuba has been purchased from Spain. Now the United States must determine what Cuba will become. The island's people, its geography, and the weight of American principles all demand an answer."
    ostend_manifesto.3.f: "How the United States treats Cuba will define its character as a hemispheric power for generations to come."
    ostend_manifesto.3.a: "Grant Cuba Full Sovereignty"
    ostend_manifesto.3.b: "Establish an American Protectorate"
    ostend_manifesto.3.c: "Incorporate Cuba as a Colony"

    # Ostend Manifesto — Puerto Rico Offer Event Chain
    je_ostend_offer_pco_button: "Make an Offer for Puerto Rico"
    je_ostend_offer_pco_button_desc: "Approach Spain with a formal offer to purchase Puerto Rico. The island's strategic position in the Caribbean makes it a prize worth pursuing through diplomacy."

    ostend_manifesto.4.t: "An Offer for Puerto Rico"
    ostend_manifesto.4.d: "An American envoy has arrived in Madrid with a proposal to purchase Puerto Rico for seven hundred and fifty thousand dollars. The sum is modest compared to what is asked of Cuba, but the island is smaller, and Washington calculates Spain may be more willing to part with it."
    ostend_manifesto.4.f: "Puerto Rico's future may be decided not by arms, but by commerce."
    ostend_manifesto.4.a: "Accept — Seven Hundred and Fifty Thousand"
    ostend_manifesto.4.b: "Counter — One and a Quarter Million"
    ostend_manifesto.4.c: "Refuse — Puerto Rico Is Not For Sale"

    ostend_manifesto.5.t: "Spain's Counteroffer — Puerto Rico"
    ostend_manifesto.5.d: "Spain has declined the initial offer for Puerto Rico, but signals a willingness to negotiate. Madrid's reply: one and a quarter million dollars, and not a cent less. Washington must now weigh whether the island is worth the price."
    ostend_manifesto.5.f: "Spain drives a harder bargain than expected."
    ostend_manifesto.5.a: "Accept the Counteroffer — One and a Quarter Million"
    ostend_manifesto.5.b: "Reject the Counteroffer"

    ostend_manifesto.6.t: "The Treaty of San Juan"
    ostend_manifesto.6.d: "The purchase of Puerto Rico is complete. The ink is dry, the price agreed upon — but one question remains. What is Puerto Rico to become under American stewardship? The island's people, its resources, and its place in the Caribbean all demand an answer."
    ostend_manifesto.6.f: "The treaty signed in San Juan will shape Puerto Rico's future for generations."
    ostend_manifesto.6.a: "Grant Puerto Rico Full Sovereignty"
    ostend_manifesto.6.b: "Establish an American Protectorate"
    ostend_manifesto.6.c: "Incorporate Puerto Rico as a Colony"
