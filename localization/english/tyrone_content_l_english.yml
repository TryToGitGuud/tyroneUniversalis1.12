    #Germany
    je_north_german_fed_pu:0 "North German Confederation"
    je_north_german_fed_pu_reason:0 "After the defeat against Austria, the North German states attempt to unite. We must strive to be the foremost power in northern Germany, so that the people still look to us as champions of the cause."
    # je_north_german_status:1 "The North German minor nations will unify with us if we can become the sole [concept_unification_candidate]."
    # je_german_status:1 "To complete the unification of Germany, we should launch a Unification [concept_diplomatic_play]"
    german_unification.6.t:0 "Unification with [SCOPE.sCountry('german_annex_country').GetName]"
    german_unification.6.d:0 "The remaining North German state of [SCOPE.sCountry('german_annex_country').GetName] has wisely decided to join our efforts to unify the North German people."
    german_unification.6.f:0 ""To thrive again, we must look forward, not back. It is unity under a single state that will drive the North German people to greatness once more.""
    german_unification.6.a:0 "Diplomacy has won the day!"
    german_unification.6.b:0 "It is not the right time."
    dyn_c_german_reich:0 "German Reich"
    germany_rejoin_decision:0 "Reassert Leadership of Germany"
    germany_rejoin_decision_desc:0 "With the German lands bound by shared economic and political interests, Prussia can once again assume its natural role as the leading power among the German states, restoring cohesion and influence within the bloc."
    germany_rework.1.t:0 "The Brothers' War Lost"
    germany_rework.1.d1:0 "The Brothers' War has ended in humiliation for [ROOT.GetCountry.GetName]. Our bid to steer the course of German unification has collapsed, leaving our prestige shaken and our ambitions exposed. Rivals now whisper that [ROOT.GetCountry.GetNameNoFlag]'s moment has passed, and the dream of leading a united Germany slips further from our grasp."
    germany_rework.1.f1:0 ""We believed ourselves the engine of Germany’s future, yet we return humbled. The road to unity now lies broken before us — but not abandoned. Even in defeat, purpose endures.""
    germany_rework.1.d2:0 "[ROOT.GetCountry.GetName] reels from defeat, and the old imperial order trembles. The Hungarians grow restless, demanding concessions long denied. Unless the Empire adapts — reshaping itself into a dual monarchy — the rising storm of nationalist unrest may tear it apart from within."
    germany_rework.1.f2:0 ""A shattered crown cannot deny its cracks forever. Reform may yet preserve the Empire — refusal will only hasten its unraveling.""
    germany_rework.1.a:0 "We will rebuild from this defeat."
    germany_rework.1.b:0 "Offer the Ausgleich — preserve the Empire through reform."
    germany_rework.1.c:0 "Refuse concessions — let Hungary dare to defy us."
    germany_rework.2.t:0 "A Second Attempt at German Unification"
    germany_rework.2.d:0 "Though the Brothers’ War ended in humiliation, [ROOT.GetCountry.GetName] has not abandoned its national ambitions. A renewed effort now begins to bring the northern German states together under [ROOT.GetCountry.GetAdjectiveNoFlag] leadership. Envoys are sent, agreements drafted, and pressure quietly applied as the foundations of a stronger northern union take shape."
    germany_rework.2.f:0 ""We may have stumbled, but the path remains. Germany will not be shaped by those who hesitate, but by those who persevere.""
    germany_rework.2.a:0 "Consolidate the northern German states."
    hungary_lead_to_war_tt: "#bold This will lead to #red war#! with the Hungarians!#!"
    je_prussian_unification_fail_tt: "We have lost the #v Brothers' War#!"
    brothers_war_defeat_pru: "Lost the Bruderkrieg"
    brothers_war_defeat_aus: "Lost the Bruderkrieg"
    won_brothers_war_tt: "Has won the #v Brothers' War#!"
    not_austria_tt: "Your country is #bold not#! [SCOPE.sCountry('austria_scope').GetName]"
    je_avenge_brothers_war:0 "Avenge the Brothers' War"
    je_avenge_brothers_war_reason:0 "The humiliation suffered in the Brothers' War still lingers within [ROOT.GetCountry.GetName] and the wider German nation. Many believe that the failure to assert German unity then has emboldened rivals and fractured national pride. By reversing this defeat and bringing the southern German states firmly under [ROOT.GetCountry.GetAdjectiveNoFlag] leadership, we can restore our honor and complete the unfinished work of unification."
    get_claims_germany_tt: "[ROOT.GetCountry.GetName] gets claims on all [Concept('concept_state', '$concept_states$')] in #v Germany#!."
    germany_rework.3.t:0 "A Crown from the Gutter"
    germany_rework.3.d:0 "Delegates of the Frankfurt Assembly have gathered to offer us a newly forged German crown—one born not of ancient right, but of parliamentary decree. They proclaim it the will of the German nation, though it comes shackled to constitutional limits and expectations crafted far from our court."
    germany_rework.3.f:0 "Some hail this moment as the dawn of a new German order; others sneer that no legitimate sovereign should accept a crown molded by theorists and idealists. Whether this gift is an opportunity or an insult depends on how boldly we answer their call."
    germany_rework.3.a:0 "Accept the Frankfurt Assembly's proposal."
    germany_rework.3.b:0 "We shall proclaim a republic!"
    germany_rework.3.c:0 "This parliament must learn its place!"
    gutter_germany: "Crown from the Gutter"
    gutter_german_republic: "Radical German Republic"
    dyn_c_prussia_monarchy: "Kingdom of Prussia"
    dyn_c_german_republic: "German Republic"
    rejected_gutter: "Rejected Gutter Crown"
    je_avenge_brothers_war_lobby:0 "The humiliation of the Brothers' War still casts a long shadow over our standing in Germany. The time has come to restore our honor and reassert our rightful influence among the German states."
    je_crown_in_the_gutter_lobby:0 "Germany stands leaderless and divided, its crown left to be claimed by those bold enough to grasp it. As one of the foremost German powers, it falls to us to decide the future course of the nation."

    je_crown_in_the_gutter:0 "The Crown from the Gutter"
    je_crown_in_the_gutter_desc:0 "Revolutionary fervor spreads across the German lands, and with it comes an unthinkable proposal: the unification of the nation under a new crown born not of divine right, but of popular will. The old dynastic order trembles as the masses demand a Germany forged by nationalism rather than lineage."

    je_crown_in_the_gutter_reason:0 "What once belonged to emperors and princes now lies before the people. A crown discarded by history may yet be raised again—not by tradition, but by revolution, ideology, and the will of the nation."

    accepted_gutter_crown:0 "Accepted the #v Crown from the Gutter#!"

    declined_gutter_crown:0 "Declined the #v Crown from the Gutter#!"

    germany_exists_tt: "#b $GER$#! has been [Concept('concept_nation_formation','$concept_nation_formation_short_past$')]"
    germany_rework.4.t:0 "The Habsburg Response"
    germany_rework.4.d:0 "The Frankfurt Assembly has made its decision, and the [SCOPE.sCountry('prussia_scope').GetName] has accepted its call to lead the unification of the German states. Whether this emerging Germany takes monarchical or republican form matters less than the political reality: Prussia has moved decisively, and Austria must now choose how to respond."
    germany_rework.4.f:0 "The court is divided. One faction insists that Germany cannot be “unified” without Austria at its head, and that any settlement led from Berlin is a direct challenge to our historic role. Another argues that resisting the tide risks isolation—and that careful acceptance may preserve influence where open defiance would lose everything."
    germany_rework.4.a:0 "Germany must answer to Vienna."
    germany_rework.4.b:0 "We will not stand in Germany’s way."

    germany_rework.5.t:0 "The Imperial Reckoning"
    germany_rework.5.d:0 "From Paris comes a proclamation that chills every court in the German lands: [SCOPE.sCountry('france_scope').GetName] speaks openly of *imperial reconquests*—of borders to be “restored,” of old arrangements to be overturned, of Europe to be reordered at the point of a bayonet."
    germany_rework.5.f:0 "For decades the German states have endured division as a habit and caution as a policy. Now that habit feels like a liability. If [SCOPE.sCountry('france_scope').GetName] means to stride again across the map, then each petty frontier becomes an invitation, each separate army a weakness, each separate diplomacy a bargain struck under threat.\n\nVoices once dismissed as radicals now find sober listeners: a single command, a single banner, a single will. The great #v North German Confederation#! stands as the only power with the weight—and the nerve—to gather the fractured German world into something that can answer [SCOPE.sCountry('france_scope').GetNameNoFlag] without flinching."
    germany_rework.5.a:0 "Germany must be forged—before France decides its shape for us."
    je_gutter_crown_status:1 "In order to be offered the #yellow Crown from the Gutter#!, we must have either the #v $je_springtime_of_the_peoples$#! [concept_journal_entry] active, or the year must be at least #v 1848#!, or we need to have unlocked [GetTechnology('pan-nationalism').GetName]."
    german_national_movement_tt: "Is a $movement_german_national$"


