    je_of_two_crowns: "Of Two Crowns"
    je_of_two_crowns_lobby: "The unified crowns of Sweden and Norway since the Convention of Moss in 1814 have proven the value of a common monarch and common foreign policy. The union must bring the remaining Nordic countries to heel, or be forgotten to the sands of time."
    je_of_two_crowns_reason: "The Swedish-Norwegian Union brought forth from the Convention of Moss in 1814 has proven the strength of a unified Nordic people under one crown. It is time to expand the influence of the union to secure a future for the Nordic peoples."
    two_crowns_unite.1.t: "The Danish Throne"
    two_crowns_unite.1.d: "The Danish crown has accepted their position beneath the Swedish."
    two_crowns_unite.1.f: "With the newfound subservience of the Danish crownlands, the only question remaining is how we should treat them."
    two_crowns_unite.1.a: "Retain the throne, and seat our king upon it. The two crowns shall become three."
    two_crowns_shatter.1.t: "A Crown, Lost"
    two_crowns_shatter.1.d: "The Danish throne has been destroyed."
    two_crowns_shatter.1.f: "With the Danish monarchy uprooted from their homeland, the Danes now stand without a monarch above them."
