l_english:

    #Economic JE
    je_reform_economy_goal:0 "We have increased our [concept_gdp] by #v 50%#."
    je_reform_economy:0 "The Direction of Capital"
    je_reform_economy_reason:0 "With the rise of investment banks, the flow of capital within [ROOT.GetCountry.GetName] stands at a turning point. Finance no longer merely serves industry — it now shapes it, directing the growth of entire sectors and the fortunes of the nation itself. Yet this newfound power demands a choice. The state may assert its hand, guiding investment toward national priorities and strategic strength, or it may entrust the market to allocate capital freely, unleashing private enterprise and competition. Whichever path is chosen, the structure of our economy will be transformed, and the balance between state and capital redefined."
    law_laissez_faire_plus:0 "Financial Corporatism"
    law_laissez_faire_plus_desc:0 "A highly developed liberal economy where capital flows freely, private enterprise dominates industry, and minimal restrictions allow markets to expand at maximum efficiency."
    economic_reform.1.t: "The Fate of Capitalism"
    economic_reform.1.d: "With the rise of modern finance and industry, [ROOT.GetCountry.GetName] stands at a decisive crossroads. The expansion of investment banks has reshaped the flow of capital, raising fundamental questions about who should command the nation’s economic future — the state or the market."
    economic_reform.1.f: "The reports lay scattered across the desk, ink still drying on figures that promised growth beyond anything the old order could sustain. Some spoke of discipline, of guiding capital with a firm hand for the good of the nation. Others whispered of opportunity, of fortunes made where ambition was left unshackled. The minister lingered in silence, knowing that whichever path was chosen, there would be no easy return."
    economic_reform.1.a: "Let capital flow freely."
    economic_reform.1.b: "The state must take the lead."

