    change_tag_to_KUK_triple_monarchy_tt: "[ROOT.GetCountry.GetName] will federate with [SCOPE.sCountry('hungary_scope').GetName] and [SCOPE.sCountry('croatia_scope').GetName] to form #v $dyn_c_triple_monarchy$#!"
    integrating_hungary: "Reincorporating the Crownlands"
    matter_of_hungary_federate_hungary_decision:0 "Unify the Dual Monarchy"
    matter_of_hungary_federate_hungary_decision_desc:0 "With the Dual Monarchy firmly established, a deeper union with #bold $HUN$#! now stands within reach. By formalizing shared institutions and aligning the crowns more closely than ever before, Vienna and Budapest may set aside old grievances and forge a single, integrated state.\n\n#bold This will consolidate the realms into a unified monarchy.#!"
