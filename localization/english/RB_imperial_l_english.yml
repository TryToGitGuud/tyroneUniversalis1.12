l_english:

  dyn_c_imperial_federation: "Imperial Federation"
  IMP_ADJ: "Imperial"

  enact_imperial_federation: "Imperial Federation Act"
  enact_imperial_federation_desc: "Advocates of imperial unity argue that the far-flung dominions of the British Empire must be bound together more closely if the empire is to endure. By forming an Imperial Federation, these territories could unite under a common federal structure while preserving their local governments."

  je_imperial_federation: "An Imperial Federation"
  je_imperial_federation_reason: "Across the world the dominions and colonies of the [SCOPE.sCountry('gbr_scope').GetAdjective] Empire stretch across continents and oceans, bound together by loyalty to the Crown and a shared [SCOPE.sCountry('gbr_scope').GetAdjectiveNoFlag] heritage. Yet distance and differing interests have long prevented the empire from acting as a single political body. Now, inspired by the growing spirit of imperial unity, voices throughout the empire have begun calling for something greater: a federation of the [ROOT.GetCountry.GetName]'s global dominions.\n\nFrom Ottawa to Sydney and from Cape Town to Calcutta, advocates argue that the empire must evolve into a closer political union if it is to endure in an age of rising nations. What was once merely an intellectual movement has now begun to influence the halls of power, and the dream of an Imperial Federation is no longer confined to pamphlets and lecture halls.\n\n@information! All [Concept('concept_country','$concept_countries$')] involved in this [concept_journal_entry] must align their [Concept('concept_law','$concept_laws$')] before a true federation of empire can be realized."
  je_imperial_federation_lobby: "The vast #red #bold British Empire#!#! spans continents but lacks true political unity. As global tensions rise, calls grow to bind its dominions into a single federation—transforming imperial loyalty into lasting strength."

  imperial_events.1.t: "The Matter of our Empire"

  imperial_events.1.d: "As the Empire grows ever wider, a debate has arisen over how it should be governed. Should the dominions be drawn into a single Imperial Federation or should the Empire remain a looser Commonwealth of nations, bound by loyalty to the Crown but free to govern themselves?"

  imperial_events.1.f: "Some argue that the dominions — such as [SCOPE.sCountry('can_scope').GetName], [SCOPE.sCountry('aus_scope').GetName], and [SCOPE.sCountry('raj_scope').GetName] — should be brought together with [ROOT.GetCountry.GetName] in a single Imperial Federation, united under one parliament and government. Others insist the Empire should remain a looser Commonwealth of nations, bound by loyalty to the Crown but free to govern themselves."

  imperial_events.1.a:0 "For an Imperial Federation!"

  imperial_events.1.b:0 "Let it remain a Commonwealth of nations."

  imperial_federation_formed_tt: "A grand #bold Imperial Federation#! has been formed."

  imperial_federation_sufficient_shared_laws_tt: "All Involved [Concept('concept_country','$concept_countries$')] in the #bold Imperial Federation#! [concept_journal_entry] share at least [SCOPE.ScriptValue('imperial_federation_shared_laws_requirement')|v0] active [Concept('concept_law','$concept_laws$')] (currently [GetGlobalVariable('imperial_federation_shared_laws_var').GetValue|v0])"


  exclusion_from_federation: "Exclusion from the Imperial Federation" 
  imperial_federation_modifier: "The Imperial Federation"
  imperial_federation_failure: "A Failed Federation"

  imperial_events.2.t: "The Imperial Federation"

  imperial_events.2.d: "After years of debate and negotiation, the British Empire has taken a bold step toward unity. The dominions and Britain itself are now bound together in a federal structure intended to strengthen cooperation, defense, and governance across the [ROOT.GetCountry.GetName]."

  imperial_events.2.f: "From Ottawa to Sydney, from Cape Town to London, delegates have gathered to proclaim a new chapter in [ROOT.GetCountry.GetAdjective] history. What was once a loose collection of dominions and colonies now seeks to become something greater: a federation of nations bound together by shared institutions and common purpose. Though many challenges lie ahead, today marks the birth of a grand experiment — an empire united not only by crown and tradition, but by government and destiny."

  imperial_events.2.a: "A New Imperial Age Begins"


  imperial_events.3.t: "The Imperial Federation Fails"

  imperial_events.3.d: "Plans to unite the [ROOT.GetCountry.GetAdjective] Empire under a federal system have collapsed after years of disagreement between [ROOT.GetCountry.GetName] and the dominions."

  imperial_events.3.f: "For decades, imperial thinkers dreamed of binding the Empire together through a common parliament and shared institutions. Conferences were held, proposals drafted, and speeches given in the hope that [ROOT.GetCountry.GetName] and her dominions might one day stand as a single political union. Yet distance, competing interests, and deep constitutional disagreements have proven too great to overcome. The vision of an Imperial Federation now fades, leaving the Empire to continue as it always has — a vast realm held together by tradition, loyalty, and the Crown, rather than by a single united government."

  imperial_events.3.a: "The Dream of Federation Is Lost"
