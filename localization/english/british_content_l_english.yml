  je_company_equity: "The Question of Equity"
  je_company_equity_reason: "The status of the #bold Progress Bar#! will #tooltippable;tooltip:[ROOT.GetCountry.GetTooltipTag],je_company_equity_special_tooltip_advance advance#! or #tooltippable;tooltip:[ROOT.GetCountry.GetTooltipTag],je_company_equity_special_tooltip_deplete retreat#! based on certain conditions. The #bold Progress Bar#! reaching #variable 0%#! will lead to the total consolidation the [SCOPE.sCountry('gbr_scope').GetAdjectiveNoFlag] government's control, and the seizure of power by [SCOPE.sCountry('gbr_scope').GetAdjectiveNoFlag] authorities. While the #bold Progress Bar#! reaching #variable 100%#! will lead to the [SCOPE.sCountry('company_scope').GetName] reconsolidating the Indian Subcontinent. \n \n The relationship between [SCOPE.sCountry('gbr_scope').GetName] and [SCOPE.sCountry('company_scope').GetName] investors has grown strained. Shareholders defend their chartered rights and dividends, while the [SCOPE.sCountry('gbr_scope').GetAdjectiveNoFlag] government seeks greater oversight of an enterprise that wields power beyond commerce. What began as a partnership of profit has evolved into a constitutional dilemma, as Parliament questions whether a private corporation should command armies, administer territories, and shape imperial policy. The struggle now turns on a single question: where does sovereignty truly reside?"

  event_effects_raj_tyrone.1_tt: "• $activate_british_raj$\n• Reduces the autonomy of [SCOPE.sCountry('company_scope').GetName] to [concept_colony]\n• $doctrine_of_lapse_disabled$\n• [SCOPE.sCountry('company_scope').GetName] loses #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_india_company_rule_tt $modifier_india_company_rule$#!\n• [SCOPE.sCountry('company_scope').GetName] gets #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_india_crown_rule_tt $modifier_india_crown_rule$#!\n• [SCOPE.gsInterestGroup('eic_ig').GetName] will be renamed to #v Government of India#!"

