  bic_content.2.t:0 "Government of India Act Enacted"
  bic_content.2.d:0 "Parliament has formally transferred administrative control of the East India Company’s Indian territories to the [SCOPE.sCountry('gbr_scope').GetAdjective] Government. The Company's political and economic authority is now effectively removed."
  bic_content.2.f:0 "Once a sovereign power in its own right, the East India Company now cedes governance to the [SCOPE.sCountry('gbr_scope').GetAdjective] Crown. Its influence over local administration and revenue collection is sharply reduced, marking a significant decline in its authority."
  bic_content.2.a:0 "The End of An Age"

  bic_content.3.t:0 "Repeal of the Charter Act of 1833"
  bic_content.3.d:0 "[SCOPE.sCountry('gbr_scope').GetAdjective] Parliament has repealed the Charter Act of 1833, returning significant economic and administrative authority to the [SCOPE.sCountry('company_scope').GetName]. The Company’s officials now resume direct control over economic and governing affairs in India."
  bic_content.3.f:0 "Once curtailed by state centralization, the [SCOPE.sCountry('company_scope').GetName] emerges as the dominant authority in its territories once more. Its influence over local administration and revenue collection is strengthened, marking a resurgence in its power."
  bic_content.3.a:0 "John Company Rises Again"

