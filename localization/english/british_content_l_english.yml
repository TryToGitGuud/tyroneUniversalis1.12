l_english:
  je_britain_industrialize:0 "Britain's Industrial Revolution"
  je_britain_industrialize_reason:0 "Centuries of colonial wealth have driven this transformation. While [SCOPE.sCountry('FRA_scope').GetName] squandered riches on armies and [SCOPE.sCountry('SPA_scope').GetName] on luxuries, we invested in #bold industry#!.\n\n#bold Watt's steam engine (1769)#! and #bold Stephenson's railways (1825)#! allowed for this era of industrialization. Our abundant [SCOPE.sGoods('coal_scope').GetName] powered factories that reshaped the landscape—replacing rural idylls with factories producing [SCOPE.sGoods('iron_scope').GetName] and [SCOPE.sGoods('steel_scope').GetName].\n\nLet us cement [ROOT.GetCountry.GetName] as the world's first industrial nation!"
  je_britain_industrialize_status:0 "Forge Britain into the world's first industrial nation"
  industrialized_britain: "Britannia Terrae Industriae"

  je_group_british_india_global: "Governance of British India"

    #eic/raj content
  ideology_john_company: "John Company"
  ideology_john_company_desc:  "#lore The state is a balance sheet, and sovereignty a tradable asset. Under the John Company, rule is exercised through contracts, conquest through commerce, and governance in the pursuit of profit alone.#!"

  ideology_zamindar_system: "Zamindar System"
  ideology_zamindar_system_desc:  "#lore The Zamindar System upholds a rigid agrarian hierarchy built on land revenue extraction, prioritizing estate profits and tax collection over peasant welfare. Loyal to the British, its adherents accept subordination to British authority in exchange for recognition, protection, and the preservation of their landed privileges.#!"

  modifier_zamindar_unrest: "Zamindar Unrest"

  je_uneasy_raj_complete_header: "#lore Will prevent #bold Indian Uprising#! if:#! \n"

  bic_content.1.t: "A Question of Equity"
  bic_content.1.d: "The relationship between [SCOPE.sCountry('gbr_scope').GetName] and the directors of [SCOPE.sCountry('company_scope').GetName] has entered a period of open friction. What was once a compact of mutual enrichment now resembles a rivalry over authority itself."
  bic_content.1.f: "The [SCOPE.sCountry('gbr_scope').GetAdjective] government grows uneasy at the sight of a corporation that commands armies, levies taxes, and governs distant millions in its own name."
  bic_content.1.a: "Company or Crown?"

