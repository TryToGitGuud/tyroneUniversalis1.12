 je_marxist_proletarian_state_failed_effects_tt: "#bold The Marxist Line Defeated:#!\n• The [GetInterestGroupVariant('ig_trade_unions', GetPlayer).GetNameWithCountryVariant] receive #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_marxist_line_defeated_tt $modifier_marxist_line_defeated$#! for #v 5 years#!."
 je_marxist_workers_party_completed_effects_tt: "#bold The Workers' Party Consolidated:#!\n• [ROOT.GetCountry.GetName] receives #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_marxist_trade_union_hegemony_tt $modifier_marxist_trade_union_hegemony$#! permanently.\n• [ROOT.GetCountry.GetName] receives #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_marxist_state_cadre_tt $modifier_marxist_state_cadre$#! for #v 10 years#!.\n• Lower Strata [Concept('concept_loyalist', '$concept_loyalists$')] increase by #v 5%#!."
