  intl_communism.13.t:0 "The Syndicates Consolidated"
  intl_communism.13.d:0 "The syndicalist economy has passed into law. The unions now hold the commanding machinery of the republic, but the question remains whether hostile factions will be broken or drawn into the new order."
  intl_communism.13.f:0 "\"The factory has voted. The office has stamped it. Now the country must learn to obey production itself.\""
  intl_communism.13.a:0 "The councils will tolerate no counter-revolution."
  intl_communism.13.b:0 "Bind the hesitant factions to the revolution."

  intl_communism.14.t:0 "The Syndicate Falters"
  intl_communism.14.d:0 "The attempt to reorganize the economy around the syndicates has collapsed. With the strike committees discredited and the government exposed, a republican settlement is restored under census suffrage."
  intl_communism.14.f:0 "\"The old chamber returns not as victor, but as the last institution still able to count votes and pay clerks.\""
  intl_communism.14.a:0 "Restore the republic."

  intl_communism.15.t:0 "The Question of State Power"
  intl_communism.15.d:0 "The Marxist clubs have ceased speaking of the state as a distant prize. Delegates from the [GetInterestGroupVariant('ig_trade_unions', GetPlayer).GetNameWithCountryVariant], party editors, and council organizers now argue over the same immediate demand: the workers must take political power, and the republic must be made to reflect it."
  intl_communism.15.f:0 "\"The old chamber calls itself national because it counts estates, professions, and parishes. We will call ours national when it counts the hands that make the nation live.\""
  intl_communism.15.a:0 "Let the question be posed plainly."

  intl_communism.16.t:0 "The Workers' State"
  intl_communism.16.d:0 "The republic has accepted the form demanded by the Marxists. Whether through the common council republic or an explicitly Marxist constitution, the state now claims to rule as the political instrument of the working class. The victory is real, but it is only a beginning; every ministry must learn a new language, and every union hall must learn the burden of command."
  intl_communism.16.f:0 "\"In the morning the clerks found the same desks, the same stamps, the same brass lamps. By noon they understood that the signature above them had changed more than the furniture ever could.\""
  intl_communism.16.a:0 "Now discipline must become administration."

  intl_communism.17.t:0 "The Line Broken"
  intl_communism.17.d:0 "The councils have taken a form the Marxists cannot claim as their own. The unions remain powerful, but the party's argument for a proletarian state has been outflanked by rival revolutionaries, who speak of communes, syndicates, and associations where Marxists spoke of class power."
  intl_communism.17.f:0 "\"The motion was not defeated by silence. It was defeated by applause for someone else's revolution.\""
  intl_communism.17.a:0 "The party will remember this defeat."

  intl_communism.18.t:0 "The Programme Circulates"
  intl_communism.18.d:0 "Pamphlets bearing the party programme have passed from print shops to union halls and from railway depots to barracks canteens. Some demand a careful legislative campaign; others insist that the programme must become a weapon in the factories before it becomes a statute."
  intl_communism.18.f:0 "\"The paper was folded twice and hidden in a lunch pail. By evening it had been read aloud beside three machines and copied by hand beside a fourth.\""
  intl_communism.18.a:0 "Make the programme legislative."
  intl_communism.18.b:0 "Make the programme industrial."

  intl_communism.19.t:0 "A Discipline of Meetings"
  intl_communism.19.d:0 "The party's strength is being tested in the dull places: committee rooms, minutes, credentials, and votes that stretch long past midnight. The impatient call this clerical socialism. The organizers call it learning to govern."
  intl_communism.19.f:0 "\"No barricade ever asked for three copies of a credentials list. The revolution, apparently, did.\""
  intl_communism.19.a:0 "Let the union leaders carry the line."
  intl_communism.19.b:0 "Bind the committees to the programme."

  intl_communism.20.t:0 "The Party Becomes the State"
  intl_communism.20.d:0 "The workers' party no longer feels like a visitor in the ministries. Union delegates sit beside clerks, shop stewards know which office answers which petition, and the state has begun to move with the rhythm of organized labor. The Marxist line has become less a factional argument than an institution."
  intl_communism.20.f:0 "\"At first they came to the ministry in their work coats. Then the ministry learned to expect the smell of oil, coal dust, and rainwater in its corridors.\""
  intl_communism.20.a:0 "The unions are the spine of the republic."

  intl_communism.21.t:0 "Party Schools"
  intl_communism.21.d:0 "Evening schools organized by the party have begun training union secretaries, local council delegates, and factory correspondents. The lessons are part theory, part procedure, and part warning: a workers' state cannot be run by enthusiasm alone."
  intl_communism.21.f:0 "\"After ten hours at the lathe, the men still came to learn accounts, minutes, and the difference between a slogan and an order.\""
  intl_communism.21.a:0 "Train the cadres of administration."

  intl_communism.22.t:0 "Congress of Shop Stewards"
  intl_communism.22.d:0 "A congress of shop stewards has endorsed the party's place in government, though not without argument. Some delegates demanded faster nationalization, others cleaner elections inside the unions, but the final vote carried the same message: the workers' party must hold the state long enough to remake it."
  intl_communism.22.f:0 "\"The hall smelled of damp wool and tobacco. Every speech began with a grievance. Every vote ended with discipline.\""
  intl_communism.22.a:0 "Record the mandate."
  intl_communism.22.b:0 "Turn the mandate into legislation."

  intl_communism.23.t:0 "The Internationale Has Found Its Vanguard"
  intl_communism.23.d:0 "The world movement has found a state willing to stand at its center. From union halls, socialist clubs, barracks reading circles, and exile newspapers comes the same conclusion: the revolution is no longer merely international by sentiment. It has a government, a line, and a capital from which it can be carried abroad."
  intl_communism.23.f:0 "\"The old powers had congresses for borders, debts, and crowns. The workers have convened one for history itself.\""
  intl_communism.23.a:0 "A new center of gravity."

  intl_communism.24.t:0 "The Revolution Imposed"
  intl_communism.24.d:0 "Defeat has brought the Internationale into the ministries. The old constitutional order has been rewritten, the economy is being reorganized under the victorious revolutionary line, and the Internationale movement now speaks as the authorized language of political life. Other movements have not vanished, but for now their presses are quieter, their halls emptier, and their slogans harder to hear."
  intl_communism.24.f:0 "\"The treaty did not annex a province. It annexed the future.\""
  intl_communism.24.a:0 "The line is now unavoidable."

  intl_communism.25.t:0 "The World Congress of Labor"
  intl_communism.25.d:0 "The old Great Powers have been remade or broken into the language of the Internationale. What began as factional doctrine has become the grammar of world politics: councils, syndicates, communes, congresses, and committees now govern where monarchs and ministers once traded the balance of power."
  intl_communism.25.f:0 "\"No anthem was sung in one language. That was the point.\""
  intl_communism.25.a:0 "Workers of the world."
  modifier_world_congress_labor_leader:0 "Mandate of the World Congress"
  modifier_world_congress_labor_leader_desc:0 "The leading republic of the Internationale speaks with the authority of the World Congress of Labor, its decrees carried by the prestige of a victorious international movement and the organized strength of the trade unions."

