 intl_communism.2.t: "The Workers' Internationale"
 intl_communism.2.d: "The workers of [ROOT.GetCountry.GetName] have broken the old order and founded a Council Republic. The revolution must now choose which current will shape its institutions, its economy, and its future laws."
 intl_communism.2.f: ""The emancipation of labour will not be written by one hand alone. Congress, commune, union, cadre, and council all claim the red banner. The question is which hand shall hold it first.""
 intl_communism.3.t: "No God, No Master, No Delay"
 intl_communism.3.d: "#gold \"Ni Dieu ni maître.\"#!\n\nAt the appointed hour, the Committee moves. Cells seal the crossings, sympathizers inside the ministries open the right doors, and armed cadres step from rumor into history. What begins as a [concept_coup] is declared not as ambition, but as necessity: the [concept_government] has lost the right to hesitate, and [ROOT.GetCountry.GetName] must be forced into revolutionary [concept_legitimacy].\n\nBy dawn, the old republic still has its seals, offices, and printed [Concept('concept_law', '$concept_laws$')], but their meaning has changed. [Concept('concept_radical', '$concept_radicals$')] are told to stand down, [concept_turmoil] is crushed beneath emergency [concept_authority], and the republic within the republic finally speaks in its own name."
 intl_communism.3.f: ""No bell is rung. No congress is asked. The order passes from room to room without signature, and every locked drawer already has a second key.""
 intl_communism.3.a: "No gods. No masters. No hesitation."
 intl_communism.4.t: "The Mutualist Amendments"
 intl_communism.4.d: "After three years of cooperative ownership, the councils no longer speak as petitioners. Their workshops, credit unions, and machinist committees have become the machinery of public life, and [GetLawType('law_mutualist_economy').GetName] can now be written into the state itself. What remains is the amendment that will define how freely the associated producers may move."
 intl_communism.4.f: ""The contract is no longer a chain, but a bridge between workshops.""
 intl_communism.4.a: "Write public credit into the republic."
 intl_communism.4.b: "Let free association build freely."
 intl_communism.4.c: "Discipline the workshop, spare the mine."
 intl_communism.5.t: "Ledgers Against the Crown"
 intl_communism.5.d: "The mutualist turn inside the [GetInterestGroupVariant('ig_petty_bourgeoisie', GetPlayer).GetNameWithCountryVariant] has not passed quietly. Shopkeepers, clerks, and small proprietors now argue over whether the old monarchist guarantees can survive a republic of contracts and federated credit."
 intl_communism.5.f: ""Every receipt is now a declaration, and every counter has become a little assembly.""
 intl_communism.5.a: "Let the monarchists carry the scandal."
 intl_communism.5.b: "The small proprietors turn on their own."
 intl_communism.6.t: "The Deed Books Open"
 intl_communism.6.d: "As [GetLawType('law_cooperative_ownership').GetName] moves through the chambers, the workshops arrive with more than slogans. They bring deed books, membership rolls, and accounts balanced in common ink; the law begins to look less like a demand than an institution already waiting for a seal."
 intl_communism.6.f: ""The assembly hesitates. The ledgers do not.""
 intl_communism.6.a: "Let the contracts speak."
 intl_communism.7.t: "The Red Timetable"
 intl_communism.7.d: "The strike is no longer an angry rumor passing from workshop to workshop. Delegates from the rail yards, foundries, mines, and textile halls now argue over the only question that matters: whether the general strike should be a threat, a rehearsal, or the first day of the new economy."
 intl_communism.7.f: ""The timetable is printed without a minister's seal. Every stationmaster receives one anyway.""
 intl_communism.7.a: "Let the federations coordinate the stoppage."
 intl_communism.7.b: "Keep the railways breathing."
 intl_communism.8.t: "The First Wave"
 intl_communism.8.d: "Shift bells go unanswered, foremen discover locked offices, and union stewards read production orders from the same platforms where they once read demands. Employers call it paralysis. The syndicates call it proof of life."
 intl_communism.8.f: ""At noon the mill is silent. At one, it begins again under another hand.""
 intl_communism.8.a: "The capital will pay for this."
 intl_communism.8.b: "Send the guards to the gates."
 intl_communism.9.t: "The Congress Takes Command"
 intl_communism.9.d: "The strike committees have ceased asking whether the government will recognize them. The depots, union halls, workshops, and food lists already answer to the congress. The old ministry can still speak, but it can no longer administer. The first act of the new order is not celebration, but legislation."
 intl_communism.9.f: ""Power did not pass through the chamber. It passed through the factory gate.""
 intl_communism.9.a: "Begin the revolutionary reforms."
 intl_communism.10.t: "The Second Wave"
 intl_communism.10.d: "The strike line spreads from factory gates to municipal depots, warehouses, printers, and tram sheds. Some workshops wait for instructions that never arrive; others now take orders only from the congress. The old state discovers that authority is a thing that must be delivered, and delivery is in union hands."
 intl_communism.10.f: ""A gate is only a gate until both sides decide what it means.""
 intl_communism.10.a: "The stoppages spread unchecked."
 intl_communism.10.b: "Break the lines before dawn."
 intl_communism.11.t: "The Strike Is Defused"
 intl_communism.11.d: "The government has yielded just enough to survive. Labor rights are written into law, social welfare is promised in the language of responsibility, and the committees find their meeting halls suddenly divided between triumph and suspicion. The general strike has not been smashed in the street. It has been absorbed by the state."
 intl_communism.11.f: ""A concession is a barricade with a door in it.""
 intl_communism.11.a: "The ministry lives another day."
 intl_communism.12.t: "The Third Wave"
 intl_communism.12.d: "There is no longer a clean line between strike and government. The unions distribute fuel, decide which trains run, settle disputes, and tell entire districts when work will resume. The ministry's decrees arrive late, if they arrive at all. The congress now speaks with the practical voice of power."
 intl_communism.12.f: ""The republic was not stormed. It was made unnecessary.""
 intl_communism.12.a: "The country grinds to a halt."
 intl_communism.12.b: "Occupy the stations and yards."
 modifier_blanquist_revolutionary_order: "Revolutionary Order"
 modifier_blanquist_revolutionary_order_desc: "The Blanquist Committee has imposed a disciplined revolutionary order. [concept_turmoil] is smothered by emergency [concept_authority], while ordinary [Concept('concept_law', '$concept_laws$')] crawl beneath the weight of central command."
 blanquist_revolutionary_director_popularity: "Revolutionary Director"
 blanquist_revolutionary_director_popularity_desc: "The Intelligentsia's conspirator has stepped from the sealed room into the chair of state."
 blanquist_bureaucratic_reform_drive: "Administrative Purge"
 blanquist_bureaucratic_reform_drive_desc: "The Committee has thrown the offices open and ordered the files rewritten by trusted hands."
 blanquist_atheist_reform_drive: "War on the Pulpit"
 blanquist_atheist_reform_drive_desc: "The Committee moves against clerical power with lists, seals, and unsentimental speed."
 blanquist_economic_reform_drive: "Command of Production"
 blanquist_economic_reform_drive_desc: "Factories, ledgers, contracts, and warehouses are being bent toward revolutionary discipline."
 blanquist_state_police_reform_drive: "The Watchful Republic"
 blanquist_state_police_reform_drive_desc: "The Committee prepares the instruments needed to see conspiracy before conspiracy sees the state."
 modifier_blanquist_movement_hegemony: "Blanquist Hegemony"
 modifier_blanquist_movement_hegemony_desc: "The Blanquist movement has become the central language of revolutionary loyalty."
 modifier_syndicalist_strike_committees: "Strike Committees"
 modifier_syndicalist_strike_committees_desc: "Local union committees coordinate stoppages, food lists, workshop watches, and the political discipline needed to make direct action endure."
 modifier_syndicalist_railway_compromise: "Railway Compromise"
 modifier_syndicalist_railway_compromise_desc: "The rail syndicates keep essential traffic moving while the strike congress gathers strength."
 modifier_syndicalist_federated_shop_committees: "Federated Shop Committees"
 modifier_syndicalist_federated_shop_committees_desc: "The committees have learned to build, count, and command together. The workshop now speaks in federation."
 modifier_syndicalist_revolutionary_reforms: "Revolutionary Reforms"
 modifier_syndicalist_revolutionary_reforms_desc: "The victorious strike congress has seized the machinery of reform, forcing the old legal order to move at the rhythm of organized labor."
 modifier_syndicalist_broken_strike: "Strike Defused"
 modifier_syndicalist_broken_strike_desc: "Concessions have split the strike committees between victory, exhaustion, and suspicion."
 modifier_mutualist_worker_council_construction: "Worker Council Workshops"
 modifier_mutualist_worker_council_construction_desc: "The councils build as they deliberate: plank, brick, signature, seal."
 amendment_mutualist_public_credit: "Public Credit Amendment"
 amendment_mutualist_public_credit_desc: "Public credit passes from hand to hand like a civic oath, counted in ledgers instead of crowns."
 amendment_mutualist_free_association: "Free Association Amendment"
 amendment_mutualist_free_association_desc: "Association is left free to multiply, and the workshop keeps its own key to the future."
 amendment_mutualist_workshop_discipline: "Workshop Discipline Amendment"
 amendment_mutualist_workshop_discipline_desc: "The workshop tightens its rhythm; the pit and forest are asked to loosen their grip."
 modifier_mutualist_monarchist_ig_backlash: "Monarchist Credit Panic"
 modifier_mutualist_monarchist_ig_backlash_desc: "Rank, debt, and inheritance recoil before a republic that writes its promises in common ink."
 modifier_mutualist_petite_bourgeoisie_split: "Petty-Bourgeois Split"
 modifier_mutualist_petite_bourgeoisie_split_desc: "One half of the shop shuts its till; the other half sharpens its politics."
