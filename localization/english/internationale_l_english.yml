  intl_communism.27.t:0 "The Great Proletarian War"
  intl_communism.27.d:0 "The war has escaped the language of borders and reparations. At least two communist Great Powers of the Internationale's line now face a coalition of old Great Powers, and every capital understands what the newspapers scarcely dare print: this is a war over the future form of the world."
  intl_communism.27.f:0 "\"Le drapeau rouge flotte sur Paris! Rot Front! Мир, хлеб, земля! Bandiera rossa trionferà!\" The slogans arrive in different alphabets, but the guns answer in one language."
  intl_communism.27.a:0 "The world has found its front."

