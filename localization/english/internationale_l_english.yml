 blanquist_cells_prepared_tt: "The revolutionary cells have been sworn to secrecy and bound to the Committee."
 blanquist_state_already_infiltrated_tt: "The state apparatus already carries Blanquist names in its ledgers."
 blanquist_state_infiltrated_tt: "Sympathizers inside the administration can now misplace papers, open doors, and delay loyalist orders."
 blanquist_cadres_already_armed_tt: "The republican cadres have already received their rifles, passwords, and rendezvous."
 blanquist_cadres_armed_tt: "The republican cadres have rifles hidden, passwords memorized, and routes marked before dawn."
 blanquist_coup_button_clicked_tt: "The final order has been given through the coup button."
 blanquist_coup_event_resolved_tt: "The coup event has resolved and the Blanquist Republic has been proclaimed."
 blanquist_preparation_done_tt: "The Committee records the conspiracy as ready; the republic within the republic waits for its hour."
 blanquist_law_unlock_var_tt: "The Blanquist line is now acknowledged by the revolutionary movement."
 blanquist_intelligentsia_ready_tt: "The Intelligentsia must have a living, non-marginal leader and enough influence to carry the conspiracy into respectable society."
 blanquist_radical_society_tt: "Enough of the country must be angry to make whispered republican plots sound like necessity rather than fantasy."
 blanquist_meeting_places_tt: "A university must exist; the Committee needs lecture halls, reading rooms, and rented rooms where names can be gathered."
 blanquist_agitation_ready_tt: "The city must already know the language of agitation, socialism, or anarchist revolt."
 blanquist_bureaucratic_map_tt: "The Committee needs modern archives or identity papers before it can map the state from within."
 blanquist_bureaucracy_capacity_tt: "The bureaucracy must still function; an office in collapse cannot be quietly captured."
 blanquist_state_offices_tt: "Government administration buildings must exist for sympathizers to enter, copy keys, and misplace loyalist orders."
 blanquist_permeable_state_tt: "The state must have an established bureaucratic corps that can be infiltrated from within."
 blanquist_cadres_logistics_tt: "Mass communication or military statistics are needed to coordinate armed cadres without wasting the decisive hour."
 blanquist_armed_forces_contact_tt: "The Armed Forces must still matter; the Committee needs officers, quartermasters, or veterans who can be approached."
 blanquist_weapon_supply_tt: "The cadres need access to an arms industry or barracks before rifles can move from rumor into locked crates."
 blanquist_security_pressure_tt: "A police apparatus must exist; the revolutionary cadres are organized in the shadow of the very force they plan to outmaneuver."
