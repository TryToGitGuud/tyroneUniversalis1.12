 law_anarchist_council_republic:0 "Free Council Federation"
law_anarchist_council_republic_desc:0 "Authority rests in freely associated local councils, bound together through voluntary cooperation rather than imposed hierarchy."

law_anarchist_anarchy:0 "Stateless Order"
law_anarchist_anarchy_desc:0 "All formal structures of state authority are dismantled, replaced by self-organization, mutual aid, and direct participation in all aspects of society."

law_anarchist_bureaucracy:0 "Self-Managed Administration"
law_anarchist_bureaucracy_desc:0 "Administrative duties are carried out by locally elected and recallable delegates, ensuring that governance remains accountable and decentralized."

law_anarchist_economy:0 "Cooperative Economy"
law_anarchist_economy_desc:0 "Production and exchange are organized through networks of worker cooperatives and communal associations, free from centralized control or coercion."
country_no_iphone_production:0 "No iPhone Production"
country_no_iphone_production_desc:0 "The workers now own the means of production, but not the app store."
