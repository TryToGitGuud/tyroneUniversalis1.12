  intl_vote_events.11.t:0 "Bakunin Raises a Motion"
  intl_vote_events.11.d:0 "Bakunin calls the Congress to order. In his view, the movement's institutional form must reflect the principle of free federation — no imposed authority, no hierarchical governance. He proposes to put the matter before the delegates."
  intl_vote_events.11.propose_council_republic:0 "Propose [GetLawType('law_anarchist_council_republic').GetName]"
  intl_vote_events.11.propose_economy_vs_marxist:0 "Propose [GetLawType('law_anarchist_economy').GetName] — contest the Marxist line"
  intl_vote_events.11.propose_economy_vs_mutualist:0 "Propose [GetLawType('law_anarchist_economy').GetName] — contest the Mutualist line"
  intl_vote_events.11.cancel:0 "This is not the moment — withdraw"

  intl_vote_events.12.t:0 "Proudhon Raises a Motion"
  intl_vote_events.12.d:0 "Proudhon calls for a vote. He insists the Congress must build institutions that reflect the principle of mutualism — cooperative exchange, free association, and the abolition of exploitation without resort to state coercion."
  intl_vote_events.12.propose_council_republic_vs_anarchist:0 "Propose [GetLawType('law_mutualist_council_republic').GetName] — contest the Anarchist line"
  intl_vote_events.12.propose_council_republic_vs_marxist:0 "Propose [GetLawType('law_mutualist_council_republic').GetName] — contest the Marxist line"
  intl_vote_events.12.propose_economy:0 "Propose [GetLawType('law_mutualist_economy').GetName]"
  intl_vote_events.12.cancel:0 "This is not the moment — withdraw"

  intl_vote_events.13.t:0 "De Paepe Raises a Motion"
  intl_vote_events.13.d:0 "César De Paepe rises to address the Congress. The union, he argues, is not merely an economic instrument — it is the embryo of the new society. The Congress must build its institutions accordingly."
  intl_vote_events.13.propose_council_republic_vs_anarchist:0 "Propose [GetLawType('law_syndicalist_council_republic').GetName] — contest the Anarchist line"
  intl_vote_events.13.propose_council_republic_vs_marxist:0 "Propose [GetLawType('law_syndicalist_council_republic').GetName] — contest the Marxist line"
  intl_vote_events.13.propose_economy_vs_mutualist:0 "Propose [GetLawType('law_syndicalist_economy').GetName] — contest the Mutualist line"
  intl_vote_events.13.propose_economy_vs_marxist:0 "Propose [GetLawType('law_syndicalist_economy').GetName] — contest the Marxist line"
  intl_vote_events.13.cancel:0 "This is not the moment — withdraw"

  intl_vote_events.14.t:0 "Blanqui Demands a Vote"
  intl_vote_events.14.d:0 "Blanqui does not mince words. The Congress drifts without direction. The movement requires discipline, a vanguard, and the willingness to impose order. He moves to bring the matter to a vote."
  intl_vote_events.14.propose_presidential_republic:0 "Propose [GetLawType('law_blanquist_presidential_republic').GetName]"
  intl_vote_events.14.propose_economy:0 "Propose [GetLawType('law_blanquist_economy').GetName]"
  intl_vote_events.14.cancel:0 "This is not the moment — withdraw"

  intl_vote_events.15.t:0 "Marx Raises a Motion"
  intl_vote_events.15.d:0 "Marx calls for order and a vote. The question before the Congress is not merely tactical — it is a question of historical direction. Scientific socialism demands a clear answer, and the working class deserves nothing less."
  intl_vote_events.15.propose_council_republic:0 "Propose [GetLawType('law_marxist_council_republic').GetName]"
  intl_vote_events.15.propose_economy:0 "Propose [GetLawType('law_marxist_economy').GetName]"
  intl_vote_events.15.cancel:0 "This is not the moment — withdraw"

  je_group_mp_faction:0 "Faction Struggle"
  je_mp_faction_leader:0 "Lead the Faction Struggle"
  je_mp_faction_leader_desc:0 "Only one great power can open this struggle. Choose which interest bloc you back and raise five aligned agitators (moderate ideology placeholder). When you confirm, other major powers gain the wider journal entry."
  je_mp_faction_world:0 "Faction Struggle"
  je_mp_faction_world_desc:0 "The struggle has begun abroad. The initiator has chosen a side; your objectives will be defined here as the content is expanded."
  je_mp_faction_world_complete_wip_tt:0 "Completion conditions not yet defined."
  mp_faction_events.1.t:0 "Which Tendency Do We Represent?"
  mp_faction_events.1.d:0 "The Internationale is now convened — workers of every nation look to us for leadership. The movement is not a single voice but a chorus of competing visions: anarchist, mutualist, syndicalist, Blanquist, Marxist. Each tendency would chart a different course for the liberation of the working class. The time has come to declare which current we stand with."
  mp_faction_events.1.f:0 "History does not wait. The tendency we choose will shape the character of the movement itself."
  mp_faction_events.1.a:0 "We stand with Bakunin. The state must be abolished immediately, replaced by free federation."
  mp_faction_events.1.b:0 "We follow Proudhon. Mutual credit and cooperative exchange — reform without revolution."
  mp_faction_events.1.c:0 "We side with De Paepe. The union is the instrument of liberation — direct action and the general strike."
  mp_faction_events.1.e:0 "We answer Blanqui's call. A disciplined vanguard must seize power and impose the socialist order."
  mp_faction_events.1.marxist:0 "We hold with Marx. The proletariat must conquer state power and build the material foundations of communism."

  je_consolidate_the_syndacate:0 "Consolidate the Syndacate"
  je_consolidate_the_syndacate_reason:0 "The general strike has broken the old order, but the syndicalist republic is not yet secure. The economy must be reorganized around the unions before the new government loses control of the revolution it unleashed."
  je_consolidate_the_syndacate_status_desc:0 "The syndicates are consolidating."
  je_consolidate_the_syndacate_status_complete:0 "The syndicates hold production."
  je_consolidate_the_syndacate_completed_effects_tt:0 "#bold The Syndicates Consolidated:#!\nAn event will fire, giving a choice between two settlements:\n• Gain #v 10%#! [Concept('concept_loyalist', '$concept_loyalists$')]. Every [concept_interest_group] whose stance toward [GetLawType('law_council_republic').GetName] is below #bold Neutral#! receives #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_syndicalist_council_opposition_purged_tt $modifier_syndicalist_council_opposition_purged$#! for #v 10 years#!, decaying.\n• Lower Strata [Concept('concept_radical', '$concept_radicals$')] increase by #v 10%#!. [ROOT.GetCountry.GetName] receives #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_syndicalist_revolutionary_mandate_tt $modifier_syndicalist_revolutionary_mandate$#! for #v 5 years#!, while anti-council [Concept('concept_interest_group', '$concept_interest_groups$')] receive #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_syndicalist_council_opposition_conciliated_tt $modifier_syndicalist_council_opposition_conciliated$#! for #v 5 years#!."
  je_consolidate_the_syndacate_failed_effects_tt:0 "#bold The Syndicate Falters:#!\n• [GetLawType('law_parliamentary_republic').GetName] will be enacted immediately.\n• [GetLawType('law_census_voting').GetName] will be enacted immediately."

  je_syndacate_labour_fronts:0 "Gather Support from Labour Fronts"
  je_syndacate_labour_fronts_desc:0 "Rally the organized workers behind the new order, even if the upper strata recoil from the red syndicates."
  je_syndacate_rural_parties:0 "Gather Support from Rural Parties"
  je_syndacate_rural_parties_desc:0 "Bind the rural leagues to the syndicalist project and carry their delegates into the economic reform."
  je_syndacate_intellectuals:0 "Gather Support from the Intellectuals"
  je_syndacate_intellectuals_desc:0 "Invite sympathetic theorists and publicists to give the revolution a language the country can recognize."
  je_syndacate_purge_bourgeoisie:0 "Purge the Bourgeoisie"
  je_syndacate_purge_bourgeoisie_desc:0 "Drive the hostile bourgeois factions out of political life before they can rally against the syndicates."

