  intl_communism.26.t:0 "Debug: Revolutionary Line"
  intl_communism.26.d:0 "Choose which Internationale ideology should be applied to [ROOT.GetCountry.GetName]. This directly changes the form of government and distribution of power law for testing."
  intl_communism.26.f:0 "\"No minutes were kept. This was, after all, a debug congress.\""
  intl_communism.26.a:0 "Anarchist councils"
  intl_communism.26.b:0 "Mutualist councils"
  intl_communism.26.c:0 "Syndicalist councils"
  intl_communism.26.e:0 "Blanquist directorate"
