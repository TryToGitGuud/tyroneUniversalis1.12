 intl_doctrine_anarchist: "The state is the root of oppression. Bakunin calls for its immediate abolition and its replacement by free communes bound together through voluntary federation — no masters, no hierarchies, no coercive authority of any kind."
 intl_doctrine_mutualist: "Proudhon envisions a society of small producers exchanging goods at cost through mutual credit banks. Workers own their tools, profit is abolished, and market exchange persists — but freed from exploitation and wage labor."
 intl_doctrine_syndicalist: "De Paepe places the trade union at the heart of revolution. Through direct action and the general strike, workers seize control of industry without need for political parties or the state. Production managed by the unions themselves."
 intl_doctrine_blanquist: "Revolution is not made by spontaneous uprisings but by disciplined cadres seizing the moment. Blanqui advocates a conspiratorial vanguard that captures state power and uses it to impose the socialist order from above, until the working class is ready to govern itself."
 intl_doctrine_marxist: "History moves through the conflict of classes. Marx argues that capitalism contains the seeds of its own destruction. The proletariat must seize state power, establish the dictatorship of the working class, and build the material conditions for stateless communism."
 intl_detail_placeholder: "Select a faction or delegate to read their doctrine."
 intl_footer_text: "Workers of the world, unite!"
