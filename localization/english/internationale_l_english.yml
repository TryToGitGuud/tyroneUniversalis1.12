# --- internationale_l_english.yml ---
 ecchi_De_Paepe: "De Paepe"
 je_internationale: "The Internationale"
 je_internationale_reason: "The workers of the world stir. Across borders and beyond the reach of any single government, the cause of labour organises itself into something larger — a fraternity of the dispossessed, bound not by nation but by class. How we answer their call will define the century."
 je_internationale_complete_tt: "The Internationale has achieved its aims"
 je_mutualist_worker_councils: "The Birth of Worker Councils"
 je_mutualist_worker_councils_reason: "The mutualist current seeks to make the [concept_government] answer to the workshop rather than the other way around. If the [Concept('concept_interest_group', '$concept_interest_groups$')] of labor can enter government with sufficient [concept_legitimacy], the existing [GetLawType('law_council_republic').GetName] may be refounded as a federation of worker councils, mutual credit, and associated production."
 je_mutualist_worker_councils_status_desc: "The councils wait for a government legitimate enough to recognize their contracts, benches, and assemblies."
 je_mutualist_cooperative_mandate: "The Cooperative Mandate"
 je_mutualist_cooperative_mandate_reason: "The council republic must prove that cooperative property can endure beyond proclamation. Three years of associated ownership will turn workshop ledgers, mutual credit, and machinist savings into the ordinary law of the republic."
 je_mutualist_cooperative_mandate_status_desc: "The workshops keep their books; each month of cooperative ownership deepens the mandate."
 mutualist_council_republic_base_tt: "The country must be a [GetLawType('law_council_republic').GetName] or one of its variants."
 mutualist_legitimate_government_tt: "Government [concept_legitimacy] must be at least #v 75#!."
 mutualist_trade_unions_government_tt: "The [GetInterestGroupVariant('ig_trade_unions', GetPlayer).GetNameWithCountryVariant] must be in government and led by a Mutualist."
 mutualist_cooperative_ownership_36_months_tt: "Maintain [GetLawType('law_cooperative_ownership').GetName] or any variant for #v 36#! consecutive months."
 je_mutualist_summon_intelligentsia_agitator: "Open the Lecture Halls"
 je_mutualist_summon_intelligentsia_agitator_desc: "In the lecture halls, the old formulas are crossed out and rewritten as contracts between equals."
 mutualist_intelligentsia_agitator_appears_tt: "An Intelligentsia [GetIdeology('ideology_mutualist').GetName] [concept_ideology] Agitator appears."
 je_mutualist_install_petite_bourgeoisie_leader: "Bind the Small Proprietors"
 je_mutualist_install_petite_bourgeoisie_leader_desc: "The shop counter, the workshop bench, and the cooperative ledger begin to speak the same republican language."
 mutualist_pb_leader_not_conservative_tt: "The Petite Bourgeoisie leader must not have a conservative [concept_ideology]."
 mutualist_petite_bourgeoisie_leader_appears_tt: "A Petite Bourgeoisie [GetIdeology('ideology_mutualist').GetName] [concept_ideology] Leader appears."
 je_blanquism: "The Blanquist Conspiracy"
 je_blanquism_reason: "A disciplined revolutionary minority has begun preparing the seizure of power. The Intelligentsia must be brought under a Blanquist line, cells organized, state offices infiltrated, and republican cadres armed before the old order can be forced into a revolutionary republic."
 je_blanquism_status_desc: "Prepare the conspiracy by completing the three Blanquist steps below."
 je_blanquism_prepare_cells: "Prepare Revolutionary Cells"
 je_blanquism_prepare_cells_desc: "Organize clandestine circles loyal to the Blanquist line."
 je_blanquism_prepare_cells_effect_tt: "The first sealed rooms answer to the Committee; the conspiracy now has hands in the streets."
 je_blanquism_infiltrate_state: "Infiltrate the State"
 je_blanquism_infiltrate_state_desc: "Place reliable sympathizers inside the bureaucracy and republican clubs."
 je_blanquism_infiltrate_state_effect_tt: "Names, seals, and office keys pass quietly into revolutionary hands."
 je_blanquism_arm_cadres: "Arm the Cadres"
 je_blanquism_arm_cadres_desc: "Prepare a disciplined cadre force for the republican rupture."
 je_blanquism_arm_cadres_effect_tt: "The cadres receive their hidden stores; when the signal comes, they will not march empty-handed."
 je_blanquism_execute_coup: "Execute the Coup"
 je_blanquism_execute_coup_desc: "Strike at the appointed hour and proclaim the Blanquist Revolutionary Republic."
 je_blanquist_consolidation: "Consolidate the Blanquist Republic"
 je_blanquist_consolidation_reason: "The Committee has seized the republic, but seizure is not survival. The old offices still remember old signatures, the pulpits still speak in forbidden names, the economy still follows habits older than the revolution, and the police still answer to yesterday's maps. Consolidate at least three pillars of the new order before the revolutionary hour expires."
 je_blanquist_consolidation_status_desc: "Each month the old republic reorganizes beneath the Committee's feet. Pass at least three consolidation laws before the timer reaches #v 60#!."
 je_syndicalist_amendments: "The General Strike"
 je_syndicalist_amendments_reason: "Communism will not arrive by manifesto alone. It must first be heard in the factory whistle that goes unanswered, the rail depot that stops by common order, and the union hall that becomes a government before the government admits it.\n\n#b The Strike Committee Demands:#!\nThe government may still defeat the general strike by turning revolt into reform. Granting all concessions below will disperse the strike committees and end this [concept_journal_entry] in a #n government victory#!.\n• [SCOPE.GetRootScope.GetCountry.GetCustom('syndicalist_right_to_associate_checkbox')] Has granted [GetLawType('law_right_to_associate').GetName]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('syndicalist_labor_rights_checkbox')] Has granted #b labor rights#!\n• [SCOPE.GetRootScope.GetCountry.GetCustom('syndicalist_social_welfare_checkbox')] Has granted #b social welfare#!\n• [SCOPE.GetRootScope.GetCountry.GetCustom('syndicalist_progressive_taxation_checkbox')] Has granted [GetLawType('law_proportional_taxation').GetName] or [GetLawType('law_graduated_taxation').GetName]\n\nIf the government does not concede, sustain repeated strike waves until the old ministry can do nothing but yield."
 je_syndicalist_amendments_status_desc: "Strikes are being prepared."
 je_syndicalist_amendments_status_spreading: "Strikes are spreading."
 je_syndicalist_amendments_status_intensifying: "Strikes are intensifying."
 je_syndicalist_amendments_status_near_general: "General strike is near."
 je_syndicalist_amendments_status_wave_1: "First strike wave holds."
 je_syndicalist_amendments_status_wave_2: "Second strike wave holds."
 je_syndicalist_amendments_status_wave_3: "General strikes are in place."
 syndicalist_communist_republic_tt: "The country must be a [GetLawType('law_council_republic').GetName] or one of its variants."
 syndicalist_economic_base_tt: "The economy must use either [GetLawType('law_interventionism').GetName] or [GetLawType('law_cooperative_ownership').GetName]."
 syndicalist_repeated_strikes_tt: "At least #v 3#! strike waves must shake the government."
 syndicalist_strike_momentum_tt: "Strike pressure must reach #v 100#!."
 syndicalist_strike_wave_progress_tt: "Strike Pressure increases by #v 10#!."
 syndicalist_strike_wave_repression_tt: "Strike Pressure decreases by #v 10#!."
 syndicalist_all_states_receive_strikes_tt: "All [Concept('concept_state', '$concept_states$')] receive the [concept_modifier] #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_nationwide_strikes_tt $modifier_nationwide_strikes$#!."
 modifier_nationwide_strikes_tt: "[GetStaticModifier('modifier_nationwide_strikes').GetName|v]\n[GetStaticModifier('modifier_nationwide_strikes').GetDesc]"
 syndicalist_general_strike_completed_effects_tt: "• [GetLawType('law_syndicalist_council_republic').GetName] will be enacted immediately.\n• [GetLawType('law_syndicalist_economy').GetName] will begin enactment.\n• [ROOT.GetCountry.GetName] gets #tooltippable;tooltip:[GetPlayer.GetTooltipTag],modifier_syndicalist_revolutionary_reforms_tt $modifier_syndicalist_revolutionary_reforms$#! during the enactment\n• Lower Strata [Concept('concept_radical', '$concept_radicals$')] increase by #v 15%#!."
