 syndicalist_government_concessions_tt: "The government must grant association rights, labor rights, social welfare, and progressive taxation."
 syndicalist_trade_unions_government_tt: "The [GetInterestGroupVariant('ig_trade_unions', GetPlayer).GetNameWithCountryVariant] must be in government."
 syndicalist_trade_unions_not_marginal_tt: "The [GetInterestGroupVariant('ig_trade_unions', GetPlayer).GetNameWithCountryVariant] must not be marginalized."
 syndicalist_general_strike_progress_bar: "Strike Pressure"
 syndicalist_general_strike_progress_bar_desc: "Pressure built by repeated union stoppages."
 syndicalist_progress_trade_unions_not_marginal: "Trade Unions are organized."
 syndicalist_progress_trade_unions_government: "Trade Unions sit in government."
 syndicalist_progress_trade_unions_opposition: "Opposition unions agitate."
 syndicalist_progress_weak_government: "The government is weak."
 syndicalist_progress_right_to_associate: "Association rights protect organizing."
 syndicalist_progress_worker_protections: "Worker protections embolden strikes."
 syndicalist_progress_worker_reforms_enacting: "The government is conceding worker reforms."
 je_marxist_proletarian_state: "The Proletarian State"
 je_marxist_proletarian_state_reason: "The Marxist current will not be satisfied with red banners above old ministries. The working class must conquer political power and make the [concept_government] answer to class struggle rather than compromise. A base [GetLawType('law_council_republic').GetName] may serve as the first form of this state; a [GetLawType('law_marxist_council_republic').GetName] will make the line unmistakable.\n\nThe rival council republics of the other currents will not satisfy the Marxists. The workers' state must be either common council power or their own."
 je_marxist_proletarian_state_status_desc: "The party argues in clubs, unions, reading rooms, and ministries over the form the workers' state must take."
 je_marxist_proletarian_state_status_enacting_base: "The base council republic is being written into law."
 je_marxist_proletarian_state_status_enacting_marxist: "The Marxist council republic is being written into law."
 je_marxist_proletarian_state_status_councils: "The councils exist; the question is whether they can govern."
 je_marxist_workers_party: "The Workers' Party"
 je_marxist_workers_party_reason: "The proletarian state has been proclaimed, but proclamation is a thin thing until it survives clerks, elections, local councils, shop committees, and the daily appetites of office. Keep the [GetInterestGroupVariant('ig_trade_unions', GetPlayer).GetNameWithCountryVariant] inside the [concept_government] long enough for the workers' party to become the ordinary machinery of the state."
 je_marxist_workers_party_status_desc: "The workers' party waits outside the central machinery of government."
 je_marxist_workers_party_status_consolidating: "The workers' party is converting office, union, and council into one discipline."
 je_the_internationale: "The Internationale"
 je_the_internationale_reason: "\"Debout, les damnés de la terre!\"\n\nThe first republic to bind the revolution into law has raised a signal no chancery can mistake. No emperor called this congress. No banker underwrote it. No old treaty gave it permission. The Internationale now stands as the court of appeal for every worker denied bread, vote, land, dignity, and command over the labor of their own hands.\n\nBring every [concept_great_power] under the revolutionary line of the Internationale."
 je_the_internationale_status_great_war: "The Great Proletarian War has begun. The world is no longer choosing laws; it is choosing sides."
 je_the_internationale_status_anarchist: "The Internationale carries the black-red line: communes, free councils, and the end of command from above."
 je_the_internationale_status_mutualist: "The Internationale carries the mutualist line: association, credit, and federation against the old monopolies."
 je_the_internationale_status_syndicalist: "The Internationale carries the syndicalist line: the organized workers of every trade against the old state and the old employers."
 je_the_internationale_status_blanquist: "The Internationale carries the Blanquist line: disciplined committees, revolutionary administration, and no patience for hesitation."
 je_the_internationale_status_marxist: "The Internationale carries the Marxist line: workers' councils, party discipline, and the state as the weapon of class power."
 je_the_internationale_status_encircled: "The old Great Powers still encircle the revolution."
 je_the_internationale_status_final: "The old balance of power has been broken."
 je_the_internationale_all_gps_tt: "Every [concept_great_power] must follow the current revolutionary line of the Internationale."
 marxist_workers_state_tt: "The country must have either [GetLawType('law_council_republic').GetName] or [GetLawType('law_marxist_council_republic').GetName]."
 marxist_trade_unions_not_marginal_tt: "The [GetInterestGroupVariant('ig_trade_unions', GetPlayer).GetNameWithCountryVariant] must not be marginalized."
 marxist_legitimate_transition_tt: "Government [concept_legitimacy] must be at least #v 40#!."
 marxist_consolidation_months_tt: "Maintain the workers' party in government for #v 24#! months."
