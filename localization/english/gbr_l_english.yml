 ###############################################
 # Section 1 -- Path Selection (gbr_path)
 ###############################################

 gbr_path.1.t: "The Shape of Empire"

 gbr_path.1.d: "The sun never sets upon the British Empire -- or so they say in the halls of Westminster and in the drawing rooms of a hundred colonial governors. Across the vast expanse of sea and continent, the dominions are bound to the mother country by ties of loyalty, commerce, and history."

 gbr_path.1.f: "Yet the empire is changing. The dominions grow in population, wealth, and confidence. Colonial statesmen speak with increasing boldness in their own parliaments. The question is no longer whether these peoples will demand a greater voice, but what form that voice shall take. \n\nFrom the frozen shores of [SCOPE.sCountry('can_scope').GetName] to the sun-baked plains of [SCOPE.sCountry('aus_scope').GetName], from the minarets of [SCOPE.sCountry('raj_scope').GetName] to the Cape of Good Hope -- [ROOT.GetCountry.GetName] governs one quarter of the world's surface. Shall we draw the empire tighter, binding the dominions into one Federal crown? Or shall we loosen the bonds, trusting that partnership and common purpose shall prove stronger than any constitution?"

 gbr_path.1.a:0 "Forge a Federal Empire"
 gbr_path.1.b:0 "Build a Commonwealth of Nations"

 ###############################################
 # Section 2 -- Imperial Federation
 # (These keys override RB_imperial_l_english.yml)
 ###############################################

 je_imperial_federation: "An Imperial Federation"

 je_imperial_federation_reason: "Across the world the dominions and colonies of the [ROOT.GetCountry.GetAdjective] Empire stretch across continents and oceans, bound by loyalty to the Crown and a shared heritage. From Ottawa to Sydney and from Cape Town to Calcutta, advocates argue that the empire must evolve into a closer political union if it is to endure in an age of rising nations. Conferences are held, tariffs negotiated, and armies drilled together, but the great question of formal union remains unanswered.\n\nThe #bold Dominion Sentiment Bar#! will #tooltippable;tooltip:[ROOT.GetCountry.GetTooltipTag],je_imperial_federation_tt_advance advance#! or #tooltippable;tooltip:[ROOT.GetCountry.GetTooltipTag],je_imperial_federation_tt_retreat retreat#! each month based on [ROOT.GetCountry.GetName]'s laws, technologies, and the state of the empire. The bar reaching #variable 100#!, alongside the research of #bold [GetTechnology('pan-nationalism').GetName]#! technology, the enactment of #bold [GetLawType('law_cultural_exclusion').GetName]#! or #bold [GetLawType('law_multicultural').GetName]#!, and the unification of Canada and Australia will allow the Imperial Federation to be proclaimed."

 je_imperial_federation_tt_advance: "The following conditions will #bold advance#! the Dominion Sentiment Bar each month:\n• #bold +0.1#! -- always (the spirit of imperial unity)\n• #bold +0.2#! -- [GetTechnology('nationalism').GetName] researched\n• #bold +0.4#! -- [GetTechnology('pan-nationalism').GetName] researched\n• #bold +0.1#! -- [GetLawType('law_cultural_exclusion').GetName] enacted\n• #bold +0.3#! -- [GetLawType('law_multicultural').GetName] enacted\n• #bold +0.2#! -- [GetLawType('law_total_separation').GetName] enacted\n• #bold +0.1#! -- [GetLawType('law_no_migration_controls').GetName] active\n• #bold +0.5#! -- Canada unified under the Crown\n• #bold +0.5#! -- Australia unified under the Crown"

 je_imperial_federation_tt_retreat: "The following conditions will #bold deplete#! the Dominion Sentiment Bar each month:\n• #bold -0.1#! -- [GetLawType('law_closed_borders').GetName] active\n• #bold -0.1#! -- [GetLawType('law_censorship').GetName] active\n• #bold -0.1#! -- [GetLawType('law_free_trade').GetName] active\n• #bold -0.5#! -- [GetLawType('law_state_religion').GetName] active\n• #bold -0.5#! -- [GetLawType('law_ethnostate').GetName] active"

 je_imperial_federation_lobby: "The vast #bold [ROOT.GetCountry.GetAdjective] Empire#! spans continents but lacks true political unity. As global tensions rise and rival powers consolidate, the vision of binding its dominions into a single federation grows ever more urgent."

 exclusion_from_federation: "Exclusion from the Imperial Federation" 
 imperial_federation_modifier: "The Imperial Federation"
 imperial_federation_failure: "A Failed Federation"

 imperial_events.2.t: "The Imperial Federation"

 imperial_events.2.d: "After years of debate and negotiation, the British Empire has taken a bold step toward unity. The dominions and Britain itself are now bound together in a federal structure intended to strengthen cooperation, defense, and governance across the [ROOT.GetCountry.GetName]."

 imperial_events.2.f: "From Ottawa to Sydney, from Cape Town to London, delegates have gathered to proclaim a new chapter in [ROOT.GetCountry.GetAdjective] history. What was once a loose collection of dominions and colonies now seeks to become something greater: a federation of nations bound together by shared institutions and common purpose. Though many challenges lie ahead, today marks the birth of a grand experiment — an empire united not only by crown and tradition, but by government and destiny."

 imperial_events.2.a: "A New Imperial Age Begins"


 ###############################################
 # Federation Bar Events (gbr_fed_events)
 ###############################################

 gbr_fed_events.1.t: "The Imperial Colonial Conference"
 gbr_fed_events.1.d: "Delegates from Britain and the dominions have gathered in London for the latest Colonial Conference. Over weeks of deliberation, statesmen from Canada, Australia, and South Africa have hammered out protocols on imperial defence, trade, and postal communications. Sentiment for closer union is palpable in the corridors."
 gbr_fed_events.1.f: "The conference closes with no binding resolution -- federation, as ever, remains a matter for the future. Yet the very act of gathering breeds familiarity, and familiarity breeds trust."
 gbr_fed_events.1.a:0 "Open imperial channels of communication."
 gbr_fed_events.1.b:0 "Reaffirm our commitment to the dominions' security."

 gbr_fed_events.2.t: "The Imperial Penny Post"
 gbr_fed_events.2.d: "A new postal arrangement has been agreed across the empire, fixing the price of a letter between any two imperial territories at a single penny stamp. From London to Sydney, from Cape Town to Quebec, the same coin carries a message halfway around the world."
 gbr_fed_events.2.f: "Critics call it a trifle. The advocates of imperial federation call it something more: the first true common institution of empire, a thread binding dominion to dominion as surely as any constitution."
 gbr_fed_events.2.a:0 "Invest in imperial logistics, expand the convoy network."
 gbr_fed_events.2.b:0 "Reward the dominions directly, let them keep more of what they earn."

 gbr_fed_events.3.t: "Imperial Manoeuvres"
 gbr_fed_events.3.d: "British, Canadian, and Australian military units have conducted joint exercises on the plains of Canada. Officers from three continents drilled together, shared tactics, and learned the same bugle calls. The experiment has been judged a considerable success."
 gbr_fed_events.3.f: "Soldiers who train together tend to fight together. Whether in Imperial Federation or Commonwealth, the bonds forged here may prove sturdier than any paper union."
 gbr_fed_events.3.a:0 "Celebrate the achievement, let the empire's glory speak for itself."
 gbr_fed_events.3.b:0 "Build on the drill, make experience the foundation of our forces."

 gbr_fed_events.4.t: "The Imperial Preference Agreement"
 gbr_fed_events.4.d: "After extended negotiations in Westminster and the colonial capitals, a framework for imperial preferential tariffs has been agreed. Goods moving between Britain and the dominions shall enjoy reduced customs duties, creating in effect a single internal market of empire."
 gbr_fed_events.4.f: "Commerce is the sinew of empire. The factories of Birmingham and the farms of Ontario are now bound by something older and stronger than sentiment: profit."
 gbr_fed_events.4.a:0 "Seal the agreement, and let the trade speak for itself."

 gbr_fed_events.5.t: "A Voice for Federation"
 gbr_fed_events.5.d: "A prominent colonial statesman has made a landmark speech calling for closer union between Britain and the dominions. The address, reported verbatim in the imperial press, has reinvigorated public discussion of federal union on both sides of the Atlantic, and on the far side of the Pacific."
 gbr_fed_events.5.f: "Words are not constitutions. But words spoken by men of authority have a habit of becoming law."
 gbr_fed_events.5.a:0 "Reassure the dominions, their loyalty shall not go unrewarded."
 gbr_fed_events.5.b:0 "Open [ROOT.GetCountry.GetName] to all settlers of the empire."
 gbr_fed_events.5.c:0 "Proclaim the empire a home for all peoples of the world."

 gbr_fed_events.6.t: "Australia Speaks for Federation"
 gbr_fed_events.6.d: "Across the breadth of [SCOPE.sCountry('aus_dominion_scope').GetName], a popular movement in favour of closer union with Britain has returned a clear majority for federation. The result is non-binding, formal federation requires an act of parliament in London, but the voice of [SCOPE.sCountry('aus_dominion_scope').GetName] is now unmistakable."
 gbr_fed_events.6.f: "The furthest dominion has spoken the loudest. [ROOT.GetCountry.GetName] can only listen, and act accordingly."
 gbr_fed_events.6.a:0 "Acknowledge Australia's voice, and answer it."

 gbr_fed_events.7.t: "The Point of No Return"
 gbr_fed_events.7.d: "The federation project has crossed the threshold from aspiration to expectation. In the dominion capitals and in Westminster alike, men who once debated whether federation was possible now debate only when and on what terms. The momentum is self-sustaining."
 gbr_fed_events.7.f: "There are moments in the life of an empire when a thing becomes inevitable before it has happened. This is one of them."
 gbr_fed_events.7.a:0 "Grant equal standing to all settler cultures of the empire."
 gbr_fed_events.7.b:0 "Open the empire's borders, let its peoples move freely."
 gbr_fed_events.7.c:0 "We are ready. The empire is already shaped for what comes next."

 ###############################################
 # Federation Milestone Event Modifier Names
 ###############################################

 fed_event2_gbr_convoys: "Imperial Postal Expansion"
 fed_event2_dominion_minting: "Imperial Revenue Compact"
 fed_event3_unit_experience: "Imperial Military Exercises"
 fed_event4_trade_advantage: "Imperial Preferential Tariffs"
 fed_event5_subject_loyalty: "Imperial Solidarity"
 fed_event5_migration_cultural_exclusion: "Settler Commonwealth"
 fed_event5_migration_multicultural: "People of the Empire"
 imperial_federation_support_from_australia: "Australia Speaks for Federation"

 gbr_fed_events.10.t: "Voices of Dissent"
 gbr_fed_events.10.d: "Reports from the dominions describe growing resentment toward the centralising tendencies of Westminster. Colonial newspapers accuse London of treating the dominions as provinces to be managed rather than partners to be consulted. Liberty sentiment in one of the major dominions has reached a fever pitch."
 gbr_fed_events.10.f: "Empires built on compulsion do not endure. The architects of federation must answer not only how to govern the dominions, but why those dominions should consent to be governed."
 gbr_fed_events.10.a:0 "A setback. We must do better."

 gbr_fed_events.11.t: "Scandal in the Colonies"
 gbr_fed_events.11.d: "A colonial administrator has been implicated in serious misconduct, the details are suppressed from the public press but widely known in Whitehall. The affair has given ammunition to those who argue that imperial federation would simply entrench corruption across a wider stage."
 gbr_fed_events.11.f: "Men of empire are not immune to the failings of men. The federation project suffers for it."
 gbr_fed_events.11.a:0 "An embarrassment we shall have to weather."

 gbr_fed_events.12.t: "The Envoy Refused"
 gbr_fed_events.12.d: "An envoy dispatched to discuss the terms of closer union has been received with conspicuous coldness. The colonial government has declined to participate in the imperial federation talks, citing concerns over parliamentary sovereignty and the erosion of self-government."
 gbr_fed_events.12.f: "Federation by consent requires that both parties consent. Today, at least, that consent is withheld."
 gbr_fed_events.12.a:0 "A frank rebuke. We must rebuild trust first."

 ###############################################
 # Section 3 -- Commonwealth of Nations (je_british_commonwealth)
 ###############################################

 je_british_commonwealth: "The British Commonwealth of Nations"

 je_british_commonwealth_reason: "The Commonwealth path maintains the dominions as distinct, self-governing partners bound to the Crown by kinship, commerce, and voluntary allegiance rather than by administrative fiat. Instead of annexation, Britain invests in the maturation of each dominion, and the depth of that partnership is measured by the Dominion Sentiment Bars.\n\nThe #bold Dominion Sentiment Bar#! for each partner will #tooltippable;tooltip:[ROOT.GetCountry.GetTooltipTag],je_british_commonwealth_tt_advance advance#! each month based on the dominion's own laws, technologies, economic growth, and population.\n\nThe Commonwealth of Nations reaches its fullest expression when all active dominion bars reach #variable 300#!."

 je_british_commonwealth_tt_advance: "Each dominion's bar advances monthly based on that dominion's conditions:\n• #bold +0.5#! always (the dominion exists)\n• #bold +0.2#! [GetTechnology('nationalism').GetName] researched\n• #bold +0.2#! [GetTechnology('pan-nationalism').GetName] researched\n• #bold +0.5#! advanced government ([GetLawType('law_theocracy').GetName], [GetLawType('law_parliamentary_republic').GetName], [GetLawType('law_council_republic').GetName], or [GetLawType('law_corporate_state').GetName])\n• #bold +0.5#! [GetLawType('law_ethnostate').GetName] or [GetLawType('law_multicultural').GetName] enacted\n• #bold +0.5#! [GetLawType('law_no_migration_controls').GetName] active\n• #bold +1.0#! GDP growth above 5%%\n• #bold +0.5#! population above 10 million (#bold +1.0#! if above 20 million)\n• #bold +1.0#! dominion fully unified (Canada or Australia formed)"

 je_british_commonwealth_lobby: "The British Empire can choose partnership over annexation, binding its dominions not by conquest but by the freely given loyalty of peoples who choose to remain British."

