 event_effects_gbr_commonwealth_tt: "All of the following: #indent_newline:3 \n• All active dominions have reached #bold Equal Partner#! status within the British Commonwealth of Nations.\n• The Commonwealth stands as a voluntary fellowship of free peoples, bound to the Crown by choice rather than compulsion."

 ###############################################
 # Commonwealth Bar Condition Tooltip Keys
 ###############################################

 commonwealth_bar_baseline_tt: "The dominion exists and maintains its ties to the Crown."
 commonwealth_bar_nationalism_tt: "Nationalist sentiment gives the dominion a stronger identity to bring to the partnership."
 commonwealth_bar_pan_nationalism_tt: "Pan-national ideology opens the dominion to a broader imperial identity."
 commonwealth_bar_gov_form_tt: "A developed government form demonstrates the dominion’s political maturity."
 commonwealth_bar_citizenship_tt: "A clear citizenship law reflects the dominion’s settled sense of its own national character."
 commonwealth_bar_open_migration_tt: "Free movement between the empire’s territories deepens human bonds."
 commonwealth_bar_gdp_growth_tt: "Rapid economic growth gives the dominion the confidence to seek a more equal relationship."
 commonwealth_bar_pop_medium_tt: "A population of ten million or more gives the dominion genuine demographic weight."
 commonwealth_bar_pop_large_tt: "A population exceeding twenty million makes the dominion a significant power in its own right."
 commonwealth_bar_unified_tt: "The dominion has been fully unified, its people speak with one voice."
 commonwealth_ire_inactive_bar_tt: "Ireland is not present in this game, this bar does not apply."

 ###############################################
 # Commonwealth Threshold Events
 # (.1/.2/.3 fire on dominion; .10/.11/.12 fire on GBR once)
 ###############################################

 # Dominion bar crosses 100
 gbr_commonwealth_events.1.t: "A Growing Partnership"
 gbr_commonwealth_events.1.d: "The relationship between [ROOT.GetCountry.GetName] and [SCOPE.sCountry('gbr_scope').GetName] has deepened beyond simple suzerainty. The dominion has grown in wealth and confidence, and its statesmen speak with increasing authority on the affairs of the empire."
 gbr_commonwealth_events.1.f: "Ties freely given are worth more than ties compelled. The empire grows stronger when its partners choose to remain."
 gbr_commonwealth_events.1.a:0 "The partnership is maturing. Let it continue."

 # Dominion bar crosses 200
 gbr_commonwealth_events.2.t: "A Deepening Bond"
 gbr_commonwealth_events.2.d: "The partnership between [ROOT.GetCountry.GetName] and [SCOPE.sCountry('gbr_scope').GetName] has entered a new phase. The dominion is no longer merely a loyal dependency, it is a self-governing partner that has chosen, in full knowledge of its alternatives, to remain within the [SCOPE.sCountry('gbr_scope').GetAdjective] family of nations."
 gbr_commonwealth_events.2.f: "Familiarity has bred not contempt but trust. The bond between mother country and dominion is richer for having been tested."
 gbr_commonwealth_events.2.a:0 "A remarkable achievement. Let it serve as a model."

 # Dominion bar crosses 300 (shared title/desc/flavor for .3, .30, .31)
 gbr_commonwealth_events.3.t: "Equal Partnership Achieved"
 gbr_commonwealth_events.3.d: "The long arc of [ROOT.GetCountry.GetName]'s relationship with [SCOPE.sCountry('gbr_scope').GetName] has reached its fullest expression. The dominion stands today as a genuine equal within the Commonwealth of Nations, governing itself in all domestic matters, engaged as a partner in the world's affairs, and bound to [SCOPE.sCountry('gbr_scope').GetName] not by conquest but by the freely given bond of peoples who share a common destiny."
 gbr_commonwealth_events.3.f: "The empire does not end here. It transforms."
 gbr_commonwealth_events.3.a:0 "The partnership is complete. Long may it endure."

 # GBR event: first dominion crosses 100
 gbr_commonwealth_events.10.t: "The Commonwealth Stirs"
 gbr_commonwealth_events.10.d: "The first of [ROOT.GetCountry.GetName]'s dominions has reached a meaningful milestone in the Commonwealth partnership. Statesmen in Westminster take notice: the voluntary bond between mother country and dominion is proving stronger than the sceptics predicted."
 gbr_commonwealth_events.10.f: "An empire of willing partners is more durable than one built on compulsion. The first step has been taken."
 gbr_commonwealth_events.10.a:0 "A promising beginning. Let us build on it."

 # GBR event: first dominion crosses 200
 gbr_commonwealth_events.11.t: "The Commonwealth Deepens"
 gbr_commonwealth_events.11.d: "One of [ROOT.GetCountry.GetName]'s dominions has reached an advanced stage of Commonwealth partnership. The relationship has moved beyond loyalty into something more equal, a partnership of confidence, commerce, and common purpose."
 gbr_commonwealth_events.11.f: "The Commonwealth is no longer an experiment. It is a fact of the empire."
 gbr_commonwealth_events.11.a:0 "The vision of a Commonwealth of Nations becomes real."

 # GBR event: first dominion crosses 300
 gbr_commonwealth_events.12.t: "A Dominion Stands Equal"
 gbr_commonwealth_events.12.d: "One of [ROOT.GetCountry.GetName]'s dominions has achieved full and equal partnership within the Commonwealth of Nations. The project that began as an aspiration, an empire that could transform itself into a family of free peoples, has found its first proof of concept."
 gbr_commonwealth_events.12.f: "History will record that [ROOT.GetCountry.GetName] was the first empire to do this. Whether others follow is for the future to determine."
 gbr_commonwealth_events.12.a:0 "A landmark moment for the empire, and the world."

