italyEventsTyroneLV.1.t:0 "Reforms Realized @green_checkmark!"
italyEventsTyroneLV.1.d:0 "The long effort to reform [ROOT.GetCountry.GetName] has borne fruit. [concept_bureaucracy] has been strengthened, the economy steadied, and the [concept_authority] of the [concept_state] restored.\n\nWhat was once fragile now stands firm, ready to face the challenges ahead."
italyEventsTyroneLV.1.f:0 "From careful reform comes lasting strength."
italyEventsTyroneLV.1.a:0 "We are ready for what comes next"
italyEventsTyroneLV.1_tt:0 "[ROOT.GetCountry.GetName] gets #tooltippable;tooltip:[GetPlayer.GetTooltipTag],LV_ita_LV_reformed_bonus_tt $ita_LV_reformed$#! for 5 years."
