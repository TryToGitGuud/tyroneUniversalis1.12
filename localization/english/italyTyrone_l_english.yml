italyEventsTyroneLV.2.t:0 "@inf! An Age of Liberty"
italyEventsTyroneLV.2.d:0 "The reforms we have enacted have transformed our [concept_state]. Rights are secured, freedoms upheld, and prosperity begins to take root across our lands.\n\nBeyond our borders, word spreads quickly. Those who live under harsher rule now look to Italy with hope, seeing in it a land where dignity and opportunity may yet be found."
italyEventsTyroneLV.2.f:0 "Where liberty flourishes, so too do the hopes of men."
italyEventsTyroneLV.2.a:0 "Let them come"
italyEventsTyroneLV.2.b:0 "Our strength lies at home"

italyEventsTyroneLV.3.t:0 "@aut! A New Order Established"
italyEventsTyroneLV.3.d:0 "The course has been set. [concept_authority] is no longer divided, nor is the direction of the [concept_state] left to uncertainty. Power is consolidated, and the nation stands bound by a single will.\n\nWhere division once threatened to weaken us, unity now prevails, enforced through strength and discipline. [ROOT.GetCountry.GetName] shall endure, not through compromise, but through order."
italyEventsTyroneLV.3.f:0 "A nation is strongest when it speaks with one voice."
italyEventsTyroneLV.3.a:0 "Order shall prevail"

italyEventsTyroneLV.4.t:0 "The Federation of the Po Realized"
italyEventsTyroneLV.4.d:0 "What began as a vision has now taken form. The states of Italy, once divided by ambition and tradition, have been brought together under a single political framework.\n\nNo longer merely a collection of crowns and councils, the peninsula now stands united, its future guided by a common purpose. What was achieved through accord may now endure through unity."
italyEventsTyroneLV.4.f:0 "From many states, one Italy."
italyEventsTyroneLV.4.a:0 "North Italy stands united"

italyEventsTyroneLV.5.t:0 "A Crown for [ROOT.GetCountry.GetName]"
italyEventsTyroneLV.5.d:0 "With North Italy united under a single state, the question of its crown must now be settled. The choice of monarch will shape not only the character of the nation, but its place among the powers of Europe.\n\nSeveral houses present their claims, each offering a different vision for Italy’s future. The decision cannot be taken lightly."
italyEventsTyroneLV.5.f:0 "A crown is not merely worn, it defines the realm beneath it."
italyEventsTyroneLV.5.a:0 "Invite a Hohenzollern prince"
LV_von_hohenzollern_tt:0 "A @armed_forces! ruler from the #gold House of Hohenzollern#! will ascend the throne"
italyEventsTyroneLV.5.b:0 "Crown the House of Savoy"
LV_de_savoy_tt:0 "A @intelligentsia! ruler from the #gold House of Savoy#! will ascend the throne"
italyEventsTyroneLV.5.c:0 "Restore a Bonaparte"
LV_bonaparte_tt:0 "A @petty_bourgeoisie! ruler from the #gold Bonaparte dynasty#! will ascend the throne"
italyEventsTyroneLV.5.e:0 "Entrust the Habsburgs"
LV_habsburg_tt:0 "A @landowners! ruler from the #gold House of Habsburg-Lorraine#! will ascend the throne"
italyEventsTyroneLV.5.g:0 "Invite a foreign compromise candidate"
LV_saxegotha_tt:0 "A @industrialists! ruler from the #gold House of Saxe-Coburg-Gotha#! will ascend the throne"
italyEventsTyroneLV.5.h:0 "Accept Austrian overlordship"

italyEventsTyroneLV.6.t:0 "From Federation to Nation"
italyEventsTyroneLV.6.d:0 "The Italian federation has fulfilled its purpose. What began as a union of states has grown into something greater, a single nation in all but name.\n\nNow the question remains: shall we preserve the remnants of federal autonomy, or complete the work and bind Italy into a fully centralized state?"
italyEventsTyroneLV.6.f:0 "A nation divided in structure cannot stand united in destiny."
italyEventsTyroneLV.6.a:0 "Preserve some regional autonomy"
italyEventsTyroneLV.6.b:0 "Strengthen central authority"
italyEventsTyroneLV.6.c:0 "One state, indivisible"
