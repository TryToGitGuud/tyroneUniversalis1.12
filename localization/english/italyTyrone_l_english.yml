 sic_conqueror_of_italy_b_hover_tt:0 "[GetCharacterTrait('sic_conqueror_of_italy_b').GetName|v]\n[GetCharacterTrait('sic_conqueror_of_italy_b').GetDesc]"
 sic_conqueror_of_italy_c_hover_tt:0 "[GetCharacterTrait('sic_conqueror_of_italy_c').GetName|v]\n[GetCharacterTrait('sic_conqueror_of_italy_c').GetDesc]"

 # Event sic_tyrone.13 – Italian claims
 sic_tyrone.13.t:0 "Italy Awaits Our Rule"
 sic_tyrone.13.d:0 "The Kingdom has chosen its path. The divided peninsula, with its petty duchies, papal domains, and Austrian-held north, lies before us not as foreign land but as a rightful inheritance still denied. The Crown now proclaims its claim over all Italian soil."
 sic_tyrone.13.f:0 "A claim is but the first step. Steel must give it force."
 sic_tyrone.13.a:0 "Italy shall be one under our banner."
 sic_tyrone.13.a_claims_tt:0 "Get #gold Claims#! on all #gold Italian#! territories."
 sic_conqueror_italy_states_tt:0 "At least 12 states with a South or North Italian majority culture are under our rule"
 sic_conqueror_of_italy_completed_desc:0 "Choose one trait for the Ruler and Heir:\n - #gold Authority#!: [GetCharacterTrait('ita_conqueror_of_italy_authority').GetName] \n - #gold Military#!: [GetCharacterTrait('ita_conqueror_of_italy_military').GetName]\n - #gold Innovation#!: [GetCharacterTrait('ita_conqueror_of_italy_innovation').GetName]\n\nGet #green #bold +20%#!#! [GetCulture('north_italian').GetName] and #green #bold +10%#!#! [GetCulture('south_italian').GetName] [concept_loyalist]."

 # Ruler of Italy (nationalist path)
 sic_ruler_of_italy:0 "Ruler of Italy"
 sic_ruler_of_italy_reason:0 "Against all expectations, the Kingdom of the Two Sicilies has emerged as the driving force of Italian unification. From Naples, a new vision of national destiny now spreads across the peninsula, placing the South at the center of the movement to unite all Italians under one crown. \n \n#green #bold Friendly relations with the Italian states, or their inclusion within our bloc, will encourage them to join the cause.#!#!"
 sic_ruler_of_italy_unlock_tt:0 "Unlocked by the nationalist victory in the entry #gold Fate of the Kingdom#!."

 # Event sic_tyrone.15 – Puppet Italian Minor
 sic_tyrone.15.t:0 "An Offer They Cannot Refuse"
 sic_tyrone.15.d:0 "[SCOPE.sCountry('puppet_target').GetName] has long orbited our sphere. With Italy's future intertwined with our ambitions, the moment has come to formalize the relationship. Their leaders understand where power lies — the question is whether we extend a hand or a fist."
 sic_tyrone.15.f:0 "A puppet state is a useful tool, as long as one remembers which hand holds the strings."
 sic_tyrone.15.a:0 "Bring [SCOPE.sCountry('puppet_target').GetName] into our orbit."
 sic_tyrone.15.b:0 "The time is not right."

 # Event sic_tyrone.16 – Voice of the Peninsula
 sic_tyrone.16.t:0 "Voice of the Peninsula"
 sic_tyrone.16.d:0 "A pamphlet has begun circulating in the salons and coffee houses of [SCOPE.sCountry('pamphlet_country').GetName] — written by an unknown hand, but speaking with the fire of conviction. It names [ROOT.GetCountry.GetName] the rightful heart of a future Italy, and calls upon patriots of every Italian land to look south.\n\nAmong the nationalists of [SCOPE.sCountry('pamphlet_country').GetName], its effect has been considerable."
 sic_tyrone.16.f:0 "Words cost nothing. The [concept_relations] they build may be priceless."
 sic_tyrone.16.a:0 "Bring [SCOPE.sCountry('pamphlet_country').GetName] under our wing."
 sic_tyrone.16.b:0 "Words are enough for now."

 # Event sic_tyrone.17 – The Artisans' Pilgrimage
 sic_tyrone.17.t:0 "The Artisans’ Pilgrimage"
 sic_tyrone.17.d:0 "Craftsmen, weavers, and small merchants from across the peninsula have begun arriving in Naples and Palermo, drawn by reports of a Kingdom on the rise. They bring their trades, their dialects, and their hope that [ROOT.GetCountry.GetName] might be the anchor of a greater Italian future.\n\nThey ask only one thing: to belong."
 sic_tyrone.17.f:0 "A united Italy begins with its people — not its crowns."
 sic_tyrone.17.a:0 "Welcome them. Italian hands will build Italy's future."
 sic_tyrone.17.b:0 "Let them settle where they will."

 # Event sic_tyrone.18 – Young Men of Italy
 sic_tyrone.18.t:0 "Young Men of Italy"
 sic_tyrone.18.d:0 "They arrive on foot, by cart, in groups of three or thirty — young men from Tuscany, Modena, and the Papal States — crossing into the Kingdom with nothing but a rifle and a song. They have heard that here, in [ROOT.GetCountry.GetName], the dream of Italy is real.\n\nThey wish to fight for it."
 sic_tyrone.18.f:0 "Every great cause finds its soldiers before it finds its victory."
 sic_tyrone.18.a:0 "Enlist them. Italy's sons serve Italy's King."
 sic_tyrone.18.b:0 "Send them home with honor. Their time will come."

 # Button: sic_request_lmv_cession_button
 sic_request_lmv_cession_button:0 "Request Cession of Lombardy-Venetia"
 sic_request_lmv_cession_button_desc:0 "Dispatch an envoy to Vienna with a formal diplomatic request for the cession of Lombardy-Venetia. Whether the Habsburgs will listen is another matter."

 # Event sic_tyrone.20 – A Messenger from the South (fires on Austria)
 sic_tyrone.20.t:0 "A Messenger from the South"
 sic_tyrone.20.d:0 "A [SCOPE.sCountry('sic_lmv_requester').GetAdjectiveNoFormatting] envoy has arrived at the Hofburg bearing a diplomatic note sealed with the crest of [SCOPE.sCountry('sic_lmv_requester').GetName]. The language is careful and courtly, but the meaning is unmistakable: [ROOT.GetCountry.GetName] is asked to surrender Lombardy-Venetia.\n\nIn exchange, [SCOPE.sCountry('sic_lmv_requester').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCountry('sic_lmv_requester').GetRuler.GetFullName] offers lasting peace and friendship along the borders of the Italian [concept_state|pl].\n\nThe chamber has gone very quiet."
 sic_tyrone.20.f:0 "Quiet rooms make the loudest decisions."
 sic_tyrone.20.a:0 "Grant it. Lombardy-Venetia bleeds the treasury and stirs nothing but revolution."
 sic_tyrone.20.b:0 "Austria yields nothing. Show the envoy the road."

 # Event sic_tyrone.19 – The Question of Rome
 sic_tyrone.19.t:0 "The Question of Rome"
 sic_tyrone.19.d:0 "For every [ROOT.GetCountry.GetAdjectiveNoFormatting] nationalist, one word has always burned brightest: Rome. The eternal city — mother of law, throne of saints, and the only seat that could make a united Italy undeniable.\n\nThe Papal States are exhausted. They cannot defend themselves without foreign bayonets, and the foreign bayonets are thinning. The Holy See has grown warmer toward [ROOT.GetCountry.GetName] than any cardinal would openly admit. The road to Rome has never been shorter.\n\nWhat [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] does next will be remembered for a thousand years."
 sic_tyrone.19.f:0 "All roads lead to Rome. And Italy's road leads nowhere else."
 sic_tyrone.19.a:0 "Rome is ours. It was always ours."
 sic_tyrone.19.b:0 "Let the Pope keep his throne. His blessing is worth more than his silence."
 sic_tyrone_capital_rome_tt:0 "Rome is proclaimed the eternal seat of [ROOT.GetCountry.GetName]."

 # Modifiers – sic_tyrone.19
 sic_rome_declared_capital:0 "Rome, Capital of Italy"
 sic_rome_declared_capital_desc:0 "The Eternal City now sits at the heart of [ROOT.GetCountry.GetName]. A thousand years of [concept_prestige] and an unbroken claim to civilization flow from the very name of Rome, and with it comes a [concept_legitimacy] no rival can easily contest."
 sic_papal_concordat:0 "Concordat with the Holy See"
 sic_papal_concordat_desc:0 "The Pope and the Crown have found common cause. The faithful across the peninsula look toward [ROOT.GetCountry.GetName] as a friend of the Church, and that quiet [concept_legitimacy] is worth more than any decree."

 # Modifiers – sic_tyrone.17 / sic_tyrone.18
 sic_artisans_pilgrimage:0 "The Artisans’ Pilgrimage"
 sic_artisans_pilgrimage_desc:0 "Craftsmen and merchants from across the peninsula have made their home in the Kingdom, bringing with them their trades and their [concept_wealth]."
 sic_italian_volunteers:0 "Young Men of Italy"
 sic_italian_volunteers_desc:0 "Nationalist volunteers have swelled the ranks, inspired by the call of a united Italy."

 # Journal Entry
 sic_fate_of_kingdom:0 "The Fate of the Kingdom"
 sic_fate_of_kingdom_reason:0 "The Kingdom of the Two Sicilies stands at a crossroads. The old Bourbon order — entrenched [concept_interest_group|pl] of #gold Landowners#!@landowners! and a zealous #gold Devouts #!@devout!, a court clinging to autocracy — faces a rising tide of #gold liberal nationalism#! stirred by secret societies, exiled intellectuals, and the distant thunder of revolution.\n\n[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] must decide what manner of sovereign to be. The fate of [ROOT.GetCountry.GetName], and whether it will ever march beneath an #gold Italian#! banner, will be decided not on a battlefield but in the drawing rooms, cathedrals, and public squares of #yellow Palermo#! and #yellow Naples#!."
 fate_sic_Complete_tt:0 "The progress bar has reached 100% progress."
 fate_sic_fail_tt:0 "The progress bar has reached 0% progress."

 # Status descriptions
 sic_fate_absolutist_dominant_desc:0 "The Bourbon order holds firm. The Landowners and the Church dominate political life; liberal voices are silenced or exiled. Unification remains a distant dream."
 sic_fate_nationalist_dominant_desc:0 "The reformist tide is swelling. Liberal intellectuals and the rising bourgeoisie are reshaping the kingdom's politics. Unification draws ever closer."
 sic_fate_balanced_desc:0 "The kingdom teeters between reaction and reform. Bourbon loyalists and Italian nationalists contest every decision, every appointment, every law."
 sic_fate_outcome_not_triggered_tt:0 "The struggle between order and reform has not yet reached its conclusion"
 sic_fate_absolutist_outcome_tt:0 "#gold #bold @landowners! Absolutist Victory#!#!:\n Either: \n  • [ROOT.GetCountry.GetName] gets #tooltippable;tooltip:[GetPlayer.GetTooltipTag],sic_absolutist_dominance_hover_tt $sic_absolutist_dominance$#! for 10 years\n  • [ROOT.GetCountry.GetName] gets #tooltippable;tooltip:[GetPlayer.GetTooltipTag],sic_absolutist_dominance2_hover_tt $sic_absolutist_dominance2$#! for 10 years\n Will be able to unify #gold Italy#! through [concept_war]."
 sic_fate_nationalist_outcome_tt:0 "#gold #bold @intelligentsia! Nationalist Victory#!#!:\n • [ROOT.GetCountry.GetName] gets #tooltippable;tooltip:[GetPlayer.GetTooltipTag],sic_nationalist_surge_hover_tt $sic_nationalist_surge$#! for 10 years\n • Will be able to unify #gold Italy#! through #gold Diplomacy#!."
 sic_absolutist_dominance_hover_tt:0 "[GetStaticModifier('sic_absolutist_dominance').GetName|v]\n[GetStaticModifier('sic_absolutist_dominance').GetDesc]"
 sic_absolutist_dominance2_hover_tt:0 "[GetStaticModifier('sic_absolutist_dominance2').GetName|v]\n[GetStaticModifier('sic_absolutist_dominance2').GetDesc]"
 sic_nationalist_surge_hover_tt:0 "[GetStaticModifier('sic_nationalist_surge').GetName|v]\n[GetStaticModifier('sic_nationalist_surge').GetDesc]"
 sic_intelligentsia_powerful_hover_tt:0 "[GetStaticModifier('sic_intelligentsia_powerful').GetName|v]\n[GetStaticModifier('sic_intelligentsia_powerful').GetDesc]"

 # Event: Secret Societies (sic_tyrone.1)
 sic_tyrone.1.t:0 "The Secret Societies"
 sic_tyrone.1.d:0 "Reports reach the palace of clandestine gatherings across the kingdom — Carbonari lodges in Naples, Young Italy cells in Palermo. These secret societies preach constitutional government and Italian unity, and their numbers grow with every arrest. The question before the Crown is simple: crush them, or allow them space to breathe?"
 sic_tyrone.1.f:0 "Repression breeds martyrs; tolerance breeds conspirators."
 sic_tyrone.1.a:0 "Suppress them — arrest the ringleaders and close the lodges."
 sic_tyrone.1.b:0 "Turn a blind eye — let the societies operate under watch."

 # Event: The Role of the Crown (sic_tyrone.2)
 sic_tyrone.2.t:0 "The Role of the Crown"
 sic_tyrone.2.d:0 "A delegation of nobles and ministers presents itself at court. One faction urges the king to reassert his absolute prerogatives, recalling the suppression of the 1820 constitution as a model of firmness. Another faction — led by cautious reformers — warns that without limited concessions, the monarchy risks what the French Bourbons suffered. The king must decide what kind of sovereign he intends to be."
 sic_tyrone.2.f:0 "Every dynasty believes it is the last one standing — until it is not."
 sic_tyrone.2.a:0 "Strengthen royal authority — there will be no constitutions here."
 sic_tyrone.2.b:0 "Accept limited reforms — a stable throne requires loyal subjects."

 # Event: The Bourbon Order Prevails (sic_tyrone.101)
 sic_tyrone.101.t:0 "The Bourbon Order Prevails"
 sic_tyrone.101.d:0 "The reformist movement has been broken. Whether through repression, exile, or the simple weight of tradition, the Bourbon monarchy has emerged victorious over the challenge from below. The Landowners and the Church stand triumphant; the kingdom will not march beneath the Italian tricolore — not now, perhaps not ever. Ferdinand would be pleased."
 sic_tyrone.101.f:0 "The kingdom endures. Whether it flourishes is another matter."
 sic_tyrone.101.a:0 "The King is absolute — God and King, in that order."
 sic_tyrone.101.b:0 "Exile the reformers — let them spread their sedition elsewhere."

 # Event: Il Vento del Risorgimento (sic_tyrone.102)
 sic_tyrone.102.t:0 "Il Vento del Risorgimento"
 sic_tyrone.102.d:0 "The wind of the Risorgimento has swept through the Two Sicilies. The reformers have won; the old order is in retreat. Whether through constitutional concessions, the collapse of the Bourbon clique, or the sheer momentum of liberal ideas, the Kingdom of the Two Sicilies now looks northward — toward Sardinia, toward Turin, toward a united Italy. The path is still long, but the will is there."
 sic_tyrone.102.f:0 "When the wind changes, even kings must adjust their sails."
 sic_tyrone.102.a:0 "Embrace the liberal constitution — the people have spoken."
 sic_tyrone.102.b:0 "Unity above all — the nation must come first."

 # ========== Lateran Concordat decision ==========
 ita_lateran_concordat_decision:0 "The Lateran Reconciliation"
 ita_lateran_concordat_decision_desc:0 "The seizure of Rome and the annexation of the Papal State left a wound in the soul of Catholic Italy. The Pope retreated behind the walls of the Vatican, refusing to recognize the new kingdom. The rift has poisoned our relations with the clergy, weakened the Church's loyalty, and cast a shadow over the legitimacy of the state.\n\nA settlement is possible — not a return to the old order, but a formal agreement granting the Holy See recognition and limited sovereignty in exchange for an end to the quarrel. The Church will gain institutional guarantees; we will pay in bureaucratic concessions."
 ita_lateran_concordat_decision_tooltip:0 "Removes the [no_papal_recognition] modifier. The Church regains institutional footing — bureaucratic costs rise across the country and clergy redirect resources inward for the next five years."
 ita_lateran_concordat:0 "Concordat Obligations"
 ita_lateran_concordat_desc:0 "The Lateran settlement has been signed. The state has made its peace with Rome, but the concessions are not without cost — the clergy consolidates its institutional presence, and the machinery of government bends to accommodate them."

 # ========== Italy Developing Industry — investment decisions ==========
 # ========== Sicilian Sulphur Monopoly ==========
 sic_sulphur_company_decision:0 "Establish the Anglo-Sicilian Sulphur Company"
 sic_sulphur_company_decision_desc:0 "Sicily sits atop the world's most productive sulphur deposits. For decades the trade has been unregulated, enriching local landlords and foreign merchants while the kingdom captures little of the value. A chartered company — with the full backing of the Crown — could consolidate the mines, control exports, and transform sulphur into a true instrument of state power."

 sic_sulphur_monopoly_je:0 "The Sulphur Monopoly"
 sic_sulphur_monopoly_je_reason:0 "The Anglo-Sicilian Sulphur Company has been chartered, placing the rich sulphur deposits of [GetStateRegion('STATE_SICILY').GetName] under the direction of a single privileged enterprise. [ROOT.GetCountry.GetName] now holds the means to shape [concept_building_ownership] and pricing across the Mediterranean sulphur trade — a resource the [concept_world_market] cannot do without.\n\nSo long as the Company endures, the Crown's grip on this commerce shall endure with it."
 sic_sulphur_company_slot:0 "Sulphur Monopoly"
 sic_sulphur_company_slot_desc:0 "The Anglo-Sicilian Sulphur Company operates under royal charter, expanding the productive base of the kingdom and opening an additional slot for state-backed enterprise."

 # ========== Italy Developing Industry — investment decisions ==========
 ita_investment_power_spend_tt:0 "Spends 1 investment point."
 ita_investment_power_available_tt:0 "Have enough investment points."
 ita_invest_manufacturing_decision:0 "#gold Developing Industries#!: Invest in Manufacturing"
 ita_invest_manufacturing_decision_desc:0 "Direct state resources to expand and modernize Italian manufacturing, reducing capital friction and boosting industrial output."
 ita_invest_manufacturing:0 "Manufacturing Investment"
 ita_invest_manufacturing_desc:0 "Public funds are boosting output across Italian factories."

 ita_invest_agriculture_decision:0 "#gold Developing Industries#!: Invest in Agriculture"
 ita_invest_agriculture_decision_desc:0 "Support the agricultural base by improving yields, expanding farmland, and stabilizing the food supply."
 ita_invest_agriculture:0 "Agricultural Investment"
 ita_invest_agriculture_desc:0 "State investment is increasing output across Italian farms."

 ita_leverage_public_loans_decision:0 "#gold Developing Industries#!: Leverage Public Loans"
 ita_leverage_public_loans_decision_desc:0 "Use state credit to secure favorable borrowing terms, lowering interest costs and freeing capital for investment."
 ita_leverage_public_loans:0 "Public Credit Leverage"
 ita_leverage_public_loans_desc:0 "Borrowing costs are reduced under favorable loan terms."

 ita_invest_education_decision:0 "#gold Developing Industries#!: Public Investment in Education"
 ita_invest_education_decision_desc:0 "Expand funding for universities and technical institutes to train skilled workers and drive innovation."
 ita_invest_education:0 "Education Investment"
 ita_invest_education_desc:0 "State funding is accelerating research and technical training."

 ita_invest_institutions_decision:0 "#gold Developing Industries#!: Institutional Modernization"
 ita_invest_institutions_decision_desc:0 "Invest in administrative and bureaucratic systems to speed up institutional growth across the state."
 ita_invest_institutions:0 "Institutional Push"
 ita_invest_institutions_desc:0 "Institutional development is accelerating across Italy."
 # ========== Ministry of Industry ==========
 ita_ministry_of_industry_decision:0 "#gold Developing Industries#!: Appoint Industry Minister"
ita_ministry_of_industry_decision_desc:0 "The Industry Minister defines Italy’s economic direction. Each faction offers a different vision — from free markets to state control or imperial expansion."

italian_development.2.t:0 "The Industry Ministry Convenes"
italian_development.2.d:0 "A new minister will shape Italy’s economic path for years. Competing factions within the industrialists each present their vision for the nation’s future."
italian_development.2.f:0 "Every great economy is built on a theory — the question is whose."
italian_development.2.a:0 "#b $ideology_market_liberal$#!: Free trade and open markets."
italian_development.2.b:0 "#b $ideology_protectionist$#!: State investment and national industry."
italian_development.2.c:0 "#b $ideology_jingoist$#!: Colonial expansion and extraction."
italian_development.2.e:0 "#b $ideology_utilitarian_leader$#!: Reform and social stability."

ita_ministry_market_liberal:0 "Market Liberal Policy"
ita_ministry_protectionist:0 "Protectionist Policy"
ita_ministry_jingoist:0 "Jingoist Policy"
ita_ministry_utilitarian:0 "Utilitarian Policy"

 # ========== Italian Irredentism expansion decisions ==========
 ita_irredentism_egypt_decision:0 "#gold Irredentism#!: Look to the Nile"
 ita_irredentism_egypt_decision_desc:0 "The Nile delta now lies within reach — Egypt, cradle of ancient civilizations and gateway to the East. An Italian claim over these lands would scandalize Europe, but Mare Nostrum demands nothing less."
 ita_irredentism_egypt_decision_tooltip:0 "Unlocks the Egyptian Irredentism journal entry. Costs 10 infamy."

 ita_irredentism_holy_city_decision:0 "#gold Irredentism#!: The Holy City Awaits"
 ita_irredentism_holy_city_decision_desc:0 "Italy's gaze turns to Palestine — the land of the Crusaders, the seat of Christendom. The Great Powers will protest. The Church will be divided. But for those who see Italy as the heir of Rome, no claim could be more sacred."
 ita_irredentism_holy_city_decision_tooltip:0 "Unlocks the Holy City Irredentism journal entry. Costs 10 infamy."

 ita_irredentism_mediterranean_decision:0 "#gold Irredentism#!: The Mediterranean Islands"
 ita_irredentism_mediterranean_decision_desc:0 "Beyond Dalmatia lie the islands of the eastern Mediterranean — Crete, Cyprus, the Aegean archipelago. Rome once held them all. Italy's navy, if it is to dominate the sea, must hold them again."
 ita_irredentism_mediterranean_decision_tooltip:0 "Unlocks the Mediterranean Islands Irredentism journal entry. Costs 10 infamy."

 # ========== LMV protectorate request decision ==========
 lmv_request_protectorate_decision:0 "Petition Vienna for Autonomous Status"
 lmv_request_protectorate_decision_desc:0 "The Kingdom of Lombardy-Venetia has long chafed under direct Austrian rule. With Vienna weakened — whether by defeat in the Brothers' War, the constitutional compromises of the Dual Monarchy — the moment has come to press for a lighter grip. A formal petition to the Emperor may secure protectorate status: internal autonomy, a separate diet, and the end of crown land administration."
 lmv_request_protectorate_decision_tooltip:0 "Sends a petition to our Overlord. The Emperor will choose whether to grant or deny autonomous status."

 # ========== italyEventsTyroneLV.8 — Austria receives the LMV petition ==========
 italyEventsTyroneLV.8.t:0 "A Petition from Lombardy-Venetia"
 italyEventsTyroneLV.8.d:0 "A delegation from the Kingdom of Lombardy-Venetia has arrived at the Imperial court in Vienna. They come not with demands, but with a petition: that the Emperor consider granting the Italian provinces a measure of self-governance, transforming the crown land into a protectorate with its own institutions. The delegates argue that such a concession would buy loyalty and ease the administration of a restless population — and that the current moment, with other pressures upon the Empire, is precisely the right time to make it."
 italyEventsTyroneLV.8.f:0 "An empire that cannot offer its subjects a reason to stay will eventually find them leaving another way."
 italyEventsTyroneLV.8.a:0 "Grant the petition — Lombardy-Venetia shall have its autonomy."
 italyEventsTyroneLV.8.b:0 "Refuse — the Italian provinces remain under the direct authority of the Crown."

 # Modifier names
 sic_absolutist_dominance:0 "Bourbon Absolutism"
 sic_absolutist_dominance_desc:0 "The Bourbon monarchy has reasserted its authority. The Crown rules unchallenged, but at a cost to innovation and reform."
 sic_absolutist_dominance2:0 "Bourbon Absolutism"
 sic_landowners_powerful:0 "Landowning Ascendancy"
 sic_landowners_powerful_desc:0 "The great landowners of the south have consolidated their grip on power following the defeat of the liberal movement."
 sic_nationalist_surge:0 "Risorgimento Surge"
 sic_nationalist_surge_desc:0 "The nationalist victory has unleashed a wave of popular energy. Radicals flood the streets, but innovation and reform flourish."
 sic_intelligentsia_powerful:0 "Intelligentsia Ascendancy"
 sic_intelligentsia_powerful_desc:0 "Liberal intellectuals and reformers have emerged as the dominant political force following the Risorgimento victory."

 # ========== Stop Italian Emigration JE ==========
 ita_stop_emigration_italy_tt:0 "Italy exists and is governed by us"
 ita_stop_emigration:0 "Stop Italian Emigration"
 ita_stop_emigration_reason:0 "[ROOT.GetCountry.GetName] is losing its [Concept('concept_pop', '$concept_population$')]. Across the countryside and the crowded streets of its cities, thousands abandon their [concept_homeland] in search of opportunity abroad. Letters arrive from distant lands, speaking of higher [concept_building_wage] and better [concept_sol], while at home wages stagnate and prospects remain uncertain. If this trend continues, the nation risks losing not only its labor force, but its future.\n\nThe [concept_government] must confront this growing crisis."

 # Status descriptions
 ita_stop_emigration_status_inactive_desc:0 "The sons and daughters of this land seek their futures on foreign shores. The government has not yet moved to answer them."
 ita_stop_emigration_status_desc:0 "The flight of the people demands a resolution. Seal the borders by law, or give them reason enough to stay."

 # Buttons
 ita_emigration_close_borders_button:0 "Close the Borders"
 ita_emigration_close_borders_button_desc:0 "Assert state authority over emigration. Impose strict controls on who may leave, tightening ports and paperwork. Faster progress — but radicals will grow."
 ita_emigration_improve_italy_button:0 "Make Italy Worth Staying"
 ita_emigration_improve_italy_button_desc:0 "Invest in the nation's people. Raise standards of living, expand industry, and give Italians reason to remain. Slower — but earns lasting loyalty and draws migrants back."

 # Progress bar
 ita_emigration_progress_bar_name:0 "Emigration Crisis Response"
 ita_emigration_progress_bar_desc:0 "Progress toward resolving the emigration crisis"
 ita_emigration_close_borders_tick_tt:0 "Border controls in effect"
 ita_emigration_restrictive_laws_tt:0 "Restrictive laws accelerate enforcement"
 ita_emigration_improve_italy_tick_tt:0 "Prosperity drive underway"
 ita_emigration_high_sol_tt:0 "High standard of living reduces desire to emigrate"
 ita_emigration_high_literacy_tt:0 "Educated workforce finds opportunity at home"

 # Tooltips
 ita_emigration_path_chosen_tt:0 "A path has been chosen to address emigration"
 ita_emigration_bar_complete_tt:0 "The flight of the people has been arrested — the Kingdom has given them cause enough to remain"

