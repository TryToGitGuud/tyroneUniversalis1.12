 # Stance buttons
 sic_fate_support_absolutist_button:0 "Support the Autocratic Cause"
 sic_fate_support_absolutist_button_desc:0 "Lend the Crown's authority to the great estates and the Church. So long as this course is held, the weight of Landowners and Clergy shall press the balance toward Bourbon reaction — in proportion to the power they command."
 sic_fate_support_nationalist_button:0 "Support the Radical Cause"
 sic_fate_support_nationalist_button_desc:0 "Align the Crown with those who speak of renewal. So long as this course is held, the Intelligentsia and the rising bourgeoisie shall press the balance toward Italian awakening — in proportion to the influence they hold."
 sic_fate_status_noentry:0 "Italy is a dream for poets and agitators. We, however, must govern a kingdom that is not yet ready to be dissolved into such fantasies."

 # Conqueror of Italy (absolutist path)
 sic_conqueror_of_italy:0 "Conqueror of Italy"
 sic_conqueror_of_italy_reason:0 "The peninsula lies fractured by centuries of division, its states propped up by foreign bayonets and exhausted dynasties. Yet from Naples to Milan, from the Alps to Sicily, one truth has emerged through fire and war: Italy can only be united by force of will.\n\nThe absolutist victory has placed that burden upon the Crown. Not as a dream of poets, but as a task of conquest. Every road, every city, every rival flag must bend beneath a single authority — or be erased from history.\n\nWhat begins as legitimacy secured by arms now becomes something greater: the forging of a nation through iron."
 sic_conqueror_of_italy_unlock_tt:0 "Unlocked by the absolutist victory in the entry #gold Fate of the Kingdom#!."
 sic_italian_debuff_conqueror:0 "Italian Nationalist Revolts"

 # Event sic_tyrone.14 – Iron Crown of Italy
 sic_tyrone.14.t:0 "The Iron Crown of Italy"
 sic_tyrone.14.d:0 "The ancient Iron Crown of the Lombards — said to contain a nail from the True Cross — rests once more upon an Italian head. The Kingdom has proven its right to rule this peninsula by force of arms and will. The question now is what manner of conqueror the King shall be."
 sic_tyrone.14.f:0 "The crown does not make the king. What follows does."
 sic_tyrone.14.a:0 "The iron fist. Law and order shall bind Italy together."
 sic_tyrone.14.b:0 "The sword. Let our enemies learn what conquest means."
 sic_tyrone.14.c:0 "The pen. A unified Italy must be an enlightened Italy."

