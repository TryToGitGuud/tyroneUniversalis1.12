 # ── Garibaldi expedition events (1–7) ──
 garibaldi_expedition.1.t:0 "Red Shirts at Quarto"
 garibaldi_expedition.1.d:0 "Word reaches Turin that [SCOPE.sCharacter('garibaldi').GetFullName] has assembled over a thousand volunteers — workers, students, veterans of '48 — in the port of Quarto near Genoa. They wear scarlet shirts and carry worn rifles. Whatever Cavour may privately wish, the nation holds its breath."
 garibaldi_expedition.1.f:0 "History rarely asks permission."
 garibaldi_expedition.1.a:0 "Let events unfold."
 garibaldi_expedition.1.a.tt:0 "The expedition is forming. We can only watch and wait."

 garibaldi_expedition.2.t:0 "The Piemonte and Lombardo Set Sail"
 garibaldi_expedition.2.d:0 "On the night of the 5th of May, two small steamers slip their moorings and head south. [SCOPE.sCharacter('garibaldi').GetFullName] stands at the bow wrapped in his South American poncho, eyes fixed on the dark horizon. Behind him, 1,089 men sing softly. The die is cast."
 garibaldi_expedition.2.f:0 "A thousand hearts beat as one."
 garibaldi_expedition.2.a:0 "May fortune favour the bold."
 garibaldi_expedition.2.char.tt:0 "[SCOPE.sCharacter('garibaldi').GetFullName] sails south — and with him, Italy's destiny."

 garibaldi_expedition.3.t:0 "Landing at Marsala"
 garibaldi_expedition.3.d:0 "The Thousand wade ashore at the sleepy port of Marsala. Two Neapolitan warships arrive minutes too late, their shells splashing harmlessly as the last redshirt vanishes into the town. Local fishermen stare in bewilderment at these wild-eyed liberators led by [SCOPE.sCharacter('garibaldi').GetFullName]."
 garibaldi_expedition.3.f:0 "Sicily smells of salt and sulphur — and now, of revolution."
 garibaldi_expedition.3.a:0 "The foot is on Sicilian soil."
 garibaldi_expedition.3.char.tt:0 "[SCOPE.sCharacter('garibaldi').GetFullName] has landed. The Bourbon garrison is alarmed."

 garibaldi_expedition.4.t:0 "Calatafimi — Bayonets and Will"
 garibaldi_expedition.4.d:0 "Bourbon regulars hold the terraced hillside of Calatafimi. When his aide urges retreat, [SCOPE.sCharacter('garibaldi').GetFullName] answers simply: \"Here we make Italy or we die.\" The redshirts charge uphill three times under withering fire. On the third charge the Neapolitans break. The myth of Bourbon invincibility dies on this hillside."
 garibaldi_expedition.4.f:0 "Nino Bixio wipes blood from his sword and grins."
 garibaldi_expedition.4.a:0 "A legend is being written in blood."
 garibaldi_expedition.4.char.tt:0 "[SCOPE.sCharacter('garibaldi').GetFullName]'s personal courage turns the tide at Calatafimi."

 garibaldi_expedition.5.t:0 "Palermo Rises"
 garibaldi_expedition.5.d:0 "[SCOPE.sCharacter('garibaldi').GetFullName] enters Palermo to scenes of delirious joy. Women throw flowers from balconies; priests ring church bells; even the Bourbon officers in the royal palace seem dumbstruck. The city of a quarter-million souls is his. Dispatches arrive in every European capital: something extraordinary is happening in Sicily."
 garibaldi_expedition.5.f:0 "'And they call this war,' [SCOPE.sCharacter('garibaldi').GetFullName] laughs."
 garibaldi_expedition.5.a:0 "Sicily belongs to Italy now."
 garibaldi_expedition.5.char.tt:0 "[SCOPE.sCharacter('garibaldi').GetFullName] is master of Palermo. All of Sicily will follow."

 garibaldi_expedition.6.t:0 "Across the Strait"
 garibaldi_expedition.6.d:0 "The Strait of Messina is barely three kilometres wide, yet it separates Sicily from the mainland — and [SCOPE.sCharacter('garibaldi').GetFullName]'s dream from its completion. On the night of the 19th of August the redshirts cross in fishing boats, evading the Neapolitan fleet. By dawn they stand on Calabrian soil. The Kingdom of Naples itself now lies open."
 garibaldi_expedition.6.f:0 "Three kilometres of water. An eternity of history."
 garibaldi_expedition.6.a:0 "The mainland awaits."
 garibaldi_expedition.6.char.tt:0 "[SCOPE.sCharacter('garibaldi').GetFullName] sets foot on the peninsula. Naples cannot hold."

 garibaldi_expedition.7.t:0 "Garibaldi Enters Naples"
 garibaldi_expedition.7.d:0 "On the 7th of September 1860, [SCOPE.sCharacter('garibaldi').GetFullName] rides into Naples alone in an open carriage — the Bourbon king having already fled by sea — to the roar of hundreds of thousands. In less than four months, one thousand volunteers have overturned a kingdom of nine million. Now comes the harder question: what to do with the prize? [SCOPE.sCharacter('garibaldi').GetFullName] holds the south in his hands and looks north toward Turin, waiting."
 garibaldi_expedition.7.f:0 "He could be king. He chooses to be a citizen."

 garibaldi_expedition.7.a:0 "Ride south — the royal army will secure what [SCOPE.sCharacter('garibaldi').GetFullName] has won."
 garibaldi_expedition.7.a.unrest.tt:0 "The armies of Piedmont march into the mezzogiorno under the royal banner. Cavour's men arrive with ledgers and decrees where [SCOPE.sCharacter('garibaldi').GetFullName]'s had rifles and songs. The south is taken — but it is not yet won. The peasants who cheered the red shirts stare blankly at the new officials; the brigands sharpen their blades in the hills. This land will not be incorporated quietly — expect significant unrest."
 garibaldi_expedition.7.a.char.tt:0 "[SCOPE.sCharacter('garibaldi').GetFullName] is quietly thanked and set aside."

 garibaldi_expedition.7.b:0 "Let [SCOPE.sCharacter('garibaldi').GetFullName] govern the south — for now."
 garibaldi_expedition.7.b.temp.tt:0 "A pragmatic arrangement. [SCOPE.sCharacter('garibaldi').GetFullName] knows the land, the people, the rhythm of the south in a way that no Piedmontese bureaucrat ever could. Let him govern for now — smooth the ground, quiet the loudest voices — and when the moment is right, Vittorio Emanuele's flag will rise without bloodshed. It is a gamble on [SCOPE.sCharacter('garibaldi').GetFullName]'s loyalty. History suggests it will pay off."
 garibaldi_expedition.7.b.char.tt:0 "[SCOPE.sCharacter('garibaldi').GetFullName] accepts the role of governor — loyally, for now."

 garibaldi_expedition.7.c:0 "Let the general speak. The south shall be a Republic."
 garibaldi_expedition.7.c.republic.tt:0 "From the balcony of the royal palace of Naples, [SCOPE.sCharacter('garibaldi').GetFullName] raises his hand and the crowd falls silent. When he speaks the word \"Repubblica\" the silence breaks into a roar that echoes across the bay. Mazzini weeps somewhere in exile. Cavour goes white. Austria smiles. [SCOPE.sCharacter('garibaldi').GetFullName] will proclaim a Republic in the south, breaking with Turin entirely — expect a grave diplomatic and military crisis. The Risorgimento has fractured. What comes next is uncharted territory."
 garibaldi_expedition.7.c.char.tt:0 "[SCOPE.sCharacter('garibaldi').GetFullName] stands on the palace balcony and speaks the word: Repubblica."

 # ── Garibaldi expedition 8: South unrest (follow-up to 7.a — royal army secures south) ──
 garibaldi_expedition.8.t:0 "Unrest in the Mezzogiorno"
 garibaldi_expedition.8.d:0 "The royal army has taken the south, but the land is not won. In Sicily and Naples, in the provinces that cheered the red shirts, the peasants and townsfolk who hoped for a republic or at least a voice now stare at Piedmontese officials and royal decrees. Resentment simmers; the south will not be quiet."
 garibaldi_expedition.8.f:0 "Ledgers and bayonets do not make loyalty."
 garibaldi_expedition.8.a:0 "We shall govern nonetheless."

