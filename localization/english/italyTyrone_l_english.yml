italy_LV_federationItaly:0 "The Italian Federation"
italy_LV_federationItaly_reason:0 "The path to a united Italy need not be swift nor violent. The peninsula remains divided among proud states, Piedmont, Tuscany, Rome, Naples, and others, each guarding its own traditions and authority.\n\nYet a gradual federation may bind these lands into a single political framework, preserving local autonomy while drawing them ever closer under a shared Italian state. In time, such a union may prove the foundation for full national integration."
italyFederalized_tt:0 "At least 3 Italian states have been federated"
italy_LV_federationItaly_desc_tt:0 "Bind the Italian states into a shared bond, paving the way toward a single Italian nation"
italy_LV_itafed_piedmont_button:0 "Establish Autonomous Zone of Piedmont"
italy_LV_itafed_piedmont_button_desc:0 "Declare Piedmont as an autonomous zone within the Federation of the Po, with its own administrative authority."
italy_LV_itafed_rome_button:0 "Establish Autonomous Zone of Rome"
italy_LV_itafed_rome_button_desc:0 "Declare Rome as an autonomous zone under the federal framework, recognizing its unique political status."
italy_LV_itafed_tuscany_button:0 "Establish Autonomous Zone of Tuscany"
italy_LV_itafed_tuscany_button_desc:0 "Declare Tuscany as an autonomous zone within the federation, preserving its regional governance."
italy_LV_itafed_sardinia_button:0 "Establish Autonomous Zone of Sardinia"
italy_LV_itafed_sardinia_button_desc:0 "Declare Sardinia as an autonomous zone under federal protection and administration."
italy_LV_itafed_sicily_button:0 "Invite the Kingdom of the Two Sicilies"
italy_LV_itafed_sicily_button_desc:0 "Invite the Kingdom of the Two Sicilies to join the Federation of the Po as an autonomous zone, preserving its internal structure under federal authority."
italy_LV_itafed_naples_button:0 "Divide the Southern Administration"
italy_LV_itafed_naples_button_desc:0 "Reorganize the Kingdom of the Two Sicilies into two separate autonomous zones: Naples and Sicily, each with its own local administration under the federation."
italy_LV_centralizedItaly:0 "Centralized Unification"
italy_LV_centralizedItaly_reason:0 "A swift path to Italian unity demands decisive action. Rather than gradual cooperation, the peninsula may be brought together through direct central authority.\n\nSuch a course promises speed, but risks instability, resistance, and the strain of forcing diverse states into a single structure before they are ready."
italy_LV_centralizedItaly_desc_tt:0 "Italy, divided since the fall of Rome, must be united once more under a single authority"
italy_LV_itacentr_sicily_button:0 "Centralize the Two Sicilies"
italy_LV_itacentr_sicily_button_desc:0 "Integrate the Kingdom of the Two Sicilies into the Federation of the Po as a centralized federal territory under direct administration."

italy_LV_itacentr_sway_sicily_button:0 "Strengthen Relations with the Two Sicilies"
italy_LV_itacentr_sway_sicily_button_desc:0 "Improve diplomatic relations with the Kingdom of the Two Sicilies to facilitate future integration into the federation."

