 ita_garibaldi_prepare_expedition_button_desc:0 "Set Garibaldi’s expedition in motion, committing the strength of our fleet and army to the southern venture."
 ita_garibaldi_prepare_expedition_navy_tt:0 "Our navy must vastly outmatch that of the Two Sicilies. (2x)"
 ita_garibaldi_prepare_expedition_army_tt:0 "Our army must decisively outnumber the forces of the Two Sicilies (2x)"
