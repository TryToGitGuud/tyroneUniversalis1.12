 # sic_dismantle_latifundia JE
 sic_dismantle_latifundia:0 "The Dismantling of the Latifundia"
 sic_dismantle_latifundia_reason:0 "For generations, the great estates have defined the [concept_homeland] of [ROOT.GetCountry.GetName]. Yet what was once the foundation of [concept_prestige] and stability is now accused of suffocating progress.\n\nNew [concept_technology|pl] of cultivation spread across Europe, demanding precision, fertility, and modern organisation. The old order of vast, underworked estates stands increasingly incompatible with the demands of the [concept_world_market].\n\nIt is said within the court of [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] that no true transformation can begin while these structures remain intact."
 sic_dismantle_latifundia_status_desc:0 "Unlocked in the #gold Reform the Latifunda#! journal entry."
 sic_dismantle_latifundia_active_status_desc:0 "The great estates must be broken. As modern cultivation spreads across the southern lands, the Kingdom draws closer to a true agricultural transformation."
 sic_dismantle_latifundia_all_fertilized_tt:0 "Scientific methods of cultivation have been adopted throughout the Kingdom’s agricultural lands"
 sic_dismantle_latifundia_bar_progress_tt:0 "#gold Reform the Latifundia#!: #green +25 progress#!"

 # Event sic_tyrone.3 – Export Boom
 sic_tyrone.3.t:0 "The Surge of Foreign Demand"
 sic_tyrone.3.d:0 "News arrives from across the seas: merchants speak of unprecedented demand for the Kingdom’s agricultural goods.\n\nThe ports of Naples and Palermo grow busier with each passing season, and wealth begins to flow into the realm. Yet with this prosperity comes a new dependency upon foreign markets, whose appetites may shift without warning.\n\nAt court, the landowners press for measures to shield domestic prices, while the merchant class argues for open ports and unfettered trade. What appears as fortune may yet become vulnerability."
 sic_tyrone.3.f:0 "Fortune favours the open hand — yet fortune, it is said, can also be fickle."
 sic_tyrone.3.a:0 "Let us protect the homeland — stability before profit."
 sic_tyrone.3.b:0 "Throw open the ports — let trade carry the Kingdom forward."

 # Event sic_tyrone.4 – Rural Investment Crisis
 sic_tyrone.4.t:0 "The Reckoning of the Countryside"
 sic_tyrone.4.d:0 "Reports reach the court from every province: the rush of agricultural expansion has outpaced the means to sustain it. Roads are rutted beyond use, granaries strain under the weight of harvests they cannot shelter, and the drainage of the lowlands fails where it is most needed.\n\nThe countryside demands investment — yet from whom shall it come? Some argue that only the Crown can act with the speed and authority the crisis demands. Others insist that private enterprise, given proper encouragement, will find its own way to profit.\n\nA field without husbandry is a field on borrowed time."
 sic_tyrone.4.f:0 "The land gives generously to those who tend it. It takes back from those who do not."
 sic_tyrone.4.a:0 "The Crown shall provide — it is the state’s duty to care for its land."
 sic_tyrone.4.b:0 "Let private capital lead — entrepreneurial spirit shall unlock the countryside."

 # Event sic_tyrone.5 – Land Reform Pressure
 sic_tyrone.5.t:0 "The Question of the Estates"
 sic_tyrone.5.d:0 "The great rural estates, long unquestioned pillars of the Kingdom, are now the subject of growing debate.\n\nIn the cities, pamphlets multiply and petitions circulate — the intelligentsia speaks openly of feudal relics strangling the south. Within the administration, calls for reform grow louder and more insistent.\n\nThe Landowners, for their part, present themselves at court with the certainty of men who have never been refused. They demand reaffirmation of the sacred right of property, or they shall withdraw their service from the Crown.\n\nThe countryside stands upon the threshold of transformation — or its refusal."
 sic_tyrone.5.f:0 "Land is not merely property: it is power, and power is not surrendered without a struggle."
 sic_tyrone.5.a:0 "The estates are inviolable, order must be preserved."
 sic_tyrone.5.b:0 "The countryside cries for justice, let reform begin."

 # Event sic_tyrone.6 – Rural Modernization Initiative
 sic_tyrone.6.t:0 "The March of New Methods"
 sic_tyrone.6.d:0 "In several provinces, new techniques of cultivation begin to take root.\n\nA delegation of progressive officials presents their case before the court: iron machinery and rational rotation of crops shall transform the Kingdom’s fields, yielding harvests that the old plough could never achieve. The farms of the north stand as proof, they argue, that the new methods are not merely desirable — they are inevitable.\n\nYet traditional landholders speak of disruption, of labourers cast out and the established order of rural life overthrown. Progress advances only when it is contested at every step."
 sic_tyrone.6.f:0 "The machine does not negotiate. It simply replaces."
 sic_tyrone.6.a:0 "Speed is essential: let machinery advance across the fields without delay."
 sic_tyrone.6.b:0 "Caution above all: the countryside must not be thrown into disorder."

 # Event sic_tyrone.7 – The Question of Slavery
 sic_tyrone.7.t:0 "The Question of Bondage"
 sic_tyrone.7.d:0 "Within the highest circles of society, a grave proposal has been raised.\n\nCertain voices among the landed elite argue that the expansion of agricultural production demands harsher institutions, pointing to systems employed in distant colonies as evidence of their effectiveness. They speak of Cuba, of Brazil, of the American South — and they do not speak of them with shame.\n\nOthers recoil in horror at such suggestions, warning that the Kingdom risks staining its future in pursuit of short-term gain. The intelligentsia is in uproar. It is proclaimed in pamphlets that such a course would make the Kingdom the last refuge of a condemned institution.\n\nThe King is called upon to judge not only the economic wisdom of such a path — but its moral weight upon the realm."
 sic_tyrone.7.f:0 "Some choices, once made, cannot be undone — and history does not forget."
 sic_tyrone.7.a:0 "Authorize it: the necessities of the land demand it."
 sic_tyrone.7.b:0 "Refuse: let the Kingdom not dishonour itself before history."
 sic_tyrone.7.a_slavery_unlock_tt:0 "The path of royal reform is henceforth foreclosed. The institution of the Slave Trade may now be pursued in law."

 # Event sic_tyrone.8 – Economic Ending Choice
 sic_tyrone.8.t:0 "The Shape of the New Kingdom"
 sic_tyrone.8.d:0 "The latifundia are broken. The old agrarian order, long the subject of debate, petition, and struggle, has been brought to its end.\n\nWhat rises in its place will define this Kingdom — or Italy — for the remainder of the century. Within the council chamber, two visions contend. The first speaks of factories and workshops rising from the ruins of the estate system, of a Kingdom that looks northward toward industrial civilisation. The second speaks of mastery over what nature and history have already provided — of making the land and its bounty the engine of commerce and the source of sovereign strength.\n\nThe choice is irrevocable. Let it be made with the full weight of consequence in mind."
 sic_tyrone.8.f:0 "From the soil all wealth begins. Where it ends is a matter of will."
 sic_tyrone.8.a:0 "Let the factory rise — the future is not in the field."
 sic_tyrone.8.b:0 "The land is our inheritance — let it be our engine."
 sic_tyrone.8.c:0 "The old order shall endure."

 # Event sic_tyrone.10 – Stop Emigration complete
 sic_tyrone.10.t:0 "The Flight of the People Has Ended"
 sic_tyrone.10.d_borders:0 "The borders have been sealed and the movement of the people curtailed by decree. Emigration slows to a trickle — not because the people are content, but because they are constrained. The Kingdom retains its population, though at a price measured in quiet resentment."
 sic_tyrone.10.d_prosperity:0 "The long work of improving the condition of the people has borne its fruit. Those who once packed their belongings for distant shores now find reason enough to remain. The emigrant’s road has lost its appeal — and with it, the threat of a kingdom emptied of its own."
 sic_tyrone.10.f:0 "A nation that cannot hold its people must first ask why they leave."
 sic_tyrone.10.a:0 "The borders are closed. Let them find their future here."
 sic_tyrone.10.b:0 "We gave them reason to stay. That is as it should be."

 # Event sic_tyrone.9 – Modernizer King complete
 sic_tyrone.9.t:0 "The King’s New Role"
 sic_tyrone.9.d:0 "His Majesty presents himself not merely as sovereign, but as guide to the Kingdom’s renewal.\n\nIn a rare address to his ministers, the King acknowledges the transformation that has unfolded — law reformed, institutions reshaped, and progressive voices raised to prominence within the corridors of power. The intelligentsia has found an unexpected ally upon the throne, and the petite bourgeoisie has discovered that its cause is no longer without a champion.\n\nYet the question remains: how far shall this go? To embrace the constitutional path is to bind the Crown to the will of the people. To retrench is to use the reforms as a shield against further demands. Whether this vision can be fully realised depends upon forces far beyond the throne itself."
 sic_tyrone.9.f:0 "Reform that goes only halfway prepares the ground for revolution."
 sic_tyrone.9.a:0 "Embrace it fully — the Kingdom’s future is constitutional."
 sic_tyrone.9.b:0 "Enough has been granted — the prerogative of the Crown is not for sale."

