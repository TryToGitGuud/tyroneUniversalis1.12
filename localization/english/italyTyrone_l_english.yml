italyEventsTyroneLV.7.t:0 "The Future of [ROOT.GetCountry.GetName]"
italyEventsTyroneLV.7.d:0 "[ROOT.GetCountry.GetName] has taken its first step toward unity, binding the northern and central regions into a shared political framework. Yet Italy remains incomplete, with the south still outside its reach.\n\nNow the state must decide whether to continue the gradual path of integration, or move directly toward the full unification of the peninsula under a single authority."
italyEventsTyroneLV.7.f:0 "One path builds unity piece by piece; the other declares it complete."
italyEventsTyroneLV.7.a:0 "#green Continue Federal Integration #!"
ita_path_to_fed_tt:0 "Italy will be unified gradually through the expansion of the federation. #red #bold (Full Integration requires Pan-Nationalism) #!#!"
