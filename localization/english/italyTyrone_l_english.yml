italy_developing_industry_reason:1 "Each year North and South [Concept('concept_gdp', '$concept_gdp_short$')] must grow by at least #v 8%#!. \n- Meeting the target #g adds#! #v 1#! development.\n\n#bold North#! (Piedmont, Romagna, Lombardy, Venetia)\nStarting [Concept('concept_gdp', '$concept_gdp_short$')]: @gdp!#variable [JournalEntry.GetCountry.MakeScope.Var('north_gdp_ita_var').GetValue|K]#!\nObjective [Concept('concept_gdp', '$concept_gdp_short$')]: @gdp!#variable [JournalEntry.GetCountry.MakeScope.Var('north_gdp_objective_ita_var').GetValue|K]#!\n\n#bold South#! (Sardinia, Sicily, Calabria, Campania, Apulia, Abruzzo)\nStarting [Concept('concept_gdp', '$concept_gdp_short$')]: @gdp!#variable [JournalEntry.GetCountry.MakeScope.Var('south_gdp_ita_var').GetValue|K]#!\nObjective [Concept('concept_gdp', '$concept_gdp_short$')]: @gdp!#variable [JournalEntry.GetCountry.MakeScope.Var('south_gdp_objective_ita_var').GetValue|K]#! \n\nEach year, Italy distributes up to 5 development points across North, South, and the Padana plain. If North and South receive equal points, #b both#! gain #green #b +1 development#!#!. \n#white #b If development funds are not distributed equally the difference is gonna add up to the overinvested area and subtracted from the neglected one.#!#! \n \n#yellow #b Development funds give 6% to 30% construction speed bonus up to the investment size \nBased on the development already done other bonuses are applied!#!#! \n\nDevelopment is capped: North/South −20 to +20, Padana 0 to 50.\nAt the Timeout of the entry permanent rewards on the states will be given! \n#green #b At the end of the entry having 10+ development in the South will remove the state trait. #!#! \n\n#red #b Funds to assign are given yearly based on an event!#!#!"
