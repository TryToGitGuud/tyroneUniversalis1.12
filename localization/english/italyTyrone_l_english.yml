 # ========== Garibaldi's Thousand Expedition ==========
 ita_garibaldi_thousand_expedition_JE:0 "Garibaldi's Thousand Expedition"
 ita_garibaldi_thousand_expedition_JE_reason:0 "Giuseppe Garibaldi has gathered a band of volunteers, ready to sail south and ignite revolution in the Kingdom of the Two Sicilies. Though few in number, their cause carries the hopes of the nation. If supported, this daring expedition may succeed where armies have failed, bringing the south into the fold of a united Italy."
