 # ========== Slavery Path JE ==========
 sic_slavery_path:0 "The Slaveholders Pact"
 sic_slavery_path_reason:0 "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] has bound the Crown to the will of the great landowners. The choice has been made — coerced [concept_pop|pl] shall provide the labour that sustains the Kingdom's agricultural order. What follows is the formal consecration of that choice in [concept_law].\n\nThe leader of the @landowners! #gold Landowners#! stands ready to see it done."
 sic_slavery_path_pending_desc:0 "The pact demands fulfilment. The institution of the Slave Trade must be enshrined in law. Should the Kingdom turn instead toward abolition, the compact is broken and the path is lost."
 sic_slavery_path_enacted_desc:0 "The law has spoken. The Kingdom has bound itself to this course, and the consequences — in blood and treasure — shall be its inheritance."
 law_sic_slave_trade:0 "The Controlled Bondage Regime"
 law_sic_slave_trade_desc:0 "The Crown has formalised a regulated institution of coerced labour. Through decree and administrative authority, the most extreme agitation is suppressed — yet the cost falls upon the fertility of the land and the lives of those who till it. This is not liberty. It is control."
 law_sic_serfdom:0 "Bonded Peasantry"
 law_sic_serfdom_desc:0 "The peasantry is legally bound to the land and subject to the authority of hereditary landowners. Mobility is heavily restricted, preserving a rigid agrarian hierarchy at the expense of personal freedom and economic development."
 sic_slavery_path_noentry_desc:0 "Unlocked in the #gold Reform the Latifunda#! journal entry."
 sic_slavery_system_je:0 "The System of Rural Bondage"
 sic_slavery_system_je_reason:0 "Serfdom and slavery uphold a rigid agrarian order in which vast estates dominate rural life. The entire system depends on these institutions, and without them the structure of the southern countryside would collapse."
 # ========== Reform the Latifundia JE chain ==========

 # sic_latifundia_reform JE
 sic_latifundia_reform:0 "Reform of the Latifundia"
 sic_latifundia_reform_reason:0 "The lands of [ROOT.GetCountry.GetName] are vast, yet their promise remains unfulfilled.\n\nAcross the southern estates, ancient structures of ownership endure, binding the soil to tradition and limiting the fruit of the harvest. Yet demand on the [concept_world_market] grows ever greater, and foreign nations speak increasingly of the Kingdom's [concept_prestige] and untapped potential.\n\nWithin the court of [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName], voices among the [concept_interest_group|pl] now rise in disagreement. Some claim that the strength of the realm lies in preservation of the old [concept_law]s, while others insist that only transformation and access to new [concept_technology] can secure its future.\n\nThe question is no longer whether change is desirable — but whether it can be avoided."
