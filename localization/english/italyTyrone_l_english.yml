 ita_conqueror_of_italy_military:0 "Conqueror of Italy"
 ita_conqueror_of_italy_military_desc:0 "Italy was not unified through debate, but through discipline and fire. This ruler’s legacy is carved into the battlefield, where divided armies were forged into a single instrument of war. The peninsula remembers them as the hand that made Italy one — and made it obey."
 ita_conqueror_of_italy_authority:0 "Conqueror of Italy"
 ita_conqueror_of_italy_authority_desc:0 "The unity of Italy was not only imposed by the sword, but sustained by the weight of the state itself. Through decree, administration, and unyielding authority, this ruler shaped a nation that bends easily to will, and resists fracture through the strength of its institutions."
 ita_conqueror_of_italy_innovation:0 "Conqueror of Italy"
 ita_conqueror_of_italy_innovation_desc:0 "Italy was unified not only as a realm, but as a project. Under this ruler, universities expanded, knowledge spread, and the machinery of progress accelerated. Their conquest did not end with borders — it continued into the structure of the nation itself."

 # sic_bourbon_monarchy_main
 sic_bourbon_monarchy_main:0 "The Restoration of #gold Bourbon#! Authority"
 sic_bourbon_monarchy_main_reason:0 "The Bourbon crown endures, but the kingdom it rules is in decay. [concept_turmoil] festers in the provinces, the [concept_treasury] runs thin, and the [concept_institution|pl] of the state creak under the weight of neglect.\n\nThe State of [ROOT.GetCountry.GetName] must be modernized for the Bourbons to endure: \n\n• [SCOPE.GetRootScope.GetCountry.GetCustom('sic_fix_police_checkbox')] Pacify the interior and reform the police forces\n• [SCOPE.GetRootScope.GetCountry.GetCustom('sic_fix_constitution_checkbox')] Grant a constitution and limit absolutism\n• [SCOPE.GetRootScope.GetCountry.GetCustom('sic_fix_economy_checkbox')] Industrialize the economy\n• [SCOPE.GetRootScope.GetCountry.GetCustom('sic_fix_bureaucracy_checkbox')] Deal with corruption and professionalize the bureaucracy\n\nThe kingdom is weakened by [concept_turmoil] in many forms, from brigands in Calabria to secret societies in Palermo, and a [concept_bureaucracy] burdened by corruption and inefficiency that limits the reach of [concept_authority] beyond the major towns. The [concept_legitimacy] of the dynasty rests more on tradition than confidence, and the [concept_lower_strata] endure because they have few alternatives.\n\nThe great powers observe the situation with interest. His Majesty [ROOT.GetCountry.GetRuler.GetFullName] must decide whether to shape these reforms or allow events in the streets to decide for him.\n\nShould #gold Bourbon Legittimacy#! fall low enough, crisis will unfold in stages:\n• #bold Whispers in the Barracks#! at 60 #gold Bourbon Legittimacy#!\n• #bold The Sicilian Spark#! at 50 #gold Bourbon Legittimacy#!\n• #bold The Red Shirts Gather#! at 40 #gold Bourbon Legittimacy#!\n• #bold The Court in Panic#! at 30 #gold Bourbon Legittimacy#!\n• #red #bold Garibaldi's Coup#!#! at 20 #gold Bourbon Legittimacy#!"
 sic_bourbon_fail_tt:0 "The Progress Bar has reached #bold 0%#!"
 sic_bourbongaribaldi_fail_tt:0 "Garibaldi has enstablished the Republic"

 sic_checkbox_unticked:0 "@simple_box!"
 sic_checkbox_ticked:0 "@green_checkmark_box!"

