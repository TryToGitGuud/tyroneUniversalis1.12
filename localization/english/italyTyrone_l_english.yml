italy_LV_federationPo_PAPenvoy_button_desc:0 "Improve relations and encourage cooperation with the Papal States in the federal project."
italy_LV_federationPo_PAPinvestment_button:0 "Invest in [SCOPE.sCountry('papal_scope').GetName]"
italy_LV_federationPo_PAPinvestment_button_desc:0 "Provide economic investment to strengthen ties and integrate the Papal economy into the federal sphere."
italy_LV_federationPo_SARenvoy_button:0 "Send Envoy to [SCOPE.sCountry('sarpied_scope').GetName]"
italy_LV_federationPo_SARenvoy_button_desc:0 "Strengthen diplomatic relations with Sardinia-Piedmont to encourage alignment with the federation."
italy_LV_federationPo_SARinvestment_button:0 "Invest in [SCOPE.sCountry('sarpied_scope').GetName]"
italy_LV_federationPo_SARinvestment_button_desc:0 "Support Sardinia-Piedmont’s economy through investment, deepening federal influence."
italy_LV_federationPo_AUSenvoy_button:0 "Send Envoy to [SCOPE.sCountry('austria_scope').GetName]"
