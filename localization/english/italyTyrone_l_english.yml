 # Reformed Agrarian Order law and amendments
 law_sic_agrarian_reform:0 "The Reformed Agrarian Order"
 law_sic_agrarian_reform_desc:0 "The latifundia have been broken and the land reordered. In place of the old estate system, a reformed agrarian order has been enshrined — one that preserves the primacy of the soil while opening the door to the demands of a new age. The character of that order remains to be determined."

 amendment_sic_industrialist:0 "Agrarian-Industrial Pact"
 amendment_sic_industrialist_desc:0 "A constitutional settlement between the old agrarian tradition and the new industrial ambition. The Kingdom looks to both the field and the furnace, and declares that its future shall be forged in both."

 amendment_sic_exporter:0 "Export Agrarian Constitution"
 amendment_sic_exporter_desc:0 "The Kingdom has enshrined its identity as the breadbasket and storehouse of the Mediterranean. The land and its resources are proclaimed the nation's sovereign wealth, to be cultivated and exported without apology."

