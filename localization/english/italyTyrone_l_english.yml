 # sic_modernizer_king JE
 sic_modernizer_king:0 "The Modernizer King"
 sic_modernizer_king_reason:0 "A new vision takes shape within the court of [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName].\n\n[ROOT.GetCountry.GetRuler.GetFirstName], once regarded as the guardian of tradition, is now urged by select advisers to assume a more active role in the transformation of [ROOT.GetCountry.GetName]. Reformists among the [concept_interest_group|pl] speak of renewal, [concept_technology], and [concept_legitimacy], while conservative voices warn that such ideas threaten the very foundations of the Crown.\n\nThe [concept_ruler] himself remains at the centre of this struggle — between the preservation of legacy and the demands of a changing world."
 sic_modernizer_king_bar_name:0 "The March of Reform"
 sic_modernizer_king_bar_desc:0 "The advance of royal-sponsored reform."
 sic_modernizer_king_bar_complete_tt:0 "The King’s programme of reform has reached its fullest expression"
