 ita_italy_exists_complete_tt:0 "Italy has been formed and exists."

 # ========== Invite the Pope to the Italian sphere ==========
 ita_invite_pope_sphere_button:0 "Invite the Pope to the Italian sphere"
 ita_invite_pope_sphere_button_desc:0 "Draw the Papal State into our orbit, placing it under Italian protection. Requires the North Italian Federation to be formed, relations with the Pope above 50, that we lead a power bloc, and a defensive pact with the Pope."

 # ========== Occupy Umbria ==========
 ita_occupy_abruzzi_button:0 "Occupy Umbria"
 ita_occupy_abruzzi_button_desc:0 "As the Pope's authority wanes, we may bring another portion of his lands into the Italian fold."

 # ========== Annex the Pope (war goal + No Papal Recognition) ==========
 ita_annex_pope_war_goal_button:0 "Annex the Papal State"
 ita_annex_pope_war_goal_button_desc:0 "Launch a diplomatic play to annex the Papal State. The Catholic world will condemn the act, weakening the Devout and diminishing the influence of the clergy across our realm."

 # ========== Form Italy ==========
 ita_form_italy_button:0 "Form Italy"
 ita_form_italy_button_desc:0 "Proclaim the Kingdom of Italy. Requires at least 12 Italian states (owned or by subject), and that we own Romagna, Naples, and Piedmont, and either Lombardy or Rome. Fires the Italian Formation event."

 ita_form_italy_garibaldi_button:0 "Form Italy (Garibaldi)"
 ita_form_italy_garibaldi_button_desc:0 "Unite Italy under Garibaldi: transfer him to Sardinia–Piedmont, enact Presidential Republic, and make him head of state. Then fire the Italian Formation event. Available when the Garibaldi republic's leader has the Garibaldi republican trait."
 ita_form_garibaldi_tension_tt:0 "At least 90 Italian sentiment"
 italyEventsTyrone.16.t:0 "The Birth of Italy"
 italyEventsTyrone.16.d:0 "From the Alps to Sicily, the dream long whispered by patriots and poets alike now stands fulfilled. The scattered states of the peninsula gather beneath a single banner, and Italy rises at last among the nations of Europe. The Risorgimento is complete—but the future of this newborn kingdom remains unwritten."
 italyEventsTyrone.16.f:0 "Italy is made. Now it must be forged."
 italyEventsTyrone.16.economy:0 "Strengthen the foundations of our economy"
 italyEventsTyrone.16.army:0 "Forge a mighty army"
 italyEventsTyrone.16.technology:0 "Pursue the frontiers of science"

 italyEventsTyrone.17.t:0 "Garibaldi at the Helm"
 italyEventsTyrone.17.d:0 "With the peninsula united and the republic proclaimed, the hero of the Thousand steps forward. Garibaldi accepts the call to lead the new Italy—first citizen no longer of a southern republic, but of the nation entire. The question remains: as what shall he lead?"
 italyEventsTyrone.17.f:0 "He could have been king. He chooses to serve."
 italyEventsTyrone.17.a:0 "An unlikely monarch?"
 italyEventsTyrone.17.b:0 "Garibaldi should take his time stabilizing the Repubblica Italiana."
 italyEventsTyrone.17.c:0 "The first term served by the man of the people."

 bella_italia_economy:0 "Bella Italia"
 bella_italia_army:0 "Bella Italia"
 bella_italia_tech:0 "Bella Italia"

 italia_asburgica_economy:0 "Italia Asburgica"
 italia_asburgica_economy_desc:0 "Birth rate +5%, Clergymen and Shopkeepers investment pool efficiency +15%."
 italia_asburgica_army:0 "Italia Asburgica (Army)"
 italia_asburgica_army_desc:0 "Birth rate +5%, Home offense and defense +10%, Training rate +10%."
 italia_asburgica_tech:0 "Italia Asburgica"
 italia_asburgica_tech_desc:0 "Birth rate +5%, Production and Society tech spread +25%, University throughput +20%."

 italia_napoleonica_economy:0 "Italia Napoleonica"
 italia_napoleonica_economy_desc:0 "Birth rate +5%, Capitalists investment pool efficiency +15%."
 italia_napoleonica_army:0 "Italia Napoleonica"
 italia_napoleonica_army_desc:0 "Birth rate +5%, Home offense +20%, Training rate +10%."
 italia_napoleonica_tech:0 "Italia Napoleonica"
 italia_napoleonica_tech_desc:0 "Birth rate +5%, Production tech spread +35%, University throughput +30%."

 ita_formation_italy_exists_tt:0 "Italy already exists."

 Spenna_la_gallina_austriaca:0 "Spenna la gallina austriaca"
 Spenna_la_gallina_austriaca_reason:0 "Austria stands as the greatest obstacle to Italian unity, its grip over the northern provinces a constant reminder of foreign domination. Some argue for patience and diplomacy, while others call for decisive action. If Italy is to be truly united, the Austrian presence must be confronted sooner or later."
 Spenna_la_gallina_austriaca_status_austria_owns:0 "Italian land is under foreign occupation!"
 Spenna_la_gallina_austriaca_status_escape:0 "Lombardy and Venetia are no longer held by Austria."
 ita_spenna_gallina_not_italy_tt:0 "We must be Italy."
 spenna_gallina_offense:0 "Push away the Foreign Invader"

 # ========== No Papal Recognition event ==========
 italyEventsTyrone.15.t:0 "No Papal Recognition"
 italyEventsTyrone.15.d:0 "By moving to annex the Holy See, we have drawn the condemnation of Catholics at home and abroad. The Church refuses to recognise our authority; the Devout are crippled, clergymen lose their voice in the polity, and families turn from the cradle. This burden shall endure."
 italyEventsTyrone.15.a:0 "So be it."

 no_papal_recognition:0 "No Papal Recognition"

 # ========== Request Italian Recognition (Papal concessions JE) ==========
 ita_request_italian_recognition_button:0 "Request Italian Recognition"
 ita_request_italian_recognition_button_desc:0 "Ask the Pope to recognise our Italian state. Requires the Papal State to exist and that we own Abruzzi and Rome (Lazio). Opens a negotiation in which we must grant three concessions from four options."

 Pap_recognition_for_italy:0 "Papal Recognition for Italy"
 Pap_recognition_for_italy_reason:0 "We are treating with the Holy See for recognition of our Italian state."

 ita_pap_rec_concession_1_button:0 "Concession: Clergy in the distribution of power"
 ita_pap_rec_concession_1_button_desc:0 "Grant the Church a greater say in the distribution of power: increase clergymen voting power and Devout political strength. Lasts 10 years."

 ita_pap_rec_concession_2_button:0 "Concession: Tax cuts for the clergy"
 ita_pap_rec_concession_2_button_desc:0 "Exempt the clergy from part of their contribution to the investment pool (-25% clergymen investment pool contribution in all states). Lasts 10 years."

 ita_pap_rec_concession_3_button:0 "Concession: Papal subsidies"
 ita_pap_rec_concession_3_button_desc:0 "Pay a weekly subsidy to the Holy See (7,500 in expenses). Lasts 10 years."

 ita_pap_rec_concession_4_button:0 "Concession: State religion and church authority"
 ita_pap_rec_concession_4_button_desc:0 "If we do not have State Religion, adopt it; then add an amendment to the current Church and State law that reduces Authority by 10%. The amendment can be repealed like other law amendments."

 papal_recognition_concession_clergy_power:0 "Papal Concession: Clergy Power"
 papal_recognition_concession_clergy_power_desc:0 "Clergymen voting power and Devout political strength increased for the Pope's recognition."
 papal_recognition_concession_clergy_tax_cuts:0 "Papal Concession: Clergy Tax Cuts"
 papal_recognition_concession_clergy_tax_cuts_desc:0 "Clergymen contribute 25% less to the investment pool in this state."
 papal_recognition_concession_papal_subsidies:0 "Papal Concession: Subsidies"
 papal_recognition_concession_papal_subsidies_desc:0 "Weekly payments to the Holy See."
 papal_recognition_concession_church_authority:0 "Papal Concession: Church Authority"
 papal_recognition_concession_church_authority_desc:0 "Authority reduced by 10% as a concession to the Church."

 amendment_papal_recognition_church_authority:0 "Church Authority"
 amendment_papal_recognition_church_authority_desc:0 "Papal recognition concession."

 # ========== Declare the North Italian Federation ==========
 ita_declare_north_italian_federation_button:0 "Declare the North Italian Federation"
 ita_declare_north_italian_federation_button_desc:0 "Proclaim the North Italian Federation. Requires either relations with the Pope above 50 or ownership of Romagna; ownership of Emilia and Tuscany; and Italian unification sentiment of at least 60."
 ita_declare_north_italian_federation_tension_tt:0 "Italian unification sentiment must be at least 60."
 italyEventsTyrone.12.t:0 "The North Italian Federation"
 italyEventsTyrone.12.d:0 "The hour has come to proclaim the North Italian Federation. Our path depends on our alignment: with Austria we may demand Lombardy and Venetia; with France we shall prepare to strike at Vienna; alone or as a bloc leader, our Italian lands shall flourish."
 italyEventsTyrone.12.f:0 "The cause advances."
 italyEventsTyrone.12.a:0 "Demand Lombardy and Venetia from Austria. (Austrian Bloc)"
 italyEventsTyrone.12.b:0 "Prepare to strike the Austrians. (French Bloc)"
 italyEventsTyrone.12.c:0 "Stand alone—bless our Italian states. (Italian Bloc)"
 italyEventsTyrone.12.a_tt:0 "Only available when in Austria's power bloc."
 italyEventsTyrone.12.b_tt:0 "Only available when in France's power bloc."
 italyEventsTyrone.12.c_tt:0 "Only available when leading a power bloc or when not in Austria's or France's bloc."

 italyEventsTyrone.13.t:0 "Italy Demands Lombardy and Venetia"
 italyEventsTyrone.13.d:0 "Our ally in the Italian cause has proclaimed the North Italian Federation and demands the cession of Lombardy and Venetia—to be incorporated at once. Shall we grant them?"
 italyEventsTyrone.13.f:0 "The fate of the Legations is decided in Vienna."
 italyEventsTyrone.13.a:0 "Accept. Lombardy and Venetia pass to Italy and are incorporated."
 italyEventsTyrone.13.b:0 "Refuse. We will not surrender Austrian Italy."

 # ========== Consolidating the South JE – debuff explanation event ==========
 italyEventsTyrone.14.t:0 "Unrest in the Mezzogiorno"
 italyEventsTyrone.14.d:0 "The annexation of the southern territories has not brought the unity many had hoped for. Across the countryside of the Mezzogiorno, resentment brews among peasants, former soldiers of the old regime, and local elites who view the northern government with suspicion. Bands of brigands roam the hills, attacking officials and disrupting trade, while villages whisper of betrayal and occupation."
 italyEventsTyrone.14.f:0 "To the new authorities in Turin, this is a test of whether unity can truly be imposed upon a divided land — or whether the south will remain restless under its new rulers."
 italyEventsTyrone.14.a:0 "We shall consolidate in time."

 # ========== North Italian Manifesto button (Risorgimento Stage JE) ==========
 ita_north_italian_manifesto_button:0 "Issue Central Italian Manifesto"
 ita_north_italian_manifesto_button_desc:0 "Our influence over the central Italian states has reached a point where they will accept their annexation for the cause of a unified Italy."
 ita_north_italian_manifesto_sentiment_tt:0 "Italian unification sentiment must be at least 30."

 # ========== Talks with the Pope / Italian Concordat (Risorgimento Stage JE) ==========
 ita_talks_with_the_pope_button:0 "Talks with the Pope"
 ita_talks_with_the_pope_button_desc:0 "Open negotiations with the Papal State. With sufficient Italian unification sentiment and the backing of France or Austria, we may secure Umbria and Romagna in exchange for religious concessions."
 ita_talks_with_the_pope_sentiment_tt:0 "Italian unification sentiment must be at least 30."
 ita_italian_concordat_button:0 "Italian Concordat"
 ita_italian_concordat_button_desc:0 "Proclaim an Italian Concordat with the Pope: adopt theocracy and religious laws, annex the Papal State with full incorporation, and align the Crown and the Devout with theocratic principle."
 ita_italian_concordat_sentiment_tt:0 "Italian unification sentiment must be at least 60. The Papal State must hold Umbria and Romagna."

 italyEventsTyrone.9.t:0 "Talks with the Pope"
 italyEventsTyrone.9.d:0 "Through the good offices of our bloc patron, the Holy See agrees to cede Umbria and Romagna to Italy in exchange for guarantees on religion: we shall adopt State Religion, Religious Schools, and Charity Hospitals."
 italyEventsTyrone.9.f:0 "The Pope yields territory for the faith."
 italyEventsTyrone.9.a:0 "Accept. We gain claims on Umbria and Romagna and enact the religious laws."

 italyEventsTyrone.10.t:0 "The Italian Concordat"
 italyEventsTyrone.10.d:0 "The moment has come to unite the Papal State with Italy under a single theocratic compact. We shall adopt Theocracy, State Religion, Religious Schools, and Charity Hospitals; annex the Papal State with full incorporation; and the King and the leader of the Devout shall embrace theocratic ideology."
 italyEventsTyrone.10.f:0 "Rome and Italy, one under God."
 italyEventsTyrone.10.a:0 "Proclaim the Concordat."

 # ========== Annex Romagna only (unincorporated) ==========
 ita_annex_romagna_only_button:0 "Occupy Romagna"
 ita_annex_romagna_only_button_desc:0 "The Pope is losing influence in the theater of Risorgimento, let's seize the chance and occupy Romagna."
 ita_occupy_romagna_umbria_sentiment_penalty_tt:0 "#r Italian unification sentiment -15.#!"
 ita_occupy_abruzzi_button:0 "Occupy Umbria"
 ita_occupy_abruzzi_button_desc:0 "Annex Umbria from the Papal State. Requires owning Romagna and poor relations with the Pope."
 ita_annex_romagna_stance_tt:0 "Diplomatic stance bar must be between 40 and 60 (neutral)."
 italyEventsTyrone.11.t:0 "Romagna Seized"
 italyEventsTyrone.11.d:0 "We have taken Romagna from the Papal State by force of circumstance—neither Paris nor Vienna holds sway, and the Holy See's relations with us have sunk too low to prevent it. The territory is annexed but left unincorporated; unrest in the region will flare."
 italyEventsTyrone.11.f:0 "The Legations fall without the blessing of the great powers."
 italyEventsTyrone.11.a:0 "Romagna is Italian."

 # ========== Journal entry (Italian Diplomatic Stance) ==========
 italy_je_theater_title:0 "The Italian Unification Theater"
 italy_risorgimento_martyr_quote:0 "Ideas grow quickly when watered by the blood of martyrs."

 # ========== Journal entry (Risorgimento Stage) ==========
 italy_risorgimento_stage:0 "Risorgimento Stage"
 italy_risorgimento_stage_reason:0 "#b How to navigate Italian entries: #! \n1. There are many ways to become Italy, examples are: \n- Annexing the Pope with the Concordat \n- Occupying Emilia and Romagna from the Pope \n - Giving concession to the Pope \n The South will always annex with the Garibaldi's Entry.\nNOTE: To gain a lot of Italian Unification Sentiment you can decline republican proposal in either the French or Austrian Laws entry. \n \n2. Later Italian Entries will be mostly blocked by tech and being leader of a bloc. \n#red It's encouraged to create the Italian bloc and be an Independent Power even if the early entries provide ways to join France/Austria blocs! #! \n\n3. One of the two main entries after Italian formation will be the Irredentism, strictly locked behind being a Bloc Leader. \n\n4. The main industrial entry will be available on Steel-Frame and will be complicated to complete fully if not prepared!"
 italy_risorgimento_stage_status_fallback:0 "#variable [JournalEntry.GetCountry.MakeScope.Var('italian_sentiment_var').GetValue|v0]#!: Italian unification remains little more than a distant dream."
 italy_risorgimento_stage_status_25_40:0 "#variable [JournalEntry.GetCountry.MakeScope.Var('italian_sentiment_var').GetValue|v0]#!: The idea of a united Italy is beginning to spread among the people."
 italy_risorgimento_stage_status_40_60:0 "#variable [JournalEntry.GetCountry.MakeScope.Var('italian_sentiment_var').GetValue|v0]#!: The risorgimento has taken hold in the public mind."
 italy_risorgimento_stage_status_60_90:0 "#variable [JournalEntry.GetCountry.MakeScope.Var('italian_sentiment_var').GetValue|v0]#!: The call for Italia Unita grows ever stronger. Viva la Repubblica!"
 italy_risorgimento_countries_capital_italy:0 " #gold #b Popolo d'Italia #!#!"
 italy_diplo_stance:0 "Italian Diplomatic Stance"
