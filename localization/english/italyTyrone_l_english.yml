 bourbon_fix_sluggish_mod_hover_tt:0 "[GetStaticModifier('bourbon_fix_sluggish_mod').GetName|v]\n[GetStaticModifier('bourbon_fix_sluggish_mod').GetDesc]"
 garibaldi_presidency_JE:0 "Garibaldi's Presidency"
 garibaldi_presidency_JE_reason:0 "The general who forged Italy now governs it. So long as the People still rally to his name, [concept_authority] remains in the hands of the man who crossed the straits with a thousand volunteers and toppled a kingdom. Whether the republic he has won can survive the peace is another question entirely."
 sic_bourbon_economy_skip_button:0 "Forgo Economic Reform"
 sic_bourbon_economy_skip_button_desc:0 "Abandon the push to industrialize the South. The Kingdom will be recognized as having addressed its economic obligations, but none of the accompanying reforms or benefits will follow."
 garibaldi_steps_down_button:0 "The General Steps Down"
 garibaldi_steps_down_button_desc:0 "Garibaldi relinquishes the presidency and returns to command of the army. An election will be called to determine his successor."
 garibaldi_steps_down_tt:0 "#gold Garibaldi's Presidency#! ends. Garibaldi returns to the field as a general. An election is called."
 garibaldi_counter_coup:0 "Bourbonic Counter-Coup"

 sic_whispers_barracks_mod:0 "Whispers in the Barracks"
 sic_whispers_barracks_mod_desc:0 "Disaffection spreads through [ROOT.GetCountry.GetAdjectiveNoFormatting] @ig_armed_forces! ranks, sapping discipline and readiness."
 sic_sicilian_spark_mod:0 "The Sicilian Spark"
 sic_sicilian_spark_mod_desc:0 "Unrest in the south has shaken the crown's grip on its own territories, weakening [concept_authority] across the kingdom."
 sic_red_shirts_gather_mod:0 "The Red Shirts Gather"
 sic_red_shirts_gather_mod_desc:0 "Word of Garibaldi's volunteers spreading through the peninsula has begun to erode [ROOT.GetCountry.GetName]'s standing abroad."
 sic_court_in_panic_mod:0 "The Court in Panic"
 sic_court_in_panic_mod_desc:0 "Quarreling ministers and fleeing nobles have brought government to a standstill, slowing every attempt to pass new [concept_law|pl]."

 sic_tyrone.28.t:0 "Whispers in the Barracks"
 sic_tyrone.28.d:0 "#gold \"When soldiers mutter in silence, kingdoms should listen.\"#!\n\nDiscontent stirs quietly among the officers and common soldiers of [ROOT.GetCountry.GetAdjectiveNoFormatting] @ig_armed_forces!. Meagre pay, corrupt superiors, and the growing language of Italian nationhood have given rise to secret circles in barracks and camps alike. Toasts once made to the crown are now offered in hushed voices to liberty and reform.\n\nThe loyalty of the army, long thought unshakable, no longer stands beyond question."
 sic_tyrone.28.f:0 "A bayonet may defend a throne — or turn upon it."
 sic_tyrone.28.a:0 "Root out the troublemakers."
 sic_tyrone.28.b:0 "Let discipline slip — we have bigger concerns."

 sic_tyrone.29.t:0 "The Sicilian Spark"
 sic_tyrone.29.d:0 "#gold \"From the island comes the first flame.\"#!\n\nIn the streets of Palermo and among the rugged hillsides beyond, rebellion has broken out against Bourbon rule. Bells ring in defiance, tax offices are stormed, and royal symbols torn down before cheering crowds. What officials dismissed as local unrest now swells into open insurrection.\n\nTroops are hurried southward, yet each regiment withdrawn from the mainland reveals how fragile the kingdom’s grasp has become."
 sic_tyrone.29.f:0 "Sicily has ever been the tinder of revolutions."
 sic_tyrone.29.a:0 "Send reinforcements at once."
 sic_tyrone.29.b:0 "The island has always been restless — it will pass."

 sic_tyrone.30.t:0 "The Red Shirts Gather"
 sic_tyrone.30.d:0 "#gold \"Across the sea, the sword of Italy is being forged.\"#!\n\nWord reaches the kingdom that #gold Garibaldi#! gathers volunteers abroad: exiles, students, laborers, and veterans of many failed uprisings. They flock beneath the banner of the red shirt, swearing to carry war into the south and liberty into every province.\n\nMeanwhile, smugglers ferry arms through hidden coves, while @intelligentsia! patriots scatter pamphlets and songs through the cities of [ROOT.GetCountry.GetName]. The [concept_political_movement] waits for the signal."
 sic_tyrone.30.f:0 "Every song sung today may become a battle cry tomorrow."
 sic_tyrone.30.a:0 "We are watching."
 sic_tyrone.30.b:0 "A few volunteers abroad are no threat to a kingdom."

 sic_tyrone.31.t:0 "The Court in Panic"
 sic_tyrone.31.d:0 "#gold \"While the streets move, the palace hesitates.\"#!\n\nThe royal government of [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] has fallen into bitter division. Ministers quarrel over reform or repression, generals demand powers they do not trust one another to wield, and nobles quietly dispatch their fortunes abroad.\n\nEach decree is delayed, each order contested, each hour squandered. In the midst of gathering crisis, the authority of [ROOT.GetCountry.GetName] stands without a steady hand to guide it."
 sic_tyrone.31.f:0 "When rulers cannot choose, events choose for them."
 sic_tyrone.31.a:0 "We must act decisively."
 sic_tyrone.31.b:0 "The court has always argued — nothing new here."

 sic_garibaldi_approaching_tt:0 "#bold Garibaldi draws closer.#! Each crisis that goes unanswered brings his moment nearer."
 sic_bourbon_bar_loss_tt:0 "#gold Bourbon Legitimacy#! #r -10#!"

 ita_grande_generale:0 "Il Condottiero della Nazione"
 ita_grande_generale_desc:0 "A commander of rare charisma and daring, this leader inspires volunteers and soldiers alike. His campaigns in Southern Italy have shaken old thrones and carried the banner of national unity across the peninsula." 
 garibaldi_coup:0 "Republica Garibaldina"