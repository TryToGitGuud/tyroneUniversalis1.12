 Italian_Irredentism:0 "Italian Irredentism"
 Italian_Irredentism_desc:0 "The nation stirs. Beyond our borders lie lands that history and blood have marked as ours—terre irredente, unredeemed. The Adriatic must become an Italian lake; the Alps our rampart. Until every land where the tongue of Dante is spoken flies the tricolour, the Risorgimento remains unfinished."
 Italian_Irredentism_main_reason:0 "[ROOT.GetCountry.GetName] has embraced the cause of #b Italia irredenta#!—the unredeemed lands where [ROOT.GetCountry.GetAdjectiveNoFormatting] culture and claims endure. Realizing the objectives below will be scored upon this [concept_journal_entry] successfully #b completing#!.\n\n#b Italian Irredentism objectives:#!\n• [SCOPE.GetRootScope.GetCountry.GetCustom('irredentism_savoy_checkbox')] Own the entire [concept_state_region] of [GetStateRegion('STATE_SAVOY').GetName]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('irredentism_montenegro_albania_checkbox')] Own [GetStateRegion('STATE_MONTENEGRO').GetName] and [GetStateRegion('STATE_ALBANIA').GetName]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('irredentism_trieste_dalmatia_checkbox')] Own [GetStateRegion('STATE_ISTRIA').GetName] and [GetStateRegion('STATE_DALMATIA').GetName]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('irredentism_libya_checkbox')] Own [GetStateRegion('STATE_TRIPOLI').GetName]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('irredentism_crete_cyprus_aegean_checkbox')] Own [GetStateRegion('STATE_CRETE').GetName], [GetStateRegion('STATE_CYPRUS').GetName], and the Aegean islands ([GetStateRegion('STATE_WEST_AEGEAN_ISLANDS').GetName] and [GetStateRegion('STATE_EAST_AEGEAN_ISLANDS').GetName])\n• [SCOPE.GetRootScope.GetCountry.GetCustom('irredentism_egypt_checkbox')] Own [GetStateRegion('STATE_LOWER_EGYPT').GetName], [GetStateRegion('STATE_MIDDLE_EGYPT').GetName], [GetStateRegion('STATE_UPPER_EGYPT').GetName], [GetStateRegion('STATE_MATRUH').GetName], and [GetStateRegion('STATE_EGYPTIAN_DESERT').GetName]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('irredentism_palestine_checkbox')] Own the entire [concept_state_region] of [GetStateRegion('STATE_PALESTINE').GetName]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('irredentism_rank_checkbox')] Be at least the #b 3#!rd [concept_great_power] (currently rank [GetPlayer.MakeScope.ScriptValue('irredentism_rank_current_script')|v0])\n• [SCOPE.GetRootScope.GetCountry.GetCustom('irredentism_units_checkbox')] Have more than [GetPlayer.MakeScope.ScriptValue('irredentism_units_target')|v0] [Concept('concept_battalion','$concept_battalions$')] \n• [SCOPE.GetRootScope.GetCountry.GetCustom('irredentism_tech_checkbox')] Have researched [GetPlayer.MakeScope.ScriptValue('irredentism_tech_target')|v0] [Concept('concept_technology', '$concept_technologies$')] (currently [GetPlayer.MakeScope.ScriptValue('irredentism_tech_current_script')|v0])"
