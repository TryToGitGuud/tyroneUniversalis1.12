 # ========== Treaty buttons (Savoy/Provence, Lombardy) ==========
 ita_treaty_turin_button:0 "Propose Treaty of Turin (Savoy & Provence)"
 ita_treaty_turin_button_desc:0 "Request France cede Savoy and Provence. Only available while in France's power bloc. France may accept or decline."
 ita_lombardy_cession_button:0 "Request Lombardy from Austria"
 ita_lombardy_cession_button_desc:0 "Request Austria cede Lombardy. Only available while in Austria's power bloc. Austria may accept or decline."

 # ========== Treaty events (France / Austria receive) ==========
 italyEventsTyrone.3.t:0 "The Treaty of Turin"
 italyEventsTyrone.3.d:0 "Our ally in the Italian cause requests the cession of Savoy and Provence—the price of their alignment with Paris. Shall we grant these territories and bind them closer to our bloc?"
 italyEventsTyrone.3.f:0 "A diplomatic exchange at the highest level."
 italyEventsTyrone.3.a:0 "Accept. Let Savoy and Provence pass to them."
 italyEventsTyrone.3.b:0 "Decline. We will not surrender French soil."
 italyEventsTyrone.4.t:0 "The Lombardy Question"
 italyEventsTyrone.4.d:0 "Our ally in the Italian cause requests the cession of Lombardy—the rich heart of the peninsula. Shall we grant this territory and bind them closer to Vienna?"
 italyEventsTyrone.4.f:0 "The fate of Lombardy is decided in the chancelleries."
 italyEventsTyrone.4.a:0 "Accept. Lombardy shall pass to them."
 italyEventsTyrone.4.b:0 "Decline. We will not surrender Austrian Italy."

 # ========== Savoy lost – Italian sentiment (monthly pulse) ==========
 italyEventsTyrone.5.t:0 "Savoy Lost to the Cause"
 italyEventsTyrone.5.d:0 "Sardinia no longer holds Savoy—the ancestral heart of the House of Savoy. For those who dream of a united Italy, it is a bitter blow."
 italyEventsTyrone.5.a:0 "#r A betrayal to all Italians.#!"
 italyEventsTyrone.5.a_tt:0 "Italian unification sentiment: #r -10#!"

 # ========== North Italian annexation (PAR, MOD, TUS, LUC) ==========
 italyEventsTyrone.6.t:0 "The North Italian Manifesto"
 italyEventsTyrone.6.d:0 "Parma, Modena, Tuscany, and Lucca are brought into the fold—their territories annexed and incorporated into our state."
 italyEventsTyrone.6.f:0 "The peninsula draws ever closer."
 italyEventsTyrone.6.a:0 "Italy advances."
 italyEventsTyrone.6.a_sentiment_tt:0 "Italian unification sentiment: #r -15#!"
 minus30sentiment_ita_tt:0 "#r Italian unification sentiment: -30#!"

 # ========== Italian Irredentism ==========
 italia_colony_incorporation_irredentism:0 "Irredentism: Incorporation"
 italia_colony_state_bonuses_irredentism:0 "Irredentism: Colony"
 italia_colony_migration_irredentism:0 "Irredentism: Settlement"
 italyEventsTyrone.30.t:0 "Italian Irredentism: Libya Secured"
 italyEventsTyrone.30.d:0 "The Italian tricolour now flies over the shores of Tripoli and the deserts of Libya. What was once an ambition of statesmen and patriots has finally been achieved: Italy has secured its own colony across the Mediterranean. Yet conquest alone does not determine the future of these lands. From Cyrenaica to the vast interior deserts, the question remains unresolved—should Libya be ruled directly from Rome, administered through local authorities, or transformed into a settler colony for Italians? Now that victory is secured, the government must decide how this new possession shall be governed."
 italyEventsTyrone.30.a:0 "This is Italian land for Italians"
 italyEventsTyrone.30.b:0 "Institute a colonial administration for the area"
 italyEventsTyrone.30.c:0 "Settle with the population, this land will be Italian in time"
 italyEventsTyrone.31.t:0 "Italian Irredentism: Egypt Secured"
 italyEventsTyrone.31.d:0 "The Italian tricolour now flies along the Nile. What was once distant ambition has become reality, but conquest alone does not decide the future of these lands. The government must now determine how these new territories shall be governed."
 italyEventsTyrone.31.a:0 "This is Italian land for Italians"
 italyEventsTyrone.31.b:0 "Institute a colonial administration for the area"
 italyEventsTyrone.31.c:0 "Settle with the population, this land will be Italian in time"
 italyEventsTyrone.32.t:0 "Italian Irredentism: Mediterranean Islands Secured"
 italyEventsTyrone.32.d:0 "The Mediterranean islands have fallen under Italian control, securing our presence across the sea. Yet their future remains uncertain, and the government must now decide how these distant possessions will be administered."
 italyEventsTyrone.32.a:0 "This is Italian land for Italians"
 italyEventsTyrone.32.b:0 "Institute a colonial administration for the area"
 italyEventsTyrone.32.c:0 "Settle with the population, this land will be Italian in time"
 italyEventsTyrone.33.t:0 "Italian Irredentism: Holy City Secured"
 italyEventsTyrone.33.d:0 "With Palestine now under Italian authority, the ancient Holy Land has entered a new chapter of its history. The question before the government is no longer one of conquest, but of rule—how shall these lands be governed?"
 italyEventsTyrone.33.a:0 "This is Italian land for Italians"
 italyEventsTyrone.33.b:0 "Institute a colonial administration for the area"
 italyEventsTyrone.33.c:0 "Settle with the population, this land will be Italian in time"
 italyEventsTyrone.34.t:0 "Italian Irredentism: Balkans Secured"
 italyEventsTyrone.34.d:0 "Albania, Montenegro, and Dalmatia now stand under the Italian tricolour. Our influence in the Adriatic has never been greater, yet the future of these territories remains undecided. The government must determine how they are to be administered."
 italyEventsTyrone.34.a:0 "This is Italian land for Italians"
 italyEventsTyrone.34.b:0 "Institute a colonial administration for the area"
 italyEventsTyrone.34.c:0 "Settle with the population, this land will be Italian in time"
 italyEventsTyrone.35.t:0 "Italian Irredentism: Italian Land Secured"
 italyEventsTyrone.35.d:0 "Istria and South Tyrol have been secured, bringing long-contested lands under Italian authority. With the borders redrawn, the government must now decide how these territories shall be governed."
 italyEventsTyrone.35.a:0 "This is Italian land for Italians"
 italyEventsTyrone.35.b:0 "Institute a colonial administration for the area"
 italyEventsTyrone.35.c:0 "Settle with the population, this land will be Italian in time"

