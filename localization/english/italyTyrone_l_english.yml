 bourbon_legitimacy_bar_name:0 "Bourbon Legitimacy"
 bourbon_legitimacy_bar_desc:0 "The [concept_legitimacy] of House of Bourbon"
 bourbon_leg_missing_police_tt:0 "The interior remains lawless and unpoliced."
 bourbon_leg_missing_constitution_tt:0 "No #gold Constitution#! has been granted to temper absolutism."
 bourbon_leg_missing_economy_tt:0 "The #gold Economy#! has not been modernized."
 bourbon_leg_missing_bureaucracy_tt:0 "The [concept_bureaucracy] remains unreformed and corrupt."
 sic_bourbon_bar_progress_tt:0 "Increases #gold Bourbon Legittimacy#! by 25"
 sic_bourbon_monarchy_main_complete_tt:0 "Completed the four Bourbon agendas."

 # sic_tyrone.22-24 — Italian national movement activism events
 sic_tyrone.22.t:0 "Words That Outlive Kings"
 sic_tyrone.22.d:0 "Pamphlets circulate through the alleys of Naples and Palermo, unsigned, cheaply printed, and impossible to fully suppress. They speak of a peninsula, not a collection of thrones, of a people, not a subject.\n\nAs one line attributed to Mazzini spreads among them: #gold \"Dio e il popolo sono una sola cosa quando la nazione si risveglia.\"#!\n\nThe agents of the [concept_authority] seize what they can. The rest reaches the hands it was meant for."
 sic_tyrone.22.f:0 "A scrap of paper is nothing on its own. Yet in the right hands, it becomes more dangerous than any blade or musket. It carries no flag, no uniform, no clear author to punish. Only an idea that refuses to stay confined once it has been read."
 sic_tyrone.22.a:0 "Let them write. Paper burns."
 sic_tyrone.22.b:0 "Seize every copy. Arrest the printers."

 sic_tyrone.23.t:0 "The Piazza Fills"
 sic_tyrone.23.d:0 "A crowd gathers without announcement, workers, students, and a few minor clergy who have forgotten their vows of silence. No banners are raised, no leaders speak, and yet the meaning is unmistakable. The #gold Italian National Movement#! does not need to announce itself.\n\nFrom the words of Manzoni that some whisper in the streets: #gold \"Una d'arme, di lingua, d'altare, di memorie, di sangue e di cor.\"#!"
 sic_tyrone.23.f:0 "At first it is only a handful of voices, then a murmur that spreads across the stones of the square. No one commands it, yet no one resists it either. Even those who came only to watch find themselves standing still, as if the city itself had paused to listen to something it already understood but had never been allowed to say aloud."
 sic_tyrone.23.a:0 "Disperse them. For now."
 sic_tyrone.23.b:0 "Send in the carabinieri."

 sic_tyrone.24.t:0 "The Opera of the Nation"
 sic_tyrone.24.d:0 "A tenor in Palermo inserts a verse no one approved. The audience recognizes it immediately, an old song carried through generations, where every repetition has meant something slightly different under Bourbon [concept_legitimacy].\n\nAs Cavour once wrote, #gold \"L’Italia farà da sé\"#!, and the theatre erupts before the carabinieri outside even understand why. They hear applause, not rebellion. The #gold Italian National Movement#! has found its anthem."
 sic_tyrone.24.f:0 "Music is never just performance in a city like this. Every note carries memory, every chorus a second meaning understood without being spoken. What begins as art becomes something harder to contain, because it is shared instantly by everyone who hears it, and cannot be taken back once it has filled the room."
 sic_tyrone.24.a:0 "A fine performance."
 sic_tyrone.24.b:0 "Close the theatre. Fine the director."

 # sic_tyrone.25 — Garibaldi's Coup
 sic_tyrone.25.t:0 "The Thousand Ascend"
 sic_tyrone.25.d:0 "#gold \"Here we make Italy, or we die.\"#!\n\nAs [concept_turmoil] spreads through [ROOT.GetCountry.GetName], #gold Giuseppe Garibaldi#! lands amidst thunderous acclaim, clad in the red shirt of revolution and followed by loyal volunteers. @ig_armed_forces! Garrisons falter, officials flee, and the people of [SCOPE.sState('capital_scope').GetName] pour into the streets to greet the liberator of the south.\n\nWhat began as rebellion now stands at the gates of power. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] and the old Bourbon order tremble, while @intelligentsia! intellectuals and the [concept_political_movement] proclaim that only decisive action can complete the nation’s destiny. Garibaldi himself is urged to seize the reins of [concept_authority] and forge a new republic built on [concept_legitimacy] in the name of all Italians."
 sic_tyrone.25.f:0 "The sword is drawn for the nation."
 sic_tyrone.25.a:0 "Hail President Garibaldi!"
 sic_tyrone.25.b:0 "The crown shall not fall so easily."

 # modifier loc
 bourbon_monarchy_bur_mod:0 "Unreformed Bureaucracy"
 bourbon_monarchy_bur_mod_desc:0 "The royal [concept_bureaucracy] remains bloated with sinecures and riddled with corruption, sapping [concept_authority] before it reaches the provinces."

 bourbon_monarchy_police_mod:0 "Lawless Interior"
 bourbon_monarchy_police_mod_desc:0 "Without a reformed police force, brigandage and unrest go unchecked across the kingdom, eroding the [concept_prestige] of the crown."

 bourbon_monarchy_constitution_mod:0 "No Constitutional Order"
 bourbon_monarchy_constitution_mod_desc:0 "The absence of a constitution leaves the kingdom without a legal framework the [concept_interest_group|pl] can trust, making every [concept_law] harder to pass and slower to take hold."

 bourbon_monarchy_eco_mod:0 "Stagnant Economy"
 bourbon_monarchy_eco_mod_desc:0 "With no modernization underway, the kingdom's [concept_wealth] stagnates. Capitalists see little reason to invest where the state offers no guarantees and the infrastructure no returns."

 sic_ita_national_activism:0 "Italian National Awakening"
 sic_ita_national_activism_desc:0 "A wave of nationalist sentiment stirs the [concept_political_movement], drawing in new supporters and hardening the resolve of those already committed."

 sic_bourbon_monarchy_bureaucracy:0 "A Modern Royal Administration"
 sic_bourbon_monarchy_police:0 "Restoring Order in the Kingdom"
 sic_bourbon_monarchy_constitution:0 "The Question of Constitutional Reform"
 sic_bourbon_monarchy_economy:0 "Modernizing the Southern Economy"
 sic_bourbon_monarchy_bureaucracy_reason:0 "The machinery of the state no longer serves the crown with the precision it once claimed. Offices are burdened by patronage, records are poorly kept, and authority weakens as it moves away from the capital. A modern administration is required if royal decrees are to carry weight beyond paper."
 sic_bourbon_monarchy_police_reason:0 "Order within the kingdom depends less on law than on local arrangements and improvised authority. Banditry, secret societies, and political agitation stretch the limits of the existing forces. A more capable and permanent police structure is required to restore control."
 sic_bourbon_monarchy_constitution_reason:0 "The political structure of the kingdom rests on absolutist foundations that no longer command universal acceptance. Calls for representation and legal limits on royal authority grow louder among both elites and common citizens. Some form of constitutional settlement may be necessary to stabilize the realm."
 sic_bourbon_monarchy_economy_reason:0 "The economic foundations of the kingdom remain uneven and underdeveloped. Productivity is low in many regions, trade is constrained, and industrial capacity is limited. Without modernization and greater integration into wider markets, long-term stability cannot be secured."
 sic_ita_movement_surge:0 "The Streets Are Alive"
 sic_ita_movement_surge_desc:0 "A surge of nationalist sentiment has swept through the lower classes, swelling the ranks of the #gold Italian National Movement#! with new urgency — but also new [concept_turmoil]."

 sic_tyrone.26.t:0 "The Nation of Italy"
 sic_tyrone.26.d:0 "#gold \"Italy is not yet a nation, but an aspiration shared across divided crowns.\"#!\n\nIn the year 1836, the peninsula remains fractured between competing rulers, foreign influence, and old dynastic claims. In the south, the #gold Kingdom of the Two Sicilies#! governs Naples and Sicily under Bourbon authority, wary of reform and fearful of unrest. Across the north and center, Austrian dominance, papal rule, and minor states preserve a patchwork order resistant to change.\n\nYet beneath this political division, a common sentiment begins to stir. Intellectuals, merchants, soldiers, and laborers speak more openly of language, heritage, and destiny. The #gold Italian National Movement#! is still young, but its voice grows louder with every passing year."
 sic_tyrone.26.f:0 "A people divided may still dream as one."
 sic_tyrone.26.a:0 "Italy awaits its hour."
 sic_tyrone.26.b:0 "The old order still stands."

 sic_tyrone.27.t:0 "The Streets Answer"
 sic_tyrone.27.d:0 "#gold \"What began as a procession has become a cause.\"#!\n\nThe authorities chose restraint, and the crowds have taken heart from it. In Naples, Palermo, and the provincial towns, banners of the #gold Italian National Movement#! now fly above swelling assemblies. Public squares ring with speeches, songs, and cries for a common fatherland.\n\nEach day without repression emboldens the movement further. Citizens who once watched from windows now descend into the streets, while local officials hesitate to challenge numbers they can no longer easily contain."
 sic_tyrone.27.f:0 "Mercy is often mistaken for weakness."
 sic_tyrone.27.a:0 "Their cause gains strength."
 sic_tyrone.27.b:0 "We shall watch carefully."

 ita_stop_emigration_ai_button:0 "Close the Borders"
 ita_stop_emigration_ai_button_desc:0 "Enact closed borders to stem emigration."

 sic_bourbon_offer_census_suffrage_button:0 "Offer Census Suffrage"
 sic_bourbon_offer_census_suffrage_button_desc:0 "Grant [concept_law|pl] that extend voting rights to property-holding citizens, satisfying moderate reformist demands within the kingdom."
 sic_bourbon_offer_right_of_assembly_button:0 "Guarantee Right of Assembly"
 sic_bourbon_offer_right_of_assembly_button_desc:0 "Recognize the right of subjects to organize and petition, giving the kingdom's political factions a legal outlet for dissent."
 sic_ita_movement_suppressed:0 "Radicals Appeased"

 sic_bourbon_legittimacy:0 "Bourbon Legittimacy"
 sic_fate_kingdom_instabourbon_tt:0 "#gold Fate of the Kingdom#!: Max Progress toward Bourbon Absolutism"
 sic_fate_kingdom_instanationalist_tt:0 "#gold Fate of the Kingdom#!: Max Progress toward Italian Nationalists"
