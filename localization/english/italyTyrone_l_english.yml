 # ========== ItalyStatutoAlbertino events ==========
 ItalyStatutoAlbertino.1.t:0 "A Petition for the Vote"
 ItalyStatutoAlbertino.1.d:0 "Liberals and bourgeois circles have presented a petition demanding an expansion of the franchise. They argue that property and education, not birth alone, should open the door to the ballot."
 ItalyStatutoAlbertino.1.f:0 "The salons of Turin and Genoa buzz with talk of representation and the King's charter."
 ItalyStatutoAlbertino.1.a:0 "We shall expand the franchise."
 ItalyStatutoAlbertino.1.b:0 "We will not be dictated to by the mob."

 ItalyStatutoAlbertino_momentum_plus_tt:0 "#green Constitutional tension +1 (toward reform).#!"
 ItalyStatutoAlbertino_autocratic_tt:0 "Constitutional tension -1 (toward autocracy)."
 ItalyStatutoAlbertino_autocratic_3_tt:0 "Constitutional tension -3 (toward autocracy)."
 ItalyStatutoAlbertino_sentiment_tt:0 "#negative_value #r #bold Italian unification sentiment increases.#!#!"
 ItalyStatutoAlbertino_no_sentiment_tt:0 "#positive_value Italian unification sentiment does not increase.#!"

 ItalyStatutoAlbertino.2.t:0 "The Salotto Debate"
 ItalyStatutoAlbertino.2.d:0 "In the salotti of the elite, intellectuals and nobles debate whether the realm should be granted a written constitution—one that limits the Crown and guarantees rights. Their voices are growing harder to ignore."
 ItalyStatutoAlbertino.2.f:0 "Between the King's grace and the people's sovereignty, the salons seek a middle path—but the Crown may yet refuse to bend."
 ItalyStatutoAlbertino.2.a:0 "We will listen to the salons."
 ItalyStatutoAlbertino.2.b:0 "Silence them."

 ItalyStatutoAlbertino.3.t:0 "Carbonari Agitation"
 ItalyStatutoAlbertino.3.d:0 "The Carbonari and other secret societies have stepped up their agitation for a constitution. Pamphlets and whispers speak of the King's charter—or of a republic if the Crown will not yield."
 ItalyStatutoAlbertino.3.f:0 "Repression may fuel the very fires of unification; concession may steal the revolution's thunder."
 ItalyStatutoAlbertino.3.a:0 "Make concessions to avoid upheaval."
 ItalyStatutoAlbertino.3.b:0 "Crush the conspirators."

 ItalyStatutoAlbertino.4.t:0 "Radical Pamphlets"
 ItalyStatutoAlbertino.4.d:0 "Anonymous pamphlets demanding a constitution and the vote are circulating in the cities. The language is incendiary—and the crowds are growing. We can bend to the wind or clamp down hard and push the realm three steps toward the old order."
 ItalyStatutoAlbertino.4.f:0 "Repression will swell the ranks of radicals and patriots alike."
 ItalyStatutoAlbertino.4.a:0 "We will consider reforms."
 ItalyStatutoAlbertino.4.b:0 "Crush the pamphleteers and tighten the reins."

 ItalyStatutoAlbertino.5.t:0 "The Demand for Right of Assembly"
 ItalyStatutoAlbertino.5.d:0 "Liberals and bourgeois clubs demand the Right of Assembly—the law that grants citizens the right to public assembly. We can pass the law now and face the Landowners' fury, or refuse and feed the flames of Italian sentiment."
 ItalyStatutoAlbertino.5.f:0 "The right to assemble is the right to speak; the Crown may grant it or deny it."
 ItalyStatutoAlbertino.5.a:0 "Pass the Right of Assembly law."
 ItalyStatutoAlbertino.5.b:0 "We will not be dictated to."

 ItalyStatutoAlbertino.6.t:0 "Constitutional Ultimatum"
 ItalyStatutoAlbertino.6.d:0 "Constitutionalists have issued an ultimatum: concede to a charter or they will paralyse the legislature. If we refuse, they vow that no law will pass for two years without a popular movement behind it—political deadlock until we bend or they do."
 ItalyStatutoAlbertino.6.f:0 "The chamber may become a theatre of obstruction."
 ItalyStatutoAlbertino.6.a:0 "We will negotiate a constitutional path."
 ItalyStatutoAlbertino.6.b:0 "We reject the ultimatum."

 ItalyStatutoAlbertino.7.t:0 "The Intelligentsia Demand a Voice"
 ItalyStatutoAlbertino.7.d:0 "Writers, lawyers, and academics demand a greater say in the realm's direction—and a written constitution. Granting them influence would strengthen the reform camp but commit us to listening to the salons and the press."
 ItalyStatutoAlbertino.7.f:0 "Pen and parliament: the intelligentsia seek both."
 ItalyStatutoAlbertino.7.a:0 "Expand the influence of the Intelligentsia."
 ItalyStatutoAlbertino.7.b:0 "The Crown does not take orders from men of letters."

 ItalyStatutoAlbertino.8.t:0 "Peasant Concessions"
 ItalyStatutoAlbertino.8.d:0 "Peasants across the countryside demand relief from burdensome obligations and greater protection from local authorities. Granting concessions may calm the countryside and ease the pressure on the state—but it risks emboldening further demands in these uncertain times."
 ItalyStatutoAlbertino.8.f:0 "As constitutional tensions rise within the Kingdom of Sardinia, unrest among the rural population grows harder to ignore."
 ItalyStatutoAlbertino.8.a:0 "Allow the press to discuss reform."
 ItalyStatutoAlbertino.8.b:0 "Tighten censorship."

 ItalyStatutoAlbertino.9.t:0 "Church and Constitution"
 ItalyStatutoAlbertino.9.d:0 "The Church and the devout oppose a constitution that would limit its privileges and separate law from dogma. Constitutionalists demand the realm curb clerical influence. To side with the Church is to turn our back on reform—and to fuel Italian sentiment among those who see Rome as the enemy of a free Italy."
 ItalyStatutoAlbertino.9.f:0 "God and the people—or the Crown and the altar?"
 ItalyStatutoAlbertino.9.a:0 "Curb clerical influence and advance the constitution."
 ItalyStatutoAlbertino.9.b:0 "Side with the Church."

 ItalyStatutoAlbertino.10.t:0 "Vienna Watches the Charter"
 ItalyStatutoAlbertino.10.d:0 "Austria watches every step toward a constitution in Piedmont with suspicion. A charter would signal defiance and strengthen the Italian cause. We can defy Vienna and push ahead with reform—relations will suffer—or appease Austria and step back, at the cost of Italian unification sentiment."
 ItalyStatutoAlbertino.10.f:0 "What Vienna allows today may decide what Italy becomes tomorrow."
 ItalyStatutoAlbertino.10.a:0 "Defy Vienna and advance the constitution."
 ItalyStatutoAlbertino.10.b:0 "Appease Austria."

