 italyEventsTyrone.1.d:0 "Each year the government must determine how much capital to direct toward the development of the Italian economy. Funds can be distributed between the industrial regions of the North, the struggling provinces of the South, and the fertile plains of the Po Valley. The scale of this year's investment will determine how much influence the state can exert over the direction of national development."
 italyEventsTyrone.1.f:0 "Ministers, economists, and industrialists gather to argue over priorities. Some call for heavy investment to accelerate industrial growth, while others warn of the mounting costs such policies impose upon the treasury."
