 # ========== sic_tyrone.21 – Ruler of Italy bonus selection ==========
 sic_tyrone.21.t:0 "The Shape of United Italy"
 sic_tyrone.21.d:0 "Italy stands united under one banner at last. The long struggle is over, but the work of building a nation has only just begun. The decisions made now will define the character of this new state for a generation."
 sic_tyrone.21.f:0 "A moment of founding — and of growth."
 sic_tyrone.21.a:0 "The Birth of Italy"
 sic_tyrone.21.b:0 "Towards the Future"
 sic_tyrone.21.c:0 "United Against Foreign Rule"
 sic_tyrone.21.e:0 "The Construction of Italy"

 # ========== sic_tyrone.21 modifier names ==========
 sic_united_tradition:0 "United in Tradition"
 sic_united_tradition_desc:0 "A unified Italy rooted in shared heritage. The new state draws strength from its traditions, rewarding loyalty and natural growth."
 sic_towards_future:0 "Towards the Future"
 sic_towards_future_desc:0 "The new Italy looks to science, education, and innovation as the pillars of national greatness."
 sic_united_invader:0 "United Against Foreign Rule"
 sic_united_invader_desc:0 "The struggle for Italian lands is not yet over. A strong and vigilant military stands ready."
 sic_construction_italy:0 "The Construction of Italy"
 sic_construction_italy_desc:0 "A nation built in stone and iron. The infrastructure of the new Italy must match its ambitions."

 # ========== Metternich System JE ==========
