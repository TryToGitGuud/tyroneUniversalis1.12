italy_LV_federationPo_monarchy_button_desc:0 "Establish the Federation of the Po under a unified monarchy, consolidating authority while preserving its federal structure."
italy_LV_federationPo_republic_button:0 "#yellow Federal Republic #!"
italy_LV_federationPo_republic_button_desc:0 "Establish the Federation of the Po as a republican union of states, bound by shared institutions and governance."
