 # ========== Event 1 – Mazzini ==========
 italy_tyrone_characters.1.t:0 "Giuseppe Mazzini"
 italy_tyrone_characters.1.d:0 "The exiled Genoese has made his presence known—his name feared by princes and whispered by those who dream of a united Italy."
 italy_tyrone_characters.1.f:0 "Through the pen and the cause, through Young Italy and the networks of the carbonari, he preaches a nation not of kings but of citizens: one republic, one people, from the Alps to Sicily. The risorgimento has not yet broken into open revolt, but the idea has taken root. The hour may come."
 italy_tyrone_characters.1.a:0 "Italy is not a geographical expression, but a nation."

 # ========== Event 2 – Cavour & journal entry ==========
 italy_tyrone_characters.2.t:0 "Cavour and the Crown"
 italy_tyrone_characters.2.d:0 "Count Camillo di Cavour, a young liberal noble with a taste for reform and for the ways of Paris and London, has stepped into the political scene."
 italy_tyrone_characters.2.f:0 "Between throne and parliament he seeks a middle way: progress without revolution, unity through trade and railways and the ballot, not the barricade. With the King's favour, he could become the voice that steers Piedmont—and perhaps one day a greater Italy—toward the modern world."
 italy_tyrone_characters.2.a:0 "The great art of politics consists in understanding the times and in taking advantage of them."

 # ========== Industrialists push for Laissez-Faire ==========
 italyEventsTyrone.7.t:0 "The Industrialists Demand Laissez-Faire"
 italyEventsTyrone.7.d:0 "With no reform currently before the legislature, the Industrialists have seized the moment. Their representatives press for a shift to Laissez-Faire economic policy—less state meddling, they argue, and more room for enterprise to flourish."
 italyEventsTyrone.7.f:0 "“By pursuing his own interest he frequently promotes that of the society more effectually than when he really intends to promote it.” \n\n      - Adam Smith"
 italyEventsTyrone.7.a:0 "We shall put Laissez-Faire on the agenda."
 italyEventsTyrone.7.b:0 "We will not be dictated to by the captains of industry."

 # ========== Laissez-Faire enactment – shape the law ==========
 italyEventsTyrone.8.t:0 "Shaping Laissez-Faire"
 italyEventsTyrone.8.d:0 "As Laissez-Faire moves through the legislature, the question of who shall hold the reins of investment is in the air. The Industrialists press for greater control; others urge a measured hand or a share for the state."
 italyEventsTyrone.8.f:0 "Markets and ministries alike watch how the law will be written."
 italyEventsTyrone.8.a:0 "Give more power to the Industrialists."
 italyEventsTyrone.8.a_tt:0 "Add the Corporate Control amendment to the enacting law."
 italyEventsTyrone.8.b:0 "Keep partial control of investments."
 italyEventsTyrone.8.b_tt:0 "No amendment; the current law receives -20% stall chance."
 italyEventsTyrone.8.c:0 "Seize part of the investment for the country."
 italyEventsTyrone.8.c_tt:0 "+50 Construction for 4 years, -10% Capitalist Investment Pool efficiency for 4 years."

