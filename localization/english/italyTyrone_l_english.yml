 # Event sic_tyrone.11 – Latifundia Reform complete
 sic_tyrone.11.t:0 "The Estates Yield"
 sic_tyrone.11.d:0 "After years of struggle, pressure, and negotiation, the old order of the latifundia has been broken. The great estates that once defined the political and economic life of the Kingdom have been forced to yield. The work of transforming them begins now."
 sic_tyrone.11.f:0 "The land question is not answered by law alone — it is answered by what follows."
 sic_tyrone.11.a:0 "Then let us begin the work of transformation."

 # Event sic_tyrone.12 – Slavery path complete
 sic_tyrone.12.t:0 "The Question of the Slave Markets"
 sic_tyrone.12.d:0 "The Kingdom has bound itself to the slave trade. The estates of the Mezzogiorno now await their labor force. Two roads stand before us: open the markets further and let commerce do its work, or act decisively — flood the south with enslaved men and women from Africa’s coasts, and then seal the ledgers shut."
 sic_tyrone.12.f:0 "What is bought in chains is never truly owned."
 sic_tyrone.12.a:0 "Open the markets. The estates will purchase what they need."
 sic_tyrone.12.b:0 "Import them in great numbers now — then close the books."

