# Lombardo Venezia

italy_LV_startingout:0 "A State in Need of Reform"
italy_LV_startingout_reason:0 "The Lombardy-Venetian State stands at a precarious moment. Though prosperous in appearance, its foundations are strained by inefficient administration, lagging industry, fragile legitimacy, and inadequate infrastructure.\n\nIf we are to play a leading role in the fate of Italy, these shortcomings must be addressed without delay."
LV_fully_reformed:0 "The Lombardy-Venetian State has been reformed."
italy_LV_startingouty_desc_tt:0 "Lombardy-Venetia still needs reforms before it can take its place in Italy's future..."
LV_fix_economy_button:0 "Stabilize the National Economy"
LV_fix_economy_button_desc:0 "Implement emergency reforms to stabilize production, secure industrial output, and restore economic confidence in the early federation."
LV_fix_burocrazia_button:0 "Reorganize the State Administration"
LV_fix_burocrazia_button_desc:0 "Streamline bureaucratic institutions to improve administrative efficiency and reduce structural inefficiencies in governance."
LV_fix_railways_button:0 "Restore the Transport Network"
LV_fix_railways_button_desc:0 "Rehabilitate critical railway infrastructure and urban connections to ensure reliable internal mobility and logistical stability."
LV_fix_legittimacy_button:0 "Reinforce State Legitimacy"
LV_fix_legittimacy_button_desc:0 "Strengthen political legitimacy through institutional consolidation and governance reform, securing public confidence in the state. \n• #bold Clicking with Autocratic Laws or Suffrage Laws grants different rewards. #!"


italy_LV_ageofliberty:0 "An Age of Liberty"
italy_LV_ageofliberty_reason:0 "If we are to secure Italy’s future, we must look beyond mere stability and embrace a greater vision. Across the Atlantic, nations flourish by offering liberty, opportunity, and dignity to all who arrive upon their shores.\n\nShould we enshrine rights, guarantee freedoms, and raise the standard of living for all, Italy may yet become a destination for the oppressed and the ambitious alike—a new land of promise in the heart of Europe."

italy_LV_neoautocracy:0 "The New Autocracy"
italy_LV_neoautocracy_reason:0 "Liberty and pluralism are not the only paths before us. A divided people cannot stand strong, and a nation without a unifying identity will falter in the face of adversity.\n\nIf Italy is to endure, it must be forged through discipline, authority, and a common culture. By consolidating power and embracing a singular national identity, we may yet build a state that commands respect and ensures its place among the great powers of Europe."

italy_LV_federationPo:0 "Federation of the Po"
italy_LV_federationPo_reason:0 "The Italian lands have long stood divided, their peoples bound by language and memory, yet separated by crowns, courts, and ancient rivalries. Now, with our state strengthened, a greater destiny presents itself.\n\nNot through conquest, but through accord, we may gather the princes of Italy beneath a common purpose. From Turin to Rome, the peninsula may yet be bound together in a federation of sovereign states, united in spirit and guided by our hand toward a shared future."
LV_fedPO_complete_tt:0 "All progress bars have reached #bold 100%#! and has selected either Monarchy or Republic."
italyEventsTyroneLV.4_tt:0 "Annex [SCOPE.sCountry('sarpied_scope').GetName] and [SCOPE.sCountry('papal_scope').GetName]. \nStates in #gold North Italy#! get #tooltippable;tooltip:[GetPlayer.GetTooltipTag],LV_nif_bonus_tt $nif_dependent_bonus$#! \n\n@aut! #gold #b Monarchy:#!#! \n • Select a [concept_ruler] from one of several dynastic houses across [concept_georegion_europe] with the [GetCharacterTrait('ambitious').GetName] trait \n \n @bur! #gold #b Republic:#!#! \n • [ROOT.GetCountry.GetName] receives #tooltippable;tooltip:[GetPlayer.GetTooltipTag],LV_italy_LV_republic_formed_bonus_tt $italy_LV_republic_formed$#! for 3 years."
