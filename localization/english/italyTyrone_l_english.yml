 # ========== French path journal entries (titles + reasons) ==========
 ITA_French_militaryJE:0 "French Military Support"
 ITA_French_militaryJE_reason:0 "Beyond the Alps, France has forged an army of iron and smoke—cannon and drill that could make our own ranks the equal of any on the continent. To walk in step with Paris is to invite her hand upon our shoulder when the hour of the risorgimento strikes."
 ITA_French_economyJE:0 "French Economic Support"
 ITA_French_economyJE_reason:0 "Gold and goodwill cross the same roads. A kingdom that grows rich and opens its doors to French capital becomes not a supplicant but a partner—and Paris, when the time comes, may remember who stood at her side.\n\nSardinian [Concept('concept_gdp', '$concept_gdp_short$')], Baseline (start of period): @gdp!#variable [Country.MakeScope.Var('ita_french_economy_sar_baseline').GetValue|K]#!\nSardinian [Concept('concept_gdp', '$concept_gdp_short$')], Current: @gdp!#variable [Country.MakeScope.ScriptValue('ita_sar_gdp')|K]#!\nSardinian [Concept('concept_gdp', '$concept_gdp_short$')], 6‑Month Goal (+5%): @gdp!#variable [Country.MakeScope.Var('ita_french_economy_sar_goal').GetValue|K]#!\n\n#bold Sardinian Growth Milestones#!\nThis [concept_journal_entry] tracks #bold five consecutive#! 6‑month periods. Each period, Sardinia's [Concept('concept_gdp', '$concept_gdp_short$')] must grow by at least #v 5#! percent. Meeting the goal #g adds#! #v 1#! progress; missing it #n removes#! #v 1#!. Reach #v 5#! progress to complete; the bar at #v 0#! fails the objective."
 ITA_French_lawsJE:0 "French Legal Reform Support"
 ITA_French_lawsJE_reason:0 "The spirit of the Revolution has not faded in the salons of Paris. A Piedmont that embraces liberty at home—the ballot, the open press, the rights of citizens—speaks a language France understands and may yet reward with her blessing for a united Italy."

 # ========== Austrian path journal entries (titles + reasons) ==========
 ITA_Austrian_militaryJE:0 "Austrian Military Support"
 ITA_Austrian_militaryJE_reason:0 "The double eagle casts its shadow from the Brenner to the Adriatic. To win Vienna's martial favour is to turn that shadow into a shield—to make the very power that holds the peninsula down the one that might, in time, permit the crown of Italy to rise."
 ITA_Austria_militaryJE:0 "Austrian Military Support"
 ITA_Austria_militaryJE_reason:0 "With the backing of the Austrian Empire, our armed forces must be reorganized to coordinate effectively with their military doctrine and command. By aligning our strategies, logistics, and training with Austrian expectations, we can better secure their support and strengthen our position in the conflicts that lie ahead."
 ITA_Austrian_economyJE:0 "Austrian Economic Support"
 ITA_Austrian_economyJE_reason:0 "Trade and tribute have always bound the Italian lands to the Habsburg court. To weave our fortunes ever closer with Vienna is to offer the Empire a stake in our future—and perhaps, in return, a measure of forbearance when the map of Italy is redrawn."
 ITA_Austrian_lawsJE:0 "Austrian Legal Reform Support"
 ITA_Austrian_lawsJE_reason:0 "The Hofburg prizes order above all. Reforms that burn too bright invite the bayonet; those that mirror Vienna's own sense of lawful progress may quiet her fears. An Italy that moves with care could one day move with Austria's consent; but across the peninsula, voices grow louder in their demand for reform. Liberals, intellectuals, and common citizens alike call for a constitution that would limit the power of the state and grant representation to the people. Whether these demands are answered or suppressed will shape the future of Italy."

