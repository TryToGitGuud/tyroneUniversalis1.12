l_english:
je_denmark_scandinavia_1: "Dreams Of a Union"
modifier_denmark_strained_diplomatic_channels: "Strained Diplomatic Channels"
denmark_reestablish_diplomatic_channels.t: "Reestablish Diplomatic Channels"
denmark_reestablish_diplomatic_channels.d: "Dispatch envoys to mend relations with Sweden."
je_denmark_scandinavia_1_relations_swe_tt: "[concept_relations] with Sweden are at least Amicable"
je_denmark_scandinavia_1_prestige_tt: "Denmark has more [concept_prestige] than Sweden"
je_denmark_scandinavia_1_army_pp_tt: "Denmark has greater Army [concept_power_projection] than Sweden"
je_denmark_scandinavia_1_reason: "The crowns of Scandinavia were once united under the Kalmar Union — a bond broken by ambition and war. Denmark has not forgotten. The path forward is uncertain: diplomacy may yet bring Sweden to the table as a willing partner, but should that door close, Denmark must be prepared to assert its claim by other means. The union will be reborn, one way or another."
je_denmark_scandinavia_ruler: "The Reign of Frederik VI"
je_denmark_scandinavia_ruler_reason: "King Frederik VI sits upon the throne of Denmark, the last of the absolute monarchs. His rule is one of rigid conservatism — a bulwark against the tide of liberalism sweeping Europe. His reign will eventually end, and with it, an era."
modifier_denmark_scandinavia_ruler: "God, and The Just Cause"
je_denmark_scandinavia_ruler_no_longer_ruler_tt: "Frederik von Oldenburg is no longer the [concept_ruler] of Denmark"
denmark_content.1.t: "The Reign of Frederik VI"
denmark_content.1.d: "King Frederik VI has ruled Denmark with an iron hand since 1808. Bloodied by the Napoleonic Wars and the loss of Norway, he remains a staunch defender of royal absolutism — resisting all demands for a constitution. How long his grip on the throne endures remains to be seen."
denmark_content.1.f: "His motto — #italic God and the just cause#! — reflects a sovereign who sees his authority as divinely ordained. The king tolerates no talk of constitutions."
denmark_content.1.a: "Long may he reign."
 denmark_enforce_union_army_pp_tt: "Denmark has equivalent or greater Army [concept_power_projection] than Sweden"
 denmark_no_military_intervention_tt: "We have not pursued military intervention against Sweden"
 denmark_enforce_union.t: "Assert the Union by Force"
 denmark_enforce_union.d: "Sweden has proven unwilling to treat with Denmark as an equal. The time for diplomacy may have passed."
