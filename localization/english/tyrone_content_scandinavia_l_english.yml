 denmark_content.3.t: "Rebirth of The Kalmar Union"
 denmark_content.3.d_diplomatic: "The long shadow of the Kalmar Union has returned — not through the force of arms, but through the careful work of statesmen and dynasties. Denmark and Sweden stand on the threshold of a new compact, one that may yet draw the scattered crowns of Scandinavia back together."
 denmark_content.3.d_military: "The age of persuasion has given way to the age of cannon. Denmark has chosen to impose what could not be agreed upon, and the outcome of this gamble will shape the north for generations to come. The Kalmar Union may yet be reborn — but its foundations will be built on conquest."
 denmark_content.3.f: "History does not repeat itself, but it rhymes."
 denmark_content.3.a: "A new chapter begins."
