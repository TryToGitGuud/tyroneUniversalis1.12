 more_unique_companies_us_steel_corp: "Rise of the $company_us_steel_corp$"
 more_unique_companies_us_steel_corp_reason: "With the rise of #b J.P. Morgan#! and other substantial investors in the heavy industry, the creation of the world’s largest @steel! #b $steel$#! producer seemed inevitable. While #b $company_us_steel$#! was the leading contender, the outcome was never set in stone. [SCOPE.sCompany('relevant_company').GetName] ultimately emerged through a major consolidation within the steel sector, uniting the strength of [Country.GetName]'s foremost producers. In different circumstances, another [concept_company] might have risen to prominence instead. But now [SCOPE.sCompany('relevant_company').GetName] influence is so deeply embedded that it has become inseparable from the very fabric of the [Country.GetName] economy."
 more_unique_companies_us_steel_corp_goal: "Maintain the following for #v [GetPlayer.MakeScope.ScriptValue('more_unique_companies_journal_entry_months')] months#! (currently #v [ROOT.GetCountry.MakeScope.Var('us_steel_corp_timer_var').GetValue]#!): #indent_newline:3 "
 more_unique_companies_us_steel_corp_complete_tt: "Has completed the #b $more_unique_companies_us_steel_corp$#! [concept_journal_entry]"
 us_steel_corp_establishment_tt: "#b $company_us_steel_corp$#! will be created as the result of a merger of [SCOPE.sCompany('relevant_company').GetName] and many smaller @coal! #b $coal$#!, @iron! #b $iron$#!, @lead! #b $lead$#! and @steel! #b $steel$#! producers."
 us_steel_corp_required_building_levels_tt: "Requires the [concept_company] to have at least #b 50#! [concept_company] owned [concept_building]"
 more_unique_companies_us_steel_corp_lobby: "With the rise of #b J.P. Morgan#! and other substantial investors in the heavy industry, the creation of the world’s largest @steel! #b $steel$#! producer seemed inevitable. While #b $company_us_steel$#! was the leading contender, the outcome was never set in stone. #b $company_us_steel$#! ultimately emerged through a major consolidation within the steel sector, uniting the strength of [Country.GetName]'s foremost producers. In different circumstances, another [concept_company] might have risen to prominence instead. The influence is so deeply embedded that it has become inseparable from the very fabric of the [Country.GetName] economy."
 
 
 more_unique_companies_deutsche_reichsbahn: "Creation of the $company_Deutsche_Reichsbahn$"
 more_unique_companies_deutsche_reichsbahn_reason: "[SCOPE.sCompany('relevant_company').GetName] was one of many smaller railway [concept_company] established prior to German unification. After unification, the various kingdoms and principalities retained differing levels of autonomy within the German nation, one such area being the control over their own #b $railway$#! systems. With the monarchy and the remaining principalities now abolished, we finally have the opportunity to consolidate the fragmented #b $railway$#! providers into a single, unified entity. #b $company_Deutsche_Reichsbahn$#! will be formed through the merger of these numerous providers."
 more_unique_companies_deutsche_reichsbahn_goal: "Sustain [concept_prosperity] for #v [GetPlayer.MakeScope.ScriptValue('more_unique_companies_deutsche_reichsbahn_months')] months#! (currently: #v [ROOT.GetCountry.MakeScope.Var('deutsche_reichsbahn_timer_var').GetValue]#!), and meet all other requirements: #indent_newline:3"
 more_unique_companies_deutsche_reichsbahn_complete_tt: "Has completed the #b $more_unique_companies_deutsche_reichsbahn$#! [concept_journal_entry]"
 deutsche_reichsbahn_establishment_tt: "#b $company_Deutsche_Reichsbahn$#! will be formed from the merger of [SCOPE.sCompany('relevant_company').GetName] and the numerous fragmented @railway! #b $railway$#! providers"
 more_unique_companies_deutsche_reichsbahn_lobby: "Prior to German unification, the various kingdoms and principalities retained differing levels of autonomy within the German nation, one such area being the control over their own #b $railway$#! systems. With the monarchy and the remaining principalities now abolished, we finally have the opportunity to consolidate the fragmented #b $railway$#! providers into a single, unified entity. #b $company_Deutsche_Reichsbahn$#! will be formed through the merger of these numerous providers."