l_english:
 more_unique_companies_ig_farben: "Establishment of $company_IG_Farben$"
 more_unique_companies_ig_farben_reason: "The rise of competing companies such as [SCOPE.sCompany('relevant_company').GetName][SCOPE.sCompany('relevant_company_2').GetName][SCOPE.sCompany('relevant_company_3').GetName][SCOPE.sCompany('relevant_company_4').GetName][SCOPE.sCompany('relevant_company_5').GetName][SCOPE.sCompany('relevant_company_6').GetName] made business less profitable. To eliminate the damages of competition without losing its advantages these companies seek to leverage their current position and fuse into a new company called #b $company_IG_Farben$#!. If successful, the new company will be able to expand its competitiveness within the global @fertilizer! #b $fertilizer$#! and @dye! #b $synthetic_dye$#! market."
 more_unique_companies_ig_farben_goal: "Maintain the following for #v [GetPlayer.MakeScope.ScriptValue('more_unique_companies_journal_entry_months')] months#! (currently #v [ROOT.GetCountry.MakeScope.Var('ig_farben_timer_var').GetValue]#!): #indent_newline:3 "
 more_unique_companies_ig_farben_complete_tt: "Has completed the #b $more_unique_companies_ig_farben$#! [concept_journal_entry]"
 ig_farben_establishment_tt: "[SCOPE.sCompany('relevant_company').GetName][SCOPE.sCompany('relevant_company_2').GetName][SCOPE.sCompany('relevant_company_3').GetName][SCOPE.sCompany('relevant_company_4').GetName][SCOPE.sCompany('relevant_company_5').GetName][SCOPE.sCompany('relevant_company_6').GetName] will be merged into one new Company: #b $company_IG_Farben$#"
 ig_farben_prosperous_tt: "Maintain [SCOPE.sCompany('relevant_company').GetName][SCOPE.sCompany('relevant_company_2').GetName][SCOPE.sCompany('relevant_company_3').GetName][SCOPE.sCompany('relevant_company_4').GetName][SCOPE.sCompany('relevant_company_5').GetName][SCOPE.sCompany('relevant_company_6').GetName] [concept_company] with a [concept_prosperity] over #v 100#!"
 more_unique_companies_ig_farben_lobby: "The rise of competing companies made business less profitable. To eliminate the damages of competition without losing its advantages these companies seek to leverage their current position and fuse into a new company called #b $company_IG_Farben$#!. If successful, the new company will be able to expand its competitiveness within the global @fertilizer! #b $fertilizer$#! and @dye! #b $synthetic_dye$#! market."
 
 more_unique_companies_ICI: "Establishment of $company_ICI$"
 more_unique_companies_ICI_reason: "The rise of competing companies such as [SCOPE.sCompany('relevant_company').GetName][SCOPE.sCompany('relevant_company_2').GetName][SCOPE.sCompany('relevant_company_3').GetName][SCOPE.sCompany('relevant_company_4').GetName] made business increasingly unprofitable. Fragmented and outpaced by more efficient foreign rivals, especially the German chemical trusts, British firms struggled to compete. In response, they have resolved to merge into a single entity: #b $company_ICI$#!. This consolidation aims to eliminate internal competition and secure Britain’s strategic position in @fertilizer!#b $fertilizer$#!, @explosives!#b $explosives$#!, and @dye!#b $synthetic_dye$#!."
 more_unique_companies_ICI_goal: "Maintain the following for #v [GetPlayer.MakeScope.ScriptValue('more_unique_companies_journal_entry_months')] months#! (currently #v [ROOT.GetCountry.MakeScope.Var('ICI_timer_var').GetValue]#!): #indent_newline:3 "
 more_unique_companies_ICI_complete_tt: "Has completed the #b $more_unique_companies_ICI$#! [concept_journal_entry]"
 ICI_establishment_tt: "[SCOPE.sCompany('relevant_company').GetName][SCOPE.sCompany('relevant_company_2').GetName][SCOPE.sCompany('relevant_company_3').GetName][SCOPE.sCompany('relevant_company_4').GetName] will be merged into one new Company: #b $company_ICI$#"
 ICI_prosperous_tt: "Maintain [SCOPE.sCompany('relevant_company').GetName][SCOPE.sCompany('relevant_company_2').GetName][SCOPE.sCompany('relevant_company_3').GetName][SCOPE.sCompany('relevant_company_4').GetName][SCOPE.sCompany('relevant_company_5').GetName][SCOPE.sCompany('relevant_company_6').GetName] [concept_company] with a [concept_prosperity] over #v 100#!"
 more_unique_companies_ICI_lobby: "The rise of competing companies made business increasingly unprofitable. Fragmented and outpaced by more efficient foreign rivals, especially the German chemical trusts, British firms struggled to compete. In response, they have resolved to merge into a single entity: #b $company_ICI$#!. This consolidation aims to eliminate internal competition and secure Britain’s strategic position in @fertilizer!#b $fertilizer$#!, @explosives!#b $explosives$#!, and @dye!#b $synthetic_dye$#!."
 
 
 more_unique_companies_zaibatsu_sumitomo: "Supremacy of the $company_Sumitomo$ Zaibatsu"
 more_unique_companies_zaibatsu_sumitomo_reason: "Companies such as [SCOPE.sCompany('relevant_company').GetName] have become increasingly influential, forming the backbone of [Country.GetName] industrial and financial modernization in the late 19th and early 20th centuries. Under a system of state-guided capitalism, these zaibatsu expanded into mining, banking, manufacturing, and trade, often thriving through close ties with the government. Their influence grew so deeply rooted that they became inseparable from the structure of the [Country.GetName] economy itself."
 more_unique_companies_zaibatsu_sumitomo_goal: "Maintain the following for #v [GetPlayer.MakeScope.ScriptValue('more_unique_companies_journal_entry_months')] months#! (currently #v [ROOT.GetCountry.MakeScope.Var('zaibatsu_timer_var').GetValue]#!): #indent_newline:3 "
