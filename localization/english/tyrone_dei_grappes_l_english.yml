 l_english:
  # =============================================
  # DEI - Journal Entry Groups
  # =============================================
  je_group_dei_global:0 "Indonesian Colonial Affairs"

  # =============================================
  # DEI - Reform the Indies Journal Entry
  # =============================================
  je_reform_indies:0 "Reform the Indies"
  je_reform_indies_reason:0 "The East Indies stand at a crossroads. Reformers within the Company argue that the abolition of slavery and feudal land tenure is both a moral imperative and an economic necessity — that only by granting the native populace land, freedom, and opportunity can the Indies be made truly prosperous. Yet entrenched interests see any such concession as a threat to their privileged position, and will fight to preserve the hierarchies that keep the colony compliant and cheap. The question is not whether change will come, but whose vision of the Indies will prevail."
  je_reform_indies_complete_header:0 "#title Will Advance Colonial Emancipation if:#!\n"
  je_reform_indies_on_complete_header:0 "#title If Colonial Emancipation is Achieved:#!\n• Triggers the Event #v $east_indies.2.t$#!\n#tooltippable;tooltip:je_reform_indies_on_complete_effects_tt Possible Event Effects#!"
  je_reform_indies_on_complete_effects_tt:0 "We will form the country of Indonesia"
  je_reform_indies_complete_effects_tt:0 "The Ethical Policy Journal Entry will be activated, and investors will take notice of the reformed Indies."
  je_reform_indies_fail_header:0 "#title Will Entrench Colonial Subjugation if:#!\n"
  je_reform_indies_on_fail_header:0 "#title If Colonial Subjugation is Entrenched:#!\n• Triggers the Event #v $east_indies.4.t$#!\n#tooltippable;tooltip:je_reform_indies_fail_effects_tt Possible Event Effects#!"
  je_reform_indies_fail_effects_tt:0 "Racial hierarchy and feudal stratification are entrenched across the Indies, cementing the colonial order.\n\nIf [GetLawType('law_agrarianism').GetName] is active: #indent_newline:3 \n• [GetLawType('law_neofeudalism').GetName] will replace it as the active [GetLawType('law_agrarianism').GetGroup.GetName] [concept_law]#indent_newline:0 \n\nIf [GetLawType('law_agrarianism').GetName] is #bold not#! active: #indent_newline:0 \n• [GetAmendmentType('amendment_colonial_neofeudalism').GetName] will be added to the active [GetLawType('law_agrarianism').GetGroup.GetName] [concept_law], sponsored by [GetInterestGroupVariant('ig_landowners', GetPlayer).GetName]\n\nIf [GetLawType('law_slave_trade').GetName] is active: \n• [GetAmendmentType('amendment_expanded_colonial_slavery').GetName] will be added to the active [GetLawType('law_slave_trade').GetGroup.GetName] [concept_law], sponsored by [GetInterestGroupVariant('ig_landowners', GetPlayer).GetName]"
  je_reform_indies_goal:0 "Improve GDP by 50%"

  # =============================================
  # DEI - The Ethical Policy Journal Entries
  # =============================================
  je_ethical_policy:0 "The Ethical Policy"
  je_ethical_policy_feudalism:0 "The New Feudalism"
  je_ethical_policy_feudalism_reason:0 "The old order has been preserved, but even those who defend it cannot deny that the Indies are restless. A population kept in bondage and ignorance is a population that simmers. Whatever the intentions of those who blocked reform, the Company cannot afford to let the colony collapse into destitution — a minimal standard of literacy and welfare must be established, if only to keep the machinery of exploitation running."

  # =============================================
  # DEI - Cultuurstelsel Law
  # =============================================
  law_cultuurstelsel:0 "Cultuurstelsel"
  law_cultuurstelsel_desc:0 "The native peasantry is compelled to dedicate a portion of their land to government-mandated cash crops. By law, no more than 20% of cultivable land may be requisitioned, leaving 80% for subsistence farming. In practice this ratio is universally disregarded — village quotas are set by output, not acreage, and meeting them leaves little land or labor for anything else."

  # =============================================
  # DEI - East Indies Events
  # =============================================
  east_india_company_men:0 "Company Men"

  east_indies.1.t:1 "A Solid Frontier"
  east_indies.1.d:1 "The great Indian Subcontinent has been brought completely under [ROOT.GetCountry.GetAdjectiveNoFormatting] rule. Those native forces which once threatened the security of our rule have been brought to heel."
  east_indies.1.f:0 ""Colonial rule is held together by the collaboration of the Company and the Indian Princes. Over decades we have seduced the Indians with promises of wealth and prestige, of military ranks and noble titles. Their service has been rewarded, and by winning their favor the subcontinent is pacified.""
  east_indies.1.a:0 "Loyal princes will keep the peace."
  east_indies.1.b:0 "Capital will cement our rule."

  east_indies.2.t:0 "Reforming the Indies"
  east_indies.2.d:0 "The economy of the Indies has been transformed under our diligent rule. With slavery and feudalism abolished, our vast territories are ripe for exploitation through private enterprise."
  east_indies.2.f:1 ""Famines, uprisings, and epidemics have been a staple of life under [ROOT.GetCountry.GetAdjectiveNoFormatting] rule. But we are resolved to change that; we have liberated the peasants from their quotas so that they are not forced to hand over the meager handful of rice they need to feed their families. By replacing these harsh regulations with private employment we are sure that the wealth will trickle down to the locals.""
  east_indies.2.a:0 "Investors are beginning to show interest."
  east_indies.2.b:0 "We should make greater use of local labor."

  east_indies.3.t:0 "The Ethical Policy"
  east_indies.3.d:0 "The [ROOT.GetCountry.GetName] has superseded the old colonialism. The people under our rule now enjoy a high standard of living and have access to a solid education."
  east_indies.3.f:0 ""Fifty years ago such a policy would have been unthinkable. Colonial administrators were concerned only with what they could extract, typically through coercion, from the wretches with the misfortune to live within colonial borders. We can proudly say that we have done better, that we have enacted an ethical policy of rule.""
  east_indies.3.a:1 "We should teach them good [SCOPE.sReligion('indies_religion').GetName] values."
  east_indies.3.b:0 "This is a land of opportunity."
  east_indies.3.c:0 "Are we not merciful?"

  east_indies.4.t:0 "The New Feudalism"
  east_indies.4.d:0 "The reformers have been silenced. The East Indies will remain what they have always been under [ROOT.GetCountry.GetName] — a land of bound labor, feudal obligation, and enforced hierarchy. The native populace will toil under arrangements that differ from the old order in name only. If the Company is to prosper, it will do so on the backs of those it rules."
  east_indies.4.f:0 ""Progress, they called it. Liberation. And yet here we are, with new laws that dress the same chains in finer cloth. The peasant still cannot leave his land. The debtor still cannot repay his debt. Nothing has changed but the vocabulary.""
  east_indies.4.a:0 "Order must be maintained."

  # =============================================
  # DEI - Independence Events
  # =============================================
  dei_independence.1.t: "A New Nation Is Born"
  dei_independence.1.d: "The colonial apparatus that once bound these islands to a distant power in Europe has been swept away. [ROOT.GetCountry.GetName] stands at the threshold of a new era — the question that now confronts our leaders is not whether we are free, but what kind of nation we shall become."
  dei_independence.1.f: "The last Dutch administrator had barely cleared his desk when the representatives began arriving. Men of the islands, speaking a dozen tongues, united by the singular fact of their independence. Whatever government they chose, it would be theirs."
  dei_independence.1.a: "[SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')|U] will speak for the people."
  dei_independence.1.b: "[ROOT.GetCountry.GetRuler.GetFullName] will lead as our sovereign."
  dei_independence.1.c: "The unity of our classes will be our strength."
  dei_independence.1.d: "It was the common people who won our freedom."
  dei_independence.1.e: "Our nation shall be guided by divine law."
  dei_independence.1.g: "Our nation shall be consecrated under the Reformed faith."
  dei_protestant_conversion_tt: "#bold 5%#! of all non-Protestant pops are forcibly converted to Protestant."

  dei_independence.2.t: "The Dutch Emigre"
  dei_independence.2.d: "The end of colonial rule has set in motion an exodus. With the Dutch administrative apparatus dissolved and the racial hierarchies that underpinned it swept away, the settlers who built their lives under that order find themselves without a place in the new [ROOT.GetCountry.GetName]. Ships bound for the Netherlands fill with those who cannot imagine staying."
  dei_independence.2.f: "They packed what they could carry. The rest: the estates, the offices, the graves of three generations, are left behind. A colonial world was ending, and its people were going home to a country many had never seen."
  dei_independence.2.a: "Let them go. This land belongs to its people now."

  dei_independence.3.t: "The End of Apartheid"
  dei_independence.3.d: "With the departure of the Dutch settler class, the legal architecture of racial hierarchy that underpinned colonial rule has lost its last defenders. The new government faces a clear choice: preserve an institution that serves no one left in power, or formally dismantle what remains of the colonial order."
  dei_independence.3.f: "The last of its enforcers had sailed. What remained was not a system, but a corpse."
  dei_independence.3.a: "Strike it from the books. [ROOT.GetCountry.GetName] is a nation of its own people."

  dei_independence.4.t: "The End of the Cultuurstelsel"
  dei_independence.4.d: "Since 1830 the peasantry of these islands have been compelled to give over their land and their labor to feed the Company's ledgers. The Cultuurstelsel survives on paper, but a free nation cannot be built on forced cultivation. The new government must decide what the land means to those who work it."
  dei_independence.4.f: "The quota collectors will come no more. But a law abolished means nothing if the land still answers to the same masters."
  dei_independence.4.a: "The land belongs to those who work it. Grant them full ownership."
  dei_independence.4.b: "A measured transition — free tenancy as a first step."

  # =============================================
  # DEI - Price of Reform Event
  # =============================================
  dei_reform.1.t: "The Price of Reform"
  dei_reform.1.d: "The colonial economy was built on extraction — raw materials stripped from the earth and shipped abroad, with little reinvested in the land or its people. Now, as the administration eyes a different model, the factions with a stake in the transition have made their expectations clear. A supporting bloc has emerged, but their backing is not without conditions."
  dei_reform.1.f: "Every reform has a price. The question is who pays it."
  dei_reform.1.a: "We will pursue [GetLawType('law_interventionism').GetName], with the backing of [GetInterestGroupVariant('ig_petty_bourgeoisie', GetPlayer).GetName] — the state will guide the economy's growth."
  dei_reform.1.b: "We will pursue [GetLawType('law_agrarianism').GetName], with the backing of [GetInterestGroupVariant('ig_landowners', GetPlayer).GetName] — the land and its yields are our true wealth."
  dei_reform.1.c: "We will pursue [GetLawType('law_laissez_faire').GetName], with the backing of [GetInterestGroupVariant('ig_industrialists', GetPlayer).GetName] — private enterprise will lead the way."
  dei_reform.1.e: "These conditions are not acceptable. We will proceed without their backing."

  # =============================================
  # DEI - Modifiers
  # =============================================
  dei_christianity_reasserted: "Christianity Reasserted"
  dei_interventionism_transition: "Industrial Mobilisation"
  dei_agrarianism_transition: "Agricultural Revitalisation"

  # =============================================
  # DEI - Colonial Construction Control Amendment
  # =============================================
  law_neofeudalism: "Neofeudalism"
  law_neofeudalism_desc: "The failure of reform has given way to a new feudal order dressed in modern garb. Agricultural estates, ranches, and plantations operate under arrangements of bound obligation that maximize output through coercion rather than investment. Aristocratic interests are empowered above all others, while capitalist enterprise finds itself crowded out of a colony that has chosen hierarchy over progress."

  amendment_colonial_neofeudalism: "Colonial Neofeudalism"
  amendment_colonial_neofeudalism_desc: "The failure of reform has entrenched a new feudal order across the Indies. Agricultural estates, ranches, and plantations operate under arrangements that differ from the old system in name only — bound labor, enforced hierarchy, and captive output yield gains that no reformer's program ever could."

  amendment_expanded_colonial_slavery: "Expanded Colonial Slavery"
  amendment_expanded_colonial_slavery_desc: "The entrenchment of colonial subjugation has opened the Indies to intensified exploitation of enslaved labor. Slave imports are expanded beyond previous limits, cementing bondage as a cornerstone of the colonial economy."

  amendment_colonial_construction_control: "Colonial Construction Control"
  amendment_colonial_construction_control_desc: "Private enterprise is granted preferential authority over construction decisions in the colony. Capitalist investors are empowered, while the state's own construction capacity is drawn back."

  # =============================================
  # DEI - Breakup Events
  # =============================================
  dei_breakup.1.t: "The East Indies' End"
  dei_breakup.1.d: "Rendered without support by the withdrawal of its colonial overlord, the [ROOT.GetCountry.GetName]'s administration has begun to collapse across the Indonesian archipelago. It seems that colonial rule is at an end at last."
  dei_breakup.1.f: "Across the islands, the silence rose like a wave. Cut telegraph wires, deserting policemen, farms that would no longer report their harvests. And then, the silence broke, and with it came annihilation."
  dei_breakup.1.a: "The peoples of the archipelago have seized their right."
  dei_breakup.1.b: "One motherland, one nation, one language!"
  dei_breakup.1.c: "We will rage against the storm until we are saved."
  dei_vassals_independent_tt:0 "All [concept_subject] countries will become independent, and our [Concept('concept_state', '$concept_states$')] will be divided between them."
  # Lobby JE LOC
  je_reform_indies_lobby: "The Dutch East Indies is about to undergo a period of extensive reform, guided by their overlord across the world. Will the colonial subject collapse, pass reformist, egalitarian policies, or further entrench the ruling colonial class' grip on society?"