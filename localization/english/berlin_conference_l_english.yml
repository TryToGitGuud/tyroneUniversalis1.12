    berlin_conference.4.t: "Colonial Policy Settled"
    berlin_conference.4.d: "As the conference proceeds, the question of colonial administration has been brought before the government. We may use our new claims chiefly for extraction and profit, or encourage settlement and permanent expansion overseas."
    berlin_conference.4.f: "The diplomats draw borders; statesmen must decide how they are to be ruled."
