    berlin_conference.3.t:0 "The Conference Concludes"
    berlin_conference.3.d:0 "The Berlin Conference has come to an end, and the window for negotiation closes with it. The claims advanced at the table now stand—on paper, and in the eyes of the powers who witnessed them."
    berlin_conference.3.f:0 "Ink dries, maps are rolled up, and the delegates depart with polite smiles and sharpened intentions. What was debated in salons will now be tested on distant coasts and along unfamiliar rivers, where recognition means little without presence. Still, a signature and a stamped map are powerful things: they turn ambition into entitlement, and entitlement into expectation."
    berlin_conference.3.a:0 "Let the record stand."
    berlin_conference.1.t:0 "The Berlin Conference Is Convened"
    berlin_conference.1.d:0 "Rival ambitions in Africa have reached a point where informal understandings are no longer sufficient. To prevent conflict among the European powers and impose a shared framework for expansion, an international conference has been called in Berlin."
    berlin_conference.1.f:0 "Diplomats arrive with portfolios full of maps, memoranda, and carefully rehearsed arguments. Behind closed doors, the future of distant lands will be debated with calm voices and deliberate language, even as every delegation measures how much it can secure before the doors finally close."
    berlin_conference.1.a:0 "We shall take part."
