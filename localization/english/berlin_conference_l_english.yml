l_english:
    je_berlin_conference: "The Berlin Conference"
    conference_members_label: "Conference Members"
    je_berlin_conference_reason:0 "As European ambitions in Africa intensify, uncoordinated expansion risks conflict between the Great Powers. To impose order on the scramble and legitimize imperial claims, an international conference in Berlin has been convened. The rules set here will shape colonial borders, determine spheres of influence, and define the future balance of power far beyond Europe."
    number_of_claims_left: "Number of Claims Left: #v [GetMetaPlayer.GetPlayedOrObservedCountry.MakeScope.Var('african_claims_var').GetValue]#!"
