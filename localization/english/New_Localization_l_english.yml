#TCC
 TCC:0 "Transcaucasia"
 TCC_ADJ:0 "Transcaucasia"
 TCC_FLAVOR_TEXT:0 "The people in the caucasus have long been oppressed by the Russian people, but no more! They have been united to face their final enemy in these troubled times. "

 TCC-formation-modifier-01:0 "Ready for a fight"
  
 TCC-unification-journal:0 "The Caucasus are United"
 TCC-unification-journal-complete:0 "Is Transcaucasia"
 
 TCC-unification-event-title:0 "To Face Our Final Enemy"
 TCC-unification-event-description:0 "The Russian will no long subjugate us."
 TCC-unification-event-flavor:0 "For many years the peoples here in the Caucasus have been subject to many other groups, the Russians being the prime offenders. We will no longer bow down, we shall prepare for their invasion. Because we know it will come. "
 TCC-unification-option-01:0 "United we shall be strong enough to face any threat. "
 TCC-unification-journal_reason:0 "Forming Transcaucasia"
 TCC-journal-completed-effects_tt.1: "• Gets #tooltippable;tooltip:[GetPlayer.GetTooltipTag],TCC-modifier-effect-tt $TCC-formation-modifier-01$#!" 
 TCC-modifier-effect-tt: "[GetStaticModifier('TCC-formation-modifier-01').GetName|v]\n[GetStaticModifier('TCC-formation-modifier-01').GetDesc]"
 
#RME
 RME:0 "Roman Empire"
 RME_ADJ:0 "Roman Empire"
 RME_FLAVOR_TEXT:0 "The Roman empire stood for over a thousand years... and under our new leadership it will continue to stand for another thousand. But still, we mustn't underestimate the changes of this new industrial world. "

 RME-formation-modifier-01:0 "For the Glory of Rome"
  
 RME-unification-journal:0 "The Rebirth of an Empire"
 RME-unification-journal-complete:0 "Is the Roman Empire"
 
 RME-unification-event-title:0 "The Eagle Rises Once Again"
 RME-unification-event-description:0 "What was once lost has been found again"
 RME-unification-event-flavor:0 "Over 1500 years ago Rome was destroyed by our failing bureaucracy and the Germanic peoples. With the empire reborn we shall learn from our mistakes and have our revenge!"
 RME-unification-option-01:0 "Those northern barabarian shall get what they deserve!"
 RME-unification-journal_reason:0 "Forming the Roman Empire"
 RME-journal-completed-effects_tt.1: "• Gets #tooltippable;tooltip:[GetPlayer.GetTooltipTag],RME-modifier-effect-tt $RME-formation-modifier-01$#!" 
 RME-modifier-effect-tt: "[GetStaticModifier('RME-formation-modifier-01').GetName|v]\n[GetStaticModifier('RME-formation-modifier-01').GetDesc]"
 RME-decision-maghrebi-explanation: "#;bold Options:#!# \nIntegrate Maghrebi for Bureaucracy and Authority\nIntegrate Maghrebi for Bureaucracy and Tax Capacity\nCanel Integration"
 
#MGB
 MGB:0 "Maghreb"
 MGB_ADJ:0 "Maghreb"
 MGB_FLAVOR_TEXT:0 "The Muslims in West Africa are united and it is now up to them where they will focus their attention. North to the Mediterranean or south the the rest of Africa"

 MGB-formation-modifier-01:0 "Challenge for the Mediterranean"
 MGB-formation-modifier-02:0 "West Africa is Ours"
  
 MGB-unification-journal:0 "Uniting the Western Muslims"
 MGB-unification-journal-complete:0 "Is Maghreb"
 
 MGB-unification-event-title:0 "A New Power in Northern Africa"
 MGB-unification-event-description:0 "What will we focus on?"
 MGB-unification-event-flavor:0 "With the western Muslims united we must choose where we will focus our attention. We could focus on the north and our control of the Mediterranean. Or we could focus on the south and continue further into Africa"
 MGB-unification-option-01:0 "The New Power in the Mediterranean."
 MGB-unification-option-02:0 "We Shall Control All of West Africa."
 MGB-unification-journal_reason:0 "Forming Maghreb"
 MGB-journal-completed-effects_tt.1: "• Gets #tooltippable;tooltip:[GetPlayer.GetTooltipTag],MGB-modifier-effect-tt $MGB-formation-modifier-01$#! \n or \n• Gets #tooltippable;tooltip:[GetPlayer.GetTooltipTag],MGB-modifier-effect-tt-2 $MGB-formation-modifier-02$#!" 
