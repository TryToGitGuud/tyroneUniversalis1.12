#BKU
 BKU:0 "Balkan Union"
 BKU_ADJ:0 "Balkan Union"
 BKU_FLAVOR_TEXT:0 "For many centuries they have fought, but their differences have been set aside to form one union. Many states are looking to the balkans as a divided land but they shall prove them wrong. "

 BKU-formation-modifier-01:0 "None Shall Invade Us Again"
  
 BKU-unification-journal:0 "The People in the Balkan are United"
 BKU-unification-journal-complete:0 "Is the Balkan Union"
 
 BKU-unification-event-title:0 "No Longer A Powder Keg"
 BKU-unification-event-description:0 "We must learn to face the world together."
 BKU-unification-event-flavor:0 "For too long the peoples in the Balkans have fought among themselves. This kept us weak and open to invasions from the outside. Under this unions this shall no longer happen."
 BKU-unification-option-01:0 "We Must Keep Our Sovereignty"
 BKU-unification-journal_reason:0 "Forming the Balkan Union"
 BKU-journal-completed-effects_tt.1: "• Gets #tooltippable;tooltip:[GetPlayer.GetTooltipTag],BKU-modifier-effect-tt $BKU-formation-modifier-01$#!" 
