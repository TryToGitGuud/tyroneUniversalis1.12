#NSE
 NSE:0 "North Sea Empire"
 NSE_ADJ:0 "North Sea Empire"
 NSE_FLAVOR_TEXT:0 "The old Viking empire formed but will it be able to stay together and keep its control over the North Sea?"

 NSE-formation-modifier-01:0 "The Power of Our Navy"
  
 NSE-unification-journal:0 "Ushering In a new Viking Age"
 NSE-unification-journal-complete:0 "Is the North Sea Empire"
 
 NSE-unification-event-title:0 "The Old Viking Empire Stands Again"
 NSE-unification-event-description:0 "King Cnut would be proud."
 NSE-unification-event-flavor:0 "During the height of the viking age the kingdoms of Norway, Denmark and England were united under one viking crown. This union was one of the strongest in Europe at the time, now we have to regain that title and protect our sea."
 NSE-unification-option-01:0 "The North Sea is Our Territory"
 NSE-unification-journal_reason:0 "Forming the North Sea Empire"
