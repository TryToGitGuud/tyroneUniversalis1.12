#BSA
 BSA:0 "Baltoscandia"
 BSA_ADJ:0 "Baltoscandia"
 BSA_FLAVOR_TEXT:0 "The people in the Nordics have united to fend off external threats to their existence. They will face the world together but how will the world respond?"

 BSA-formation-modifier-01:0 "United We Stand"
  
 BSA-unification-journal:0 "Uniting All the Nordic Peoples"
 BSA-unification-journal-complete:0 "Is Baltoscandia"
 
 BSA-unification-event-title:0 "The Northern State Shall Bow to None"
 BSA-unification-event-description:0 "Only United shall we hold."
 BSA-unification-event-flavor:0 "Many different cultures live in the north of Europe and alone we are prone to be conquered. But together we are a force to be reckoned with. None shall hold us down anymore.  "
 BSA-unification-option-01:0 "We Need to Unite Our People"
 BSA-unification-journal_reason:0 "Forming Baltoscandia"
