je_bnl_religion:0 "The Matter of Religion"
je_bnl_religion_reason:0 "We were united in the past but conflicts over religion quickly ensued. These issues must the addressed, for we will not truly be a united nation until that time. "
je_bnl_religion_goal: "Less than 25% turmoil in #tooltippable #tooltip:bnl_core #bold core#!#!#!  [SCOPE.GetRootScope.GetCountry.GetName] regions for 10 years."
bnl_core: "$STATE_HOLLAND$\n$STATE_FRIESLAND$\n$STATE_GELRE$\n$STATE_FLANDERS$\n$STATE_WALLONIA$\n$STATE_FRENCH_LOW_COUNTRIES$"

BNL-religion-event-title:0 "The Worst Conflicts are Over"
BNL-religion-event-description:0 "Religious conflicts are brought to a minimum."
BNL-religion-event-flavor:0 "The Protestant north and Catholic south have long stood opposed to each other. But through diligent work most of the conflicts have subsided. Can the nation ever truly move on?"
BNL-religion-option-01:0 "Unified Under Different Religions"
BNL-religion-modifier-01:0 "Reduced Religous Conflicts"

je_bnl_trade_or_industry:0 "Trade or Industry Focus?"
je_bnl_trade_or_industry_reason: "The north of our country has focussed on trade for the past 200 years, but our south has been an industrial powerhouse since the middle ages.\n\nWhich of these identities will we pursue to boost us into this new age? We can only choose one so we must choose carefully."
bnl_trade_or_industry_industry:0 "We have focussed on industry"
bnl_trade_or_industry_trade:0 "We have focussed on trade"

je_bnl_industry: "Focus: Industry"
je_bnl_industry_reason:0 "Industry is what is allowing countries such as Britain and France to grow and become true Great Powers. We must follow this example and allow our industry to push us into the next era."
je_bnl_industry_goal:0 "Complete all industrial policies."
je_bnl_industry_1: "Industrial Policy: Domestic Production"
je_bnl_industry_1_reason:0 "To boost our local industries we must become mostly self sufficient in the 2 most important goods of this era, Iron and Coal."
je_bnl_industry_2: "Industrial Policy: Economical Growth"
je_bnl_industry_2_reason:0 "In order to compete with the other great powers we must sustain a certain level of growth to ensure our place at the speaking table. "
je_bnl_industry_3: "Industrial Policy: Protect Our Industry"
je_bnl_industry_3_reason:0 "We can't have other countries sell all their wears to us at a lower price. This will undercut our own industries, we must put save guards in place."

je_bnl_trade: "Focus: Trade"
je_bnl_trade_reason:0 "The world is turning more and more global and trade is facilitating this. By being of the pioneers of this movement we can be ahead of the curve and reap the profits."
je_bnl_trade_goal:0 "Complete all trade policies."

bnl_industry_complete:0 "Progress on the Path of Industry"
bnl_trade_complete:0 "Progress on the Path of Trade"

je_bnl_trade_1: "Trade Policy: Trade Vessels"
je_bnl_trade_1_reason:0 "To conduct world wide trade we need enough vessels to tolerate this increased volume."
je_bnl_trade_2: "Trade Policy: Trade Capacity"
je_bnl_trade_2_reason:0 "Managing trade and collecting its profits takes time and people, we have to ensure we have the required infrastructure to facilitate this."
je_bnl_trade_3: "Trade Policy: Free Trade"
je_bnl_trade_3_reason:0 "The freedom of globalised trade is the future. Our laws must be ready to enter this new world. "

BNL-industry-event-title:0 "An Industrial Powerhouse"
BNL-industry-event-description:0 "We have chosen the path of mass industrialisation."
BNL-industry-event-flavor:0 "The bustle of industry and the sounds of massive steam engines. This can be heard all over the country, it has taken much time and effort but we can count ourselves among the industrial powerhouses of the world."
BNL-industry-option-01:0 "A Toast to the Power of the Steam Engine"
BNL-industry-modifier-01:0 "Heavy Industry is the Future"

BNL-trade-event-title:0 "The First Centre of World Trade"
BNL-trade-event-description:0 "We have chosen the path of global trade."
BNL-trade-event-flavor:0 "Our ships reach every corner of the world, from the cold wastes of Siberia to the bustling ports of London and New York. Our logo is known by every household, since most products go through our ports at least once. "
BNL-trade-option-01:0 "Nobody Will Bring us Down"
BNL-trade-modifier-01:0 "Neverending Trade"

#Malay Decisions
trade_malay_for_subject:0 "Enter the British Sphere"
trade_malay_for_subject_desc:0 "Britain holds several ports and regions on our border. If we were to accept them as an overlord they might be inclined to give them to us."

