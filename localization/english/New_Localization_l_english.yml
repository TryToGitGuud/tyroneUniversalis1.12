#CRT
 CRT:0 "Carthage"
 CRT_ADJ:0 "Carthage"
 CRT_FLAVOR_TEXT:0 "At it's prime Carthage were the rulers of the Mediterranean and they shall be again. There are however several older and bigger nations who are aiming at similar things. We must hold them back!"
 
 CRT-formation-modifier-01:0 "We Must Return To Our Roots"
  
 CRT-unification-journal:0 "The Trading Empire Reforms"
 CRT-unification-journal-complete:0 "Is Cartage"
 
 CRT-unification-event-title:0 "We Must Gain Full Control of the Mediterranean"
 CRT-unification-event-description:0 "All trade will flow via us."
 CRT-unification-event-flavor:0 "Over 2000 years ago the Carthaginian Empire was destroyed by the Romans. But we have finally risen again to take our rightful place around the Mediterranean. Our strength was our trade and commerce and it shall be again."
 CRT-unification-option-01:0 "The Power of Our Trade Will Dominate"
 CRT-unification-journal_reason:0 "Forming Carthage"
