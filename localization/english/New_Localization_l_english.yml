#ICE
 ICE:0 "Incan Empire"
 ICE_ADJ:0 "Incan Empire"
 ICE_FLAVOR_TEXT:0 "A few hundred years the Incan Empire was destroyed by invaders. Now it is back together and it is to them to see if they are willing to work with them or fight them."
 
 ICE-formation-modifier-01:0 "We Must Work To Assimilate Them"
 ICE-formation-modifier-02:0 "Death to the Colonisers"
  
 ICE-unification-journal:0 "The Ancient Empire Forms Again"
 ICE-unification-journal-complete:0 "Is the Incan Empire"
 
 ICE-unification-event-title:0 "Major Changes are Afoot"
 ICE-unification-event-description:0 "How will we look towards the future?"
 ICE-unification-event-flavor:0 "When the Spanish came to colonise this land the Incan Empire ruled these lands. Now they are united again. When discussing how to proceed, several indigenous members were trying to enter to take over several government buildings. Should this be allowed?"
 ICE-unification-option-01:0 "No, We Will Show Them How We Could Work Together."
 ICE-unification-option-02:0 "Yes, We Will Have Our Revenge On the Colonisers!"
 ICE-culture-warning:0 "WARNING! MAJOR CULTURE CHANGE"
 ICE-unification-journal_reason:0 "Forming the Incan Empire"
