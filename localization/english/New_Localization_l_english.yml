je_forming_USE:0 "Forming the United States of Europe"
je_forming_USE_custom_complete:0 "Chose to pursue or dismiss the United States of Europe"
je_button_dismiss_USE:0 "Dismiss the Idea"
je_button_dismiss_USE_desc:0 "The idea of forming the United States of Europe will be dismissed."
je_button_pursue_USE:0 "Pursue the Idea"
je_button_pursue_USE_desc:0 "We will pursue the idea of forming a greater United States of Europe."
je_forming_USE_reason:0 "The idea of forming a United States of Europe has been gaining traction and we should decide if this is something we want to pursue further."
je_button_dismiss_USE_custom:0 "We will NOT see new content about forming the United States of Europe. (NOTE: This cannot be reversed!)"
je_button_pursue_USE_custom:0 "We WILL see new content about forming the United States of Europe."
USE_formation.1-title:0 "First Steps Towards the USE"
USE_formation.1-description:0 "How will we work towards our goal?"
USE_formation.1-flavor:0 "With our commitment to forming a United States of Europe we must choose how we will start this process? We can choose to do it by the sword, claiming certain countries should become part of the Union. Or we could try to diplomatically convince other nations that our way forward is best for everybody."
USE-formation-type-aggressive-option-01:0 "Europe Will Fall Before Our Feet!"
USE-formation-type-diplomatic-option-01:0 "We Will Convince Europe of Our Way."
USE-formation-type-aggressive-option-01-custom:0 "We shall claim parts of Europe and use force of arms to incorporate them into the USE."
USE-formation-type-diplomatic-option-01-custom:0 "We shall use our influence and diplomacy to convince other nations to join the USE."
je_forming_USE_diplo:0 "Forming the USE: Diplomatic"
je_forming_USE_diplo_reason:0 "A greater European state is something that has been gaining traction for the past few years. We now have the option to convince other nations to join idea of a greater Europe."

