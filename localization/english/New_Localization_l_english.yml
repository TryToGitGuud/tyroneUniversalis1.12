#FBU
 FBU:0 "Franco-British Union"
 FBU_ADJ:0 "Franco-British Union"
 FBU_FLAVOR_TEXT:0 "They may have been rivals for a thousand years but their countries have always been connected. This connection has finally be formalized into an actual union."

 FBU-formation-modifier-01:0 "Our People Must Work Together"
  
 FBU-unification-journal:0 "The Consequences of the Norman Conquest"
 FBU-unification-journal-complete:0 "Is the Franco-British Union"
 
 FBU-unification-event-title:0 "Centuries of Conflict are Done "
 FBU-unification-event-description:0 "A historic union finally realised"
 FBU-unification-event-flavor:0 "Ever since the Norman Conquest, England and France have been connected in some way. Now this connection has been realised and their people are brought under one union. Will the other countries in Europe accept this merge?"
 FBU-unification-option-01:0 "We Must Keep This Union Together."
 FBU-unification-journal_reason:0 "Forming the Franco-British Union"
 FBU-journal-completed-effects_tt.1: "• Gets #tooltippable;tooltip:[GetPlayer.GetTooltipTag],FBU-modifier-effect-tt $FBU-formation-modifier-01$#!" 
