#HRE
 HRE:0 "Holy Roman Empire"
 HRE_ADJ:0 "the Holy Roman Empire"
 HRE_FLAVOR_TEXT:0 "This empire is powerful, vast and diverse, will it be able to stay together and rule the continent as it did in ages past?"

 HRE-formation-modifier-01:0 "At the Heart of Europe"
  
 HRE-unification-journal:0 "An Empire Reborn"
 HRE-unification-journal-complete:0 "Is the Holy Roman Empire"
 
 HRE-unification-event-title:0 "The Holy Roman Empire Reborn"
 HRE-unification-event-description:0 "The rebirth of the double headed eagle."
 HRE-unification-event-flavor:0 "For nigh a millennia the Holy Roman Empire grew and fell with the final blow coming from Napoleon. This mistake has finally been rectified and all people in this empire shall stand stronger together. The future looks favorable upon us all."
 HRE-unification-option-01:0 "The birth of a European super power."
 HRE-unification-journal_reason:0 "Forming the Holy Roman Empire"
 HRE-journal-completed-effects_tt.1: "• Gets #tooltippable;tooltip:[GetPlayer.GetTooltipTag],HRE-modifier-effect-tt $HRE-formation-modifier-01$#!" 
 HRE-modifier-effect-tt: "[GetStaticModifier('HRE-formation-modifier-01').GetName|v]\n[GetStaticModifier('HRE-formation-modifier-01').GetDesc]"

#Benelux
 BNL:0 "Benelux"
 BNL_ADJ:0 "Benelux"
 BNL_FLAVOR_TEXT:0 "It might seem small but the Benelux has a change to become a big player in Europe. All it has to do is take it. "

 BNL-formation-modifier-01:0 "Cornered Between Great Powers"
  
 BNL-unification-journal:0 "The Lowlands United"
 BNL-unification-journal-complete:0 "Is the Benelux"
 
 BNL-unification-event-title:0 "The Benelux Finally Reunited"
 BNL-unification-event-description:0 "The new lion roars."
 BNL-unification-event-flavor:0 "The lowlands are finally back together after being forcefully pulled apart. It's clear that we are stronger together but we are young and surrounded. Alliances must be found and rivals must be crushed if we are to survive the coming onslaught. "
 BNL-unification-option-01:0 "How will we compete with the other major powers in Europe?"
 BNL-unification-journal_reason:0 "Forming the Benelux"
 BNL-journal-completed-effects_tt.1: "• Gets #tooltippable;tooltip:[GetPlayer.GetTooltipTag],BNL-modifier-effect-tt $BNL-formation-modifier-01$#!" 
 BNL-modifier-effect-tt: "[GetStaticModifier('BNL-formation-modifier-01').GetName|v]\n[GetStaticModifier('BNL-formation-modifier-01').GetDesc]"

#UCB
 UCB:0 "United Caribbean"
 UCB_ADJ:0 "United Caribbean"
 UCB_FLAVOR_TEXT:0 "With all its islands under one flag, the United Caribbean will face a challenging future. It is surrounded by great powers who are more than willing to exert control over it. "

 UCB-formation-modifier-01:0 "A Modern Pirate Kingdom"
  
 UCB-unification-journal:0 "Unification of the Caribbean"
 UCB-unification-journal-complete:0 "Is the United Caribbean"
 
 UCB-unification-event-title:0 "The Caribbean Under One Flag"
 UCB-unification-event-description:0 "The second golden age of piracy has started."
 UCB-unification-event-flavor:0 "For centuries the caribbean has been under the control of outsides, no longer! We hold some of the oldest pirate capitals in the world and they shall be again. We fill usher in a new age of piracy! "
 UCB-unification-option-01:0 "Build the dockyards and train the sailers!"
 UCB-unification-journal_reason:0 "Forming the United Caribbean"
 UCB-journal-completed-effects_tt.1: "• Gets #tooltippable;tooltip:[GetPlayer.GetTooltipTag],UCB-modifier-effect-tt $UCB-formation-modifier-01$#!" 
 UCB-modifier-effect-tt: "[GetStaticModifier('UCB-formation-modifier-01').GetName|v]\n[GetStaticModifier('UCB-formation-modifier-01').GetDesc]"

#IFR
 IFR:0 "Imperial Federation"
 IFR_ADJ:0 "Imperial Federation"
 IFR_FLAVOR_TEXT:0 "A global federal empire, the first of its kind. It holds much power but this comes with many troubles and areas of control. Can the empire stay together and truly rule the waves. "

 IFR-formation-modifier-01:0 "A Global Federal Empire"
  
 IFR-unification-journal:0 "A Global Empire"
 IFR-unification-journal-complete:0 "Is the Imperial Federation"
 
 IFR-unification-event-title:0 "All the Empire Under one Flag"
 IFR-unification-event-description:0 "A new age of diplomacy has begun."
 IFR-unification-event-flavor:0 "The more the empire grew the more difficult it became to control. We now have all countries within the empire in the same parliment. Together we shall bring everyone under one identity and country. "
 IFR-unification-option-01:0 "We'll have to expand the house of commons!"
 IFR-unification-journal_reason:0 "Forming the Imperial Federation"
 IFR-journal-completed-effects_tt.1: "• Gets #tooltippable;tooltip:[GetPlayer.GetTooltipTag],IFR-modifier-effect-tt $IFR-formation-modifier-01$#!" 
 IFR-modifier-effect-tt: "[GetStaticModifier('IFR-formation-modifier-01').GetName|v]\n[GetStaticModifier('IFR-formation-modifier-01').GetDesc]"

#INC
 INC:0 "Indochina"
 INC_ADJ:0 "Indochina"
 INC_FLAVOR_TEXT:0 "The people in Indochina have long fought each other but that time is over. United we shall face the wold and its tribulations."

 INC-formation-modifier-01:0 "A Diverse Country"
  
 INC-unification-journal:0 "A New Power in Asia"
 INC-unification-journal-complete:0 "Is Indochina"
 
 INC-unification-event-title:0 "Stand Up Against Our Oppressors"
 INC-unification-event-description:0 "A difficult road ahead."
 INC-unification-event-flavor:0 "For too long the countries in Indochina have been bullied and repressed by bigger powers outside the peninsula. Despite our differences we will have to work together to face the outside dangers. "
 INC-unification-option-01:0 "Will our cultures be able to work together?"
 INC-unification-journal_reason:0 "Forming Indochina"
 INC-journal-completed-effects_tt.1: "• Gets #tooltippable;tooltip:[GetPlayer.GetTooltipTag],INC-modifier-effect-tt $INC-formation-modifier-01$#!" 
