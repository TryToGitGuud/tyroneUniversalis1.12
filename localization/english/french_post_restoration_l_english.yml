  je_post_bonapartists:0 "Retour de l'Empire"
 
  je_post_bonapartists_reason:0 "#bold #green Use character interactions on the Emperor to progress the #v Journal Entry#!#!#!. \n\nWith the #bold Bonaparte#! dynasty restored and the [ROOT.GetCountry.GetName] once more unified under #bold imperial#! rule, the nation stands at a crossroads. The legacy of the #yellow Empire#! looms large—its victories, its defeats, and the promise of renewed #bold grandeur#!. Whether this restoration becomes a lasting imperial order or a fleeting return to past glories now depends on the strength of the state and the loyalty of its people."

  je_post_bonapartists_status:0 "The Empire shall rise again..."

