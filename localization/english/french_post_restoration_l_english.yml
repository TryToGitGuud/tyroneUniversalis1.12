  THIS_is_emperor_text: "This is the Emperor of the French, use character interactions to benefit the realm."


  je_the_city_of_light_rebuild:0 "Rebuild the City of Light"
  je_the_city_of_light_rebuild_desc:0 "With the #bold Empire#! restored and a single dynasty once more guiding the [ROOT.GetCountry.GetName], Paris must be remade as the radiant heart of the nation. Broad boulevards, grand monuments, and imperial splendor shall transform the capital into a symbol of order, modernity, and #bold Bonapartist#! authority — a City of Light worthy of ruling Europe."
  je_the_city_of_light_rebuild_reason: "Under the gaze of the Emperor, Paris is to be reborn.\n \n The narrow, medieval streets of the capital no longer befit an empire restored to glory. [ROOT.GetCountry.GetRuler.GetFirstName] #yellow III#! has ordered the transformation of Paris into a city worthy to be the capital of [ROOT.GetCountry.GetName] — broad boulevards to project power, grand avenues to proclaim prosperity, and monuments that will bind the people’s loyalty to the throne. This reconstruction is not merely stone and steel, but a statement to [ROOT.GetCountry.GetNameNoFlag] and the world: the [ROOT.GetCountry.GetNameNoFlag] endures, modern, magnificent, and unassailable."

  je_improved_living_napoleon:0 "Improve Living Conditions"
  je_improved_living_napoleon_desc:0 "An Empire is measured not only by victories, but by the strength and health of its people. By enacting #bold Public Health Insurance#! and extending sanitary reforms across incorporated France, the state will reduce misery, strengthen productivity, and prove that #bold Bonapartist#! rule brings order and security to everyday life."
je_improved_living_napoleon_reason:0 "The restored #bold Empire#! cannot rely on glory alone. Disease, overcrowding, and neglect weaken the nation as surely as any foreign enemy. The government must commit to modern public health — not as charity, but as policy — and ensure that the benefits of imperial stability reach the lives of ordinary citizens.\n \nPass #bold Public Health Insurance#! and promote health measures throughout incorporated states to demonstrate that the Empire safeguards its people."

je_rebuilt_railways_napoleon:0 "Rebuild the Imperial Railways"
je_rebuilt_railways_napoleon_desc:0 "The railways are the arteries of the #bold Empire#!. Rebuilding and expanding lines across France will bind the provinces together, accelerate industry and trade, and allow the swift movement of troops and supplies when the Emperor calls."
je_rebuilt_railways_napoleon_reason:0 "To govern, to prosper, and to command, the Empire must move faster than its rivals. Roads and rivers are no longer enough; steel rails must knit the realm into a single, disciplined machine.\n \n Construct railways across the incorporated heartlands of [ROOT.GetCountry.GetName] until the network is truly imperial in scale — a foundation for commerce in peace and strength in war."


  rebuild_paris.1.t: "Paris Reborn"
  rebuild_paris.1.d: "Under the direction of the Emperor, the capital has been transformed. The cramped alleys and restless quarters of old Paris have given way to sweeping boulevards, grand façades, and monumental avenues worthy of an empire restored. This reconstruction is more than an urban project—it is a declaration of order, prosperity, and imperial confidence."
  rebuild_paris.1.f: "From the heights of the city, Paris now appears not as a relic of revolution, but as the shining heart of the Second Empire. Stone, iron, and ambition have reshaped the capital into a symbol of authority and modernity, proclaiming to France and the world that the Bonapartist state is here to endure."
  rebuild_paris.1.a: "Let the capital stand as a testament to the Empire"
rebuild_paris_button_desc:0 "Rebuild Paris into a city worthy of the Empire."


  rebuilding_paris_modifier: "Rebuilding Paris"
  rebuild_paris_button: "Rebuild Paris"

  paris_rebuilt_fully: "The City of Light Illuminates the Land"
  french_healthcare: "Reformed Healthcare System"
  imperial_infrastructure: "Imperial Infrastructure System"
  imperial_reconquests: "Napoleonic Reconquests"
  napoleonic_victory: "Napoleonic Victory"
  napoleon_the_great_modifier: "The Great"


  je_king_of_italy:0 "Roi d'Italie"
  je_king_of_italy_reason:0 "Napoléon Bonaparte once placed the Iron Crown upon his head and proclaimed himself #bold King of Italy#!, binding the peninsula to the destiny of the Empire.\n \n That legacy did not vanish with his fall — it waits to be reclaimed. As the rightful heir to the Bonapartist mantle, the Emperor now looks beyond the Alps, where history, conquest, and imperial law once united Italy under French authority. To restore the crown is not mere vanity, but a declaration that the imperial order shall be revived where it once ruled, and that the Bonapartist legacy endures beyond France itself."

  je_king_spain:0 "Roi d'Espagne"
  je_king_spain_reason:0 "In the past, Napoléon Bonaparte attempted to place his brother on the throne of Spain. We recognise such a move proved to be disastrous for France at the time. But Oh, how times have changed! The Spanish nation is now a weak, decadant one. Only its assimilation into our Grand Empire will reverse their decline."

  #events
  empire_of_france.1.t: "An Empire Without Excess"
  empire_of_france.1.d: "With the authority of the #yellow Bonapartists#! secured and the nations borders firmly entrenched, [ROOT.GetCountry.GetName] enters a new political era. The institutions of governance endure, commerce flows without interruption, and the crown stands not above the nation, but within it. This #bold Empire#! is not proclaimed in thunder, but accepted in practice."
  empire_of_france.1.f: "There are no banners unfurled in every square, no eagles cast in bronze for every boulevard. Instead, ministers return to their desks, deputies to their chambers, and investors to their calculations. Power, once again, wears a sober face."
  empire_of_france.1.a: "Momentous times await the Empire."

  empire_of_france.2.t: "Launch the Invasion of Iberia!"
  empire_of_france.2.d:0 "With authority secured at home, the #yellow Bonapartist#! regime now turns toward unfinished business beyond the Pyrenees. [SCOPE.sCountry('france_scope').GetName] regards the [SCOPE.sCountry('spain_scope').GetAdjective] question not as a matter of diplomacy, but of restoration — an assertion of imperial order where it once prevailed."

  empire_of_france.2.f: "#b $SPA$#!, a country once ruled by us. A country which #b must#! once again be ruled by us! Our great domination of Europe will begin by dominating the Spaniards."
  empire_of_france.2.a: "We will restore our control over Spain."

  empire_of_france.3.t:0 "The Italian Question"

  empire_of_france.3.d:0 "With the Empire secure at home, attention turns beyond the Alps. #yellow Bonapartist#! officials and officers argue that [SCOPE.sCountry('italy_scope').GetName], long shaped by [SCOPE.sCountry('france_scope').GetAdjectiveNoFlag] arms and administration, remains unfinished business. They insist that the authority of the Empire cannot be confined to [SCOPE.sCountry('france_scope').GetName] alone, and that the #bold Italian peninsula#! must once again be brought within its imperial orbit."

  empire_of_france.3.f:0 "“Italy was once united by French law, defended by French armies, and crowned by imperial authority. To abandon it to fragmentation is to deny our own legacy. The Empire must return where it once ruled, not as an invader, but as the restorer of order.”"

  empire_of_france.3.a:0 "The Empire must return to Italy."
  empire_of_france.3.b:0 "Assert our claims to the Italian Peninsula."

  empire_of_france.4.t:0 "The Reconquest of Italy"

  empire_of_france.4.d:0 "The reconquest of [SCOPE.sCountry('italy_scope').GetName] now stands at the forefront of imperial policy. In Paris, #yellow Bonapartist#! leaders debate not whether the peninsula should return to the imperial sphere, but how it should be brought back under [SCOPE.sCountry('france_scope').GetAdjective] authority. Some favor preserving [SCOPE.sCountry('italy_scope').GetAdjectiveNoFlag] unity under close supervision; others argue that lasting control requires the creation of loyal regimes on Italian soil, bound to [SCOPE.sCountry('france_scope').GetNameNoFlag] by treaty, interest, and force."

  empire_of_france.4.f:0 "“Italy was not lost in a day, and it will not be restored by hesitation. The Empire must decide how it shall rule what it intends to reclaim.”"

  empire_of_france.4.a:0 "Maintain [SCOPE.sCountry('italy_scope').GetNameNoFlag] as one country."
  empire_of_france.4.b:0 "Divide the peninsula and establish a Bonapartist client in the south."

  empire_of_france.4.c:0 "Maintain Current Borders."
  empire_of_france.4.g:0 "Create an Italian Client State."
  empire_of_france.4.h:0 "Partition Italy into North and South Client States"


  empire_of_france.5.t:0 "The Iron Crown"

  empire_of_france.5.d:0 "The question of Italy now reaches its natural conclusion. Once before, Napoleon Bonaparte ruled as both #bold Emperor of the French#! and #bold King of Italy#!, uniting the two crowns under a single imperial authority. That precedent has not been forgotten. Courtiers and ministers argue that a personal union between [SCOPE.sCountry('italy_scope').GetName] and [SCOPE.sCountry('france_scope').GetName] would revive this legacy, binding the peninsula to the Empire not as a conquest, but as a crown joined by right and tradition."

  empire_of_france.5.f:0 "“Napoleon did not divide his authority at the Alps. He ruled France as Emperor, and Italy as King — two realms, one will.”"

  empire_of_france.5.a:0 "Italy shall remain separate — for now."
  empire_of_france.5.b:0 "Revive the dual crown of France and Italy."

  empire_of_france.6.t:0 "The Savoyard Question"

  empire_of_france.6.d:0 "The Empire’s gaze turns once more to the Alpine gateway. Napoleon Bonaparte did not treat Savoy as foreign ground, but as a natural approach to [SCOPE.sCountry('france_scope').GetName] and a lever over Italy — a frontier to be secured, and a peninsula to be shaped. Now, with [SCOPE.sCountry('italy_scope').GetNameNoFlag] watching closely, ministers argue that [SCOPE.sCountry('savoy_country').GetName] cannot be allowed to hold the keys to the passes. They point to [SCOPE.sState('savoy_state').GetStateRegion.GetNameNoFormatting] and the surrounding approaches as lands that must be brought under [SCOPE.sCountry('france_scope').GetAdjectiveNoFlag] control, whether by cautious settlement or by decisive action."

  empire_of_france.6.f:0 "“An Emperor who would wear the Iron Crown cannot leave the Alpine doors in another man’s hands.”"

  empire_of_france.6.a:0 "Secure Savoy — no more."
  empire_of_france.6.b:0 "Take Savoy and Piedmont."
  empire_of_france.6.c:0 "Restore the Napoleonic borders in Italy."

  empire_of_france.7.t:0 "The Iberian Settlement"

  empire_of_france.7.d:0 "With the [SCOPE.sCountry('spain_scope').GetName] defeated and bound to the Empire, the western peninsula enters a new and uncertain phase. Napoleon Bonaparte once sought to secure Iberia not merely through conquest, but by reshaping its frontiers to protect [SCOPE.sCountry('france_scope').GetName] and deny its enemies a foothold beyond the Pyrenees. Now, ministers debate how far that legacy should be carried. Some argue that cooperation will suffice; others insist that the borderlands of [SCOPE.sState('aragon_state').GetStateRegion.GetNameNoFormatting] and [SCOPE.sState('navarra_state').GetStateRegion.GetNameNoFormatting] must be directly secured if imperial authority is to endure."

  empire_of_france.7.f:0 "“Spain may be ruled by treaty, but the frontier is ruled only by possession.”"

  empire_of_france.7.a:0 "Consolidate our influence over [SCOPE.sCountry('spain_scope').GetNameNoFlag]."
  empire_of_france.7.b:0 "Secure [SCOPE.sState('catalonia_state').GetStateRegion.GetNameNoFormatting] — no more."
  empire_of_france.7.c:0 "Restore the Napoleonic frontier in Iberia."

  empire_of_france.8.t:0 "The Empire Restored"

  empire_of_france.8.d:0 "The restoration is complete. The dynasty stands secure, the Rhine frontier affirmed, and the authority of [SCOPE.sCountry('france_scope').GetName] once again extends beyond its old limits."

  empire_of_france.8.f:0 "The Empire has not returned in a single moment, but through a series of deliberate acts — borders secured, institutions rebuilt, and influence restored where it once held sway. From the banks of the Rhine to the southern peninsulas of Europe, imperial order has been reasserted. Italy answers once more to Bonapartist direction, Spain bends to imperial influence, and Europe adjusts to the reality of a power that has returned not in name alone, but in fact.\n \n This victory is not merely conquest, but consolidation: a state capable of governing what it commands, and prepared to shape the years ahead."

  empire_of_france.8.a:0 "The Empire endures."

  empire_of_france.9.t:0 "The Imperial Restoration"

  empire_of_france.9.d:0 "The Republican order has collapsed under decisive action. With key institutions neutralized and authority reasserted, power has passed into new hands. The question before the nation is no longer whether the Republic can endure, but what shall now govern [SCOPE.sCountry('france_scope').GetName]."

  empire_of_france.9.f:0 "In the early hours, decrees are posted, assemblies dissolved, and arrests carried out with quiet efficiency. The army occupies the capital’s streets not to fight, but to prevent resistance. Newspapers are shuttered, opposition leaders detained, and the machinery of the state continues to function without interruption.\n \n There is no civil war, no barricades worthy of legend — only orders issued and obeyed. By the time the public fully understands what has occurred, the Republic has already ceased to exist in practice. Authority now rests with a single hand, justified not by chaos, but by the promise of order. As in 1851, power is seized not through upheaval, but through control."

  empire_of_france.9.a:0 "Restore the Monarchy."




