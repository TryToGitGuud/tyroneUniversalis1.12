  reinvite_napoleon_decision_desc:0 "With #v Bonapartist#! influence restored and the state secure, the government may once again extend an invitation to #b Napoleon#! to return to #b France#!. His presence would rally supporters of the dynasty and reopen the question of imperial leadership."
