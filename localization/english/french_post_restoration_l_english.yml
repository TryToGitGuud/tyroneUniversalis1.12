  #orleanist


  je_orleanist_france_industry_revolution:0 "Révolution Industrielle Orléaniste"

  je_orleanist_france_industry_revolution_reason:0 "While [SCOPE.sCountry('gbr_scope').GetName] was the first to enter the industrial age, [ROOT.GetCountry.GetName] cannot afford to remain behind. Guided by constitutional order, private capital, and bourgeois initiative, the state turns toward the steady modernization of its [SCOPE.sGoods('coal_scope').GetName], [SCOPE.sGoods('iron_scope').GetName], and [SCOPE.sGoods('steel_scope').GetName] in hopes to join [SCOPE.sCountry('gbr_scope').GetName] as an industrial nation. \n\nFrench [Concept('concept_gdp', '$concept_gdp_short$')], Current: @gdp! #v [ROOT.GetCountry.GetGDP|D]#!\nFrench [Concept('concept_gdp', '$concept_gdp_short$')], Yearly Goal: @gdp!#variable [GetGlobalVariable('orleanist_eco_ongoing_global_var_goal').GetValue|K]#!"

  je_orleanist_france_industry_revolution_goal: "#bold Révolution Industrielle Orléaniste#! measures performance in #bold yearly cycles#!, during which the [Concept('concept_gdp', '$concept_gdp_short$')] of #bold France#! must grow by at least #v 8%#!. Meeting this target will #g increase#! the #bold progress bar#! by #v 25#!, reaching a maximum of #v 500#! necessary to complete this [concept_journal_entry]"


  je_orleanist_france_industry_revolution_status:0 "France advances toward industry, cautiously but deliberately."

  orleanist_industry_modifier: "A Will to Catch Up"




  #gui


  je_sedo_politics_tooltip: "#header Current Progress#! \n$TOOLTIP_DELIMITER$\n Current progress toward industrialization is #P [GetMetaPlayer.GetPlayedOrObservedCountry.MakeScope.Var('french_industry_var_progressbar').GetValue|D] / 500"

  je_orleanist_tooltip_level1: "#header Very Limited Industrialization#! \n$TOOLTIP_DELIMITER$\n France is in the beginning stages of industrialization"

  je_orleanist_tooltip_level2: "#header Limited Industrialization#!\n$TOOLTIP_DELIMITER$\n France has started to industrialize"

  je_orleanist_tooltip_level3: "#header Modest Industrialization#! \n$TOOLTIP_DELIMITER$\nIndustrialization has started to bear fruit in France"

