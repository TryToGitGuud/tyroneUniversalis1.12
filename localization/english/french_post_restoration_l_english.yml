  orleanist_france.1.t:0 "An Age Settled in Stone and Iron"

  orleanist_france.1.d:0 "The great surge that reshaped workshops into factories and provinces into markets has slowed at last. What remains is not frenzy, but permanence. Boulevards, railways, and institutions now stand as proof that [ROOT.GetCountry.GetName] has exchanged revolutionary uncertainty for durable prosperity."

  orleanist_france.1.f:0 ""They said progress was fragile, that it would vanish with the first bad season. Yet here we stand—returns steady, contracts honored, and the kingdom intact. Let others dream of glory; I prefer dividends that arrive on time.""

  orleanist_france.1.a:0 "Let the future be built upon what endures."


  #legitimist

  law_ancien_regime: "The Ancien Régime"
  law_ancien_regime_desc: "The kingdom returns to its traditional order, where the monarch, nobility, and Church hold primary authority, and society is governed according to hierarchy, privilege, and long-established custom."

  dyn_c_kingdom_of_france: "Kingdom of France"
  je_house_of_bourbon: "La Lignée Ancienne"
  je_house_of_bourbon_reason: "#tooltippable La Lignée Ancienne#!:\n\nCompleting all items on the agenda will allow for the completion of the #bold La Lignée Ancienne#! [concept_journal_entry]. \n\n#bold The Legitimist Agenda#!: \n\n• [SCOPE.GetRootScope.GetCountry.GetCustom('restored_noble_priviledge_checkbox')] We have restored the #bold Noble Priviledges#! of the Ancien Regime.\n• [SCOPE.GetRootScope.GetCountry.GetCustom('reinstated_catholic_church_checkbox')] The #bold Catholic Church#! has been granted its rightful prominence.\n• [SCOPE.GetRootScope.GetCountry.GetCustom('royal_censorship_checkbox')] The policy of #bold Royal Censorship#! has been put in place to monitor and suppress radical political elements.\n• [SCOPE.GetRootScope.GetCountry.GetCustom('return_of_ancien_regime_checkbox')] We have achieved the restoration of the #bold Ancien Régime#!!\n\nWith the #bold Bourbon#! dynasty poised to reclaim its rightful throne, the so-called gains of revolution and usurpation stand increasingly in question. The Orléanist pretenders and the lingering shadow of the #bold Bonaparte#! legacy have long obscured the sacred principles upon which the kingdom was built. Yet across the [ROOT.GetCountry.GetName], faithful subjects and devoted nobles rally to the cause of the true king, ordained not by popular will, but by #bold divine right#!. The restoration of the ancient line promises not merely a change in ruler, but a rebirth of order—where throne and altar stand united, and the errors of the past decades are cast aside."

  je_bourbon_france_repeal_july_ordinances: "Repeal the July Reforms"
  je_bourbon_france_repeal_july_ordinances_desc: "The concessions forced upon the crown in recent decades have weakened royal authority. These reforms must be struck down to restore proper governance."

  restored_noble_priviledges: "Restored Noble Priviledges"
  catholic_church_revived: "A Revived Church"
  ancien_regime_restored: "The Ancien Régime"

  restore_noble_priviledges: "Restore Noble Privileges"
  restore_noble_priviledges_desc: "The old aristocracy, long stripped of its rightful influence by revolution and reform, must be restored to its proper place within society. By reaffirming their privileges and authority, the natural hierarchy of the realm can be rebuilt, strengthening both Crown and tradition."

  enact_royal_censorship: "Enact Royal Censorship"
  enact_royal_censorship_desc: "The spread of dangerous ideas through pamphlets and newspapers has undermined stability and respect for authority. By reimposing royal censorship, the state can curb dissent and ensure that public discourse serves order rather than chaos."

  catholic_church_revival: "Revival of the Church"
  catholic_church_revival_desc: "The erosion of faith has weakened the moral fabric of the nation. By restoring the influence of the Catholic Church in education and governance, society may once again be guided by spiritual authority and tradition."

  return_of_ancien_regime: "Return of the Ancien Régime"
  return_of_ancien_regime_desc: "At last, the long shadow of revolution can be cast aside. With the full restoration of the old order—its hierarchies, privileges, and traditions—the kingdom stands renewed, governed as it was before the forces of upheaval sought to remake it."


  legitimist_30_progress_tt: "Requires at least #v 30#! Legitimist Consolidation progress to begin restoring noble privilege."

  legitimist_60_progress_tt: "Requires at least #v 60#! Legitimist Consolidation progress to impose royal censorship and curb dissent."

  legitimist_90_progress_tt: "Requires at least #v 90#! Legitimist Consolidation progress to restore the influence of the Catholic Church."

  legitimist_120_progress_tt: "Requires #v 120#! Legitimist Consolidation progress to fully restore the #bold Ancien Régime#!."

  legitimist_events.1.t: "A Glorious Past"

  legitimist_events.1.d: "Across the [ROOT.GetCountry.GetNameNoFlag], voices grow louder in remembrance of a bygone age, when the House of Bourbon stood unchallenged at the heart of the nation. Though the throne has passed through revolution and compromise, devoted supporters of the old dynasty now look to reclaim its former glory."

  legitimist_events.1.f: "“They speak of progress and change, yet what has it brought us but turmoil and uncertainty? Once, the [ROOT.GetCountry.GetName] stood united beneath its rightful kings, guided by tradition and crowned with glory. The Bourbons were not merely rulers, but the very soul of the nation itself. If that greatness is to be restored, it will not come from the whims of the masses, but from the enduring legacy of a dynasty destined to rule.”"

  legitimist_events.1.a: "For the one true line!"

  legitimist_events.5.t: "The Ancien Régime Restored"

  legitimist_events.5.d: "After years of upheaval and cautious consolidation, the House of Bourbon has succeeded in restoring the kingdom to its traditional order. Authority now flows once more from the Crown, supported by the nobility and the Church, and society is realigned according to hierarchy, privilege, and time-honored custom."

  legitimist_events.5.f: "Across the [ROOT.GetCountry.GetName], loyalists rejoice as the monarchy, the nobility, and the Church stand united once more. The kingdom is reborn in the spirit of tradition and divine right, as centuries of upheaval are swept aside and the old order, with all its privileges and hierarchies, is reaffirmed for the generations to come."

  legitimist_events.5.a: "Celebrate the Restoration"

  legitimist_ruler_modifier: "L'État, c'est moi"

  completed_legitimist_agenda_tt: "We have completed the #tooltippable La Lignée Ancienne#! agenda."  

