l_german:
 war_stuff.1.t:0 "[SCOPE.sCountry('war_stuff_enemy').GetCapital.GetCityHubName] Besetzt"
 war_stuff.1.d:1 "Unsere siegreichen Armeen besetzen nun das Herz von [SCOPE.sCountry('war_stuff_enemy').GetName]. Wie wir die eroberte Hauptstadt behandeln, wird in der Geschichte widerhallen und unsere Legitimität sowie den Widerstandswillen des Feindes prägen."
 war_stuff.1.f:1 ""Diese Menschen wissen, dass ihr Schicksal von unserer Gnade abhängt.""
 war_stuff.1.a:0 "Ordnung aufrechterhalten und Institutionen respektieren."
 war_stuff.1.b:0 "Lasst die Truppen ihren Anteil nehmen."

 war_stuff.2.t:0 "[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] Besetzt"
 war_stuff.2.d:1 "Zu unserem Erstaunen haben die besetzenden [SCOPE.sCountry('war_stuff_enemy').GetAdjective] Streitkräfte trotz ihres Sieges Ordnung aufrechterhalten und unsere Institutionen respektiert."
 war_stuff.2.f:1 ""Die Invasoren patrouillierten die Märkte ohne zu plündern, ich sah sogar einen eine fallen gelassene Geldbörse zurückgeben! Wer erobert mit solcher... Zivilisation?""
 war_stuff.2.a:0 "Ihre Zurückhaltung wird zur Kenntnis genommen."

 war_stuff.3.t:0 "[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] Geplündert"
 war_stuff.3.d:1 "[SCOPE.sCountry('war_stuff_enemy').GetAdjective] Truppen haben [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] zu schwelenden Ruinen reduziert, unsere nationalen Schätze geplündert und unser Erbe geschändet."
 war_stuff.3.f:1 ""Jahrhunderte des Wissens zu Asche verbrannt. Sie schmolzen sogar Statuen für Altmetall!""
 war_stuff.3.a:0 "Sie werden für diese Barbarei bezahlen!"

 war_stuff.4.t:0 "Unruhen in [SCOPE.sState('war_stuff_state').GetName]"
 war_stuff.4.d:1 "Gewalttätige Ausbrüche sind in [SCOPE.sState('war_stuff_state').GetName] ausgebrochen, als besetzte Bevölkerungen unserer Autorität widerstehen. Die Straßen laufen rot vor Trotz, wir müssen sofort reagieren."
 war_stuff.4.f:1 ""Sie werfen Pflastersteine, die sie aus den von uns gepflasterten Straßen gerissen haben! Mein Leutnant fragte, ob wir zurückschießen sollen. Was soll ich ihm sagen?""
 war_stuff.4.a:0 "Zerschlage diese Rebellion mit maximaler Gewalt."
 war_stuff.4.b:0 "Patrouillen zurückziehen und Spannungen abkühlen lassen."

 war_stuff.5.t:0 "Die Trommeln des Krieges"
 war_stuff.5.d:1 "Eine koordinierte Propagandakampagne hat [SCOPE.sCountry('war_stuff_home').GetName] erfasst, patriotischen Eifer entfacht und die öffentliche Entschlossenheit gestärkt, den Kampf fortzusetzen."
 war_stuff.5.f:1 ""Jede Tapete trägt jetzt Rekrutierungsplakate! Sogar Kinder singen Marschlieder beim Seilspringen. Das Herz der Nation schlägt nur für den Sieg.""
 war_stuff.5.a:0 "Unser Volk steht geschlossen hinter der Sache!"

 war_stuff.6.t:0 "Rassismus in [SCOPE.sState('war_stuff_state').GetName]"
 war_stuff.6.d:1 "Bürger von [SCOPE.sCountry('war_stuff_home').GetName] in [SCOPE.sState('war_stuff_state').GetName] greifen gewaltsam Nachbarn mit [SCOPE.sCulture('war_stuff_culture').GetName] Erbe an und machen sie für den laufenden Krieg verantwortlich."
 war_stuff.6.f:1 ""'Geht nach Hause!', schrien sie...""
 war_stuff.6.a:0 "Lasst die Menschen ihren gerechten Zorn auslassen."
 war_stuff.6.b:0 "Schützt alle Bürger unabhängig von ihrer Herkunft."

 war_stuff.7.t:0 "Der Ruf der Einheit"
 war_stuff.7.d:1 "Delegationen aus [SCOPE.sCountry('war_stuff_enemy').GetName] sind eingetroffen und schlagen den freiwilligen Anschluss an [SCOPE.sCountry('war_stuff_home').GetName] vor, wobei sie auf gemeinsame Kultur und historische Bindungen verweisen."
 war_stuff.7.f:1 ""Mein Großvater kämpfte für unsere Trennung, aber meine Studenten marschieren nun und singen eure Hymnen. Das Rad der Geschichte dreht sich...""
 war_stuff.7.a:0 "Begrüßt unsere Brüder im [SCOPE.sCountry('war_stuff_home').GetNameNoFlag]!"
 war_stuff.7.b:0 "Wir respektieren die [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag] Unabhängigkeit."

 war_stuff.8.t:0 "Wellen der Annexion"
 war_stuff.8.d:1 "Nachrichten erreichen [SCOPE.GetRootScope.GetCountry.GetName], dass [SCOPE.sCountry('war_stuff_home').GetName] [SCOPE.sCountry('war_stuff_enemy').GetName] durch diplomatische Annexion absorbiert hat, was das europäische Machtgleichgewicht dramatisch verschiebt."
 war_stuff.8.f:1 ""Zuerst kamen sie für die Österreicher...""
 war_stuff.8.a:0 "Ein vollendetes Faktum, das wir anerkennen müssen."

 war_stuff.9.t:0 "Weißen Frieden mit [SCOPE.sCountry('war_stuff_enemy').GetName] vorschlagen"
 war_stuff.9.d:1 "Ohne aktive Landfronten im [SCOPE.sWar('war_stuff_war').GetName] empfehlen unsere Militärberater, einen weißen Frieden mit [SCOPE.sCountry('war_stuff_enemy').GetName] zu suchen. Dies würde den Konflikt ohne territoriale Veränderungen beenden und unsere Streitkräfte und Staatskasse vor weiterer Erschöpfung in einem festgefahrenen Krieg bewahren."
 war_stuff.9.f:1 ""
 war_stuff.9.a:0 "Gesandte mit Friedensbedingungen entsenden."
 war_stuff.9.b:0 "Den Krieg trotz der Pattsituation fortsetzen."

 war_stuff.10.t:0 "Friedensangebot von [SCOPE.sCountry('war_stuff_home').GetName]"
 war_stuff.10.d:1 "Diplomatische Kuriere kommen vom [SCOPE.sCountry('war_stuff_home').GetAdjective] Hauptquartier mit einem förmlichen Vorschlag, den [SCOPE.sWar('war_stuff_war').GetName] mit einer Rückkehr zu den Vorkriegsgrenzen zu beenden. Ihre Botschaft erkennt die strategische Pattsituation an und bietet die Einstellung aller Feindseligkeiten an."
 war_stuff.10.f:1 ""
 war_stuff.10.a:0 "Ihr Angebot annehmen."
 war_stuff.10.b:0 "Ihr Angebot ablehnen."

 war_stuff.11.t:0 "Die Meuterei der Erschöpften"
 war_stuff.11.d:1 "Die Schützengräben sind zu einem Friedhof geworden, und die Männer haben ihren Bruchpunkt erreicht. Berichte von der [SCOPE.sFront('war_stuff_front').GetName] beschreiben ganze Regimenter, die sich weigern, Bajonette aufzupflanzen. Sie behaupten, sie werden die Linie gegen einen feindlichen Vormarsch halten, aber sie werden nicht länger an 'selbstmörderischen' Offensiven für eine Regierung teilnehmen, die den Wert ihres Lebens vergessen zu haben scheint."
 war_stuff.11.f:1 ""Wir werden nicht gegen das Mutterland vorgehen, aber wir werden nicht für eine Lüge sterben. Wenn die Generäle diesen Hügel wollen, sollen sie ihn selbst einnehmen.""
 war_stuff.11.a:0 "Ordnung mit dem Exekutionskommando wiederherstellen."
 war_stuff.11.b:0 "Ihre Beschwerden anhören und die Rationen verbessern."

 war_stuff.12.t:0 "Der Munitionsskandal"
 war_stuff.12.d:1 "Eine nationale Blamage ist ans Licht gekommen: Unsere Soldaten an der Front werden mit fehlerhaften Geschossen versorgt; oder schlimmer, gar keine. Während unsere tapferen Männer dem feindlichen Feuer ausgesetzt sind, stecken die Fabriken in der Heimat in Ineffizienz und explodierenden Kosten fest. Die Presse verlangt zu wissen, warum das 'Arsenal von [SCOPE.GetRootScope.GetCountry.GetName]' in unserer Stunde der Not verstummt."
 war_stuff.12.f:1 ""Ein Soldat ohne Kugel ist nur ein Ziel. Es ist ein Verbrechen höchsten Grades, dass unsere Industrie profitiert, während unsere Gewehre leer klicken.""
 war_stuff.12.a:0 "Die Produktion trotzdem erzwingen."
 war_stuff.12.b:0 "Qualität und Versorgungsleitungsintegrität priorisieren."

 war_stuff.13.t:0 "Der [SCOPE.sCharacter('war_stuff_general_offensive').GetLastName]-Plan"
 war_stuff.13.d:1 "Die Karten im Generalhauptquartier haben sich seit Monaten nicht geändert. An der [SCOPE.sFront('war_stuff_front').GetName] wird jeder am Morgen gewonnene Meter Erde bis zum Einbruch der Dunkelheit zurückerobert. [SCOPE.sCharacter('war_stuff_general_offensive').GetFullName] ist von der Front mit einem Stapel operativer Karten und einer grimmigen Entschlossenheit eingetroffen. Er besteht darauf, dass er mit genug Durchhaltevermögen und 'einem letzten großen Vorstoß' die [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag] Linien zerschmettern und der Krieg wieder Bewegung bringen kann."
 war_stuff.13.f:1 "\"Die Männer sind müde, ja, aber sie sind es müder, im Schlamm auf den Tod zu warten. Gebt mir die Geschosse, und ich werde [SCOPE.sCountry('war_stuff_enemy').GetNameNoFormatting] ein für alle Mal brechen.\""
 war_stuff.13.a:0 "Die [SCOPE.sCharacter('war_stuff_general_offensive').GetLastName]-Offensive beginnen."
 war_stuff.13.b:0 "Den Plan ablehnen und unsere Verteidigung aufrechterhalten."

 war_stuff.14.t:0 "Die Befreiungsinitiative"
 war_stuff.14.d:1 "Die Linien an der [SCOPE.sFront('war_stuff_front').GetName] sind zum Stillstand gekommen, was unsere eigenen Landsleute unter [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag] Besatzung verkümmern lässt. [SCOPE.sCharacter('war_stuff_general_liberation').GetFullName] hat dem Kriegsministerium einen gewagten operativen Plan vorgelegt. Er argumentiert, dass wir durch Konzentration unserer Truppen und Appell an den Wunsch der Männer, ihre eigenen Herde zurückzuerobern, die [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag] Linien zerschmettern können."
 war_stuff.14.f:1 "\"Jeder Tag, den wir verzögern, ist ein weiterer Tag des Leidens für unsere Brüder in [SCOPE.sState('war_stuff_liberation_state').GetNameNoFormatting]. Geben Sie den Befehl, und wir werden die [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFormatting] Bedrohung über die Grenze zurücktreiben.\""
 war_stuff.14.a:0 "Die [SCOPE.sCharacter('war_stuff_general_liberation').GetLastName]-Offensive genehmigen."
 war_stuff.14.b:0 "Eine defensive Haltung beibehalten."

