l_german:
 more_unique_companies_ig_farben: "Gründung von $company_IG_Farben$"
 more_unique_companies_ig_farben_reason: "Der Aufstieg konkurrierender Unternehmen wie [SCOPE.sCompany('relevant_company').GetName][SCOPE.sCompany('relevant_company_2').GetName][SCOPE.sCompany('relevant_company_3').GetName][SCOPE.sCompany('relevant_company_4').GetName][SCOPE.sCompany('relevant_company_5').GetName][SCOPE.sCompany('relevant_company_6').GetName] machte das Geschäft weniger profitabel. Um die Nachteile des Wettbewerbs zu beseitigen, ohne dessen Vorteile zu verlieren, wollen diese Unternehmen ihre aktuelle Position nutzen und sich zu einem neuen Unternehmen namens #b $company_IG_Farben$#! zusammenschließen. Gelingt dies, kann das neue Unternehmen seine Wettbewerbsfähigkeit auf dem globalen @fertilizer! #b $fertilizer$#! und @dye! #b $synthetic_dye$#! Markt ausbauen."
 more_unique_companies_ig_farben_goal: "Halte Folgendes für #v [GetPlayer.MakeScope.ScriptValue('more_unique_companies_journal_entry_months')] Monate#! aufrecht (aktuell #v [ROOT.GetCountry.MakeScope.Var('ig_farben_timer_var').GetValue]#!): #indent_newline:3 "
 more_unique_companies_ig_farben_complete_tt: "Hat den [concept_journal_entry] #b $more_unique_companies_ig_farben$#! abgeschlossen"
 ig_farben_establishment_tt: "[SCOPE.sCompany('relevant_company').GetName][SCOPE.sCompany('relevant_company_2').GetName][SCOPE.sCompany('relevant_company_3').GetName][SCOPE.sCompany('relevant_company_4').GetName][SCOPE.sCompany('relevant_company_5').GetName][SCOPE.sCompany('relevant_company_6').GetName] werden zu einem neuen Unternehmen zusammengeführt: #b $company_IG_Farben$#"
 ig_farben_prosperous_tt: "Halte [SCOPE.sCompany('relevant_company').GetName][SCOPE.sCompany('relevant_company_2').GetName][SCOPE.sCompany('relevant_company_3').GetName][SCOPE.sCompany('relevant_company_4').GetName][SCOPE.sCompany('relevant_company_5').GetName][SCOPE.sCompany('relevant_company_6').GetName] [concept_company] mit einem [concept_prosperity] von über #v 100#!"
 more_unique_companies_ig_farben_lobby: "Der Aufstieg konkurrierender Unternehmen machte das Geschäft weniger profitabel. Um die Nachteile des Wettbewerbs zu beseitigen, ohne dessen Vorteile zu verlieren, wollen diese Unternehmen ihre aktuelle Position nutzen und sich zu einem neuen Unternehmen namens #b $company_IG_Farben$#! zusammenschließen. Gelingt dies, kann das neue Unternehmen seine Wettbewerbsfähigkeit auf dem globalen @fertilizer! #b $fertilizer$#! und @dye! #b $synthetic_dye$#! Markt ausbauen."

 
 more_unique_companies_ICI: "Gründung von $company_ICI$"
 more_unique_companies_ICI_reason: "Der Aufstieg konkurrierender Unternehmen wie [SCOPE.sCompany('relevant_company').GetName][SCOPE.sCompany('relevant_company_2').GetName][SCOPE.sCompany('relevant_company_3').GetName][SCOPE.sCompany('relevant_company_4').GetName] machte das Geschäft zunehmend unrentabel. Zersplittert und von effizienteren ausländischen Rivalen, insbesondere den deutschen Chemiekonzernen überholt, hatten britische Firmen Mühe mitzuhalten. Als Reaktion darauf haben sie beschlossen, sich zu einem einzigen Unternehmen zusammenzuschließen: #b $company_ICI$#$!#. Diese Konsolidierung zielt darauf ab, interne Konkurrenz zu beseitigen und die strategische Position Großbritanniens in den Bereichen @fertilizer!#b $fertilizer$#!, @explosives!#b $explosives$#! und @dye!#b $synthetic_dye$#! zu sichern."
 more_unique_companies_ICI_goal: "Halte Folgendes für #v [GetPlayer.MakeScope.ScriptValue('more_unique_companies_journal_entry_months')] Monate#! aufrecht (aktuell #v [ROOT.GetCountry.MakeScope.Var('ICI_timer_var').GetValue]#!): #indent_newline:3 "
 more_unique_companies_ICI_complete_tt: "Hat den [concept_journal_entry] #b $more_unique_companies_ICI$#! abgeschlossen"
 ICI_establishment_tt: "[SCOPE.sCompany('relevant_company').GetName][SCOPE.sCompany('relevant_company_2').GetName][SCOPE.sCompany('relevant_company_3').GetName][SCOPE.sCompany('relevant_company_4').GetName] werden zu einem neuen Unternehmen zusammengeführt: #b $company_IG_Farben$#"
 ICI_prosperous_tt: "Halte [SCOPE.sCompany('relevant_company').GetName][SCOPE.sCompany('relevant_company_2').GetName][SCOPE.sCompany('relevant_company_3').GetName][SCOPE.sCompany('relevant_company_4').GetName][SCOPE.sCompany('relevant_company_5').GetName][SCOPE.sCompany('relevant_company_6').GetName] [concept_company] mit einem [concept_prosperity] von über #v 100#!"
 more_unique_companies_ICI_lobby: "Der Aufstieg konkurrierender Unternehmen machte das Geschäft zunehmend unrentabel. Zersplittert und von effizienteren ausländischen Rivalen, insbesondere den deutschen Chemiekonzernen überholt, hatten britische Firmen Mühe mitzuhalten. Als Reaktion darauf haben sie beschlossen, sich zu einem einzigen Unternehmen zusammenzuschließen: #b $company_ICI$#$!#. Diese Konsolidierung zielt darauf ab, interne Konkurrenz zu beseitigen und die strategische Position Großbritanniens in den Bereichen @fertilizer!#b $fertilizer$#!, @explosives!#b $explosives$#! und @dye!#b $synthetic_dye$#! zu sichern."
 
 
 more_unique_companies_zaibatsu_sumitomo: "Vorherrschaft der Zaibatsu:$company_Sumitomo$"
 more_unique_companies_zaibatsu_sumitomo_reason: "Unternehmen wie [SCOPE.sCompany('relevant_company').GetName] haben zunehmend an Einfluss gewonnen und bilden das Rückgrat der industriellen und finanziellen Modernisierung von [Country.GetName] im späten 19. und frühen 20. Jahrhundert. Im Rahmen eines staatsgelenkten Kapitalismus dehnten sich diese Zaibatsu auf Bereiche wie Bergbau, Bankwesen, Industrie und Handel aus und florierten häufig durch enge Verbindungen zur Regierung. Ihr Einfluss wurde so tiefgreifend, dass sie untrennbar mit der Struktur der [Country.GetName]-Wirtschaft verbunden sind."
