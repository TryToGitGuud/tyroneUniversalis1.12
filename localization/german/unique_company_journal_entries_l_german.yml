 more_unique_companies_us_steel_corp: "Aufstieg von der $company_us_steel_corp$"
 more_unique_companies_us_steel_corp_reason: "Mit dem Aufstieg von #b J.P. Morgan#! und anderen bedeutenden Investoren in der Schwerindustrie schien die Gründung des weltweit größten @steel! #b $steel$#!-Produzenten unausweichlich. Obwohl #b $company_us_steel$#! als führender Anwärter galt, war das Ergebnis keineswegs vorbestimmt. [SCOPE.sCompany('relevant_company').GetName] ging schließlich aus einer großen Konsolidierung innerhalb des Stahlsektors hervor, die die Kräfte der führenden Produzenten [Country.GetName]s vereinte. Unter anderen Umständen hätte auch ein anderes [concept_company] an Bedeutung gewinnen können. Doch nun ist der Einfluss von [SCOPE.sCompany('relevant_company').GetName] so tief verwurzelt, dass er untrennbar mit dem wirtschaftlichen Gefüge von [Country.GetName] verbunden ist."
 more_unique_companies_us_steel_corp_goal: "Halte Folgendes für #v [GetPlayer.MakeScope.ScriptValue('more_unique_companies_journal_entry_months')] Monate#! aufrecht (derzeit #v [ROOT.GetCountry.MakeScope.Var('us_steel_corp_timer_var').GetValue]#!): #indent_newline:3 "
 more_unique_companies_us_steel_corp_complete_tt: "Habe den #b $more_unique_companies_us_steel_corp$#! [concept_journal_entry] abgeschlossen"
 us_steel_corp_establishment_tt: "#b $company_us_steel_corp$#! wird durch die Fusion von [SCOPE.sCompany('relevant_company').GetName] und vielen kleineren @coal! #b $coal$#!, @iron! #b $iron$#!, @lead! #b $lead$#! and @steel! #b $steel$#!-Produzenten gegründet."
 us_steel_corp_required_building_levels_tt: "Erfordert, dass das [concept_company] mindestens #b 50#! [concept_company]-eigene [concept_building] besitzt"
 more_unique_companies_us_steel_corp_lobby: "Mit dem Aufstieg von #b J.P. Morgan#! und anderen bedeutenden Investoren in der Schwerindustrie schien die Gründung des weltweit größten @steel! #b $steel$#!-Produzenten unausweichlich. Obwohl #b $company_us_steel$#! als führender Anwärter galt, war das Ergebnis keineswegs vorbestimmt. #b $company_us_steel$#! ging schließlich aus einer großen Konsolidierung innerhalb des Stahlsektors hervor, die die Kräfte der führenden Produzenten [Country.GetName]s vereinte. Unter anderen Umständen hätte auch ein anderes [concept_company] an Bedeutung gewinnen können. Doch nun ist der Einfluss so tief verwurzelt, dass er untrennbar mit dem wirtschaftlichen Gefüge von [Country.GetName] verbunden ist."
 
 
 more_unique_companies_deutsche_reichsbahn: "Gründung der $company_Deutsche_Reichsbahn$"
 more_unique_companies_deutsche_reichsbahn_reason: "[SCOPE.sCompany('relevant_company').GetName] war eines von vielen kleineren Eisenbahn-[concept_company], die vor der deutschen Einigung gegründet wurden. Nach der Einigung behielten die verschiedenen Königreiche und Fürstentümer unterschiedliche Grade an Autonomie innerhalb der deutschen Nation – eines dieser Gebiete war die Kontrolle über ihre eigenen #b $building_railway$#!-Systeme. Mit der Abschaffung der Monarchie und der verbleibenden Fürstentümer haben wir nun endlich die Möglichkeit, die zersplitterten #b $building_railway$#!-Anbieter in einer einzigen, einheitlichen Organisation zu vereinen. #b $company_Deutsche_Reichsbahn$#! wird durch die Fusion dieser zahlreichen Anbieter gegründet."
 more_unique_companies_deutsche_reichsbahn_goal: "Halte [concept_prosperity] für #v [GetPlayer.MakeScope.ScriptValue('more_unique_companies_deutsche_reichsbahn_months')] Monate#! aufrecht (derzeit: #v [ROOT.GetCountry.MakeScope.Var('deutsche_reichsbahn_timer_var').GetValue]#!), und erfülle alle weiteren Bedingungen: #indent_newline:3"
 more_unique_companies_deutsche_reichsbahn_complete_tt: "Hab den [concept_journal_entry] #b $more_unique_companies_deutsche_reichsbahn$#! abgeschlossen"
 deutsche_reichsbahn_establishment_tt: "#b $company_Deutsche_Reichsbahn$#! wird durch die Fusion von [SCOPE.sCompany('relevant_company').GetName] und den zahlreichen zersplitterten #b $building_railway$#!-Anbietern gegründet"
 more_unique_companies_deutsche_reichsbahn_lobby: "Vor der deutschen Einigung behielten die verschiedenen Königreiche und Fürstentümer unterschiedliche Grade an Autonomie innerhalb der deutschen Nation – eines dieser Gebiete war die Kontrolle über ihre eigenen #b $building_railway$#!-Systeme. Mit der Abschaffung der Monarchie und der verbleibenden Fürstentümer haben wir nun endlich die Möglichkeit, die zersplitterten #b $building_railway$#!-Anbieter in einer einzigen, einheitlichen Organisation zu vereinen. #b $company_Deutsche_Reichsbahn$#! wird durch die Fusion dieser zahlreichen Anbieter gegründet."